---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "ceph-lan-${EXTERNAL_DOMAIN/./-}"
  namespace: rook-ceph
spec:
  secretName: "ceph-lan-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  dnsNames:
    - "ceph.lan.${EXTERNAL_DOMAIN}"
