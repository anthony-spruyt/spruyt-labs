---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/authentik-forward-auth.yaml
  - ../base/compress.yaml
  - ./certificates.yaml
  - ./ingress-routes.yaml
patches:
  - target:
      kind: Middleware
      name: authentik-forward-auth
    patch: |
      - op: replace
        path: /metadata/namespace
        value: agent-worker-system
      - op: replace
        path: /metadata/name
        value: authentik-forward-auth-bull-board
      - op: replace
        path: /spec/forwardAuth/address
        value: http://ak-outpost-bull-board-outpost.agent-worker-system.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
  - target:
      kind: Middleware
      name: compress
    patch: |
      - op: replace
        path: /metadata/namespace
        value: agent-worker-system
