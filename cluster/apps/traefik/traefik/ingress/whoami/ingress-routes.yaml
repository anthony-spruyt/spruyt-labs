---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-lan-https
  namespace: whoami
  annotations:
    #kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: whoami.lan.${EXTERNAL_DOMAIN}
    #external-dns.alpha.kubernetes.io/target: ${LB_IP_TRAEFIK}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoami.lan.${EXTERNAL_DOMAIN}`) #&& PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: compress
      services:
        - name: whoami
          namespace: whoami
          passHostHeader: true
          port: 80
  tls:
    secretName: "wildcard-internal-${EXTERNAL_DOMAIN/./-}-tls"
