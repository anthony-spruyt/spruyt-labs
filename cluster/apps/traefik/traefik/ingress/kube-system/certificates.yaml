---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "hubble-lan-${EXTERNAL_DOMAIN/./-}"
  namespace: kube-system
spec:
  secretName: "hubble-lan-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  dnsNames:
    - "hubble.lan.${EXTERNAL_DOMAIN}"
