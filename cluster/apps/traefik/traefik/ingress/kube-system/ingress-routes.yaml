---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-lan
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    external-dns.alpha.kubernetes.io/hostname: hubble.lan.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`hubble.lan.${EXTERNAL_DOMAIN}`)
      services:
        - name: hubble-ui
          namespace: kube-system
          passHostHeader: true
          port: 80
  tls:
    secretName: "wildcard-internal-${EXTERNAL_DOMAIN/./-}-tls"
---
# #yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroutetcp_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/tcp/ingressroutetcp/
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: ingress-route-kube-api
  namespace: kube-system
  annotations:
    external-dns.alpha.kubernetes.io/hostname: api.lan.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`api.lan.${EXTERNAL_DOMAIN}`)
      services:
        - name: kubernetes-api
          namespace: kube-system
          port: 6443
  tls:
    passthrough: true
