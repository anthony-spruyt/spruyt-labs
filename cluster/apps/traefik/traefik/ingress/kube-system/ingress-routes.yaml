---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-lan
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: hubble.lan.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`hubble.lan.${EXTERNAL_DOMAIN}`)
      middlewares:
        # - name: lan-ip-whitelist
        - name: compress
      services:
        - name: hubble-ui
          namespace: kube-system
          passHostHeader: true
          port: 80
  tls:
    secretName: "hubble-internal-${EXTERNAL_DOMAIN/./-}-tls"
