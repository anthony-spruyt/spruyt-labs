---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "github-mcp-lan-${EXTERNAL_DOMAIN/./-}"
  namespace: github-mcp
spec:
  secretName: "github-mcp-lan-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  dnsNames:
    - "github-mcp.lan.${EXTERNAL_DOMAIN}"
