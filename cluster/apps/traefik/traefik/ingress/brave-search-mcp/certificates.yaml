---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "brave-search-mcp-lan-${EXTERNAL_DOMAIN/./-}"
  namespace: brave-search-mcp
spec:
  secretName: "brave-search-mcp-lan-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  dnsNames:
    - "brave-search-mcp.lan.${EXTERNAL_DOMAIN}"
