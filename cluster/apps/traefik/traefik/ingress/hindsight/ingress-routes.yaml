---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-lan-https
  namespace: hindsight
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: hindsight.lan.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost path - required for SSO auth flow redirects
    # Uses standalone outpost deployed to local namespace by Authentik
    - kind: Rule
      match: Host(`hindsight.lan.${EXTERNAL_DOMAIN}`) && PathPrefix(`/outpost.goauthentik.io/`)
      middlewares:
        - name: lan-ip-whitelist
        - name: compress
      services:
        - name: ak-outpost-hindsight-outpost
          passHostHeader: true
          port: 9000
    # Main control-plane route with SSO forward-auth + LAN whitelist
    - kind: Rule
      match: Host(`hindsight.lan.${EXTERNAL_DOMAIN}`)
      middlewares:
        - name: authentik-forward-auth
        - name: lan-ip-whitelist
        - name: compress
      services:
        - name: hindsight-control-plane
          namespace: hindsight
          passHostHeader: true
          port: 3000
  tls:
    secretName: "hindsight-lan-${EXTERNAL_DOMAIN/./-}-tls"
