---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "vaultwarden-${EXTERNAL_DOMAIN/./-}-tls-vaultwarden"
  namespace: vaultwarden
spec:
  secretName: "vaultwarden-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  commonName: "vaultwarden.${EXTERNAL_DOMAIN}"
  dnsNames:
    - "vaultwarden.${EXTERNAL_DOMAIN}"
