---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-wan-vaultwarden
  namespace: vaultwarden
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: vaultwarden.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vaultwarden.${EXTERNAL_DOMAIN}`) && PathPrefix(`/admin`)
      kind: Rule
      middlewares:
        - name: lan-ip-whitelist
      services:
        - name: vaultwarden
          namespace: vaultwarden
          passHostHeader: true
          port: 80
    - match: Host(`vaultwarden.${EXTERNAL_DOMAIN}`)
      kind: Rule
      middlewares:
        # - name: compress
        - name: rate-limit
      services:
        - name: vaultwarden
          namespace: vaultwarden
          passHostHeader: true
          port: 80
  tls:
    secretName: "vaultwarden-${EXTERNAL_DOMAIN/./-}-tls"
