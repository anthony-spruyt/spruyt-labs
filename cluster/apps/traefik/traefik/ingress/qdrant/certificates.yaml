---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "qdrant-lan-${EXTERNAL_DOMAIN/./-}"
  namespace: qdrant-system
spec:
  secretName: "qdrant-lan-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  dnsNames:
    - "qdrant.lan.${EXTERNAL_DOMAIN}"
