---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-lan-https
  namespace: flux-system
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: flux.lan.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost path - required for SSO auth flow redirects
    - kind: Rule
      match: Host(`flux.lan.${EXTERNAL_DOMAIN}`) && PathPrefix(`/outpost.goauthentik.io/`)
      middlewares:
        - name: lan-ip-whitelist
        - name: compress
      services:
        - name: ak-outpost-flux-outpost
          passHostHeader: true
          port: 9000
    # Main route with SSO forward-auth
    - kind: Rule
      match: Host(`flux.lan.${EXTERNAL_DOMAIN}`)
      middlewares:
        - name: authentik-forward-auth
        - name: lan-ip-whitelist
        - name: compress
      services:
        - name: flux-operator
          namespace: flux-system
          passHostHeader: true
          port: 9080
  tls:
    secretName: "flux-lan-${EXTERNAL_DOMAIN/./-}-tls"
