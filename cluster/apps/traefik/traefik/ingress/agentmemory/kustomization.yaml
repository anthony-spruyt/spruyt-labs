---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/lan-ip-whitelist.yaml
  - ../base/authentik-forward-auth.yaml
  - ./api-key-auth.yaml
  - ./certificates.yaml
  - ./ingress-routes.yaml
  - ./stream-replace-path.yaml
patches:
  - target:
      kind: Middleware
      name: lan-ip-whitelist
    patch: |
      - op: replace
        path: /metadata/namespace
        value: agentmemory
  - target:
      kind: Middleware
      name: authentik-forward-auth
    patch: |
      - op: replace
        path: /metadata/namespace
        value: agentmemory
      - op: replace
        path: /metadata/name
        value: authentik-forward-auth-agentmemory
      - op: replace
        path: /spec/forwardAuth/address
        value: http://ak-outpost-agentmemory-outpost.agentmemory.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
