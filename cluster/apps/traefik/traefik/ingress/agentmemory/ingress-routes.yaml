---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-lan-https-agentmemory
  namespace: agentmemory
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: agentmemory.lan.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`agentmemory.lan.${EXTERNAL_DOMAIN}`) && PathPrefix(`/outpost.goauthentik.io/`)
      middlewares:
        - name: lan-ip-whitelist
      services:
        - name: ak-outpost-agentmemory-outpost
          passHostHeader: true
          port: 9000
    - kind: Rule
      match: Host(`agentmemory.lan.${EXTERNAL_DOMAIN}`)
      middlewares:
        - name: lan-ip-whitelist
        - name: authentik-forward-auth-agentmemory
      services:
        - name: agentmemory
          namespace: agentmemory
          passHostHeader: true
          port: 3113
  tls:
    secretName: "agentmemory-lan-${EXTERNAL_DOMAIN/./-}-tls"
---
