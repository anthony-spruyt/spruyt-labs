---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/middleware_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/middlewares/http/forwardauth/
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forward-auth
  namespace: placeholder
spec:
  forwardAuth:
    # Uses standalone outpost deployed to n8n-system namespace by Authentik
    # Service name format: ak-outpost-<outpost-name-slug>
    # Outpost name "N8N Outpost" -> service "ak-outpost-n8n-outpost"
    # FQDN required because Traefik resolves from its own namespace context
    address: http://ak-outpost-n8n-outpost.n8n-system.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
