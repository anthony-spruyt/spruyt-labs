---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "wildcard-internal-home-domain-tls"
  namespace: placeholder
spec:
  secretName: "wildcard-internal-home-domain-tls"
  issuerRef:
    name: letsencrypt-staging # letsencrypt-staging | letsencrypt-production
    kind: ClusterIssuer
  commonName: "${EXTERNAL_DOMAIN}"
  dnsNames:
    - "${EXTERNAL_DOMAIN}"
    - "*.lan.${EXTERNAL_DOMAIN}"
