---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "wildcard-${EXTERNAL_DOMAIN/./-}-tls"
  namespace: placeholder
spec:
  secretName: "wildcard-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: letsencrypt-production # letsencrypt-staging | letsencrypt-production
    kind: ClusterIssuer
  commonName: "${EXTERNAL_DOMAIN}"
  dnsNames:
    - "${EXTERNAL_DOMAIN}"
    - "*.${EXTERNAL_DOMAIN}"
