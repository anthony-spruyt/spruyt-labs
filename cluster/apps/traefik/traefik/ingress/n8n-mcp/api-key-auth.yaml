---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/middleware_v1alpha1.json
# Passthrough mode: translates X-API-KEY → Authorization: Bearer for n8n-mcp.
# No validation here — backend validates the Bearer token.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-key-auth-n8n-mcp
  namespace: n8n-mcp
spec:
  plugin:
    traefik-api-key-auth:
      authenticationHeader: true
      authenticationHeaderName: X-API-KEY
      bearerHeader: false
      removeHeadersOnSuccess: true
      forwardBearerHeader: true
      forwardBearerHeaderName: Authorization
