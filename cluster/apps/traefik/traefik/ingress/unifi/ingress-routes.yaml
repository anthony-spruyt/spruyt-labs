---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroutetcp_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: ingress-routes-wan-unifi
  namespace: unifi
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: unifi.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`unifi.${EXTERNAL_DOMAIN}`)
      services:
        - name: unifi
          namespace: unifi
          port: 8443
  tls:
    passthrough: true
