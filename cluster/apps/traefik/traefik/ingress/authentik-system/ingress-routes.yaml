---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/traefik.io/ingressroute_v1alpha1.json
# Documentation: https://doc.traefik.io/traefik/reference/routing-configuration/kubernetes/crd/http/ingressroute/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-routes-wan-https
  namespace: authentik-system
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    external-dns.alpha.kubernetes.io/hostname: auth.${EXTERNAL_DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    # Admin interface - LAN only
    - kind: Rule
      match: Host(`auth.${EXTERNAL_DOMAIN}`) && PathPrefix(`/if/admin`)
      middlewares:
        - name: lan-ip-whitelist
        - name: compress
      services:
        - name: authentik-server
          namespace: authentik-system
          passHostHeader: true
          port: 80
    # Everything else - public (SSO flows, login UI)
    - kind: Rule
      match: Host(`auth.${EXTERNAL_DOMAIN}`)
      middlewares:
        - name: compress
      services:
        - name: authentik-server
          namespace: authentik-system
          passHostHeader: true
          port: 80
  tls:
    secretName: "auth-${EXTERNAL_DOMAIN/./-}-tls"
