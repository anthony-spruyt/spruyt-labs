---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/compress.yaml
  - ../base/external-certificate.yaml
  - ../base/internal-certificate.yaml
  - ./ingress-routes.yaml
patches:
  - target:
      kind: Certificate
      name: "wildcard-${EXTERNAL_DOMAIN/./-}-tls"
    patch: |
      - op: replace
        path: /metadata/namespace
        value: technitium
  - target:
      kind: Certificate
      name: "wildcard-internal-${EXTERNAL_DOMAIN/./-}-tls"
    patch: |
      - op: replace
        path: /metadata/namespace
        value: technitium
  - target:
      kind: Middleware
      name: compress
    patch: |
      - op: replace
        path: /metadata/namespace
        value: technitium
