---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Firefly III + Firemerge (shared namespace)
  - ../base/compress.yaml
  - ../base/lan-ip-whitelist.yaml
  - ./certificates.yaml
  - ./forward-auth.yaml
  - ./ingress-routes.yaml
patches:
  # Shared middlewares for namespace
  - target:
      kind: Middleware
      name: compress
    patch: |
      - op: replace
        path: /metadata/namespace
        value: firefly-iii
  - target:
      kind: Middleware
      name: lan-ip-whitelist
    patch: |
      - op: replace
        path: /metadata/namespace
        value: firefly-iii
