---
# yaml-language-server: $schema=https://raw.githubusercontent.com/traefik/traefik-helm-chart/refs/heads/master/traefik/values.schema.json
# Default values for traefik: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
priorityClassName: critical-infrastructure
# PSS restricted compliance - add seccompProfile (chart defaults handle runAsUser/runAsGroup)
podSecurityContext:
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
log:
  format: json
  level: INFO
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 1Gi
tracing:
  otlp:
    enabled: true
    http:
      enabled: true
      endpoint: http://victoria-traces-single-vt-single-server.observability.svc:10428/insert/opentelemetry/v1/traces
ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    forwardedHeaders:
      trustedIPs:
        - "${CLUSTER_POD_CIDR_IP4}"
providers:
  kubernetesCRD:
    allowCrossNamespace: false
service:
  annotations:
    lbipam.cilium.io/ips: "${TRAEFIK_IP4}"
  spec:
    externalTrafficPolicy: Local
tlsStore:
  default:
    defaultCertificate:
      secretName: "wildcard-${EXTERNAL_DOMAIN/./-}-tls"
deployment:
  annotations:
    secret.reloader.stakater.com/reload: traefik-api-keys
  additionalVolumes:
    - name: traefik-api-key-auth-plugin
      configMap:
        name: traefik-api-key-auth-plugin
experimental:
  localPlugins:
    traefik-api-key-auth:
      moduleName: "github.com/linkphoenix/traefik-api-key-auth"
      mountPath: /plugins-local/src/github.com/linkphoenix/traefik-api-key-auth
      type: localPath
      volumeName: traefik-api-key-auth-plugin
env:
  - name: OTEL_API_KEY
    valueFrom:
      secretKeyRef:
        name: traefik-api-keys
        key: OTEL_API_KEY
