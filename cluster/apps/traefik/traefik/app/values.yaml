---
# yaml-language-server: $schema=https://raw.githubusercontent.com/traefik/traefik-helm-chart/refs/heads/master/traefik/values.schema.json
# Default values for traefik: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
priorityClassName: critical-infrastructure
# PSS restricted compliance - add seccompProfile (chart defaults handle runAsUser/runAsGroup)
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
logs:
  general:
    format: json
    level: INFO
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 1Gi
ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
providers:
  kubernetesCRD:
    allowCrossNamespace: false
service:
  annotations:
    lbipam.cilium.io/ips: "${TRAEFIK_IP4}"
  spec:
    externalTrafficPolicy: Local
tlsStore:
  default:
    defaultCertificate:
      secretName: "wildcard-${EXTERNAL_DOMAIN/./-}-tls"
deployment:
  additionalVolumes:
    - name: traefik-api-key-auth-plugin
      configMap:
        name: traefik-api-key-auth-plugin
experimental:
  localPlugins:
    traefik-api-key-auth:
      moduleName: "github.com/linkphoenix/traefik-api-key-auth"
      mountPath: /plugins-local/src/github.com/linkphoenix/traefik-api-key-auth
      type: localPath
      volumeName: traefik-api-key-auth-plugin
env:
  - name: KUBECTL_MCP_API_KEY
    valueFrom:
      secretKeyRef:
        name: traefik-mcp-api-keys
        key: KUBECTL_MCP_API_KEY
  - name: VM_MCP_API_KEY
    valueFrom:
      secretKeyRef:
        name: traefik-mcp-api-keys
        key: VM_MCP_API_KEY
