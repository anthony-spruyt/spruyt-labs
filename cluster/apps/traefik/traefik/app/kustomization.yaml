---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./fallback-certificate.yaml
  - ./mcp-api-keys-secrets.sops.yaml
  - ./release.yaml
configMapGenerator:
  - name: traefik-values
    namespace: traefik
    files:
      - values.yaml
  - name: traefik-api-key-auth-plugin
    namespace: traefik
    options:
      disableNameSuffixHash: true
    files:
      - plugin.go=plugins/traefik-api-key-auth/plugin.go
      - go.mod=plugins/traefik-api-key-auth/go.mod
      - .traefik.yml=plugins/traefik-api-key-auth/.traefik.yml
configurations:
  - ./kustomizeconfig.yaml
