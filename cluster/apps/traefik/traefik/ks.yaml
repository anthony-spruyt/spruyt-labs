---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app traefik
  namespace: flux-system
spec:
  targetNamespace: traefik
  path: ./cluster/apps/traefik/traefik/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  prune: true
  timeout: 5m
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-ingress
  namespace: flux-system
spec:
  path: ./cluster/apps/traefik/traefik/ingress
  dependsOn:
    - name: traefik
    - name: authentik
    - name: crafty-controller
    - name: firefly-iii
    - name: firemerge
    - name: foundryvtt
    - name: headlamp
    - name: n8n
    - name: kubectl-mcp-server
    - name: qdrant
    - name: redisinsight
    - name: rook-ceph-operator
    - name: vaultwarden
    - name: victoria-metrics-operator
    - name: whoami
  prune: true
  timeout: 3m
