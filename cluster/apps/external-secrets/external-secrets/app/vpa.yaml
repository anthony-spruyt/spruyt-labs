metadata:
  name: external-secrets-cert-controller
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: external-secrets-cert-controller
  updatePolicy:
    updateMode: "Initial"
  resourcePolicy:
    containerPolicies:
      - containerName: cert-controller
        controlledValues: "RequestsOnly"
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 192Mi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: external-secrets-webhook
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: external-secrets-webhook
  updatePolicy:
    updateMode: "Initial"
  resourcePolicy:
    containerPolicies:
      - containerName: webhook
        controlledValues: "RequestsOnly"
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 192Mi
