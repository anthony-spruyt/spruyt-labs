---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/serviceaccount-v1.json
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-pull-secrets-reader
  namespace: external-secrets
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: image-pull-secrets-cluster-store
spec:
  provider:
    kubernetes:
      remoteNamespace: flux-system
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: image-pull-secrets-reader
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/clusterexternalsecret_v1.json
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: image-pull-secrets-cluster-external-secret
spec:
  externalSecretName: image-pull-secrets
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - flux-system
  externalSecretSpec:
    refreshInterval: "1h"
    secretStoreRef:
      name: image-pull-secrets-cluster-store
      kind: ClusterSecretStore
    target:
      name: image-pull-secrets
      creationPolicy: Owner
    data:
      - secretKey: .dockerconfigjson
        remoteRef:
          key: image-pull-secrets
          property: .dockerconfigjson
