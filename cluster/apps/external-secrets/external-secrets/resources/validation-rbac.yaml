---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.3-standalone-strict/role-rbac-v1.json
# RBAC for ClusterSecretStore validation - grants read access to the store-validation secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-secrets-validation-reader
  namespace: external-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.3-standalone-strict/rolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-validation-reader
  namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: external-secrets-validation-reader
subjects:
  - kind: ServiceAccount
    name: k8s-cluster-secret-store
    namespace: external-secrets
