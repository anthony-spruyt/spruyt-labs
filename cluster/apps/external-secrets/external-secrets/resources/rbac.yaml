---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "eso-k8s-provider"
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eso-self-check
rules:
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-self-check
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eso-self-check
subjects:
  - kind: ServiceAccount
    name: eso-k8s-provider
    namespace: external-secrets
