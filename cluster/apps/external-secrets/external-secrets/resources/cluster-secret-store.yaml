---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: k8s-cluster-secret-store
spec:
  provider:
    kubernetes:
      # remoteNamespace is NOT set - each ExternalSecret specifies source via key: "namespace/secret"
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: k8s-cluster-secret-store
          namespace: external-secrets
