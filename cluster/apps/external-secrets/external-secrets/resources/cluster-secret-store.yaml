---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: k8s-cluster-secret-store
  namespace: external-secrets
spec:
  provider:
    kubernetes:
      server:
        url: kubernetes.default
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: k8s-cluster-secret-store
          namespace: external-secrets
  # Conditions about namespaces in which the ClusterSecretStore is usable for ExternalSecrets
  # conditions needs only one of the conditions to meet for the CSS to be usable in the namespace.
  # conditions:
  #   - namespaces:
  #       - cnpg-system
