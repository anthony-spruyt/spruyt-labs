---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.35.0-standalone-strict/role-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oauth-secret-rotation
  namespace: authentik-system
rules:
  # Permission to patch the OAuth secrets
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      [
        "authentik-grafana-oauth",
        "authentik-vaultwarden-oauth",
        "authentik-headlamp-oauth",
      ]
    verbs: ["get", "patch"]
