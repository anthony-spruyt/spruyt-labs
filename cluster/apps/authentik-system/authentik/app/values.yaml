---
# yaml-language-server: $schema=TODO
# Documentation: https://github.com/goauthentik/helm/blob/main/charts/authentik/README.md
# Default values: https://github.com/goauthentik/helm/blob/main/charts/authentik/values.yaml
global:
  deploymentAnnotations:
    reloader.stakater.com/auto: "true"
  env:
    # Database connection - uses CNPG auto-generated secret
    - name: AUTHENTIK_POSTGRESQL__HOST
      valueFrom:
        secretKeyRef:
          name: authentik-cnpg-cluster-app
          key: host
    - name: AUTHENTIK_POSTGRESQL__PORT
      valueFrom:
        secretKeyRef:
          name: authentik-cnpg-cluster-app
          key: port
    - name: AUTHENTIK_POSTGRESQL__NAME
      valueFrom:
        secretKeyRef:
          name: authentik-cnpg-cluster-app
          key: dbname
    - name: AUTHENTIK_POSTGRESQL__USER
      valueFrom:
        secretKeyRef:
          name: authentik-cnpg-cluster-app
          key: user
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-cnpg-cluster-app
          key: password
    # Redis connection - uses Valkey
    - name: AUTHENTIK_REDIS__HOST
      value: valkey.valkey-system
    - name: AUTHENTIK_REDIS__PORT
      value: "6379"
    - name: AUTHENTIK_REDIS__DB
      value: "0"
    - name: AUTHENTIK_REDIS__USERNAME
      value: authentik
    - name: AUTHENTIK_REDIS__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_REDIS_PASSWORD
    # Secret key for session signing
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_SECRET_KEY
    # OAuth credentials for blueprints (used via !Env tag)
    # Stored in separate secret for least-privilege cross-namespace access
    - name: GRAFANA_OAUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: authentik-grafana-oauth
          key: GRAFANA_OAUTH_CLIENT_ID
    - name: GRAFANA_OAUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: authentik-grafana-oauth
          key: GRAFANA_OAUTH_CLIENT_SECRET
    - name: VAULTWARDEN_OAUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: authentik-vaultwarden-oauth
          key: VAULTWARDEN_OAUTH_CLIENT_ID
    - name: VAULTWARDEN_OAUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: authentik-vaultwarden-oauth
          key: VAULTWARDEN_OAUTH_CLIENT_SECRET
    - name: HEADLAMP_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: authentik-headlamp-oauth
          key: HEADLAMP_OIDC_CLIENT_ID
    - name: HEADLAMP_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: authentik-headlamp-oauth
          key: HEADLAMP_OIDC_CLIENT_SECRET
    # OAuth rotation service account token (used via !Env tag in blueprint)
    - name: OAUTH_ROTATION_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: OAUTH_ROTATION_API_TOKEN
    # SMTP configuration for email verification
    - name: AUTHENTIK_EMAIL__HOST
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: SMTP_HOST
    - name: AUTHENTIK_EMAIL__PORT
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: SMTP_PORT
    - name: AUTHENTIK_EMAIL__USERNAME
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: SMTP_USERNAME
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: SMTP_PASSWORD
    - name: AUTHENTIK_EMAIL__USE_TLS
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: SMTP_USE_TLS
    - name: AUTHENTIK_EMAIL__FROM
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: SMTP_FROM
  envFrom: []
  volumeMounts:
    - name: db-ca-cert
      mountPath: /certs/postgresql
      readOnly: true
    - name: blueprints-custom
      mountPath: /blueprints/custom
      readOnly: true
  volumes:
    - name: db-ca-cert
      secret:
        secretName: authentik-cnpg-cluster-ca
        items:
          - key: ca.crt
            path: ca.crt
    - name: blueprints-custom
      configMap:
        name: authentik-blueprints
        items:
          - key: grafana-sso.yaml
            path: grafana-sso.yaml
          - key: vaultwarden-sso.yaml
            path: vaultwarden-sso.yaml
          - key: oauth-rotation-service-account.yaml
            path: oauth-rotation-service-account.yaml
          - key: n8n-sso.yaml
            path: n8n-sso.yaml
          - key: ceph-dashboard-sso.yaml
            path: ceph-dashboard-sso.yaml
          - key: headlamp-sso.yaml
            path: headlamp-sso.yaml

authentik:
  log_level: info
  error_reporting:
    enabled: false

# Disable bundled PostgreSQL - using external CNPG
postgresql:
  enabled: false

# Disable bundled Redis - using external Valkey
redis:
  enabled: false

server:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

worker:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
