---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: authentik-server
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authentik-server
  updatePolicy:
    updateMode: "Initial"
  resourcePolicy:
    containerPolicies:
      - containerName: server
        controlledValues: "RequestsOnly"
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 2Gi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: authentik-worker
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authentik-worker
  updatePolicy:
    updateMode: "Initial"
  resourcePolicy:
    containerPolicies:
      - containerName: worker
        controlledValues: "RequestsOnly"
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 2Gi
