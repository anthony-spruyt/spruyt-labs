# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: Vaultwarden SSO
entries:
  - id: vaultwarden_users_group
    model: authentik_core.group
    identifiers:
      name: Vaultwarden Users
    attrs:
      name: Vaultwarden Users
  - id: vaultwarden_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Vaultwarden
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      client_type: confidential
      redirect_uris:
        - url: https://vaultwarden.${EXTERNAL_DOMAIN}/identity/connect/oidc-signin
          matching_mode: strict
      client_id: !Env VAULTWARDEN_OAUTH_CLIENT_ID
      client_secret: !Env VAULTWARDEN_OAUTH_CLIENT_SECRET
      # CRITICAL: Must be >5 min - Bitwarden clients detect 5min expiry
      access_token_validity: minutes=10
      # RS256 signing required for Vaultwarden (HS256 incompatible)
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, "authentik Self-signed Certificate"],
        ]
      property_mappings:
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'openid'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'profile'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'email'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'offline_access'"],
          ]
  - id: vaultwarden_application
    model: authentik_core.application
    identifiers:
      slug: vaultwarden
    attrs:
      name: Vaultwarden
      provider: !KeyOf vaultwarden_provider
      meta_launch_url: https://vaultwarden.${EXTERNAL_DOMAIN}

  # Policy binding to restrict access to group members only
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf vaultwarden_application
      order: 0
    attrs:
      group: !KeyOf vaultwarden_users_group
      negate: false
      enabled: true
      timeout: 30
