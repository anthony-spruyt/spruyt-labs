# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: N8N SSO
entries:
  - id: n8n_users_group
    model: authentik_core.group
    identifiers:
      name: N8N Users
    attrs:
      name: N8N Users
  - id: n8n_provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: N8N
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      mode: forward_single
      external_host: https://n8n.${EXTERNAL_DOMAIN}
      skip_path_regex: |
        ^/webhook/.*$
        ^/webhook-test/.*$
  - id: n8n_application
    model: authentik_core.application
    identifiers:
      slug: n8n
    attrs:
      name: N8N
      provider: !KeyOf n8n_provider
      meta_launch_url: https://n8n.${EXTERNAL_DOMAIN}
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/n8n.png

  # Policy binding to restrict access to group members only
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf n8n_application
      order: 0
    attrs:
      group: !KeyOf n8n_users_group
      negate: false
      enabled: true
      timeout: 30

  # Standalone outpost deployed to n8n-system namespace
  # Requires RBAC: Role/RoleBinding in n8n-system granting authentik SA permissions
  - id: n8n_outpost
    model: authentik_outposts.outpost
    identifiers:
      name: N8N Outpost
    attrs:
      type: proxy
      service_connection:
        !Find [
          authentik_outposts.kubernetesserviceconnection,
          [name, "Local Kubernetes Cluster"],
        ]
      config:
        authentik_host: https://auth.${EXTERNAL_DOMAIN}/
        kubernetes_namespace: n8n-system
      providers:
        - !KeyOf n8n_provider
