# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: Grafana SSO
entries:
  # Parent group for all Grafana users - used for application access control
  - id: grafana_users_group
    model: authentik_core.group
    identifiers:
      name: Grafana Users
    attrs:
      name: Grafana Users

  # Role-based child groups - Grafana maps these to internal roles
  - id: grafana_admins_group
    model: authentik_core.group
    identifiers:
      name: Grafana Admins
    attrs:
      name: Grafana Admins
      parent: !KeyOf grafana_users_group

  - id: grafana_editors_group
    model: authentik_core.group
    identifiers:
      name: Grafana Editors
    attrs:
      name: Grafana Editors
      parent: !KeyOf grafana_users_group
  - id: grafana_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Grafana
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      client_type: confidential
      redirect_uris:
        - url: https://grafana.lan.${EXTERNAL_DOMAIN}/login/generic_oauth
          matching_mode: strict
      client_id: !Env GRAFANA_OAUTH_CLIENT_ID
      client_secret: !Env GRAFANA_OAUTH_CLIENT_SECRET
      property_mappings:
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'openid'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'profile'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'email'"],
          ]
  - id: grafana_application
    model: authentik_core.application
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      provider: !KeyOf grafana_provider
      meta_launch_url: https://grafana.lan.${EXTERNAL_DOMAIN}
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/grafana.png

  # Policy binding to restrict access to group members only
  # Users must be in Grafana Users (or child groups Admins/Editors)
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf grafana_application
      order: 0
    attrs:
      group: !KeyOf grafana_users_group
      negate: false
      enabled: true
      timeout: 30
