# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: Headlamp SSO
entries:
  # Group for Headlamp users - used for application access control
  - id: headlamp_users_group
    model: authentik_core.group
    identifiers:
      name: Headlamp Users
    attrs:
      name: Headlamp Users

  # Custom email mapping that always sets email_verified: true
  # Required because kube-apiserver OIDC rejects tokens with email_verified: false
  # Authentik v2025.10+ returns email_verified: false by default and has no native
  # email verification system. Users are trusted since they must be in Headlamp Users group.
  - id: headlamp_email_mapping
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: "Headlamp OAuth Mapping: email verified"
    attrs:
      scope_name: email
      description: "Email claim with email_verified always true for Kubernetes OIDC"
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - id: headlamp_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Headlamp
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      client_type: confidential
      redirect_uris:
        - url: https://headlamp.lan.${EXTERNAL_DOMAIN}/oidc-callback
          matching_mode: strict
      client_id: !Env HEADLAMP_OIDC_CLIENT_ID
      client_secret: !Env HEADLAMP_OIDC_CLIENT_SECRET
      # RS256 signing required for Headlamp (HS256 incompatible)
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, "authentik Self-signed Certificate"],
        ]
      property_mappings:
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'openid'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'profile'"],
          ]
        # Use custom email mapping that sets email_verified: true
        - !KeyOf headlamp_email_mapping
  - id: headlamp_application
    model: authentik_core.application
    identifiers:
      slug: headlamp
    attrs:
      name: Headlamp
      provider: !KeyOf headlamp_provider
      meta_launch_url: https://headlamp.lan.${EXTERNAL_DOMAIN}
      meta_icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/headlamp.png

  # Policy binding to restrict access to group members only
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf headlamp_application
      order: 0
    attrs:
      group: !KeyOf headlamp_users_group
      negate: false
      enabled: true
      timeout: 30
