# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: Headlamp SSO
entries:
  # Group for Headlamp users - used for application access control
  - id: headlamp_users_group
    model: authentik_core.group
    identifiers:
      name: Headlamp Users
    attrs:
      name: Headlamp Users

  - id: headlamp_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Headlamp
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      client_type: confidential
      redirect_uris:
        - url: https://headlamp.lan.${EXTERNAL_DOMAIN}/oidc/callback
          matching_mode: strict
      client_id: !Env HEADLAMP_OIDC_CLIENT_ID
      client_secret: !Env HEADLAMP_OIDC_CLIENT_SECRET
      property_mappings:
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'openid'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'profile'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'email'"],
          ]
  - id: headlamp_application
    model: authentik_core.application
    identifiers:
      slug: headlamp
    attrs:
      name: Headlamp
      provider: !KeyOf headlamp_provider
      meta_launch_url: https://headlamp.lan.${EXTERNAL_DOMAIN}

  # Policy binding to restrict access to group members only
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf headlamp_application
      order: 0
    attrs:
      group: !KeyOf headlamp_users_group
      negate: false
      enabled: true
      timeout: 30
