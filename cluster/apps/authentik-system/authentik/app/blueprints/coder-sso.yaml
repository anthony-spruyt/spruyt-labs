# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: Coder SSO
entries:
  - id: coder_users_group
    model: authentik_core.group
    identifiers:
      name: Coder Users
    attrs:
      name: Coder Users

  # Custom email mapping that always sets email_verified: true
  # Required because Coder rejects tokens with email_verified: false
  # Authentik v2025.10+ returns email_verified: false by default and has no native
  # email verification system. Users are trusted since they must be in Coder Users group.
  - id: coder_email_mapping
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: "Coder OAuth Mapping: email verified"
    attrs:
      scope_name: email
      description: "Email claim with email_verified always true for Coder OIDC"
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - id: coder_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Coder
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      client_type: confidential
      redirect_uris:
        - url: https://code.${EXTERNAL_DOMAIN}/api/v2/users/oidc/callback
          matching_mode: strict
      client_id: !Env CODER_OIDC_CLIENT_ID
      client_secret: !Env CODER_OIDC_CLIENT_SECRET
      # RS256 signing for OIDC token validation
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, "authentik Self-signed Certificate"],
        ]
      property_mappings:
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'openid'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'profile'"],
          ]
        # Use custom email mapping that sets email_verified: true
        - !KeyOf coder_email_mapping

  - id: coder_application
    model: authentik_core.application
    identifiers:
      slug: coder
    attrs:
      name: Coder
      provider: !KeyOf coder_provider
      meta_launch_url: https://code.${EXTERNAL_DOMAIN}
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/coder.png

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf coder_application
      order: 0
    attrs:
      group: !KeyOf coder_users_group
      negate: false
      enabled: true
      timeout: 30
