# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: Bull Board SSO
entries:
  - id: bull_board_users_group
    model: authentik_core.group
    identifiers:
      name: Bull Board Users
    attrs:
      name: Bull Board Users
  - id: bull_board_provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: Bull Board
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      mode: forward_single
      external_host: https://bull-board.${EXTERNAL_DOMAIN}
  - id: bull_board_application
    model: authentik_core.application
    identifiers:
      slug: bull-board
    attrs:
      name: Bull Board
      provider: !KeyOf bull_board_provider
      meta_launch_url: https://bull-board.${EXTERNAL_DOMAIN}

  # Policy binding to restrict access to group members only
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf bull_board_application
      order: 0
    attrs:
      group: !KeyOf bull_board_users_group
      negate: false
      enabled: true
      timeout: 30

  # Standalone outpost deployed to agent-worker-system namespace
  # Requires RBAC: Role/RoleBinding in agent-worker-system granting authentik SA permissions
  - id: bull_board_outpost
    model: authentik_outposts.outpost
    identifiers:
      name: Bull Board Outpost
    attrs:
      type: proxy
      service_connection:
        !Find [
          authentik_outposts.kubernetesserviceconnection,
          [name, "Local Kubernetes Cluster"],
        ]
      config:
        authentik_host: https://auth.${EXTERNAL_DOMAIN}/
        kubernetes_namespace: agent-worker-system
      providers:
        - !KeyOf bull_board_provider
