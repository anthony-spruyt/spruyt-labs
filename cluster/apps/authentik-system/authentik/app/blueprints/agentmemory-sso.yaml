# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: AgentMemory SSO
entries:
  - id: agentmemory_users_group
    model: authentik_core.group
    identifiers:
      name: AgentMemory Users
    attrs:
      name: AgentMemory Users
  - id: agentmemory_provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: AgentMemory
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      mode: forward_single
      external_host: https://agentmemory.lan.${EXTERNAL_DOMAIN}
  - id: agentmemory_application
    model: authentik_core.application
    identifiers:
      slug: agentmemory
    attrs:
      name: AgentMemory
      provider: !KeyOf agentmemory_provider
      meta_launch_url: https://agentmemory.lan.${EXTERNAL_DOMAIN}

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf agentmemory_application
      order: 0
    attrs:
      group: !KeyOf agentmemory_users_group
      negate: false
      enabled: true
      timeout: 30

  - id: agentmemory_console_provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: AgentMemory Console
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      mode: forward_single
      external_host: https://agentmemory-console.lan.${EXTERNAL_DOMAIN}
  - id: agentmemory_console_application
    model: authentik_core.application
    identifiers:
      slug: agentmemory-console
    attrs:
      name: AgentMemory Console
      provider: !KeyOf agentmemory_console_provider
      meta_launch_url: https://agentmemory-console.lan.${EXTERNAL_DOMAIN}
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf agentmemory_console_application
      order: 0
    attrs:
      group: !KeyOf agentmemory_users_group
      negate: false
      enabled: true
      timeout: 30

  - id: agentmemory_outpost
    model: authentik_outposts.outpost
    identifiers:
      name: AgentMemory Outpost
    attrs:
      type: proxy
      service_connection:
        !Find [
          authentik_outposts.kubernetesserviceconnection,
          [name, "Local Kubernetes Cluster"],
        ]
      config:
        authentik_host: https://auth.${EXTERNAL_DOMAIN}/
        kubernetes_namespace: agentmemory
      providers:
        - !KeyOf agentmemory_provider
        - !KeyOf agentmemory_console_provider
