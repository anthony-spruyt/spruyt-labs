# yamllint disable-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/goauthentik/authentik/refs/heads/main/blueprints/schema.json
---
version: 1
metadata:
  name: OAuth Rotation Service Account
entries:
  # Role with minimal permissions for OAuth credential rotation
  - id: oauth_rotation_role
    model: authentik_rbac.role
    identifiers:
      name: OAuth Rotation
    attrs:
      name: OAuth Rotation
      permissions:
        - authentik_providers_oauth2.view_oauth2provider
        - authentik_providers_oauth2.change_oauth2provider

  # Group that holds the role
  - id: oauth_rotation_group
    model: authentik_core.group
    identifiers:
      name: OAuth Rotation Service Accounts
    attrs:
      name: OAuth Rotation Service Accounts
      roles:
        - !KeyOf oauth_rotation_role

  # Service account user for the rotation CronJob
  - id: oauth_rotation_user
    model: authentik_core.user
    identifiers:
      username: oauth-rotation-service
    attrs:
      name: OAuth Rotation Service Account
      path: goauthentik.io/service-accounts
      type: service_account
      groups:
        - !KeyOf oauth_rotation_group

  # API token for the service account
  - id: oauth_rotation_token
    model: authentik_core.token
    state: present
    identifiers:
      identifier: oauth-rotation-token
    attrs:
      user: !KeyOf oauth_rotation_user
      intent: api
      expiring: false
      description: API token for OAuth credential rotation CronJob
      key: !Env OAUTH_ROTATION_API_TOKEN
