---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-cnpg-cluster
spec:
  priorityClassName: high-priority
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
  enableSuperuserAccess: true
  imageName: "ghcr.io/cloudnative-pg/postgresql:18@sha256:afbcd2ca3827991317113ba8a90348f321b13a9698c39aaac8c089837a4e07f3"
  instances: 2
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: authentik-cnpg-aws-object-store
  postgresql:
    parameters:
      shared_buffers: 256MB # 25% of the memory defined under requests memory
  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 250m
      memory: 1Gi # shared_buffers under parameters should be 25% of the memory defined here
  storage:
    pvcTemplate:
      storageClassName: rbd-fast-delete
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 3Gi
