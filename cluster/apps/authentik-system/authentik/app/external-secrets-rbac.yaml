---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.3-standalone-strict/role-rbac-v1.json
# Allows External Secrets Operator to read authentik-secrets for cross-namespace sync
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-secrets-secret-reader
  namespace: authentik-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["authentik-secrets"]
    verbs: ["get", "list", "watch"]
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.3-standalone-strict/rolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-secret-reader
  namespace: authentik-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: external-secrets-secret-reader
subjects:
  - kind: ServiceAccount
    name: k8s-cluster-secret-store
    namespace: external-secrets
