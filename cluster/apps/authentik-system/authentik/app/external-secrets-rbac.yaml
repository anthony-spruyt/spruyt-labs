---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.3-standalone-strict/role-rbac-v1.json
# Allows observability namespace to read only Grafana OAuth secret (least-privilege)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-oauth-reader
  namespace: authentik-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["authentik-grafana-oauth"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.3-standalone-strict/rolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-oauth-reader
  namespace: authentik-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-oauth-reader
subjects:
  - kind: ServiceAccount
    name: authentik-secret-reader
    namespace: observability
