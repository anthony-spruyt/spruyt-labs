---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: low-priority
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  redisinsight:
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    serviceAccount:
      identifier: redisinsight
    containers:
      app:
        image:
          repository: redis/redisinsight
          tag: 3.2.0@sha256:55542a762210bb1cd681410282642bac0970f780f39bc134565394a81b1f1fd9
          pullPolicy: IfNotPresent
        env:
          - name: RI_FILES_LOGGER
            value: "false"
          - name: RI_STDOUT_LOGGER
            value: "true"
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          # readOnlyRootFilesystem: true # SQLITE_CANTOPEN: unable to open database file
          capabilities:
            drop:
              - ALL
        # Probes: HTTP on RedisInsight API
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: 5540
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness: *probes
serviceAccount:
  redisinsight:
    enabled: true
service:
  app:
    # name should not be 'redisinsight'  since the service creates environment variables
    # that conflicts with redisinsight application's environment variables:
    # `REDISINSIGHT_HOST` and `REDISINSIGHT_PORT`
    suffix: svc
    controller: redisinsight
    ports:
      http:
        port: 5540
