---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# CiliumNetworkPolicy for redisinsight
# Redis GUI tool with authentik forward auth (traefik proxies to app after outpost auth)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-dns-egress
  namespace: redisinsight
spec:
  endpointSelector: {}
  egress:
    - toServices:
        - k8sService:
            serviceName: kube-dns
            namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow traefik ingress to authentik outpost
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      goauthentik.io/outpost-name: redisinsight-outpost
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow traefik ingress to redisinsight app (forward auth mode - traefik proxies to app)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-traefik-to-app-ingress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: redisinsight
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "5540"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost egress to authentik server for authentication
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-authentik-egress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      goauthentik.io/outpost-name: redisinsight-outpost
  egress:
    - toServices:
        - k8sService:
            serviceName: authentik-server
            namespace: authentik-system
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost world HTTPS egress for Cloudflare/external authentik access
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-world-https-egress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      goauthentik.io/outpost-name: redisinsight-outpost
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost kube-api egress for service discovery
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-kube-api-egress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      goauthentik.io/outpost-name: redisinsight-outpost
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost egress to valkey for session storage
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-valkey-egress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      goauthentik.io/outpost-name: redisinsight-outpost
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: valkey-system
            k8s:app.kubernetes.io/name: valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow redisinsight app world HTTPS egress
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-redisinsight-world-https-egress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: redisinsight
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow redisinsight app egress to valkey for viewing data
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-redisinsight-valkey-egress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: redisinsight
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: valkey-system
            k8s:app.kubernetes.io/name: valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow metrics scraping from vmagent
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-metrics-ingress
  namespace: redisinsight
spec:
  endpointSelector:
    matchLabels:
      goauthentik.io/outpost-name: redisinsight-outpost
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "9300"
              protocol: TCP
