---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./rbac.yaml
  - ./rbac-spawner.yaml
  - ./network-policies.yaml
  - ./github-secret-store.yaml
  - ./github-ssh-external-secret.yaml
  - ./github-bot-gitconfig.yaml
  - ./github-rotation-rbac.yaml
  - ./claude-mcp-config.yaml
  - ./mcp-credentials.sops.yaml
configMapGenerator:
  - name: claude-settings-profiles
    files:
      - settings/sre.json
      - settings/dev.json
      - settings/minimal.json
      - settings/full.json
      - settings/generic.json
generatorOptions:
  disableNameSuffixHash: true
