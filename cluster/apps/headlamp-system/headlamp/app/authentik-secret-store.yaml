---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/serviceaccount-v1.json
# ServiceAccount for accessing Headlamp OAuth secret from authentik-system
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authentik-secret-reader
  namespace: headlamp-system
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/secretstore_v1.json
# Namespace-scoped SecretStore for reading Headlamp OAuth credentials from authentik-system
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: headlamp-oauth-store
  namespace: headlamp-system
spec:
  provider:
    kubernetes:
      remoteNamespace: authentik-system
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: authentik-secret-reader
