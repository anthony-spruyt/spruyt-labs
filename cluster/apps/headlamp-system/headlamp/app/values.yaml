---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kubernetes-sigs/headlamp/main/charts/headlamp/values.schema.json
# Headlamp Helm Chart Reference -> https://headlamp.dev/docs/latest/installation/in-cluster/
# Default values for headlamp: https://github.com/kubernetes-sigs/headlamp/blob/main/charts/headlamp/values.yaml
deploymentAnnotations:
  reloader.stakater.com/auto: "true"

config:
  watchPlugins: true
  # Provide system CA bundle to fix empty CA cert bug in chart
  # See: https://github.com/kubernetes-sigs/headlamp/issues/3884
  extraArgs:
    - "-oidc-ca-file=/etc/ssl/certs/ca-certificates.crt"
  oidc:
    secret:
      create: false
    # Chart's externalSecret feature requires ALL OIDC config in the secret
    # See headlamp-oauth-external-secret.yaml for full config
    externalSecret:
      enabled: true
      name: headlamp-oauth-credentials
    # Required to trigger chart to add -oidc-callback-url arg
    callbackURL: "https://headlamp.lan.${EXTERNAL_DOMAIN}/oidc-callback"

pluginsManager:
  enabled: true
  configContent: |
    plugins:
      - name: headlamp_flux
        source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
        version: 0.5.0
      - name: headlamp_cert-manager
        source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
        version: 0.1.0
      - name: prometheus_headlamp_plugin
        source: https://artifacthub.io/packages/headlamp/headlamp-plugins/prometheus_headlamp_plugin
        version: 0.0.3
    installOptions:
      parallel: true
      maxConcurrent: 3

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
