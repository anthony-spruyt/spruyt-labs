---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Syncs Headlamp OAuth credentials from dedicated secret in authentik-system namespace
# When using chart's externalSecret feature, ALL OIDC config must be in the secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oauth-credentials
  namespace: headlamp-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: headlamp-oauth-store
  target:
    name: headlamp-oauth-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Keys used by chart envFrom (required for template rendering)
        OIDC_CLIENT_ID: "{{ .clientID }}"
        OIDC_CLIENT_SECRET: "{{ .clientSecret }}"
        OIDC_ISSUER_URL: "https://auth.${EXTERNAL_DOMAIN}/application/o/headlamp/"
        OIDC_SCOPES: "openid profile email"
        OIDC_CALLBACK_URL: "https://headlamp.lan.${EXTERNAL_DOMAIN}/oidc-callback"
        # Keys for koanf env provider - headlamp reads HEADLAMP_CONFIG_* as config
        # This avoids passing secrets as CLI args (visible in /proc/cmdline)
        HEADLAMP_CONFIG_OIDC_CLIENT_ID: "{{ .clientID }}"
        HEADLAMP_CONFIG_OIDC_CLIENT_SECRET: "{{ .clientSecret }}"
        HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL: "https://auth.${EXTERNAL_DOMAIN}/application/o/headlamp/"
        HEADLAMP_CONFIG_OIDC_SCOPES: "openid profile email"
        HEADLAMP_CONFIG_OIDC_CALLBACK_URL: "https://headlamp.lan.${EXTERNAL_DOMAIN}/oidc-callback"
  data:
    - secretKey: clientID
      remoteRef:
        key: authentik-headlamp-oauth
        property: HEADLAMP_OIDC_CLIENT_ID
    - secretKey: clientSecret
      remoteRef:
        key: authentik-headlamp-oauth
        property: HEADLAMP_OIDC_CLIENT_SECRET
