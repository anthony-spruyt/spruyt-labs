---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: low-priority
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
controllers:
  n8n-mcp-server:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/czlonkowski/n8n-mcp
          tag: "2.47.12"
          pullPolicy: IfNotPresent
        env:
          - name: MCP_MODE
            value: "http"
          - name: PORT
            value: "3000"
          - name: LOG_LEVEL
            value: "warn"
          - name: N8N_API_URL
            value: "http://n8n.n8n-system.svc:5678"
          - name: N8N_MCP_TELEMETRY_DISABLED
            value: "true"
          - name: AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-mcp-secrets
                key: AUTH_TOKEN
          - name: N8N_API_KEY
            valueFrom:
              secretKeyRef:
                name: n8n-mcp-secrets
                key: N8N_API_KEY
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              failureThreshold: 60
              periodSeconds: 5
persistence:
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  home:
    type: emptyDir
    globalMounts:
      - path: /home/node
  data:
    type: emptyDir
    globalMounts:
      - path: /app/data
service:
  app:
    controller: n8n-mcp-server
    ports:
      http:
        port: 3000
