---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/role-rbac-v1.json
# Allows coder-workspaces SA to read n8n-mcp-secrets for ESO sync.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: n8n-mcp-secrets-reader
  namespace: n8n-mcp
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["n8n-mcp-secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/rolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-mcp-secrets-reader-coder-workspaces
  namespace: n8n-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: n8n-mcp-secrets-reader
subjects:
  - kind: ServiceAccount
    name: mcp-api-keys-reader
    namespace: coder-workspaces
