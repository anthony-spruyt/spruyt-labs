---
# Default values: https://github.com/vectorize-io/hindsight/blob/main/helm/hindsight/values.yaml
# #yaml-language-server: $schema=TODO

# Image tags default to .Chart.AppVersion (currently 0.7.2). Renovate bumps the
# OCIRepository tag in cluster/flux/meta/repositories/oci, which moves AppVersion
# and all three images in lockstep — no per-component tag to maintain.
# Repositories below are the chart defaults, stated explicitly for clarity.

# Disable bundled Postgres — use external CNPG
postgresql:
  enabled: false
  external:
    host: hindsight-cnpg-cluster-rw.hindsight.svc.cluster.local
    port: 5432
    username: hindsight
    database: hindsight
    # password comes from `existingSecret` key `postgres-password`

# Inject all keys from this Secret as envFrom on every pod. The chart also wires
# POSTGRES_PASSWORD from key `postgres-password` separately via secretKeyRef.
# This Secret holds ONLY app-relevant keys: HINDSIGHT_API_LLM_API_KEY (SOPS) and
# postgres-password (ESO-merged from the CNPG-generated hindsight-cnpg-cluster-app
# secret). AWS creds for CNPG barman live in a SEPARATE secret
# (hindsight-cnpg-aws-secrets) so they are never exposed as pod env vars.
existingSecret: hindsight-secrets

# GLOBAL security context — the chart applies these to ALL components
# (api, worker, controlPlane). Per-component securityContext keys are NOT read
# by the templates, so security MUST be set here. seccompProfile is required to
# satisfy the namespace's Pod Security Admission `restricted` enforcement.
podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  # readOnlyRootFilesystem stays false: the chart has no writable-mount hooks
  # for the control-plane (Node.js) container, so global RORF=true would break
  # it. PSA `restricted` does not require RORF.
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

api:
  # Warm-up: 1 replica so only ONE node cold-pulls the ~1.42 GB api image.
  # Once it is cached, spegel (cluster image mirror) can fan it out P2P to a
  # second node — scale back to 2 for HA after the first pull completes.
  replicaCount: 1
  image:
    repository: ghcr.io/vectorize-io/hindsight-api
    pullPolicy: IfNotPresent
  env:
    HINDSIGHT_API_LLM_BASE_URL: "http://litellm.litellm.svc.cluster.local:4000"
    HINDSIGHT_API_LLM_MODEL: "hindsight-model"
    HINDSIGHT_API_EMBEDDINGS_PROVIDER: "litellm"
    HINDSIGHT_API_LITELLM_API_BASE: "http://litellm.litellm.svc.cluster.local:4000/v1"
    HINDSIGHT_API_EMBEDDINGS_LITELLM_MODEL: "hindsight-embedding"
    HINDSIGHT_API_EMBEDDINGS_LITELLM_API_KEY: "$(HINDSIGHT_API_LLM_API_KEY)"
    # ---- Retain / extraction tuning (issue #2270) ----------------------------
    # The LiteLLM memory callback retains each Claude Code exchange as ONE
    # conversation item (JSON array of {role,content}). Upstream chunk_text()
    # keeps a whole turn intact up to STRUCTURED_CHUNK_SIZE; without it a turn is
    # split at RETAIN_CHUNK_SIZE (3000) and facts lose context. 8192 is the
    # canonical chat-transcript value from the bank-template schema.
    HINDSIGHT_API_RETAIN_STRUCTURED_CHUNK_SIZE: "8192"
    # verbose = richer facts with full context and relationships (vs the default
    # `concise`, which aggressively summarizes into fragments).
    HINDSIGHT_API_RETAIN_EXTRACTION_MODE: "verbose"
    HINDSIGHT_API_RETAIN_MISSION: >-
      Extract technical decisions, architectural trade-offs, API and design
      choices, file paths and symbols touched, root causes, blockers, and exact
      error messages from this software-engineering session. Keep each memory
      self-contained with enough surrounding context to be understood in
      isolation. Prefer fewer, richer facts over many fragments.
    # Per-operation model overrides (LiteLLM aliases; provider/base inherit).
    # Retain runs per turn (high volume) -> haiku conserves the subscription's
    # 5-hour / weekly usage budget. Consolidation is a nightly batch (low
    # volume) -> sonnet for stronger belief synthesis. Both support >=64k output
    # so the RETAIN_MAX_COMPLETION_TOKENS default (64000) needs no clamp.
    HINDSIGHT_API_RETAIN_LLM_MODEL: "claude-haiku-4-5"
    HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: "claude-sonnet-4-6"
    # Auto-consolidation moved OFF the per-turn hot path (it fired an LLM pass on
    # every retain). A nightly CronJob calls /consolidate per bank instead.
    HINDSIGHT_API_ENABLE_AUTO_CONSOLIDATION: "false"
    # Reranker model (cross-encoder/ms-marco-MiniLM-L-6-v2) is baked into the
    # image cache at /home/hindsight/.cache/huggingface/hub. The egress
    # CiliumNetworkPolicy permits ONLY postgres + litellm — no DNS, no
    # huggingface.co. Without offline mode, transformers/sentence-transformers
    # do an online etag check on startup that hangs on the dropped connection
    # until socket timeout, so uvicorn's lifespan never finishes and the port
    # never binds → liveness probe SIGKILLs at ~50s → crashloop. Offline mode
    # uses the baked cache and skips the blocked network call.
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  persistence:
    modelCache:
      enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  # PDB disabled while api runs a single replica (minAvailable=1 on 1 replica
  # blocks all voluntary node drains). Re-enable when scaling back to 2.
  podDisruptionBudget:
    enabled: false

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vectorize-io/hindsight-api
    pullPolicy: IfNotPresent
  env:
    HINDSIGHT_API_WORKER_POLL_INTERVAL_MS: "500"
    HINDSIGHT_API_WORKER_BATCH_SIZE: "10"
    HINDSIGHT_API_WORKER_MAX_RETRIES: "3"
    # HINDSIGHT_API_WORKER_HTTP_PORT omitted — chart default (8889) matches.
    # Override the k8s service-discovery env var: the `hindsight-api` Service
    # makes Kubernetes inject HINDSIGHT_API_PORT=tcp://<clusterIP>:8888 into
    # every pod, which the app tries to int()-parse and crashes
    # (invalid literal for int(): 'tcp://...'). The api Deployment sets this
    # explicitly in its template; the worker StatefulSet does not, so set it
    # here too.
    HINDSIGHT_API_PORT: "8888"
    HINDSIGHT_API_EMBEDDINGS_PROVIDER: "litellm"
    HINDSIGHT_API_LITELLM_API_BASE: "http://litellm.litellm.svc.cluster.local:4000/v1"
    # Must match the LiteLLM model alias exactly. The alias is `hindsight-embedding`
    # (singular) in litellm values.yaml; the previous plural `hindsight-embeddings`
    # did not resolve, so worker retain embeddings failed (issue #2270).
    HINDSIGHT_API_EMBEDDINGS_LITELLM_MODEL: "hindsight-embedding"
    HINDSIGHT_API_EMBEDDINGS_LITELLM_API_KEY: "$(HINDSIGHT_API_LLM_API_KEY)"
    # ---- Retain / extraction tuning (issue #2270) ----------------------------
    # Async retain jobs are processed by the worker, so the extraction knobs must
    # be set here too (mirrors api.env). See api.env for rationale.
    HINDSIGHT_API_RETAIN_STRUCTURED_CHUNK_SIZE: "8192"
    HINDSIGHT_API_RETAIN_EXTRACTION_MODE: "verbose"
    HINDSIGHT_API_RETAIN_MISSION: >-
      Extract technical decisions, architectural trade-offs, API and design
      choices, file paths and symbols touched, root causes, blockers, and exact
      error messages from this software-engineering session. Keep each memory
      self-contained with enough surrounding context to be understood in
      isolation. Prefer fewer, richer facts over many fragments.
    HINDSIGHT_API_RETAIN_LLM_MODEL: "claude-haiku-4-5"
    HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: "claude-sonnet-4-6"
    HINDSIGHT_API_ENABLE_AUTO_CONSOLIDATION: "false"
    # See api.env note: force HF offline so the baked reranker cache is used
    # without the egress-blocked huggingface.co etag check that hangs startup.
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  persistence:
    modelCache:
      enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 1.1Gi
    limits:
      cpu: 3000m
      memory: 2.5Gi
  # PDB disabled: single replica. minAvailable=1 on a 1-replica workload blocks
  # all voluntary node drains. Re-enable with replicaCount>1.
  podDisruptionBudget:
    enabled: false

controlPlane:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vectorize-io/hindsight-control-plane
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  # PDB disabled: single replica (see worker note).
  podDisruptionBudget:
    enabled: false

# No TEI sidecars in v1
tei:
  reranker:
    enabled: false
  embedding:
    enabled: false
