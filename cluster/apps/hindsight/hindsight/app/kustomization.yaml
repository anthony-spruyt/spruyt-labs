---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./hindsight-secrets.sops.yaml
  - ./aws-secret-store.yaml
  - ./aws-barman-eso.yaml
  - ./cnpg-password-rbac.yaml
  - ./cnpg-password-eso.yaml
  - ./hindsight-cnpg-object-stores.yaml
  - ./hindsight-cnpg-cluster.yaml
  - ./hindsight-cnpg-database.yaml
  - ./hindsight-cnpg-scheduled-backups.yaml
  - ./release.yaml
  - ./vpa.yaml
  - ./authentik-outpost-rbac.yaml
  - ./network-policies.yaml
  - ./consolidate-cronjob.yaml
  - ./consolidate-network-policy.yaml
configMapGenerator:
  - name: hindsight-values
    namespace: hindsight
    files:
      - values.yaml
configurations:
  - ./kustomizeconfig.yaml
