---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/secretstore_v1.json
# In-namespace store: lets ESO read secrets in the `hindsight` namespace itself
# (the CNPG operator writes the cluster app secret here).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: cnpg-password-store
spec:
  provider:
    kubernetes:
      remoteNamespace: hindsight
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: cnpg-password-reader
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Projects the CNPG-generated DB password into `hindsight-secrets` under the key
# `postgres-password`, which is exactly the key the hindsight chart wires into
# POSTGRES_PASSWORD (see api/worker templates). creationPolicy: Merge keeps the
# SOPS-managed HINDSIGHT_API_LLM_API_KEY key in the same secret intact.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-password
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: cnpg-password-store
  target:
    name: hindsight-secrets
    creationPolicy: Merge
  data:
    - secretKey: postgres-password
      remoteRef:
        key: hindsight-cnpg-cluster-app
        property: password
