---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Egress for the nightly hindsight-consolidate CronJob (issue #2270): it only
# needs to reach the hindsight api on :8888 to list banks and POST /consolidate.
# DNS egress is handled cluster-wide by allow-kube-dns-egress. The matching api
# ingress rule lives in network-policies.yaml (allow-hindsight-api-ingress).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-hindsight-consolidate-egress
spec:
  endpointSelector:
    matchLabels:
      app: hindsight-consolidate
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: hindsight
            k8s:app.kubernetes.io/instance: hindsight
            k8s:app.kubernetes.io/name: hindsight
            k8s:app.kubernetes.io/component: api
      toPorts:
        - ports:
            - port: "8888"
              protocol: TCP
