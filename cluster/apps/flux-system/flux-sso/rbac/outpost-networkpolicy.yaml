---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.35.0-standalone-strict/networkpolicy-networking-v1.json
# Allow ingress to Authentik outpost from Traefik for ForwardAuth
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-outpost
  namespace: flux-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  policyTypes:
    - Ingress
  ingress:
    # Allow Traefik to reach the outpost for ForwardAuth
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9443
    # Allow Prometheus scraping (Authentik auto-creates ServiceMonitor on port 9300)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9300
