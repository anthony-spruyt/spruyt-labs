---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator-ocirepo
  interval: 4h
  valuesFrom:
    - kind: ConfigMap
      name: flux-operator-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: flux-operator
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: true
