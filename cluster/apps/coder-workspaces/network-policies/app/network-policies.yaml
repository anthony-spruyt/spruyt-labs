            - port: "5678"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to Home Assistant MCP (LAN device)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-workspace-homeassistant-mcp-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: coder-workspace
  egress:
    - toCIDR:
        - "${CLUSTER_NODE_CIDR_IP4}"
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
