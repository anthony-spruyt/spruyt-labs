        - matchLabels:
            k8s:io.kubernetes.pod.namespace: nexus-system
            k8s:app.kubernetes.io/name: nexus
      toPorts:
        - ports:
            - {port: "8081", protocol: TCP}
            - {port: "8082", protocol: TCP}
            - {port: "8083", protocol: TCP}
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to n8n SRE MCP endpoint
apiVersion: cilium.io/v2
