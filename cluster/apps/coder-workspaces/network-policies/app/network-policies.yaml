# Workspace pod CNPs for coder-workspaces namespace.
# Relocated from cluster/apps/coder-system/coder/app/network-policies.yaml.
# Pods in this ns carry label app.kubernetes.io/name: coder-workspace.
# DNS egress handled by CiliumClusterwideNetworkPolicy/allow-kube-dns-egress.
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow WireGuard/Tailscale UDP tunnel from workspace to control plane
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-workspace-wireguard-tunnel
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: coder-workspace
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: coder-system
            k8s:app.kubernetes.io/name: coder
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: coder-system
            k8s:app.kubernetes.io/name: coder
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# =============================================================================
# Workspace Pod Policies
# =============================================================================
# Workspace pods need broad egress for development tools
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-workspace-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: coder-workspace
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow all egress to world — workspace is a dev environment needing unrestricted
# external access (git, npm, pip, container pulls, Talos API, STUN/DERP, etc.)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-workspace-world-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: coder-workspace
  egress:
    - toEntities:
        - world
        - host
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow workspace pods to reach Traefik LB for access URL (hostAliases resolves here)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-workspace-traefik-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: coder-workspace
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# =============================================================================
# Workspace MCP Server Egress Policies
# =============================================================================
# Allow egress to kubectl MCP server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-workspace-kubectl-mcp-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: coder-workspace
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kubectl-mcp
            k8s:app.kubernetes.io/name: kubectl-mcp-server
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to VictoriaMetrics MCP server
