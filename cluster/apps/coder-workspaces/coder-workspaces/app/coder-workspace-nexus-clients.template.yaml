# TEMPLATE for cluster/apps/coder-workspaces/coder-workspaces/app/coder-workspace-nexus-clients.sops.yaml
# Ref #976.
#
# Mounts into Coder workspaces at /etc/containers/auth.json so podman/skopeo
# authenticate to Nexus as one of the workspace-client users. Auth entries
# are keyed by host:port — can hold multiple users (e.g. workspace-puller
# for reads, workspace-pusher for envbuilder-cache writes) side by side.
#
# USER STEPS before pushing:
#   1. Pick matching password from nexus-workspace-clients.sops.yaml:
#        PULLER_PASS=<the puller-password you set there>
#   2. Build the docker auth header:
#        PULLER_AUTH=$(printf 'workspace-puller:%s' "$PULLER_PASS" | base64 -w0)
#   3. Copy this template and substitute <PULLER_AUTH>:
#        cp coder-workspace-nexus-clients.template.yaml coder-workspace-nexus-clients.sops.yaml
#        sed -i "s|<PULLER_AUTH>|$PULLER_AUTH|g" coder-workspace-nexus-clients.sops.yaml
#   4. Encrypt in place:
#        sops -e -i cluster/apps/coder-workspaces/coder-workspaces/app/coder-workspace-nexus-clients.sops.yaml
#   5. Add to kustomization.yaml resources list (alphabetised):
#        - ./coder-workspace-nexus-clients.sops.yaml
#   6. Delete this template file:
#        rm coder-workspace-nexus-clients.template.yaml
#
# Puller creds work for both 8082 (docker-group, read) and 8083
# (envbuilder-cache, read) — nx-anonymous role grants view/read/browse on
# all repos. When a workspace-pusher user is added later, append a third
# auth entry keyed on 8083 with the pusher token.
---
apiVersion: v1
kind: Secret
metadata:
  name: coder-workspace-nexus-clients
  namespace: coder-workspaces
type: Opaque
stringData:
  auth.json: |
    {
      "auths": {
        "nexus.nexus-system.svc.cluster.local:8082": {"auth": "<PULLER_AUTH>"},
        "nexus.nexus-system.svc.cluster.local:8083": {"auth": "<PULLER_AUTH>"}
      }
    }
