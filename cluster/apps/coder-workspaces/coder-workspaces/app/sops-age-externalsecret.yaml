---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Pulls the SOPS Age identity key from flux-system into coder-workspaces.
# Mounted ONLY by the spruyt-labs workspace template (not devcontainer).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-age-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: flux-system-sops-age-store
  target:
    name: coder-age-key
    creationPolicy: Owner
  data:
    - secretKey: age.key
      remoteRef:
        key: sops-age
        property: age.agekey
