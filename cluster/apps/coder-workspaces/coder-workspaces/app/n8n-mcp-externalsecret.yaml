---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Pulls n8n-mcp AUTH_TOKEN from n8n-mcp namespace for workspace Bearer auth.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-workspace-n8n-mcp-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: n8n-mcp-secrets-store
  target:
    name: coder-workspace-n8n-mcp-key
    creationPolicy: Owner
  data:
    - secretKey: N8N_MCP_API_KEY
      remoteRef:
        key: n8n-mcp-secrets
        property: AUTH_TOKEN
