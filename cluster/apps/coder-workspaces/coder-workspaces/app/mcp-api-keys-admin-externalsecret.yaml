---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Pulls admin-only MCP API keys from traefik ns into coder-workspaces.
# These grant cluster-level or workflow management access — only for the
# spruyt-labs template, not shared/generic workspaces.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-workspace-mcp-api-keys-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: traefik-mcp-api-keys-store
  target:
    name: coder-workspace-mcp-api-keys-admin
    creationPolicy: Owner
  data:
    - secretKey: KUBECTL_MCP_API_KEY
      remoteRef:
        key: traefik-mcp-api-keys
        property: KUBECTL_MCP_API_KEY
    - secretKey: VM_MCP_API_KEY
      remoteRef:
        key: traefik-mcp-api-keys
        property: VM_MCP_API_KEY
