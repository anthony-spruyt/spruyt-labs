---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Pulls generic MCP API keys from traefik ns into coder-workspaces.
# These are safe for all workspace templates (no cluster-level access).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-workspace-mcp-api-keys
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: traefik-mcp-api-keys-store
  target:
    name: coder-workspace-mcp-api-keys
    creationPolicy: Owner
  data:
    - secretKey: BRAVE_SEARCH_MCP_API_KEY
      remoteRef:
        key: traefik-mcp-api-keys
        property: BRAVE_SEARCH_MCP_API_KEY
    - secretKey: GITHUB_MCP_API_KEY
      remoteRef:
        key: traefik-mcp-api-keys
        property: GITHUB_MCP_API_KEY
