---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app coder-workspaces
  namespace: flux-system
spec:
  targetNamespace: coder-workspaces
  path: ./cluster/apps/coder-workspaces/coder-workspaces/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets
    - name: kyverno-policies
    - name: n8n-mcp-server
  prune: true
  timeout: 5m
  wait: true
