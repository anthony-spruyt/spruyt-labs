---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: ssh-key-rotation
spec:
  groups:
    - name: ssh-key-rotation
      rules:
        - alert: CoderSSHKeyRotationFailed
          expr: |
            kube_job_status_failed{namespace="coder-workspaces", job_name=~"ssh-key-rotation.*"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Coder SSH key rotation CronJob failed"
            description: "CronJob {{ $labels.job_name }} failed. SSH key was not rotated."
        - alert: CoderSSHKeyRotationConsecutiveFailures
          expr: |
            time() - kube_cronjob_status_last_successful_time{namespace="coder-workspaces", cronjob="ssh-key-rotation"} > 1209600
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Coder SSH key rotation has not succeeded in 14+ days"
            description: "Personal SSH key has not been rotated in over 2 weeks."
