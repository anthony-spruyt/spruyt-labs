---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ssh-key-rotation
  namespace: coder-workspaces
spec:
  schedule: "0 3 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: ssh-key-rotation
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: ssh-key-rotation
          restartPolicy: Never
          containers:
            - name: rotate-ssh-key
              image: ghcr.io/anthony-spruyt/ssh-key-rotation:2.0.3@sha256:c1e6db9cfa023d88d8f8bc00348b3fa8ea54e31e58edfd8828648621d2636187
              env:
                - name: GITHUB_PAT
                  valueFrom:
                    secretKeyRef:
                      name: coder-ssh-rotation-token
                      key: GITHUB_PAT
                - name: TITLE_PREFIX
                  value: coder-workspace
                - name: SECRET_NAME
                  value: coder-ssh-signing-key
                - name: SECRET_NAMESPACE
                  value: coder-workspaces
                - name: GRACE_PERIOD_DAYS
                  value: "8"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
