---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ssh-key-rotation
  namespace: coder-workspaces
spec:
  schedule: "0 3 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: ssh-key-rotation
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: ssh-key-rotation
          restartPolicy: Never
          containers:
            - name: rotate-ssh-key
              image: ghcr.io/anthony-spruyt/ssh-key-rotation:1.0.3@sha256:af70c6771c5356e92d74f18c4d4d8ffe3d551917b8d8dac0a48f177b9dbee0b0
              command:
                - /bin/sh
                - -c
                - sed 's/-n coder-system/-n coder-workspaces/' /usr/local/bin/rotate-ssh-key.sh | /bin/sh -e
              env:
                - name: GITHUB_PAT
                  valueFrom:
                    secretKeyRef:
                      name: coder-ssh-rotation-token
                      key: GITHUB_PAT
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
