---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow world HTTPS egress for apk package installs and GitHub API calls
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ssh-rotation-world-https-egress
spec:
  endpointSelector:
    matchLabels:
      app: ssh-key-rotation
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow kube-api egress for kubectl patch on coder-ssh-signing-key secret
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ssh-rotation-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      app: ssh-key-rotation
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
