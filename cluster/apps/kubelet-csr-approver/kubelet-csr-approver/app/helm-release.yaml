---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
spec:
  interval: 1h
  chart:
    spec:
      # renovate: datasource=github-releases depName=postfinance/kubelet-csr-approver
      chart: kubelet-csr-approver
      version: 1.2.10
      sourceRef:
        kind: HelmRepository
        name: postfinance-charts
        namespace: flux-system
  values:
    # #yaml-language-server: $schema=TODO
    # Default values for kubelet-csr-approver: TODO
    providerRegex: |
      ${KUBELET_CSR_APPROVER_REGEX}
    bypassDnsResolution: true
    providerIpPrefixes:
      - "${NATIVE_ROUTING_CIDR_IP4}"
      - "${NATIVE_ROUTING_CIDR_IP6}"
      - "${NETWORK_LB_CIDR_IP4_CILIUM}"
      - "${NETWORK_LB_CIDR_IP4_METALLB}"
      - "${NETWORK_LB_CIDR_IP6_METALLB}"
      - "${CLUSTER_POD_NETS_IP4}"
      - "${CLUSTER_POD_NETS_IP6}"
      - "${CLUSTER_SVC_NETS_IP4}"
      - "${CLUSTER_SVC_NETS_IP6}"
    skipDenyStep: true
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi
