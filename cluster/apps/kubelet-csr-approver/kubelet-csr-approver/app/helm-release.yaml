---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
spec:
  interval: 1h
  chart:
    spec:
      # renovate: datasource=github-releases depName=postfinance/kubelet-csr-approver
      chart: kubelet-csr-approver
      version: 1.2.10
      sourceRef:
        kind: HelmRepository
        name: postfinance-charts
        namespace: flux-system
  values:
    # #yaml-language-server: $schema=TODO
    # Default values for kubelet-csr-approver: TODO
    providerRegex: |
      ${KUBELET_CSR_APPROVER_REGEX}
    bypassDnsResolution: true
    providerIpPrefixes: ["${LAN_SUBNET}"]
    skipDenyStep: true
