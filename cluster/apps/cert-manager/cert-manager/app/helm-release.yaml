---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      # renovate: datasource=github-releases depName=cert-manager/cert-manager
      version: v1.18.2
      sourceRef:
        kind: HelmRepository
        name: jetstack-charts
        namespace: flux-system
  # yaml-language-server: $schema=https://github.com/cert-manager/cert-manager/blob/master/deploy/charts/cert-manager/values.schema.json
  # Default values: https://github.com/cert-manager/cert-manager/blob/master/deploy/charts/cert-manager/values.yaml
  values:
    crds:
      enabled: true
    enableCertificateOwnerRef: true # When this flag is enabled, secrets will be automatically removed when the certificate resource is deleted.
    # A comma-separated string with the host and port of the recursive nameservers cert-manager should query.
    dns01RecursiveNameservers: 172.64.36.1:853,172.64.36.2:853 # Cloudflare trusted zone
    # Forces cert-manager to use only the recursive nameservers for verification.
    # Enabling this option could cause the DNS01 self check to take longer owing to caching performed by the recursive nameservers.
    dns01RecursiveNameserversOnly: true
    replicaCount: 2
    webhook:
      replicaCount: 2
      podDisruptionBudget:
        enabled: true
    cainjector:
      replicaCount: 2
      podDisruptionBudget:
        enabled: true
