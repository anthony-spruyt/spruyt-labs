---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: ${SECRET_ACME_EMAIL}
    profile: tlsserver
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-private-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: solver-secrets
              key: CLOUDFLARE_API_TOKEN
        selector:
          dnsZones:
            - "${EXTERNAL_DOMAIN}"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    email: ${SECRET_ACME_EMAIL}
    profile: tlsserver
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production-account-private-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: solver-secrets
              key: CLOUDFLARE_API_TOKEN
        selector:
          dnsZones:
            - "${EXTERNAL_DOMAIN}"
