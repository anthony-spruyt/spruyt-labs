---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: standard
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  litellm:
    type: deployment
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      litellm:
        image:
          # renovate: datasource=docker depName=ghcr.io/berriai/litellm-non_root
          repository: ghcr.io/berriai/litellm-non_root
          tag: v1.84.0@sha256:aa665b0cf9cfa247c6e5e9ce63aa19ff33b71860662d08407675dfb6ca32ce6b
          pullPolicy: IfNotPresent
        args:
          - "--config"
          - "/app/config.yaml"
          - "--port"
          - "4000"
        env:
          # Database — CNPG auto-generated secret
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: litellm-cnpg-cluster-app
                key: uri
          # LiteLLM core secrets
          LITELLM_MASTER_KEY:
            valueFrom:
              secretKeyRef:
                name: litellm-secrets
                key: LITELLM_MASTER_KEY
          LITELLM_SALT_KEY:
            valueFrom:
              secretKeyRef:
                name: litellm-secrets
                key: LITELLM_SALT_KEY
          # Alibaba Cloud Model Studio — code plan (token-plan endpoint)
          DASHSCOPE_API_KEY:
            valueFrom:
              secretKeyRef:
                name: litellm-secrets
                key: DASHSCOPE_API_KEY
          # Alibaba Cloud Model Studio — free quota (dashscope-intl endpoint)
          DASHSCOPE_PAYG_API_KEY:
            valueFrom:
              secretKeyRef:
                name: litellm-secrets
                key: DASHSCOPE_PAYG_API_KEY
          # Gemini API key
          GEMINI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: litellm-secrets
                key: GEMINI_API_KEY
          # OpenAI API key
          OPENAI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: litellm-secrets
                key: OPENAI_API_KEY
          # Authentik SSO (OIDC) — credentials from ExternalSecret
          GENERIC_CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: litellm-oauth-credentials
                key: GENERIC_CLIENT_ID
          GENERIC_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: litellm-oauth-credentials
                key: GENERIC_CLIENT_SECRET
          GENERIC_AUTHORIZATION_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/authorize/"
          GENERIC_TOKEN_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/token/"
          GENERIC_USERINFO_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/userinfo/"
          PROXY_BASE_URL: "https://litellm.${EXTERNAL_DOMAIN}"
          GENERIC_SCOPE: "openid profile email litellm_role"
          GENERIC_USER_ROLE_ATTRIBUTE: litellm_role
          # OTEL — LiteLLM uses its own OTEL_EXPORTER/OTEL_ENDPOINT for traces callback
          OTEL_EXPORTER: otlp_http
          OTEL_ENDPOINT: http://victoria-traces-single-vt-single-server.observability.svc:10428/insert/opentelemetry/v1/traces
          # Standard SDK vars for metrics export
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://vmsingle-victoria-metrics-k8s-stack.observability.svc:8428/opentelemetry/v1/metrics
          OTEL_RESOURCE_ATTRIBUTES: "service.name=litellm,service.namespace=litellm"
          PRESIDIO_ANALYZER_API_BASE: "http://litellm-presidio-analyzer.litellm.svc.cluster.local:3000"
          PRESIDIO_ANONYMIZER_API_BASE: "http://litellm-presidio-anonymizer.litellm.svc.cluster.local:3000"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/liveliness
                port: 4000
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/readiness
                port: 4000
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 10
        resources:
          limits:
            memory: 2560Mi
          requests:
            cpu: 100m
            memory: 1280Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

  presidio-analyzer:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      presidio-analyzer:
        image:
          # renovate: datasource=docker depName=mcr.microsoft.com/presidio-analyzer
          repository: mcr.microsoft.com/presidio-analyzer
          tag: "2.2.362@sha256:286e3fa7f3a7426e775e8564fe1870f1ba8f999d3ab8bbb8cc46a44355d9d6e9"
          pullPolicy: IfNotPresent
        env:
          PRESIDIO_DEVICE: cpu
          RECOGNIZER_REGISTRY_CONF_FILE: /opt/presidio/conf/recognizers.yaml
        probes:
          startup:    # NLP model loading takes 60-120s
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 18    # 180s window
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 1Gi
          limits:
            memory: 1536Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

  presidio-anonymizer:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      presidio-anonymizer:
        image:
          # renovate: datasource=docker depName=mcr.microsoft.com/presidio-anonymizer
          repository: mcr.microsoft.com/presidio-anonymizer
          tag: "2.2.362@sha256:a10a12a2a613d13cf29d3ad3641e3258444dd8c90403dd644a0a114c472c2483"
          pullPolicy: IfNotPresent
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 6     # 30s window
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

  llm-guard:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      llm-guard:
        image:
          # renovate: datasource=docker depName=laiyer/llm-guard-api
          repository: laiyer/llm-guard-api
          tag: "0.3.16"
          pullPolicy: IfNotPresent
        env:
          LOG_LEVEL: INFO
          LOG_JSON: "true"
          APP_PORT: "8000"
          SCAN_FAIL_FAST: "true"
          SCAN_PROMPT_TIMEOUT: "30"
          LAZY_LOAD: "false"
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 30    # 300s window for model loading
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 1536Mi
          limits:
            memory: 3072Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

  llm-guard-adapter:
    type: deployment
    replicas: 1
    containers:
      llm-guard-adapter:
        image:
          # renovate: datasource=docker depName=ghcr.io/anthony-spruyt/llm-guard-adapter
          repository: ghcr.io/anthony-spruyt/llm-guard-adapter
          tag: "0.0.1"
          pullPolicy: IfNotPresent
        env:
          LISTEN_ADDR: ":8080"
          LLM_GUARD_URL: "http://litellm-llm-guard.litellm.svc.cluster.local:8000"
          INJECTION_THRESHOLD: "0.5"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

service:
  litellm:
    controller: litellm
    ports:
      http:
        port: 4000
        protocol: TCP
  presidio-analyzer:
    controller: presidio-analyzer
    ports:
      http:
        port: 3000
        protocol: TCP
  presidio-anonymizer:
    controller: presidio-anonymizer
    ports:
      http:
        port: 3000
        protocol: TCP
  llm-guard:
    controller: llm-guard
    ports:
      http:
        port: 8000
        protocol: TCP
  llm-guard-adapter:
    controller: llm-guard-adapter
    ports:
      http:
        port: 8080
        protocol: TCP
configMaps:
  presidio-recognizers:
    data:
      recognizers.yaml: |
        supported_languages:
          - en
        global_regex_flags: 26
        recognizers:
          - name: CreditCardRecognizer
            supported_languages:
              - language: en
                context: [credit, card, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
            type: predefined
          - name: AuAbnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuAcnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuTfnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuMedicareRecognizer
            supported_languages:
              - en
            type: predefined
          - name: CryptoRecognizer
            type: predefined
          - name: DateRecognizer
            type: predefined
          - name: IbanRecognizer
            type: predefined
          - name: IpRecognizer
            type: predefined
          - name: MedicalLicenseRecognizer
            type: predefined
  llm-guard-scanners:
    data:
      scanners.yml: |
        app:
          log_level: INFO
          log_json: true
          scan_fail_fast: true
          scan_prompt_timeout: 30
          scan_output_timeout: 30
          lazy_load: false
        input_scanners:
          - type: PromptInjection
            params:
              threshold: 0.92
              match_type: truncate_head_tail
              model_max_length: 512
          - type: Secrets
            params:
              redact_mode: "all"
          - type: Regex
            params:
              patterns: ["Bearer [A-Za-z0-9-._~+/]+"]
              is_blocked: true
              match_type: search
              redact: true
          - type: InvisibleText
            params: {}
        output_scanners: []
  litellm-config:
    data:
      config.yaml: |
        model_list:
          # DashScope — code plan (token-plan endpoint)
          - model_name: qwen3.6-plus
            litellm_params:
              model: openai/qwen3.6-plus
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_API_KEY
            model_info:
              input_cost_per_token: 0.000000325
              output_cost_per_token: 0.00000195
          - model_name: deepseek-v3.2
            litellm_params:
              model: openai/deepseek-v3.2
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_API_KEY
            model_info:
              input_cost_per_token: 0.000000287
              output_cost_per_token: 0.000000431
          - model_name: glm-5
            litellm_params:
              model: openai/glm-5
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_API_KEY
            model_info:
              input_cost_per_token: 0.000000573
              output_cost_per_token: 0.00000258
          - model_name: MiniMax-M2.5
            litellm_params:
              model: openai/MiniMax-M2.5
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_API_KEY
            model_info:
              input_cost_per_token: 0.000000304
              output_cost_per_token: 0.000001213
          # DashScope — free quota (1M tokens each, expires 2026-08-14)
          - model_name: qwen3.6-max-preview
            litellm_params:
              model: openai/qwen3.6-max-preview
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
            model_info:
              input_cost_per_token: 0.00000078
              output_cost_per_token: 0.0000039
          - model_name: deepseek-v4-pro
            litellm_params:
              model: openai/deepseek-v4-pro
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
            model_info:
              input_cost_per_token: 0.000000435
              output_cost_per_token: 0.00000087
          - model_name: deepseek-v4-flash
            litellm_params:
              model: openai/deepseek-v4-flash
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
            model_info:
              input_cost_per_token: 0.00000014
              output_cost_per_token: 0.00000028
          - model_name: qwen3-coder-plus
            litellm_params:
              model: openai/qwen3-coder-plus
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
            model_info:
              input_cost_per_token: 0.000001
              output_cost_per_token: 0.000005
          - model_name: qwen3-coder-next
            litellm_params:
              model: openai/qwen3-coder-next
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
            model_info:
              input_cost_per_token: 0.0000003
              output_cost_per_token: 0.0000015
          - model_name: qwq-plus
            litellm_params:
              model: openai/qwq-plus
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
            model_info:
              input_cost_per_token: 0.0000008
              output_cost_per_token: 0.0000024
          - model_name: qvq-max
            litellm_params:
              model: openai/qvq-max
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
            model_info:
              input_cost_per_token: 0.0000012
              output_cost_per_token: 0.0000048
          # DashScope — embeddings and rerank (free quota, 1M tokens each)
          - model_name: text-embedding-v4
            litellm_params:
              model: openai/text-embedding-v4
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
          - model_name: text-embedding-v3
            litellm_params:
              model: openai/text-embedding-v3
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
          - model_name: qwen3-rerank
            litellm_params:
              model: openai/qwen3-rerank
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
          # Claude aliases — dual protocol (anthropic primary, openai fallback)
          # Each alias has 4 deployments:
          #   1. anthropic/ on PAYG  (Claude Code / Anthropic API clients)
          #   2. anthropic/ on code plan  (fallback)
          #   3. openai/ on PAYG  (OpenAI API clients / LiteLLM UI)
          #   4. openai/ on code plan  (last resort)
          #
          # Opus → qwen3.6-max-preview (PAYG) / qwen3.6-plus (code plan)
          - model_name: claude-opus-4-7
            litellm_params:
              model: anthropic/qwen3.6-max-preview
              api_base: https://dashscope-intl.aliyuncs.com/apps/anthropic
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
              order: 1
            model_info:
              input_cost_per_token: 0.00000078
              output_cost_per_token: 0.0000039
          - model_name: claude-opus-4-7
            litellm_params:
              model: anthropic/qwen3.6-plus
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/apps/anthropic
              api_key: os.environ/DASHSCOPE_API_KEY
              order: 2
            model_info:
              input_cost_per_token: 0.000000325
              output_cost_per_token: 0.00000195
          - model_name: claude-opus-4-7
            litellm_params:
              model: openai/qwen3.6-max-preview
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
              order: 3
            model_info:
              input_cost_per_token: 0.00000078
              output_cost_per_token: 0.0000039
          - model_name: claude-opus-4-7
            litellm_params:
              model: openai/qwen3.6-plus
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_API_KEY
              order: 4
            model_info:
              input_cost_per_token: 0.000000325
              output_cost_per_token: 0.00000195
          - model_name: claude-opus-4-6
            litellm_params:
              model: anthropic/qwen3.6-max-preview
              api_base: https://dashscope-intl.aliyuncs.com/apps/anthropic
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
              order: 1
            model_info:
              input_cost_per_token: 0.00000078
              output_cost_per_token: 0.0000039
          - model_name: claude-opus-4-6
            litellm_params:
              model: anthropic/qwen3.6-plus
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/apps/anthropic
              api_key: os.environ/DASHSCOPE_API_KEY
              order: 2
            model_info:
              input_cost_per_token: 0.000000325
              output_cost_per_token: 0.00000195
          - model_name: claude-opus-4-6
            litellm_params:
              model: openai/qwen3.6-max-preview
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
              order: 3
            model_info:
              input_cost_per_token: 0.00000078
              output_cost_per_token: 0.0000039
          - model_name: claude-opus-4-6
            litellm_params:
              model: openai/qwen3.6-plus
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_API_KEY
              order: 4
            model_info:
              input_cost_per_token: 0.000000325
              output_cost_per_token: 0.00000195
          # Sonnet → deepseek-v4-pro (PAYG) / deepseek-v3.2 (code plan)
          - model_name: claude-sonnet-4-6
            litellm_params:
              model: anthropic/deepseek-v4-pro
              api_base: https://dashscope-intl.aliyuncs.com/apps/anthropic
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
              order: 1
            model_info:
              input_cost_per_token: 0.000000435
              output_cost_per_token: 0.00000087
          - model_name: claude-sonnet-4-6
            litellm_params:
              model: anthropic/deepseek-v3.2
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/apps/anthropic
              api_key: os.environ/DASHSCOPE_API_KEY
              order: 2
            model_info:
              input_cost_per_token: 0.000000287
              output_cost_per_token: 0.000000431
          - model_name: claude-sonnet-4-6
            litellm_params:
              model: openai/deepseek-v4-pro
              api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_PAYG_API_KEY
              order: 3
            model_info:
              input_cost_per_token: 0.000000435
              output_cost_per_token: 0.00000087
          - model_name: claude-sonnet-4-6
            litellm_params:
              model: openai/deepseek-v3.2
              api_base: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/DASHSCOPE_API_KEY
              order: 4
            model_info:
              input_cost_per_token: 0.000000287
              output_cost_per_token: 0.000000431
          - model_name: claude-sonnet-4-5
            litellm_params:
              model: anthropic/deepseek-v4-pro
              api_base: https://dashscope-intl.aliyuncs.com/apps/anthropic
