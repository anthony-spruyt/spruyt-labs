            - prometheus
        guardrails:
          - guardrail_name: "pii-protection"
            litellm_params:
              guardrail: presidio
              mode: "pre_call"
              default_on: true
              presidio_filter_scope: "both"
              presidio_score_thresholds:
                ALL: 0.7
                PERSON: 0.85
                AU_TFN: 0.4
                AU_MEDICARE: 0.4
                AU_ABN: 0.4
                AU_ACN: 0.4
              pii_entities_config:
                CREDIT_CARD: "MASK"
                PERSON: "MASK"
                AU_TFN: "BLOCK"
                AU_MEDICARE: "MASK"
                AU_ABN: "MASK"
                AU_ACN: "MASK"
                IBAN_CODE: "MASK"
          - guardrail_name: "prompt-injection"
            litellm_params:
              guardrail: generic_guardrail_api
              mode: "pre_call"
              default_on: true
              api_base: "http://litellm-llm-guard-adapter.litellm.svc.cluster.local:8080"
        router_settings:
          allowed_fails: 3
          cooldown_time: 300
persistence:
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  config:
    type: configMap
    identifier: litellm-config
    advancedMounts:
      litellm:
        litellm:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
  presidio-recognizers-config:
    type: configMap
    identifier: presidio-recognizers
    advancedMounts:
      presidio-analyzer:
        presidio-analyzer:
          - path: /opt/presidio/conf/recognizers.yaml
            subPath: recognizers.yaml
            readOnly: true
  presidio-analyzer-cache:
    type: emptyDir
    advancedMounts:
      presidio-analyzer:
        presidio-analyzer:
          - path: /home/presidio/.cache
  presidio-anonymizer-cache:
    type: emptyDir
    advancedMounts:
      presidio-anonymizer:
        presidio-anonymizer:
          - path: /home/presidio/.cache
  llm-guard-scanners-config:
    type: configMap
    identifier: llm-guard-scanners
    advancedMounts:
      llm-guard:
        llm-guard:
          - path: /home/user/app/config/scanners.yml
            subPath: scanners.yml
            readOnly: true
  llm-guard-cache:
    type: emptyDir
    advancedMounts:
      llm-guard:
        llm-guard:
          - path: /home/user/.cache
