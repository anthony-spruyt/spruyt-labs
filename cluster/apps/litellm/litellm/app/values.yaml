---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: standard
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  litellm:
    type: deployment
    replicas: 2
    strategy: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/controller: litellm
              topologyKey: kubernetes.io/hostname
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      litellm:
        image:
          repository: ghcr.io/berriai/litellm-non_root
          tag: v1.88.0@sha256:fe46fd3bc61fcbc31e67d92afbc44e1ce292e2a29842f73b01b475abb4ded945
          pullPolicy: IfNotPresent
        args:
          - "--config"
          - "/app/config.yaml"
          - "--port"
          - "4000"
        env:
          # Database — CNPG auto-generated secret
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: litellm-cnpg-cluster-app
                key: uri
          # Authentik SSO (OIDC) — credentials from ExternalSecret
          GENERIC_CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: litellm-oauth-credentials
                key: GENERIC_CLIENT_ID
          GENERIC_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: litellm-oauth-credentials
                key: GENERIC_CLIENT_SECRET
          AUTO_REDIRECT_UI_LOGIN_TO_SSO: "true"
          GENERIC_AUTHORIZATION_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/authorize/"
          GENERIC_TOKEN_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/token/"
          GENERIC_USERINFO_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/userinfo/"
          PROXY_BASE_URL: "https://litellm.${EXTERNAL_DOMAIN}"
          GENERIC_SCOPE: "openid profile email litellm_role"
          GENERIC_USER_ROLE_ATTRIBUTE: litellm_role
          # OTEL — LiteLLM uses its own OTEL_EXPORTER/OTEL_ENDPOINT for traces callback
          OTEL_EXPORTER: otlp_http
          OTEL_ENDPOINT: http://victoria-traces-single-vt-single-server.observability.svc:10428/insert/opentelemetry/v1/traces
          # Standard SDK vars for metrics export
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://vmsingle-victoria-metrics-k8s-stack.observability.svc:8428/opentelemetry/v1/metrics
          OTEL_RESOURCE_ATTRIBUTES: "service.name=litellm,service.namespace=litellm"
          STORE_MODEL_IN_DB: "True"
          PRESIDIO_ANALYZER_API_BASE: "http://litellm-presidio-analyzer.litellm.svc.cluster.local:3000"
          PRESIDIO_ANONYMIZER_API_BASE: "http://litellm-presidio-anonymizer.litellm.svc.cluster.local:3000"
          REDIS_HOST: litellm-valkey.litellm.svc
          REDIS_PORT: "6379"
          REDIS_USERNAME: litellm
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: litellm-valkey-secrets
                key: litellm
          # Resolve the custom_callbacks.hindsight.* import for the proxy callback
          PYTHONPATH: "/app:/app/custom_callbacks"
        envFrom:
          - secretRef:
              name: litellm-secrets
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/liveliness
                port: 4000
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/readiness
                port: 4000
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 10
        resources:
          limits:
            memory: 3072Mi
          requests:
            cpu: 100m
            memory: 1536Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

  presidio-analyzer:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      presidio-analyzer:
        image:
          repository: mcr.microsoft.com/presidio-analyzer
          tag: "2.2.362@sha256:286e3fa7f3a7426e775e8564fe1870f1ba8f999d3ab8bbb8cc46a44355d9d6e9"
          pullPolicy: IfNotPresent
        env:
          PRESIDIO_DEVICE: cpu
          RECOGNIZER_REGISTRY_CONF_FILE: /opt/presidio/conf/recognizers.yaml
        probes:
          startup:    # NLP model loading takes 60-120s
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 18    # 180s window
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 1Gi
          limits:
            memory: 1536Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

  presidio-anonymizer:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      presidio-anonymizer:
        image:
          repository: mcr.microsoft.com/presidio-anonymizer
          tag: "2.2.362@sha256:a10a12a2a613d13cf29d3ad3641e3258444dd8c90403dd644a0a114c472c2483"
          pullPolicy: IfNotPresent
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 6     # 30s window
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

  llm-guard:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      llm-guard:
        image:
          repository: ghcr.io/anthony-spruyt/llm-guard
          tag: "1.0.9@sha256:6d18ed06e2cec22cb3a4c81fbc24a2ad6f76028f9db2cb16eaced419e91d5cce"
          pullPolicy: IfNotPresent
        env:
          LISTEN_PORT: "8000"
          # Multi-scanner pipeline loaded from the mounted ConfigMap.
          # Per-scanner thresholds live in scanners.yml, not the THRESHOLD env.
          CONFIG_FILE: "/config/scanners.yml"
          HF_TOKEN:
            valueFrom:
              secretKeyRef:
                name: litellm-secrets
                key: HF_TOKEN
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8000
              periodSeconds: 10
              timeoutSeconds: 5
              # 300s window — rogue-security model is pulled from HF over egress
              # on first boot (not baked), then loaded; baked model was ~24s.
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

service:
  litellm:
    controller: litellm
    ports:
      http:
        port: 4000
        protocol: TCP
  presidio-analyzer:
    controller: presidio-analyzer
    ports:
      http:
        port: 3000
        protocol: TCP
  presidio-anonymizer:
    controller: presidio-anonymizer
    ports:
      http:
        port: 3000
        protocol: TCP
  llm-guard:
    controller: llm-guard
    ports:
      http:
        port: 8000
        protocol: TCP

configMaps:
  presidio-recognizers:
    data:
      recognizers.yaml: |
        supported_languages:
          - en
        global_regex_flags: 26
        recognizers:
          - name: CreditCardRecognizer
            supported_languages:
              - language: en
                context: [credit, card, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
            type: predefined
          - name: AuAbnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuAcnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuTfnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuMedicareRecognizer
            supported_languages:
              - en
            type: predefined
          - name: CryptoRecognizer
            type: predefined
          - name: DateRecognizer
            type: predefined
          - name: IbanRecognizer
            type: predefined
          - name: IpRecognizer
            type: predefined
          - name: MedicalLicenseRecognizer
            type: predefined
  llm-guard-scanners:
    data:
      scanners.yml: |
        input_scanners:
          - type: PromptInjection
            params:
              model: rogue-security/prompt-injection-jailbreak-sentinel-v2
              injection_label: jailbreak
              threshold: 0.97
              match_type: full
              model_max_length: 512
          - type: Regex
            params:
              patterns: ["Bearer [A-Za-z0-9-._~+/]+"]
              is_blocked: true
              match_type: search
              redact: true
          - type: InvisibleText
            params: {}
  litellm-config:
    data:
      config.yaml: |
        general_settings:
          use_redis_transaction_buffer: true
          user_api_key_cache_ttl: 300
        guardrails:
          - guardrail_name: pii-protection
            litellm_params:
              guardrail: presidio
              mode: pre_call
              default_on: false
              skip_system_message_in_guardrail: true
              presidio_filter_scope: input
              presidio_score_thresholds:
                ALL: 0.7
                PERSON: 0.85
                AU_TFN: 0.4
                AU_MEDICARE: 0.4
                AU_ABN: 0.4
                AU_ACN: 0.4
              pii_entities_config:
                CREDIT_CARD: MASK
                AU_TFN: BLOCK
                AU_MEDICARE: MASK
                AU_ABN: MASK
                AU_ACN: MASK
                IBAN_CODE: MASK
          - guardrail_name: prompt-injection
            litellm_params:
              guardrail: generic_guardrail_api
              mode: pre_call
              default_on: false
              skip_system_message_in_guardrail: true
              api_base: http://litellm-llm-guard.litellm.svc.cluster.local:8000
        litellm_settings:
          cache: true
          cache_params:
            type: redis
          callbacks:
            - otel
            - prometheus
            - websearch_interception
            - custom_callbacks.hindsight.hindsight_plugin.hindsight_middleware
          drop_params: true
          websearch_interception_params:
            enabled_providers:
              - anthropic
              - hosted_vllm
              - openai
            search_tool_name: brave-search
        router_settings:
          redis_host: litellm-valkey.litellm.svc
          redis_port: "6379"
          redis_password: os.environ/REDIS_PASSWORD
        search_tools:
          - search_tool_name: brave-search
            litellm_params:
              search_provider: brave
              api_key: os.environ/BRAVE_API_KEY
          - search_tool_name: firecrawl-search
            litellm_params:
              search_provider: firecrawl
              api_key: os.environ/FIRECRAWL_API_KEY

persistence:
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  config:
    type: configMap
    identifier: litellm-config
    advancedMounts:
      litellm:
        litellm:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
  presidio-recognizers-config:
    type: configMap
    identifier: presidio-recognizers
    advancedMounts:
      presidio-analyzer:
        presidio-analyzer:
          - path: /opt/presidio/conf/recognizers.yaml
            subPath: recognizers.yaml
            readOnly: true
  presidio-analyzer-cache:
    type: emptyDir
    advancedMounts:
      presidio-analyzer:
        presidio-analyzer:
          - path: /home/presidio/.cache
  presidio-anonymizer-cache:
    type: emptyDir
    advancedMounts:
      presidio-anonymizer:
        presidio-anonymizer:
          - path: /home/presidio/.cache
  llm-guard-scanners-config:
    type: configMap
    identifier: llm-guard-scanners
    advancedMounts:
      llm-guard:
        llm-guard:
          - path: /config/scanners.yml
            subPath: scanners.yml
            readOnly: true
  # Hindsight proxy-side memory callback. ConfigMap keys are flat (no '/'),
  # so the custom_callbacks/hindsight/ package tree is recreated via subPath
  # mounts. The /app entry on PYTHONPATH resolves the dotted import
  # custom_callbacks.hindsight.hindsight_plugin.
  hindsight-plugin:
    type: configMap
    name: litellm-hindsight-plugin
    advancedMounts:
      litellm:
        litellm:
          - path: /app/custom_callbacks/__init__.py
            subPath: __init__.py
            readOnly: true
          - path: /app/custom_callbacks/hindsight/__init__.py
            subPath: __init__.py
            readOnly: true
          - path: /app/custom_callbacks/hindsight/hindsight_plugin.py
            subPath: hindsight_plugin.py
            readOnly: true
