---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: standard
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  litellm:
    type: deployment
    replicas: 2
    strategy: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/controller: litellm
              topologyKey: kubernetes.io/hostname
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      litellm:
        image:
          repository: ghcr.io/berriai/litellm-non_root
          tag: v1.86.2@sha256:511b513bc68956793433d62c1812daff56984325543f6a15431c622823fd90cb
          pullPolicy: IfNotPresent
        args:
          - "--config"
          - "/app/config.yaml"
          - "--port"
          - "4000"
        env:
          # Database — CNPG auto-generated secret
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: litellm-cnpg-cluster-app
                key: uri
          # Authentik SSO (OIDC) — credentials from ExternalSecret
          GENERIC_CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: litellm-oauth-credentials
                key: GENERIC_CLIENT_ID
          GENERIC_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: litellm-oauth-credentials
                key: GENERIC_CLIENT_SECRET
          AUTO_REDIRECT_UI_LOGIN_TO_SSO: "true"
          GENERIC_AUTHORIZATION_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/authorize/"
          GENERIC_TOKEN_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/token/"
          GENERIC_USERINFO_ENDPOINT: "https://auth.${EXTERNAL_DOMAIN}/application/o/userinfo/"
          PROXY_BASE_URL: "https://litellm.${EXTERNAL_DOMAIN}"
          GENERIC_SCOPE: "openid profile email litellm_role"
          GENERIC_USER_ROLE_ATTRIBUTE: litellm_role
          # OTEL — LiteLLM uses its own OTEL_EXPORTER/OTEL_ENDPOINT for traces callback
          OTEL_EXPORTER: otlp_http
          OTEL_ENDPOINT: http://victoria-traces-single-vt-single-server.observability.svc:10428/insert/opentelemetry/v1/traces
          # Standard SDK vars for metrics export
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://vmsingle-victoria-metrics-k8s-stack.observability.svc:8428/opentelemetry/v1/metrics
          OTEL_RESOURCE_ATTRIBUTES: "service.name=litellm,service.namespace=litellm"
          STORE_MODEL_IN_DB: "True"
          PRESIDIO_ANALYZER_API_BASE: "http://litellm-presidio-analyzer.litellm.svc.cluster.local:3000"
          PRESIDIO_ANONYMIZER_API_BASE: "http://litellm-presidio-anonymizer.litellm.svc.cluster.local:3000"
          REDIS_HOST: litellm-valkey.litellm.svc
          REDIS_PORT: "6379"
          REDIS_USERNAME: litellm
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: litellm-valkey-secrets
                key: litellm
        envFrom:
          - secretRef:
              name: litellm-secrets
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/liveliness
                port: 4000
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/readiness
                port: 4000
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 10
        resources:
          limits:
            memory: 3072Mi
          requests:
            cpu: 100m
            memory: 1536Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

  presidio-analyzer:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      presidio-analyzer:
        image:
          repository: mcr.microsoft.com/presidio-analyzer
          tag: "2.2.362@sha256:286e3fa7f3a7426e775e8564fe1870f1ba8f999d3ab8bbb8cc46a44355d9d6e9"
          pullPolicy: IfNotPresent
        env:
          PRESIDIO_DEVICE: cpu
          RECOGNIZER_REGISTRY_CONF_FILE: /opt/presidio/conf/recognizers.yaml
        probes:
          startup:    # NLP model loading takes 60-120s
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 18    # 180s window
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 1Gi
          limits:
            memory: 1536Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

  presidio-anonymizer:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      presidio-anonymizer:
        image:
          repository: mcr.microsoft.com/presidio-anonymizer
          tag: "2.2.362@sha256:a10a12a2a613d13cf29d3ad3641e3258444dd8c90403dd644a0a114c472c2483"
          pullPolicy: IfNotPresent
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 6     # 30s window
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

  llm-guard:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      llm-guard:
        image:
          repository: ghcr.io/anthony-spruyt/llm-guard
          tag: "0.3.1@sha256:0e131ad0ef7488fbd50b7e494d99a67097df9f12dee35689744e6cb492fd91ce"
          pullPolicy: IfNotPresent
        env:
          LOG_LEVEL: DEBUG
          LOG_JSON: "true"
          APP_PORT: "8000"
          SCAN_FAIL_FAST: "true"
          SCAN_PROMPT_TIMEOUT: "30"
          LAZY_LOAD: "false"
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 12    # 120s window — model loads in ~24s from baked image
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 1536Mi
          limits:
            memory: 3072Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

  llm-guard-adapter:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      llm-guard-adapter:
        image:
          repository: ghcr.io/anthony-spruyt/llm-guard-adapter
          tag: "0.0.4@sha256:13719459e5774a71077b0b52e2024d61c9307941b6f15b978d2da8fd7375523f"
          pullPolicy: IfNotPresent
        env:
          LISTEN_ADDR: ":8080"
          LLM_GUARD_URL: "http://litellm-llm-guard.litellm.svc.cluster.local:8000"
          INJECTION_THRESHOLD: "0.8"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              periodSeconds: 15
              failureThreshold: 3
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

service:
  litellm:
    controller: litellm
    ports:
      http:
        port: 4000
        protocol: TCP
  presidio-analyzer:
    controller: presidio-analyzer
    ports:
      http:
        port: 3000
        protocol: TCP
  presidio-anonymizer:
    controller: presidio-anonymizer
    ports:
      http:
        port: 3000
        protocol: TCP
  llm-guard:
    controller: llm-guard
    ports:
      http:
        port: 8000
        protocol: TCP
  llm-guard-adapter:
    controller: llm-guard-adapter
    ports:
      http:
        port: 8080
        protocol: TCP

configMaps:
  presidio-recognizers:
    data:
      recognizers.yaml: |
        supported_languages:
          - en
        global_regex_flags: 26
        recognizers:
          - name: CreditCardRecognizer
            supported_languages:
              - language: en
                context: [credit, card, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
            type: predefined
          - name: AuAbnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuAcnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuTfnRecognizer
            supported_languages:
              - en
            type: predefined
          - name: AuMedicareRecognizer
            supported_languages:
              - en
            type: predefined
          - name: CryptoRecognizer
            type: predefined
          - name: DateRecognizer
            type: predefined
          - name: IbanRecognizer
            type: predefined
          - name: IpRecognizer
            type: predefined
          - name: MedicalLicenseRecognizer
            type: predefined
  llm-guard-scanners:
    data:
      scanners.yml: |
        app:
          log_level: INFO
          log_json: true
          scan_fail_fast: true
          scan_prompt_timeout: 30
          scan_output_timeout: 30
          lazy_load: false
        input_scanners:
          - type: PromptInjection
            params:
              threshold: 0.97
              match_type: sentence
              model_max_length: 512
          - type: Regex
            params:
              patterns: ["Bearer [A-Za-z0-9-._~+/]+"]
              is_blocked: true
              match_type: search
              redact: true
          - type: InvisibleText
            params: {}
        output_scanners: []
  litellm-config:
    data:
      config.yaml: |
        guardrails:
          - guardrail_name: pii-protection
            litellm_params:
              guardrail: presidio
              mode: pre_call
              default_on: false
              skip_system_message_in_guardrail: true
              presidio_filter_scope: input
              presidio_score_thresholds:
                ALL: 0.7
                PERSON: 0.85
                AU_TFN: 0.4
                AU_MEDICARE: 0.4
                AU_ABN: 0.4
                AU_ACN: 0.4
              pii_entities_config:
                CREDIT_CARD: MASK
                AU_TFN: BLOCK
                AU_MEDICARE: MASK
                AU_ABN: MASK
                AU_ACN: MASK
                IBAN_CODE: MASK
          - guardrail_name: prompt-injection
            litellm_params:
              guardrail: generic_guardrail_api
              mode: pre_call
              default_on: false
              skip_system_message_in_guardrail: true
              api_base: http://litellm-llm-guard-adapter.litellm.svc.cluster.local:8080
        litellm_settings:
          drop_params: true
          callbacks:
            - otel
            - prometheus
            - websearch_interception
          websearch_interception_params:
            enabled_providers:
              - anthropic
              - hosted_vllm
              - openai
            search_tool_name: brave-search
        router_settings:
          redis_host: litellm-valkey.litellm.svc
          redis_port: "6379"
          redis_username: litellm
          redis_password: os.environ/REDIS_PASSWORD
        search_tools:
          - search_tool_name: brave-search
            litellm_params:
              search_provider: brave
              api_key: os.environ/BRAVE_API_KEY
          - search_tool_name: firecrawl-search
            litellm_params:
              search_provider: firecrawl
              api_key: os.environ/FIRECRAWL_API_KEY

persistence:
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  config:
    type: configMap
    identifier: litellm-config
    advancedMounts:
      litellm:
        litellm:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
  presidio-recognizers-config:
    type: configMap
    identifier: presidio-recognizers
    advancedMounts:
      presidio-analyzer:
        presidio-analyzer:
          - path: /opt/presidio/conf/recognizers.yaml
            subPath: recognizers.yaml
            readOnly: true
  presidio-analyzer-cache:
    type: emptyDir
    advancedMounts:
      presidio-analyzer:
        presidio-analyzer:
          - path: /home/presidio/.cache
  presidio-anonymizer-cache:
    type: emptyDir
    advancedMounts:
      presidio-anonymizer:
        presidio-anonymizer:
          - path: /home/presidio/.cache
  llm-guard-scanners-config:
    type: configMap
    identifier: llm-guard-scanners
    advancedMounts:
      llm-guard:
        llm-guard:
          - path: /home/user/app/config/scanners.yml
            subPath: scanners.yml
            readOnly: true
  llm-guard-cache:
    type: emptyDir
    advancedMounts:
      llm-guard:
        llm-guard:
          - path: /home/user/.cache
