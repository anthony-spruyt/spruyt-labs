---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./aws-secret-store.yaml
  - ./aws-external-secret.yaml
  - ./authentik-secret-store.yaml
  - ./litellm-oauth-external-secret.yaml
  - ./litellm-secrets.sops.yaml
  - ./litellm-cnpg-object-stores.yaml
  - ./litellm-cnpg-cluster.yaml
  - ./litellm-cnpg-scheduled-backups.yaml
  - ./network-policies.yaml
  - ./oauth-rotation-rbac.yaml
  - ./persistent-volume-claims.yaml
  - ./release.yaml
  - ./vm-service-scrape.yaml
  - ./vpa.yaml
configMapGenerator:
  - name: litellm-values
    namespace: litellm
    files:
      - values.yaml
  - name: litellm-chatgpt-plugin
    namespace: litellm
    options:
      disableNameSuffixHash: true
    files:
      - __init__.py=plugins/chatgpt/__init__.py
      - chatgpt_plugin.py=plugins/chatgpt/chatgpt_plugin.py
  - name: litellm-middleware-plugin
    namespace: litellm
    options:
      disableNameSuffixHash: true
    files:
      - __init__.py=plugins/middleware/__init__.py
      - base.py=plugins/middleware/base.py
      - pipeline.py=plugins/middleware/pipeline.py
      - pipeline_plugin.py=plugins/middleware/pipeline_plugin.py
      - registry.py=plugins/middleware/registry.py
  - name: litellm-hindsight-plugin
    namespace: litellm
    options:
      disableNameSuffixHash: true
    files:
      # ConfigMap keys must be flat (no '/'); nesting is recreated via subPath
      # mounts in values.yaml. The empty __init__.py is reused for both the
      # custom_callbacks and hindsight package markers.
      - __init__.py=plugins/hindsight/__init__.py
      - hindsight_plugin.py=plugins/hindsight/hindsight_plugin.py
  - name: litellm-main-override
    namespace: litellm
    options:
      disableNameSuffixHash: true
    files:
      - main.py=litellm-main.py
configurations:
  - ./kustomizeconfig.yaml
