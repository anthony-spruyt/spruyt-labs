---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: low-priority
  automountServiceAccountToken: true
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    seccompProfile:
      type: RuntimeDefault
controllers:
  kubectl-mcp-server:
    serviceAccount:
      name: kubectl-mcp-server
    strategy: Recreate
    containers:
      app:
        image:
          repository: docker.io/rohitghumare64/kubectl-mcp-server
          # Tracking `:latest` by digest: upstream tags GitHub releases infrequently
          # (e.g. v1.24.0 on 2026-02-20) while pushing main commits to `:latest`
          # continuously. Pinning to a release tag would downgrade. Renovate bumps
          # the digest; review upstream commits at github.com/rohitg00/kubectl-mcp-server
          # before merging if behavior changes are a concern.
          tag: latest@sha256:c60ac164a0d69b661c46b1089b269640527bca7f349e8d3f313df26fa45b14f7
          pullPolicy: IfNotPresent
        args:
          - "--transport"
          - "streamable-http"
        env:
          - name: KUBERNETES_SERVICE_HOST
            value: "kubernetes.default.svc.cluster.local"
          - name: MCP_DEBUG
            value: "false"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8000
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8000
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8000
              failureThreshold: 30
              periodSeconds: 5
service:
  app:
    controller: kubectl-mcp-server
    ports:
      http:
        port: 8000
