---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: low-priority
  automountServiceAccountToken: true
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    seccompProfile:
      type: RuntimeDefault
controllers:
  kubectl-mcp-server:
    serviceAccount:
      name: kubectl-mcp-server
    strategy: Recreate
    containers:
      app:
        image:
          repository: docker.io/rohitghumare64/kubectl-mcp-server
          tag: latest@sha256:6a3a59b0a8d9936b808fdcb825f53012a3de9298eb5d368c61afae51aeed6ac0
          pullPolicy: IfNotPresent
        args:
          - "--transport"
          - "streamable-http"
        env:
          - name: KUBERNETES_SERVICE_HOST
            value: "kubernetes.default.svc.cluster.local"
          - name: MCP_DEBUG
            value: "false"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8000
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8000
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8000
              failureThreshold: 30
              periodSeconds: 5
service:
  app:
    controller: kubectl-mcp-server
    ports:
      http:
        port: 8000
