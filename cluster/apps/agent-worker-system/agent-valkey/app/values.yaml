---
# yaml-language-server: $schema=https://raw.githubusercontent.com/valkey-io/valkey-helm/refs/heads/main/valkey/values.schema.json
priorityClassName: high-priority
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
auth:
  enabled: true
  usersExistingSecret: agent-valkey-secrets
  aclUsers:
    default:
      permissions: "~* &* +@all"
valkeyConfig: |
  appendonly yes
  appendfsync everysec
  no-appendfsync-on-rewrite yes
  maxmemory 50mb
  maxmemory-policy noeviction
dataStorage:
  enabled: true
  className: rbd-fast-delete
  requestedSize: 1Gi
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  exporter:
    extraEnvs:
      REDIS_PASSWORD_FILE: /secrets/valkey/default
    extraExporterSecrets:
      - name: agent-valkey-secrets
    extraVolumeMounts:
      - name: agent-valkey-secrets-exporter
        mountPath: /secrets/valkey
        readOnly: true
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi
