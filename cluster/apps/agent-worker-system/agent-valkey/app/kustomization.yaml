---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./release.yaml
  - ./valkey-secrets.sops.yaml
  - ./vpa.yaml
  - ./network-policies.yaml
configMapGenerator:
