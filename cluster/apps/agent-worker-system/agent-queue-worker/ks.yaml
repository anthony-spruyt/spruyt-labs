---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app agent-queue-worker
  namespace: flux-system
spec:
  targetNamespace: agent-worker-system
  path: ./cluster/apps/agent-worker-system/agent-queue-worker/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: agent-valkey
    - name: n8n
    - name: authentik
  prune: true
  timeout: 5m
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-queue-worker-n8n-secret
  namespace: flux-system
spec:
  targetNamespace: n8n-system
  path: ./cluster/apps/agent-worker-system/agent-queue-worker/n8n-secret
  commonMetadata:
    labels:
      app.kubernetes.io/name: agent-queue-worker
  dependsOn:
    - name: agent-queue-worker
  prune: true
  timeout: 5m
