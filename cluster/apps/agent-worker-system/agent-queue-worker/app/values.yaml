---
defaultPodOptions:
  automountServiceAccountToken: false
  priorityClassName: standard
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile:
      type: RuntimeDefault
controllers:
  worker:
    replicas: 1
    strategy: RollingUpdate
    rollingUpdate:
      unavailable: 0
    pod:
      terminationGracePeriodSeconds: 30
    containers:
      app:
        image:
          repository: ghcr.io/anthony-spruyt/agent-queue-worker
          tag: 1.2.6@sha256:9c94bb9aa72947ab5c9de8c9af5ad19b1f9a07c148fa73c5236cf42e31ed1af7
        env:
          VALKEY_HOST: agent-valkey.agent-worker-system.svc
          VALKEY_PORT: "6379"
          N8N_DISPATCH_WEBHOOK: http://n8n-webhook.n8n-system.svc/webhook/agent-dispatch
          GITHUB_OWNER: anthony-spruyt
        envFrom:
          - secretRef:
              name: agent-queue-worker-secrets
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: &port 3000
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *port
  bull-board:
    replicas: 1
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/anthony-spruyt/bull-board
          tag: 0.2.3@sha256:5d094cad3e7728f14a986adc78261aad2b153b607b20c54d7b7518bae8dff72b
        env:
          VALKEY_HOST: agent-valkey.agent-worker-system.svc
          VALKEY_PORT: "6379"
          BULL_BOARD_PORT: "3001"
          QUEUE_PREFIX: agent:queue
          READ_ONLY: "false"
          WORKER_URL: http://agent-queue-worker.agent-worker-system.svc:3000
          VALKEY_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: agent-queue-worker-secrets
                key: VALKEY_PASSWORD
          WORKER_AUTH_SECRET:
            valueFrom:
              secretKeyRef:
                name: agent-queue-worker-secrets
                key: N8N_TO_WORKER_SECRET
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: &bbport 3001
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: *bbport
service:
  worker:
    controller: worker
    ports:
      http:
        port: *port
  bull-board:
    controller: bull-board
    ports:
      http:
        port: *bbport
persistence:
  tmp:
    type: emptyDir
    advancedMounts:
      worker:
        app:
          - path: /tmp
      bull-board:
        app:
          - path: /tmp
  npm-cache:
    type: emptyDir
    advancedMounts:
      worker:
        app:
          - path: /home/node/.npm
      bull-board:
        app:
          - path: /home/node/.npm
