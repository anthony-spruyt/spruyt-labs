---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
defaultPodOptions:
  automountServiceAccountToken: false
  priorityClassName: standard
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile:
      type: RuntimeDefault
controllers:
  worker:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"
    replicas: 1
    strategy: Recreate
    rollingUpdate:
      unavailable: 0
    pod:
      terminationGracePeriodSeconds: 30
    containers:
      app:
        image:
          repository: ghcr.io/anthony-spruyt/agent-queue-worker
          tag: 3.3.34@sha256:459984f4e70e70f8e39cb1e40e89cbcd01423a3e79314932a1bd6aaabb8d8095
        env:
          VALKEY_HOST: agent-valkey.agent-worker-system.svc
          VALKEY_PORT: "6379"
          N8N_DISPATCH_WEBHOOK: http://n8n-webhook.n8n-system.svc/webhook/agent-dispatch
          GITHUB_OWNER: anthony-spruyt
          SRE_BATCH_MAX_SIZE: "50"
          SRE_BATCH_WINDOW_MS: "300000"
          SRE_COOLDOWN_MS: "900000"
          SRE_TRIAGE_SUPPRESS_S: "21600"
          VALKEY_USER: "agentqueueworker"
          VALKEY_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: agent-valkey-secrets
                key: agentqueueworker
        envFrom:
          - secretRef:
              name: agent-queue-worker-secrets
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: &port 3000
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *port
  bull-board:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"
    replicas: 1
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/anthony-spruyt/bull-board
          tag: 0.2.18@sha256:5437fe9fa40205ce9314e4f93774d2c34886d5eb44e7c4a33beb1cab87ec6d91
        env:
          VALKEY_HOST: agent-valkey.agent-worker-system.svc
          VALKEY_PORT: "6379"
          BULL_BOARD_PORT: "3001"
          QUEUE_PREFIX: agent:queue
          READ_ONLY: "false"
          WORKER_URL: http://agent-queue-worker.agent-worker-system.svc:3000
          VALKEY_USER: "agentqueueworker"
          VALKEY_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: agent-valkey-secrets
                key: agentqueueworker
          WORKER_AUTH_SECRET:
            valueFrom:
              secretKeyRef:
                name: agent-queue-worker-secrets
                key: N8N_TO_WORKER_SECRET
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: &bbport 3001
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: *bbport
service:
  worker:
    controller: worker
    ports:
      http:
        port: *port
  bull-board:
    controller: bull-board
    ports:
      http:
        port: *bbport
persistence:
  tmp:
    type: emptyDir
    advancedMounts:
      worker:
        app:
          - path: /tmp
      bull-board:
        app:
          - path: /tmp
  npm-cache:
    type: emptyDir
    advancedMounts:
      worker:
        app:
          - path: /home/node/.npm
      bull-board:
        app:
          - path: /home/node/.npm
