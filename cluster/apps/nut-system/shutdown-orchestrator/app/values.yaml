---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
controllers:
  orchestrator:
    type: deployment
    replicas: 1
    strategy: Recreate
    annotations: {}
    serviceAccount:
      name: shutdown-orchestrator
    pod:
      priorityClassName: critical-infrastructure
      # Run on control plane so orchestrator stays alive until last node shuts down
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        runAsNonRoot: true
    containers:
      app:
        image:
          repository: ghcr.io/anthony-spruyt/shutdown-orchestrator
          tag: 1.1.0
          pullPolicy: IfNotPresent
        env:
          - name: NUT_SERVER
            value: nut-server-nut.nut-system.svc.cluster.local
          - name: NUT_PORT
            value: "3493"
          - name: UPS_NAME
            value: cp1500
          - name: SHUTDOWN_DELAY
            value: "30"
          - name: POLL_INTERVAL
            value: "5"
          - name: UPS_RUNTIME_BUDGET
            value: "600"
          - name: HEALTH_PORT
            value: "8080"
          - name: MODE
            value: preflight
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          # Phase timeouts (seconds)
          - name: CNPG_PHASE_TIMEOUT
            value: "60"
          - name: CEPH_FLAG_PHASE_TIMEOUT
            value: "15"
          - name: CEPH_SCALE_PHASE_TIMEOUT
            value: "60"
          - name: CEPH_HEALTH_WAIT_TIMEOUT
            value: "300"
          - name: NODE_SHUTDOWN_PHASE_TIMEOUT
            value: "120"
          - name: PER_NODE_TIMEOUT
            value: "15"
          - name: CEPH_WAIT_TOOLS_TIMEOUT
            value: "600"
          # Node IPs from cluster secrets (Flux substitution)
          - name: MS_01_1_IP4
            value: "${MS_01_1_IP4}"
          - name: MS_01_2_IP4
            value: "${MS_01_2_IP4}"
          - name: MS_01_3_IP4
            value: "${MS_01_3_IP4}"
          - name: E2_1_IP4
            value: "${E2_1_IP4}"
          - name: E2_2_IP4
            value: "${E2_2_IP4}"
          - name: E2_3_IP4
            value: "${E2_3_IP4}"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
persistence:
  talos-secrets:
    type: secret
    name: shutdown-orchestrator-talos-secrets
    globalMounts:
      - path: /var/run/secrets/talos.dev
        readOnly: true
