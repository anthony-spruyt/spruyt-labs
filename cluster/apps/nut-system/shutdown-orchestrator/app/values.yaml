---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
controllers:
  orchestrator:
    type: deployment
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    serviceAccount:
      name: shutdown-orchestrator
    pod:
      priorityClassName: critical-infrastructure
      # Run on control plane so orchestrator stays alive until last node shuts down
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 0
        runAsGroup: 0
    initContainers:
      install-tools:
        image:
          repository: bitnami/kubectl
          tag: latest
          pullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            set -e
            # Install talosctl with checksum verification
            # renovate: depName=siderolabs/talos datasource=github-releases
            TALOS_URL="https://github.com/siderolabs/talos/releases/download/v1.12.5/talosctl-linux-amd64"
            TALOS_VERSION=$(echo "$TALOS_URL" | sed 's|.*/download/\([^/]*\)/.*|\1|')
            curl -sL "$TALOS_URL" -o /tools/talosctl
            curl -sL "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/sha256sum.txt" -o /tmp/sha256sum.txt
            EXPECTED=$(grep "talosctl-linux-amd64$" /tmp/sha256sum.txt | awk '{print $1}')
            ACTUAL=$(sha256sum /tools/talosctl | awk '{print $1}')
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "ERROR: talosctl checksum mismatch!"
              echo "Expected: $EXPECTED"
              echo "Actual:   $ACTUAL"
              exit 1
            fi
            echo "talosctl checksum verified: $ACTUAL"
            chmod +x /tools/talosctl
            # Install nut-client (for upsc command)
            apt-get update && apt-get install -y --no-install-recommends nut-client && rm -rf /var/lib/apt/lists/*
            cp /usr/bin/upsc /tools/
            echo "Tools installed successfully"
    containers:
      app:
        image:
          repository: bitnami/kubectl
          tag: latest
          pullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            export PATH="/tools:$PATH"
            exec /scripts/shutdown.sh
        env:
          - name: TALOSCONFIG
            value: /talos/talosconfig
          - name: NUT_SERVER
            value: nut-server-nut.nut-system.svc.cluster.local
          - name: NUT_PORT
            value: "3493"
          - name: UPS_NAME
            value: cp1500
          - name: SHUTDOWN_DELAY
            value: "30"
          - name: POLL_INTERVAL
            value: "5"
          # Set to "true" to test without executing destructive actions
          # TODO: Set to "false" after validating dry-run behavior
          - name: DRY_RUN
            value: "true"
          # Node IPs from cluster secrets (Flux substitution)
          - name: MS_01_1_IP4
            value: "${MS_01_1_IP4}"
          - name: MS_01_2_IP4
            value: "${MS_01_2_IP4}"
          - name: MS_01_3_IP4
            value: "${MS_01_3_IP4}"
          - name: E2_1_IP4
            value: "${E2_1_IP4}"
          - name: E2_2_IP4
            value: "${E2_2_IP4}"
          - name: E2_3_IP4
            value: "${E2_3_IP4}"
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - pgrep -f shutdown.sh
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - pgrep -f shutdown.sh
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
persistence:
  scripts:
    type: configMap
    name: shutdown-script
    defaultMode: 0755
    globalMounts:
      - path: /scripts
  talos:
    type: secret
    name: talosconfig-secret
    globalMounts:
      - path: /talos
        readOnly: true
  tools:
    type: emptyDir
    globalMounts:
      - path: /tools
