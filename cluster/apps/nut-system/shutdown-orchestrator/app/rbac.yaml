---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shutdown-orchestrator
  namespace: nut-system
---
# Cluster-wide permissions (nodes, CNPG clusters across namespaces)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shutdown-orchestrator
rules:
  # Hibernate CNPG clusters across all namespaces
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "patch", "update"]
  # Node operations (cluster-wide by nature, read-only)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shutdown-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: shutdown-orchestrator
subjects:
  - kind: ServiceAccount
    name: shutdown-orchestrator
    namespace: nut-system
