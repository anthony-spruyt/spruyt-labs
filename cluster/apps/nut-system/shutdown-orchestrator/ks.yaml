---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shutdown-orchestrator-rbac-rook-ceph
  namespace: flux-system
spec:
  path: ./cluster/apps/nut-system/shutdown-orchestrator/rbac-rook-ceph
  commonMetadata:
    labels:
      app.kubernetes.io/name: shutdown-orchestrator
  dependsOn:
    - name: rook-ceph-cluster
  prune: true
  wait: true
  timeout: 2m
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app shutdown-orchestrator
  namespace: flux-system
spec:
  targetNamespace: nut-system
  path: ./cluster/apps/nut-system/shutdown-orchestrator/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: nut-server
    - name: shutdown-orchestrator-rbac-rook-ceph
  prune: true
  wait: true
  timeout: 5m
