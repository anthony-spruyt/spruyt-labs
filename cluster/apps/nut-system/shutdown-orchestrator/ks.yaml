---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app shutdown-orchestrator
  namespace: flux-system
spec:
  targetNamespace: nut-system
  path: ./cluster/apps/nut-system/shutdown-orchestrator/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: nut-server
  prune: true
  wait: true
  timeout: 5m
