---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
controllers:
  nut-server:
    type: deployment
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      priorityClassName: critical-infrastructure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ups.spruyt-labs.io/connected
                    operator: In
                    values: ["true"]
    containers:
      upsd:
        image:
          repository: instantlinux/nut-upsd
          tag: 2.8.3-r3
          pullPolicy: IfNotPresent
        env:
          TZ: ${TIMEZONE}
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3493
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3493
              initialDelaySeconds: 10
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 3
      exporter:
        image:
          repository: ghcr.io/druggeri/nut_exporter
          tag: "3.1.1"
          pullPolicy: IfNotPresent
        args:
          - --nut.server=127.0.0.1
          - --nut.vars_enable=battery.charge,battery.charge.low,battery.runtime,battery.voltage,battery.voltage.nominal,input.voltage,input.voltage.nominal,output.voltage,ups.beeper.status,ups.delay.shutdown,ups.delay.start,ups.load,ups.realpower.nominal,ups.status,ups.temperature
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
service:
  nut:
    controller: nut-server
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      lbipam.cilium.io/ips: "${NUT_IP4}"
    ports:
      nut:
        port: 3493
        protocol: TCP
  metrics:
    controller: nut-server
    ports:
      metrics:
        port: 9199
        protocol: TCP
persistence:
  # USB device access for UPS communication
  dev-bus-usb:
    type: hostPath
    hostPath: /dev/bus/usb
    advancedMounts:
      nut-server:
        upsd:
          - path: /dev/bus/usb
  # hidraw/hiddev devices for usbhid-ups driver
  dev:
    type: hostPath
    hostPath: /dev
    advancedMounts:
      nut-server:
        upsd:
          - path: /dev
  # NUT configuration files (instantlinux/nut-upsd uses /etc/nut/local/)
  nut-config:
    type: secret
    name: nut-secrets
    advancedMounts:
      nut-server:
        upsd:
          - path: /etc/nut/local/ups.conf
            subPath: ups.conf
            readOnly: true
          - path: /etc/nut/local/upsd.conf
            subPath: upsd.conf
            readOnly: true
          - path: /etc/nut/local/upsd.users
            subPath: upsd.users
            readOnly: true
