---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-csi-drivers
spec:
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator-charts
        namespace: flux-system
  interval: 4h
  # The rook operator wrote the rbd Driver CR first and owns
  # spec.deployCsiAddons via SSA (value false, rook's default). The encryption
  # chart bug (configMapRef vs configMapName, fixed in 50a947ef) wedged the rbd
  # Driver apply during the v1.20 migration, so helm-controller never took
  # ownership of deployCsiAddons on rbd — leaving the rbd nodeplugin without a
  # csi-addons sidecar and breaking all RBD ReclaimSpaceJobs. A plain reconcile
  # cannot fix it (helm 3-way merge sees no change to its own value). Drift
  # detection makes helm-controller force-apply the rendered manifest via SSA,
  # reclaiming the conflicting field and setting deployCsiAddons: true. Ref #2213.
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: rook-ceph-csi-drivers-values
  # Upstream chart bug: ceph-csi-drivers 1.0.1 templates render
  # spec.encryption.configMapRef, but the matching Driver CRD (also v1.0.1,
  # bundled with rook-ceph-operator) only accepts spec.encryption.configMapName.
  # The mismatch makes the rbd Driver patch fail validation
  # (configMapName: Required), wedging the rbd controller plugin. Rewrite the
  # field to configMapName until the upstream chart is fixed. Ref #2208.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Driver
              name: rook-ceph.rbd.csi.ceph.com
            patch: |
              - op: remove
                path: /spec/encryption/configMapRef
              - op: add
                path: /spec/encryption/configMapName
                value:
                  name: rook-ceph-csi-kms-config
