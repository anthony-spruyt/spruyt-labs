---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-csi-drivers
spec:
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator-charts
        namespace: flux-system
  interval: 4h
  # The rook operator wrote the rbd Driver CR first and owns spec.deployCsiAddons
  # via SSA at value false (rook's default), so the rbd nodeplugin runs without a
  # csi-addons sidecar and every RBD ReclaimSpaceJob fails ("node Client not
  # found"). A plain helm apply cannot fix it: helm's 3-way merge sees no change
  # to its own rendered value (true) and emits no patch, leaving rook's false in
  # place. driftDetection makes helm-controller force-apply the rendered manifest
  # via SSA, reclaiming the field and setting deployCsiAddons: true. Requires the
  # empty-object resource subkeys in values.yaml so the SSA dry-run does not trip
  # the chart's null-resource render. Ref #2213.
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: rook-ceph-csi-drivers-values
  # Upstream chart bug: ceph-csi-drivers 1.0.1 templates render
  # spec.encryption.configMapRef, but the matching Driver CRD (also v1.0.1,
  # bundled with rook-ceph-operator) only accepts spec.encryption.configMapName.
  # The mismatch makes the rbd Driver patch fail validation
  # (configMapName: Required), wedging the rbd controller plugin. Rewrite the
  # field to configMapName until the upstream chart is fixed. Ref #2208.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Driver
              name: rook-ceph.rbd.csi.ceph.com
            patch: |
              - op: remove
                path: /spec/encryption/configMapRef
              - op: add
                path: /spec/encryption/configMapName
                value:
                  name: rook-ceph-csi-kms-config
