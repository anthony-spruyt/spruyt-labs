---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app rook-ceph-cluster
  namespace: flux-system
spec:
  targetNamespace: &namespace rook-ceph
  path: ./cluster/apps/rook-ceph/rook-ceph-cluster/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-operator
    # Note: No authentik dependency here to avoid circular dependency
    # (authentik → rook-ceph-cluster-storage → rook-ceph-cluster)
    # The SSO sidecar on toolbox handles this gracefully - it waits for
    # cluster health and is idempotent (skips if SSO already configured)
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      name: rook-ceph
      namespace: *namespace
  #healthCheckExprs:
  #  - apiVersion: ceph.rook.io/v1
  #    kind: CephCluster
  #    failed: status.ceph.health == 'HEALTH_ERR'
  #    current: status.ceph.health in ['HEALTH_OK', 'HEALTH_WARN']
  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app rook-ceph-cluster-storage
  namespace: flux-system
spec:
  targetNamespace: rook-ceph
  path: ./cluster/apps/rook-ceph/rook-ceph-cluster/storage
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
  prune: true
  timeout: 5m
