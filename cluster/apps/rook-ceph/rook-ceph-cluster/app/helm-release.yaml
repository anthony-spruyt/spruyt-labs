---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: rook-ceph-cluster
spec:
  interval: 24h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    # TODO:renovate
    tag: v1.17.6
  url: oci://ghcr.io/rook/rook-ceph-cluster
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Apparently can also do this as a CRD -> https://github.com/timtorChen/homelab/blob/02178963e88dd102f1fe89ebb965bf2e6b4e36a9/kubernetes/rook-ceph/cluster/cephcluster.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # #yaml-language-server: $schema=TODO
  # Rook Ceph Cluster Helm Reference -> https://rook.io/docs/rook/v1.9/helm-ceph-cluster.html#configuration
  # Default values for rook-ceph-cluster: https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph-cluster/values.yaml
  values:
    toolbox:
      # -- Enable Ceph debugging pod deployment. See [toolbox](https://github.com/rook/rook/blob/master/Documentation/Troubleshooting/ceph-toolbox.md)
      enabled: true # TODO: Disable when everything is setup and stable
    monitoring:
      enabled: false # TODO: Enable when Prometheus is installed
    cephClusterSpec: # TODO: Migrate to CRD https://rook.io/docs/rook/v1.9/ceph-cluster-crd.html
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
          - name: prometheus
            enabled: false # TODO: Enable when Prometheus is installed
      dashboard:
        enabled: true # TODO: configure when Prometheus is ready
        port: 8443
        ssl: false
      network:
        connections:
          encryption:
            enabled: true
          requireMsgr2: true
          provider: host
      crashCollector:
        daysToRetain: 30
      storage:
        useAllDevices: true
        # Use the following command to get the device name by-id "talosctl ls /dev/disk/by-id -n <node-ip>"
        deviceFilter: ^nvme0n1$
        config:
          encryptedDevice: "false"
    ingress:
      dashboard: {} # TODO: configure traefik
