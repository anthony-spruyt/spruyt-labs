---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: rook-ceph-cluster
spec:
  interval: 24h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    # TODO:renovate
    tag: v1.17.6
  url: oci://ghcr.io/rook/rook-ceph-cluster
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Apparently can also do this as a CRD -> https://github.com/timtorChen/homelab/blob/02178963e88dd102f1fe89ebb965bf2e6b4e36a9/kubernetes/rook-ceph/cluster/cephcluster.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # #yaml-language-server: $schema=TODO
  # Rook Ceph Cluster Helm Reference -> https://rook.io/docs/rook/v1.9/helm-ceph-cluster.html#configuration
  # Default values for rook-ceph-cluster: https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph-cluster/values.yaml
  values:
    toolbox:
      # -- Enable Ceph debugging pod deployment. See [toolbox](https://github.com/rook/rook/blob/master/Documentation/Troubleshooting/ceph-toolbox.md)
      enabled: true # TODO: Disable when everything is setup and stable
    monitoring:
      # -- Enable Prometheus integration, will also create necessary RBAC rules to allow Operator to create ServiceMonitors.
      # Monitoring requires Prometheus to be pre-installed
      enabled: true
      # -- Whether to disable the metrics reported by Ceph. If false, the prometheus mgr module and Ceph exporter are enabled
      metricsDisabled: false
      # -- Whether to create the Prometheus rules for Ceph alerts
      createPrometheusRules: true
      # -- Edit Prometheus rules for Ceph alerts
      prometheusRuleOverrides:
        {}
        # CephHealthWarning:
        #   disabled: true
        # NVMeoFHighWriteLatency:
        #   for: 3m
        #   labels:
        #     severity: critical
      # -- The namespace in which to create the prometheus rules, if different from the rook cluster namespace.
      # If you have multiple rook-ceph clusters in the same k8s cluster, choose the same namespace (ideally, namespace with prometheus
      # deployed) to set rulesNamespaceOverride for all the clusters. Otherwise, you will get duplicate alerts with multiple alert definitions.
      rulesNamespaceOverride:
      # Monitoring settings for external clusters:
      # externalMgrEndpoints: <list of endpoints>
      # externalMgrPrometheusPort: <port>
      # Scrape interval for prometheus
      # interval: 10s
      # allow adding custom labels and annotations to the prometheus rule
      prometheusRule:
        # -- Labels applied to PrometheusRule
        labels: {}
        # -- Annotations applied to PrometheusRule
        annotations: {}
    cephClusterSpec: # TODO: Migrate to CRD https://rook.io/docs/rook/v1.9/ceph-cluster-crd.html
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: false
          - name: prometheus
            enabled: true
      dashboard:
        enabled: true
        # serve the dashboard under a subpath (useful when you are accessing the dashboard via a reverse proxy)
        # urlPrefix: /ceph-dashboard
        # serve the dashboard at the given port.
        port: 8443
        # Serve the dashboard using SSL (if using ingress to expose the dashboard and `ssl: true` you need to set
        # the corresponding "backend protocol" annotation(s) for your ingress controller of choice)
        ssl: false
      network:
        connections:
          encryption:
            enabled: true
          requireMsgr2: true
          provider: host
      crashCollector:
        daysToRetain: 30
      storage:
        useAllDevices: true
        # Use the following command to get the device name by-id "talosctl ls /dev/disk/by-id -n <node-ip>"
        deviceFilter: ^nvme0n1$
        config:
          encryptedDevice: "false"
