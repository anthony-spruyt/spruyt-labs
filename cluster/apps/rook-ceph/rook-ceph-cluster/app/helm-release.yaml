---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Apparently can also do this as a CRD -> https://github.com/timtorChen/homelab/blob/02178963e88dd102f1fe89ebb965bf2e6b4e36a9/kubernetes/rook-ceph/cluster/cephcluster.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster-ocirepo
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # #yaml-language-server: $schema=TODO
  # Rook Ceph Cluster Helm Reference -> https://rook.io/docs/rook/v1.9/helm-ceph-cluster.html#configuration
  # Default values for rook-ceph-cluster: https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph-cluster/values.yaml
  values:
    toolbox:
      # -- Enable Ceph debugging pod deployment. See [toolbox](https://github.com/rook/rook/blob/master/Documentation/Troubleshooting/ceph-toolbox.md)
      enabled: true # TODO: Disable when everything is setup and stable
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 5m
          memory: 8Mi
    monitoring:
      # -- Enable Prometheus integration, will also create necessary RBAC rules to allow Operator to create ServiceMonitors.
      # Monitoring requires Prometheus to be pre-installed
      enabled: true
      # -- Whether to disable the metrics reported by Ceph. If false, the prometheus mgr module and Ceph exporter are enabled
      metricsDisabled: false
      # -- Whether to create the Prometheus rules for Ceph alerts
      createPrometheusRules: true
      # -- Edit Prometheus rules for Ceph alerts
      prometheusRuleOverrides:
        {}
        # CephHealthWarning:
        #   disabled: true
        # NVMeoFHighWriteLatency:
        #   for: 3m
        #   labels:
        #     severity: critical
      # -- The namespace in which to create the prometheus rules, if different from the rook cluster namespace.
      # If you have multiple rook-ceph clusters in the same k8s cluster, choose the same namespace (ideally, namespace with prometheus
      # deployed) to set rulesNamespaceOverride for all the clusters. Otherwise, you will get duplicate alerts with multiple alert definitions.
      rulesNamespaceOverride:
      # Monitoring settings for external clusters:
      # externalMgrEndpoints: <list of endpoints>
      # externalMgrPrometheusPort: <port>
      # Scrape interval for prometheus
      # interval: 10s
      # allow adding custom labels and annotations to the prometheus rule
      prometheusRule:
        # -- Labels applied to PrometheusRule
        labels: {}
        # -- Annotations applied to PrometheusRule
        annotations: {}
    cephClusterSpec: # TODO: Migrate to CRD https://rook.io/docs/rook/v1.9/ceph-cluster-crd.html
      mgr:
        mgr/crash/warn_recent_interval: "7200" # 2h
        modules:
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
          - name: prometheus
            enabled: true
      csi:
        readAffinity:
          enabled: true
      dashboard:
        enabled: true
        # serve the dashboard under a subpath (useful when you are accessing the dashboard via a reverse proxy)
        # urlPrefix: /ceph-dashboard
        # serve the dashboard at the given port.
        port: 8443
        # Serve the dashboard using SSL (if using ingress to expose the dashboard and `ssl: true` you need to set
        # the corresponding "backend protocol" annotation(s) for your ingress controller of choice)
        ssl: false
      network:
        connections:
          encryption:
            enabled: true
          requireMsgr2: true
          provider: host
      crashCollector:
        daysToRetain: 30
      storage:
        useAllDevices: true
        # Use the following command to get the device name by-id "talosctl ls /dev/disk/by-id -n <node-ip>"
        deviceFilter: ^nvme0n1$
        config:
          encryptedDevice: "false"
      resources:
        mgr:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 1Gi
        mon:
          limits:
            memory: 2Gi
          requests:
            cpu: 60m
            memory: 512Mi
        osd:
          limits:
            memory: 4Gi
          requests:
            cpu: 150m
            memory: 1Gi
        prepareosd:
          # limits: It is not recommended to set limits on the OSD prepare job
          #         since it's a one-time burst for memory that must be allowed to
          #         complete without an OOM kill.  Note however that if a k8s
          #         limitRange guardrail is defined external to Rook, the lack of
          #         a limit here may result in a sync failure, in which case a
          #         limit should be added.  1200Mi may suffice for up to 15Ti
          #         OSDs ; for larger devices 2Gi may be required.
          #         cf. https://github.com/rook/rook/pull/11103
          requests:
            cpu: 500m
            memory: 50Mi
        mgr-sidecar:
          limits:
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 40Mi
        crashcollector:
          limits:
            memory: 60Mi
          requests:
            cpu: 10m
            memory: 24Mi
        logcollector:
          limits:
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 100Mi
        cleanup:
          limits:
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 100Mi
        exporter:
          limits:
            memory: 128Mi
          requests:
            cpu: 25m
            memory: 32Mi
    cephFileSystems: []
    cephObjectStores: []
    # -- A list of CephFileSystem configurations to deploy
    # @default -- See [below](#ceph-file-systems)
    #cephFileSystems:
    #  - name: ceph-filesystem
    #    # see https://github.com/rook/rook/blob/master/Documentation/CRDs/Shared-Filesystem/ceph-filesystem-crd.md#filesystem-settings for available configuration
    #    spec:
    #      metadataServer:
    #        resources:
    #          limits:
    #            memory: 4Gi
    #          requests:
    #            cpu: 35m
    #            memory: 64Mi
    ## -- A list of CephObjectStore configurations to deploy
    ## @default -- See [below](#ceph-object-stores)
    #cephObjectStores:
    #  - name: ceph-objectstore
    #    # see https://github.com/rook/rook/blob/master/Documentation/CRDs/Object-Storage/ceph-object-store-crd.md#object-store-settings for available configuration
    #    spec:
    #      gateway:
    #        resources:
    #          limits:
    #            memory: 2Gi
    #          requests:
    #            cpu: 20m
    #            memory: 64Mi
