---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Apparently can also do this as a CRD -> https://github.com/timtorChen/homelab/blob/02178963e88dd102f1fe89ebb965bf2e6b4e36a9/kubernetes/rook-ceph/cluster/cephcluster.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster-ocirepo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: rook-ceph-cluster-values
  # Patch toolbox deployment to add SSO and RGW config init container
  # Note: Flux postRenderers require inline patches, external files not supported
  # IMPORTANT: Changes to init container logic require deleting the toolbox pod to take effect:
  #   kubectl delete pod -n rook-ceph -l app=rook-ceph-tools
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: rook-ceph-tools
            patch: |
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: sso-config
                    image: quay.io/ceph/ceph:v19
                    restartPolicy: Always
                    command: ["/bin/bash", "-c"]
                    env:
                      - name: SAML_ADMIN_EMAIL
                        value: "${MY_AUTHENTIK_USER_EMAIL}"
                    args:
                      - |
                        echo "Waiting for ceph config files..."
                        until [ -f /etc/ceph/ceph.conf ] && [ -f /etc/ceph/keyring ]; do sleep 5; done
                        echo "Waiting for Ceph cluster health..."
                        until ceph health 2>/dev/null | grep -qE "HEALTH_OK|HEALTH_WARN"; do sleep 10; done
                        echo "Ceph cluster is healthy"

                        # Create SAML admin user if not exists (Ceph Dashboard requires pre-created users)
                        # Uses --force-password to bypass password strength validation
                        # Password read from mounted secret file to avoid logging
                        if ! ceph dashboard ac-user-show "${SAML_ADMIN_EMAIL}" 2>/dev/null; then
                          echo "Creating SAML admin user: ${SAML_ADMIN_EMAIL}"
                          ceph dashboard ac-user-create "${SAML_ADMIN_EMAIL}" --force-password -i /var/run/secrets/dashboard/password administrator
                          echo "SAML admin user created"
                        else
                          echo "SAML admin user already exists"
                        fi

                        # Configure SAML SSO if not already enabled
                        if ceph dashboard sso status 2>/dev/null | grep -q "SAML2 is enabled"; then
                          echo "SAML SSO already configured"
                        else
                          echo "Waiting for Authentik SAML metadata endpoint..."
                          until curl -sf https://auth.${EXTERNAL_DOMAIN}/application/saml/ceph-dashboard/metadata/ >/dev/null 2>&1; do
                            echo "Authentik not ready yet, retrying in 30s..."
                            sleep 30
                          done
                          echo "Authentik is ready. Configuring SAML SSO..."
                          ceph dashboard sso setup saml2 \
                            "https://ceph.lan.${EXTERNAL_DOMAIN}" \
                            "https://auth.${EXTERNAL_DOMAIN}/application/saml/ceph-dashboard/metadata/" \
                            "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
                          ceph dashboard sso enable saml2
                          echo "SAML SSO configured successfully"
                        fi
                        ceph dashboard sso status
                        echo "Configuration complete. Sleeping..."
                        sleep infinity
                    resources:
                      limits:
                        cpu: 100m
                        memory: 128Mi
                      requests:
                        cpu: 10m
                        memory: 32Mi
                    volumeMounts:
                      - name: mon-endpoint-volume
                        mountPath: /etc/rook
                      - name: ceph-admin-secret
                        mountPath: /var/lib/rook-ceph-mon
                        readOnly: true
                      - name: ceph-config
                        mountPath: /etc/ceph
                      - name: dashboard-password
                        mountPath: /var/run/secrets/dashboard
                        readOnly: true
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: dashboard-password
                  secret:
                    secretName: rook-ceph-dashboard-password
