---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Apparently can also do this as a CRD -> https://github.com/timtorChen/homelab/blob/02178963e88dd102f1fe89ebb965bf2e6b4e36a9/kubernetes/rook-ceph/cluster/cephcluster.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster-ocirepo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: rook-ceph-cluster-values
  # Patch toolbox deployment to add SSO config sidecar
  # Note: Flux postRenderers require inline patches, external files not supported
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: rook-ceph-tools
            patch: |
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: sso-config
                    image: quay.io/ceph/ceph:v19
                    restartPolicy: Always
                    command: ["/bin/bash", "-c"]
                    args:
                      - |
                        set -e
                        echo "Waiting for ceph config files..."
                        until [ -f /etc/ceph/ceph.conf ] && [ -f /etc/ceph/keyring ]; do sleep 5; done
                        echo "Waiting for Ceph cluster health..."
                        until ceph health 2>/dev/null | grep -qE "HEALTH_OK|HEALTH_WARN"; do sleep 10; done
                        echo "Ceph cluster is healthy"
                        if ceph dashboard sso status 2>/dev/null | grep -q "SAML2 is enabled"; then
                          echo "SAML SSO already configured"
                        else
                          echo "Configuring SAML SSO..."
                          ceph dashboard sso setup saml2 \
                            "https://ceph.lan.spruyt.cloud" \
                            "https://auth.spruyt.cloud/application/saml/ceph-dashboard/metadata/" \
                            "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
                          ceph dashboard sso enable saml2
                          echo "SAML SSO configured successfully"
                        fi
                        ceph dashboard sso status
                        echo "Configuration complete. Sleeping..."
                        sleep infinity
                    resources:
                      limits:
                        cpu: 100m
                        memory: 128Mi
                      requests:
                        cpu: 10m
                        memory: 32Mi
                    volumeMounts:
                      - name: mon-endpoint-volume
                        mountPath: /etc/rook
                      - name: ceph-admin-secret
                        mountPath: /var/lib/rook-ceph-mon
                        readOnly: true
                      - name: ceph-config
                        mountPath: /etc/ceph
