---
# yaml-language-server: $schema=https://raw.githubusercontent.com/metallb/metallb/refs/heads/main/charts/metallb/values.schema.json
# Documentation: https://metallb.io/configuration/
# Default values: https://github.com/metallb/metallb/blob/main/charts/metallb/values.yaml
crds:
  enabled: true
  validationFailurePolicy: Fail

# controller contains configuration specific to the MetalLB cluster
# controller.
controller:
  image:
    repository: quay.io/metallb/controller
  serviceAccount:
    # Specifies whether a ServiceAccount should be created
    create: true

# speaker contains configuration specific to the MetalLB speaker
# daemonset.
speaker:
  logLevel: info
  tolerateMaster: true
  image:
    repository: quay.io/metallb/speaker
  serviceAccount:
    # Specifies whether a ServiceAccount should be created
    create: true
  # Run speaker in hostNetwork so it can respond to ARP/NDP on the host's interfaces
  daemonset:
    hostNetwork: true
    containers:
      speaker:
        env:
          - name: METALLB_SPEAKER_INTERFACE
            value: eno1
