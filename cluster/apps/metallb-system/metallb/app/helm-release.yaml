---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app metallb
  namespace: metallb-system
spec:
  interval: 1h
  chart:
    spec:
      chart: *app
      version: 0.15.2
      sourceRef:
        kind: HelmRepository
        name: metallb-charts
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  # yaml-language-server: $schema=https://github.com/metallb/metallb/blob/main/charts/metallb/values.schema.json
  # Documentation: https://metallb.io/configuration/
  # Default values: https://github.com/metallb/metallb/blob/main/charts/metallb/values.yaml
  values:
    crds:
      enabled: true
      validationFailurePolicy: Fail
    speaker:
      # Run speaker in hostNetwork so it can respond to ARP/NDP on the host's interfaces
      daemonset:
        hostNetwork: true
