---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: n8n
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: n8n
        minAllowed:
          cpu: 100m
          memory: 512Mi
        maxAllowed:
          cpu: 2000m
          memory: 2048Mi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: n8n-worker
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n-worker
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: n8n-worker
        minAllowed:
          cpu: 15m
          memory: 64Mi
