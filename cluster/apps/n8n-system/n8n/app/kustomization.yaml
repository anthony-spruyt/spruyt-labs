---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./authentik-outpost-rbac.yaml
  - ./github-secret-store.yaml
  - ./github-external-secret.yaml
  - ./github-rotation-rbac.yaml
  - ./n8n-secrets.sops.yaml
  - ./n8n-runner-secrets.sops.yaml
  - ./n8n-cnpg-object-stores.yaml
  - ./n8n-cnpg-cluster.yaml
  # Dont need pooling yet, if pooling is needed when load increase can look at enabling.
  # - ./n8n-cnpg-poolers.yaml
  - ./n8n-cnpg-scheduled-backups.yaml
  - ./release.yaml
  - ./hooks-configmap.yaml
  - ./network-policies.yaml
  - ./vpa.yaml
configMapGenerator:
  - name: n8n-values
    namespace: n8n-system
    files:
      - values.yaml
  - name: n8n-prompts
    namespace: n8n-system
    options:
      disableNameSuffixHash: true
    files:
      - prompts/dispatcher-triage-prompt.md
      - prompts/dispatcher-validate-prompt.md
      - prompts/dispatcher-fix-prompt.md
configurations:
  - ./kustomizeconfig.yaml
