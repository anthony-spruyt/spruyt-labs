---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./authentik-outpost-rbac.yaml
  - ./n8n-secrets.sops.yaml
  - ./n8n-cnpg-object-stores.yaml
  - ./n8n-cnpg-cluster.yaml
  # Dont need pooling yet, if pooling is needed when load increase can look at enabling.
  # - ./n8n-cnpg-poolers.yaml
  - ./n8n-cnpg-scheduled-backups.yaml
  - ./release.yaml
  - ./hooks-configmap.yaml
  - ./n8n-claude-spawner.yaml
  - ./n8n-claude-spawner-token.sops.yaml
  - ./network-policies.yaml
  - ./vpa.yaml
configMapGenerator:
  - name: n8n-values
    namespace: n8n-system
    files:
      - values.yaml
configurations:
  - ./kustomizeconfig.yaml
