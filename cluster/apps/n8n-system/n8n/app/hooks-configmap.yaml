---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/configmap.json
# N8N external hooks for Authentik SSO forward-auth integration
# Documentation: https://docs.n8n.io/hosting/configuration/environment-variables/external-hooks/
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-hooks
  namespace: n8n-system
data:
  hooks.js: |
    const { dirname, resolve } = require('path');
    const Layer = require('router/lib/layer');
    const { issueCookie } = require(resolve(dirname(require.resolve('n8n')), 'auth/jwt'));

    module.exports = {
      n8n: {
        ready: [
          async function ({ app }, config) {
            const { stack } = app.router;
            const index = stack.findIndex((l) => l.name === 'cookieParser');

            stack.splice(index + 1, 0, new Layer('/', {
              strict: false,
              end: false
            }, async (req, res, next) => {

              // Skip if instance owner not set up yet
              if (!config.get('userManagement.isInstanceOwnerSetUp', false)) return next();

              // Skip if already has n8n session cookie (already authenticated)
              if (req.cookies?.['n8n-auth']) return next();

              // Skip if no forward auth header configured
              if (!process.env.N8N_FORWARD_AUTH_HEADER) return next();

              // Get email from trusted Authentik header (headers are lowercase in Node.js)
              const email = req.headers[process.env.N8N_FORWARD_AUTH_HEADER.toLowerCase()];
              if (!email) return next();

              // Find existing user by email - user must be pre-provisioned
              // TypeORM findOneBy uses parameterized queries (SQL injection safe)
              const user = await this.dbCollections.User.findOneBy({ email });
              if (!user) {
                res.statusCode = 401;
                // Don't include email in response to avoid information disclosure
                res.end('User not found. Please have an admin invite this user first.');
                return;
              }

              // Ensure role exists (required for cookie issuance)
              if (!user.role) user.role = {};

              // Issue n8n session cookie and continue
              issueCookie(res, user);
              return next();
            }));
          },
        ],
      },
    };
