---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-claude-spawner-config
data:
  config.yaml: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: cluster
        cluster:
          server: https://kubernetes.default.svc
          certificate-authority: /var/run/secrets/claude-spawner/ca.crt
    contexts:
      - name: spawner
        context:
          cluster: cluster
          user: spawner
          namespace: claude-agents
    current-context: spawner
    users:
      - name: spawner
        user:
          tokenFile: /var/run/secrets/claude-spawner/token
