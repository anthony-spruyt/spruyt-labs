---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  interval: 4h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: n8n-ocirepo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: n8n-values
  postRenderers:
    - kustomize:
        images:
          - name: n8nio/runners
            # renovate: datasource=docker depName=n8nio/runners
            newTag: "2.20.1"
        patches:
          - target:
              kind: Deployment
              name: n8n-worker
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: _
              spec:
                template:
                  spec:
                    volumes:
                      - name: runner-tmp
                        emptyDir: {}
                    containers:
                      - name: task-runner
                        # renovate: ignore
                        image: n8nio/runners
                        env:
                          - name: N8N_RUNNERS_TASK_BROKER_URI
                            value: http://localhost:5679
                          - name: N8N_RUNNERS_AUTH_TOKEN
                            valueFrom:
                              secretKeyRef:
                                name: n8n-runner-secrets
                                key: N8N_RUNNERS_AUTH_TOKEN
                        volumeMounts:
                          - name: runner-tmp
                            mountPath: /tmp
                        securityContext:
                          capabilities:
                            drop:
                              - ALL
                          readOnlyRootFilesystem: true
                          runAsNonRoot: true
                          runAsUser: 1000
                        resources:
                          requests:
                            cpu: 10m
                            memory: 128Mi
                          limits:
                            cpu: 1000m
                            memory: 512Mi
          - target:
              kind: Deployment
              name: n8n-webhook
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: _
              spec:
                template:
                  spec:
                    containers:
                      - name: mcp-header-proxy
                        image: ghcr.io/anthony-spruyt/mcp-header-proxy:0.0.3@sha256:30b5b3203fd66ee7b48e5a43797831b70ccfc0d2c055e3d8a3ee9fd61bde6f85
                        env:
                          - name: UPSTREAM_URL
                            value: http://localhost:5678
                          - name: LISTEN_ADDR
                            value: ":8080"
                        ports:
                          - containerPort: 8080
                            name: mcp-proxy
                            protocol: TCP
                        securityContext:
                          capabilities:
                            drop:
                              - ALL
                          readOnlyRootFilesystem: true
                          runAsNonRoot: true
                          runAsUser: 65534
                        resources:
                          requests:
                            cpu: 5m
                            memory: 16Mi
                          limits:
                            memory: 32Mi
                        livenessProbe:
                          httpGet:
                            path: /healthz
                            port: 8080
                          initialDelaySeconds: 5
                          periodSeconds: 30
                        readinessProbe:
                          httpGet:
                            path: /healthz
                            port: 8080
                          initialDelaySeconds: 2
                          periodSeconds: 10
          - target:
              kind: Service
              name: n8n-webhook
            patch: |-
              apiVersion: v1
              kind: Service
              metadata:
                name: _
              spec:
                ports:
                  - name: mcp-proxy
                    port: 8080
                    targetPort: 8080
                    protocol: TCP
          - target:
              kind: Deployment
              name: n8n
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
          - target:
              kind: Deployment
              name: n8n-worker
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
          - target:
              kind: Deployment
              name: n8n-webhook
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
