---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Syncs write-tier GitHub App installation token from github-system
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-bot-credentials
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: github-secret-store
  target:
    name: n8n-github-credentials
    creationPolicy: Owner
  data:
    - secretKey: skynet-rw-installation-token
      remoteRef:
        key: github-bot-credentials
        property: write-access-token
