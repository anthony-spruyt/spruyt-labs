# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow world HTTPS for OAuth/OIDC flows and certificate validation
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-world-https-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    # Outpost needs HTTPS for OAuth/OIDC flows and certificate validation
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# =============================================================================
# CNPG PostgreSQL Cluster Policies
# =============================================================================
# DNS egress is handled by CiliumClusterwideNetworkPolicy allow-kube-dns-egress
# Allow ingress from n8n app for database connections
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-n8n-ingress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: n8n-cnpg-cluster
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: n8n-system
            k8s:app.kubernetes.io/name: n8n
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
