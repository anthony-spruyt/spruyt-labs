---
# #yaml-language-server: $schema=TODO
# Documentation: https://github.com/8gears/n8n-helm-chart/blob/main/README.md
# Default values: https://github.com/8gears/n8n-helm-chart/blob/main/charts/n8n/values.yaml
#Prod like set up with CloudNativePG and nginx-ingress
main:
  config:
    db:
      type: postgresdb
      postgresdb:
        host: db-rw
        user: n8n
        pool:
          size: 10
        ssl:
          enabled: true
          reject_Unauthorized: true
          ca_file: /home/ssl/certs/postgresql/ca.crt
  extraEnv:
    N8N_ENCRYPTION_KEY:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: N8N_ENCRYPTION_KEY
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: db-app
          key: password
  extraVolumeMounts:
    - name: db-ca-cert
      mountPath: /home/ssl/certs/postgresql
      readOnly: true
  extraVolumes:
    - name: db-ca-cert
      secret:
        secretName: db-ca
        items:
          - key: ca.crt
            path: ca.crt
  resources:
    limits:
      cpu: 2000m
      memory: 2048Mi
    requests:
      cpu: 100m
      memory: 512Mi
  extraManifests:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: db
        namespace: n8n-system
      spec:
        affinity:
          enablePodAntiAffinity: true
          podAntiAffinityType: required
          topologyKey: kubernetes.io/hostname
        instances: 1
        bootstrap:
          initdb:
            database: n8n
            owner: n8n
