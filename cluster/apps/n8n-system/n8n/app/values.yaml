---
# #yaml-language-server: $schema=TODO
# Documentation: https://github.com/8gears/n8n-helm-chart/blob/main/README.md
# Default values: https://github.com/8gears/n8n-helm-chart/blob/main/charts/n8n/values.yaml
#Prod like set up with CloudNativePG and nginx-ingress
main:
  config:
    db:
      type: postgresdb
      postgresdb:
        host: cnpg-cluster-pooler-rw.cnpg-system.svc.cluster.local
        user: n8n
        pool:
          size: 10
        ssl:
          enabled: true
          reject_Unauthorized: true
          ca_file: "/home/ssl/certs/postgresql/ca.crt"
  secret:
    n8n:
      encryption_key: "<your-secure-encryption-key>"

  extraEnv:
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: db-app
          key: password

  # Mount the CNPG CA Cert into N8N container
  extraVolumeMounts:
    - name: db-ca-cert
      mountPath: /home/ssl/certs/postgresql
      readOnly: true
  extraVolumes:
    - name: db-ca-cert
      secret:
        secretName: db-ca
        items:
          - key: ca.crt
            path: ca.crt

  resources:
    limits:
      memory: 2048Mi
    requests:
      memory: 512Mi
