---
# #yaml-language-server: $schema=TODO
# Documentation: https://github.com/8gears/n8n-helm-chart/blob/main/README.md
# Default values: https://github.com/8gears/n8n-helm-chart/blob/main/charts/n8n/values.yaml
# Configure n8n via env vars -> https://docs.n8n.io/hosting/configuration/environment-variables
image:
  repository: n8nio/n8n
  pullPolicy: IfNotPresent
  tag: "2.31.1@sha256:3ef2b357b5b82d1fe6e58fb49ef6e8847a428f0eb4e0898e3e5743cb1c92225b"
main:
  config:
    queue:
      health:
        check:
          active: true
      bull:
        redis:
          host: valkey.valkey-system
          port: 6379
  extraEnv: &extraEnv
    DB_TYPE:
      value: postgresdb
    DB_POSTGRESDB_DATABASE:
      valueFrom:
        secretKeyRef:
          name: n8n-cnpg-cluster-app
          key: dbname
    DB_POSTGRESDB_HOST:
      value: n8n-cnpg-cluster-pooler-rw.n8n-system.svc
    DB_POSTGRESDB_PORT:
      valueFrom:
        secretKeyRef:
          name: n8n-cnpg-cluster-app
          key: port
    DB_POSTGRESDB_USER:
      valueFrom:
        secretKeyRef:
          name: n8n-cnpg-cluster-app
          key: user
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: n8n-cnpg-cluster-app
          key: password
    DB_POSTGRESDB_POOL_SIZE:
      value: "5"
    DB_POSTGRESDB_SSL_ENABLED:
      value: "true"
    DB_POSTGRESDB_SSL_CA_FILE:
      value: /home/ssl/certs/postgresql/ca.crt
    EXECUTIONS_MODE:
      value: "queue"
    GENERIC_TIMEZONE:
      value: ${TIMEZONE}
    OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS:
      value: "true"
    N8N_BLOCK_ENV_ACCESS_IN_NODE:
      value: "true"
    N8N_METRICS:
      value: "true"
    N8N_METRICS_INCLUDE_DEFAULT_METRICS:
      value: "true"
    N8N_METRICS_INCLUDE_QUEUE_METRICS:
      value: "true"
    N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL:
      value: "true"
    N8N_METRICS_INCLUDE_WORKFLOW_STATISTICS:
      value: "true"
    N8N_METRICS_INCLUDE_CACHE_METRICS:
      value: "true"
    N8N_METRICS_INCLUDE_API_ENDPOINTS:
      value: "true"
    N8N_METRICS_INCLUDE_API_PATH_LABEL:
      value: "true"
    N8N_METRICS_INCLUDE_API_METHOD_LABEL:
      value: "true"
    N8N_METRICS_INCLUDE_API_STATUS_CODE_LABEL:
      value: "true"
    N8N_DIAGNOSTICS_ENABLED:
      value: "false"
    N8N_EDITOR_BASE_URL:
      value: https://n8n.${EXTERNAL_DOMAIN}
    N8N_ENCRYPTION_KEY:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: N8N_ENCRYPTION_KEY
    N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
      value: "true"
    N8N_GIT_NODE_DISABLE_BARE_REPOS:
      value: "true"
    N8N_LICENSE_ACTIVATION_KEY:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: N8N_LICENSE_ACTIVATION_KEY
    N8N_PORT:
      value: "5678"
    N8N_PROXY_HOPS:
      value: "1"
    # Learn more: https://docs.n8n.io/hosting/configuration/task-runners/
    N8N_RUNNERS_MODE:
      value: "external"
    N8N_RUNNERS_BROKER_LISTEN_ADDRESS:
      value: "0.0.0.0"
    N8N_RUNNERS_AUTH_TOKEN:
      valueFrom:
        secretKeyRef:
          name: n8n-runner-secrets
          key: N8N_RUNNERS_AUTH_TOKEN
    N8N_NATIVE_PYTHON_RUNNER:
      value: "true"
    N8N_SKIP_AUTH_ON_OAUTH_CALLBACK:
      value: "false"
    EXTERNAL_HOOK_FILES:
      value: "/home/node/.n8n/hooks.js"
    # N8N_FORWARD_AUTH_HEADER is CUSTOM - read by hooks.js to identify the trusted header
    # containing user email from Authentik forward-auth. Must match Traefik authResponseHeaders.
    N8N_FORWARD_AUTH_HEADER:
      value: "x-authentik-email"
    QUEUE_BULL_PREFIX:
      value: "n8n:queue:bull"
    QUEUE_BULL_REDIS_USERNAME:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: QUEUE_BULL_REDIS_USERNAME
    QUEUE_BULL_REDIS_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: QUEUE_BULL_REDIS_PASSWORD
    WEBHOOK_URL:
      value: https://n8n.${EXTERNAL_DOMAIN}
    N8N_OTEL_ENABLED:
      value: "true"
    N8N_OTEL_EXPORTER_OTLP_ENDPOINT:
      value: http://victoria-traces-single-vt-single-server.observability.svc:10428
    N8N_OTEL_EXPORTER_OTLP_TRACING_PATH:
      value: /insert/opentelemetry/v1/traces
    N8N_REINSTALL_MISSING_PACKAGES:
      value: "true"
  extraVolumeMounts: &extraVolumeMounts
    - name: db-ca-cert
      mountPath: /home/ssl/certs/postgresql
      readOnly: true
    - name: n8n-cache
      mountPath: /home/node/.cache
    - name: n8n-npm-cache
      mountPath: /home/node/.npm
    - name: n8n-hooks
      mountPath: /home/node/.n8n/hooks.js
      subPath: hooks.js
      readOnly: true
    - name: github-credentials
      mountPath: /home/node/.n8n-files/secrets
      readOnly: true
    - name: n8n-prompts
      mountPath: /home/node/.n8n-files/prompts
      readOnly: true
    - name: tmp
      mountPath: /tmp
  extraVolumes: &extraVolumes
    - name: db-ca-cert
      secret:
        secretName: n8n-cnpg-cluster-ca
        items:
          - key: ca.crt
            path: ca.crt
    - name: n8n-cache
      emptyDir: {}
    - name: n8n-npm-cache
      emptyDir: {}
    - name: n8n-hooks
      configMap:
        name: n8n-hooks
    - name: github-credentials
      secret:
        secretName: n8n-github-credentials
    - name: n8n-prompts
      configMap:
        name: n8n-prompts
    - name: tmp
      emptyDir: {}
  deploymentAnnotations: &deploymentAnnotations
    secret.reloader.stakater.com/reload: "n8n-cnpg-cluster-app,n8n-secrets,n8n-runner-secrets"
  securityContext: &securityContext
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
  readinessProbe: &readinessProbe
    httpGet:
      path: /healthz/readiness
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe: &livenessProbe
    httpGet:
      path: /healthz/readiness
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 5
  resources:
    limits:
      cpu: 2000m
      memory: 2048Mi
    requests:
      cpu: 100m
      memory: 768Mi
worker:
  enabled: true
  extraEnv: *extraEnv
  extraVolumeMounts: *extraVolumeMounts
  extraVolumes: *extraVolumes
  deploymentAnnotations: *deploymentAnnotations
  securityContext: *securityContext
  readinessProbe: *readinessProbe
  livenessProbe: *livenessProbe
  concurrency: 10
  resources:
    limits:
      cpu: 500m
      memory: 1.5Gi
    requests:
      cpu: 150m
      memory: 512Mi
webhook:
  enabled: true
  extraEnv: *extraEnv
  extraVolumeMounts: *extraVolumeMounts
  extraVolumes: *extraVolumes
  deploymentAnnotations: *deploymentAnnotations
  securityContext: *securityContext
  readinessProbe: *readinessProbe
  livenessProbe: *livenessProbe
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 25m
      memory: 256Mi
