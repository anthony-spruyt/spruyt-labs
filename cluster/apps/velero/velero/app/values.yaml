---
# yaml-language-server: $schema=https://raw.githubusercontent.com/vmware-tanzu/helm-charts/refs/heads/main/charts/velero/values.schema.json

priorityClassName: high-priority

resources:
  requests:
    cpu: 35m
    memory: 216Mi
  limits:
    memory: 1Gi

image:
  repository: docker.io/velero/velero
  tag: v1.18.1@sha256:11459094b1b21ec7c817b08f8067d9e89380835547915cac9c4132ff05b55b90
  pullPolicy: IfNotPresent

# Init containers to add to the Velero deployment's pod spec. At least one plugin provider image is required.
# If the value is a string then it is evaluated as a template.
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.2@sha256:0751144c1c8e52d52c48717fbd13ad5a3061e612ae4d7ad744a946cd5b139d1a
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# This job upgrades the CRDs.
# upgradeCRDs: false

##
## Parameters for the `default` BackupStorageLocation and VolumeSnapshotLocation,
## and additional server settings.
##
configuration:
  # Name of the default backup storage location. Default: default
  defaultBackupStorageLocation: aws-primary
  # Repository maintenance job settings
  repositoryMaintenanceJob:
    repositoryConfigData:
      global:
        keepLatestMaintenanceJobs: 1
  extraArgs:
    - --backup-repository-configmap=velero-backup-repo-config
  # Name of the default volume snapshot location.
  defaultVolumeSnapshotLocations: csi:aws-primary
  # Set log-format for Velero pod. Default: text. Other option: json.
  logFormat: json
  # Set log-level for Velero pod. Default: info. Other options: debug, warning, error, fatal, panic.
  # logLevel: debug
  # Bool flag to configure Velero server to move data by default for all snapshots supporting data movement. Default: false
  defaultSnapshotMoveData: true
  # Comma separated list of velero feature flags. default: empty
  features: EnableCSI

# Info about the secret to be used by the Velero deployment, which
# should contain credentials for the cloud provider IAM account you've
# set up for Velero.
credentials:
  # Whether a secret should be used. Set to false if, for examples:
  # - using kube2iam or kiam to provide AWS IAM credentials instead of providing the key file. (AWS only)
  # - using workload identity instead of providing the key file. (Azure/GCP only)
  useSecret: true
  # Name of a pre-existing secret (if any) in the Velero namespace
  # that should be used to get IAM account credentials. Optional.
  existingSecret: velero-secret

# Whether to create backupstoragelocation crd, if false => do not create a default backup location
backupsEnabled: false
# Whether to create volumesnapshotlocation crd, if false => disable snapshot feature
snapshotsEnabled: false

# Whether to deploy the node-agent daemonset.
deployNodeAgent: true
nodeAgent:
  priorityClassName: high-priority
  resources:
    requests:
      cpu: 20m
      memory: 120Mi
    limits:
      memory: 256Mi

configMaps:
  backup-repo-config:
    data:
      kopia: |
        {
          "fullMaintenanceInterval": "eagerGC"
        }
