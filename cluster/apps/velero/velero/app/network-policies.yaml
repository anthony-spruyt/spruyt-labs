---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Velero server: kube-apiserver access for managing backups, CRDs
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: velero-allow-kube-apiserver-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: velero
      name: velero
  egress:
    - toEntities:
        - kube-apiserver
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Velero server: HTTPS egress to AWS S3 for backup storage
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: velero-allow-aws-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: velero
      name: velero
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Velero server: metrics ingress from vmagent
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: velero-allow-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: velero
      name: velero
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "8085"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Node-agent DaemonSet: kube-apiserver access for PVC data movement
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: node-agent-allow-kube-apiserver-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: velero
      name: node-agent
  egress:
    - toEntities:
        - kube-apiserver
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Node-agent DaemonSet: HTTPS egress to AWS S3 for data movement
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: node-agent-allow-aws-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: velero
      name: node-agent
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Node-agent DaemonSet: metrics ingress from vmagent
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: node-agent-allow-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: velero
      name: node-agent
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "8085"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Kopia-maintain jobs: HTTPS egress to AWS S3 for repository maintenance
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kopia-job-allow-aws-egress
spec:
  endpointSelector:
    matchExpressions:
      - key: velero.io/repo-name
        operator: Exists
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
