---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app velero
  namespace: flux-system
spec:
  targetNamespace: velero
  path: ./cluster/apps/velero/velero/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  prune: true
  timeout: 5m
  # wait: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app velero-resources
  namespace: flux-system
spec:
  targetNamespace: velero
  path: ./cluster/apps/velero/velero/resources
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: velero
  interval: 1h
  prune: true
  timeout: 5m
