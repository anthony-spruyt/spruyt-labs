---
kind: CronJob
schedule: "*/30 * * * *"
timeZone: ${TIMEZONE}

priorityClassName: high-priority

resources:
  requests:
    cpu: 10m
    memory: 64Mi

# Namespace exclusion: namespaces are labeled with descheduler.kubernetes.io/exclude: "true"
# for documentation purposes, but due to an upstream bug in descheduler v0.35.1
# (namespaceLabelSelector ignores matchExpressions when matchLabels is empty),
# we must keep per-plugin exclusion lists until the fix lands.
# See: https://github.com/kubernetes-sigs/descheduler/issues/PENDING
# TODO: Switch to DefaultEvictor namespaceLabelSelector once upstream is fixed.

deschedulerPolicy:
  profiles:
    - name: default
      pluginConfig:
        - name: DefaultEvictor
          args:
            evictLocalStoragePods: false
            evictSystemCriticalPods: false
            evictFailedBarePods: true
            nodeFit: true
        - name: RemoveDuplicates
          args:
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
        - name: RemovePodsViolatingTopologySpreadConstraint
          args:
            constraints:
              - DoNotSchedule
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
        - name: RemoveFailedPods
          args:
            minPodLifetimeSeconds: 3600
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
        - name: RemovePodsHavingTooManyRestarts
          args:
            podRestartThreshold: 10
            includingInitContainers: true
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
        - name: LowNodeUtilization
          args:
            thresholds:
              cpu: 20
              memory: 20
            targetThresholds:
              cpu: 40
              memory: 40
            evictableNamespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
      plugins:
        balance:
          enabled:
            - RemoveDuplicates
            - RemovePodsViolatingTopologySpreadConstraint
            - LowNodeUtilization
        deschedule:
          enabled:
            - RemoveFailedPods
            - RemovePodsHavingTooManyRestarts
