---
kind: CronJob
schedule: "*/30 * * * *"
timeZone: ${TIMEZONE}

priorityClassName: high-priority

resources:
  requests:
    cpu: 10m
    memory: 64Mi

# Upstream bug (descheduler v0.35.1): DefaultEvictor.namespaceLabelSelector
# ignores matchExpressions when matchLabels is empty.
# Per-plugin namespaces.exclude lists are the only working mechanism.
# TODO: Switch to namespaceLabelSelector once upstream is fixed.

deschedulerPolicy:
  profiles:
    - name: default
      pluginConfig:
        - name: DefaultEvictor
          args:
            evictLocalStoragePods: false
            evictSystemCriticalPods: false
            evictFailedBarePods: true
            nodeFit: true
        - name: RemoveDuplicates
          args:
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
                - agent-worker-system
        - name: RemovePodsViolatingTopologySpreadConstraint
          args:
            constraints:
              - DoNotSchedule
              - ScheduleAnyway
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
                - agent-worker-system
        - name: RemoveFailedPods
          args:
            minPodLifetimeSeconds: 3600
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
                - agent-worker-system
        - name: RemovePodsHavingTooManyRestarts
          args:
            podRestartThreshold: 10
            includingInitContainers: true
            namespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
                - agent-worker-system
        - name: LowNodeUtilization
          args:
            metricsUtilization:
              source: KubernetesMetrics
            thresholds:
              cpu: 30
              memory: 30
            targetThresholds:
              cpu: 70
              memory: 70
            evictionLimits:
              node: 5
            evictableNamespaces:
              exclude:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - rook-ceph
                - cloudflare-system
                - agent-worker-system
      plugins:
        balance:
          enabled:
            - RemoveDuplicates
            - RemovePodsViolatingTopologySpreadConstraint
            - LowNodeUtilization
        deschedule:
          enabled:
            - RemoveFailedPods
            - RemovePodsHavingTooManyRestarts
