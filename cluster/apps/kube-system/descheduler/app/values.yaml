---
kind: CronJob
schedule: "*/30 * * * *"
timeZone: ${TIMEZONE}

priorityClassName: high-priority

resources:
  requests:
    cpu: 10m
    memory: 64Mi

# Namespace exclusion uses label selectors on DefaultEvictor instead of per-plugin lists.
# To exclude a namespace from descheduler eviction, add this label to its namespace.yaml:
#   descheduler.kubernetes.io/exclude: "true"

deschedulerPolicy:
  profiles:
    - name: default
      pluginConfig:
        - name: DefaultEvictor
          args:
            evictLocalStoragePods: false
            evictSystemCriticalPods: false
            evictFailedBarePods: true
            nodeFit: true
            namespaceLabelSelector:
              matchExpressions:
                - key: descheduler.kubernetes.io/exclude
                  operator: DoesNotExist
        - name: RemoveDuplicates
          args: {}
        - name: RemovePodsViolatingTopologySpreadConstraint
          args:
            constraints:
              - DoNotSchedule
        - name: RemoveFailedPods
          args:
            minPodLifetimeSeconds: 3600
        - name: RemovePodsHavingTooManyRestarts
          args:
            podRestartThreshold: 10
            includingInitContainers: true
        - name: LowNodeUtilization
          args:
            thresholds:
              cpu: 20
              memory: 20
            targetThresholds:
              cpu: 40
              memory: 40
      plugins:
        balance:
          enabled:
            - RemoveDuplicates
            - RemovePodsViolatingTopologySpreadConstraint
            - LowNodeUtilization
        deschedule:
          enabled:
            - RemoveFailedPods
            - RemovePodsHavingTooManyRestarts
