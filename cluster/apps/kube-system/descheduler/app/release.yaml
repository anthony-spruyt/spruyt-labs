---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app descheduler
spec:
  chart:
    spec:
      chart: *app
      version: 0.35.1
      sourceRef:
        kind: HelmRepository
        name: descheduler-charts
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: descheduler-values
