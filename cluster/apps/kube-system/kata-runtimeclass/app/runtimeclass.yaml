---
# RuntimeClass for Kata Containers (VM-level pod isolation).
# Pods with `runtimeClassName: kata` are scheduled only to nodes labeled
# kata.spruyt-labs/ready=true. Label is applied declaratively via
# talconfig.yaml machine.nodeLabels - not kubectl label.
# Ref: issue #933.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata
handler: kata
scheduling:
  nodeSelector:
    kata.spruyt-labs/ready: "true"
