---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./release.yaml
  - ./vpa.yaml
  - ./bgp-cluster.yaml
  - ./bgp-peer.yaml
  - ./bgp-advertisements.yaml
  - ./cluster-lb-ip-pool.yaml
configMapGenerator:
