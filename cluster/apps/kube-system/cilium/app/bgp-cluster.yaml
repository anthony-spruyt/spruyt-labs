---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumbgpclusterconfig_v2.json
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-cluster
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: "cilium-65050"
      localASN: 65050
      peers:
        - name: "peer-65000-uxg-fiber"
          peerASN: 65000
          peerAddress: "${GATEWAY_IP4}"
          peerConfigRef:
            name: "bgp-peer"
