---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kube-vip
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      # renovate: datasource=github-releases depName=kube-vip/helm-charts
      chart: *app
      version: 0.8.0
      sourceRef:
        kind: HelmRepository
        name: kube-vip-charts
        namespace: flux-system
  values:
    # #yaml-language-server: $schema=TODO
    # Default values for kube-vip: https://github.com/kube-vip/helm-charts/blob/main/charts/kube-vip/values.yaml
    env:
      vip_interface: "eno1"
      vip_arp: "true"
      vip_ndp: "true"
      lb_enable: "true"
      svc_enable: "true"
      svc_election: "true"
      vip_leaderelection: "false"
      cp_enable: "false"
    extraArgs:
      prometheusHTTPServer: "0.0.0.0:2112"
    podMonitor:
      enabled: true
