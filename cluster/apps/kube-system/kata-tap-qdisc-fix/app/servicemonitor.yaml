---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kata-tap-qdisc-fix
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kata-tap-qdisc-fix
  namespaceSelector:
    matchNames:
      - kube-system
  endpoints:
    - port: http-metrics
      interval: 30s
      path: /metrics
