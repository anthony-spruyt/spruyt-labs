---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: critical-infrastructure
  nodeSelector:
    kata.spruyt-labs/ready: "true"
  automountServiceAccountToken: false
  # hostNetwork + hostPID required: setns() into CNI-created netns under
  # /run/netns/cni-* requires CAP_SYS_ADMIN in the user namespace that
  # owns the target netns. A rootless pod in its own user+net ns cannot
  # do this even with NET_ADMIN+SYS_ADMIN caps (observed 216 consecutive
  # EPERM after first deploy — cluster-validator 2026-04-16).
  hostNetwork: true
  hostPID: true
  dnsPolicy: ClusterFirstWithHostNet
  securityContext:
    seccompProfile:
      type: RuntimeDefault
controllers:
  kata-tap-qdisc-fix:
    type: daemonset
    serviceAccount:
      name: kata-tap-qdisc-fix
    containers:
      app:
        image:
          repository: ghcr.io/anthony-spruyt/kata-tap-qdisc-fix
          tag: 0.2.1@sha256:7b84d0ff9ebdddf62506d849c72948c267a19bfcf2e3aca7e8bfca1ea7f14250
          pullPolicy: IfNotPresent
        env:
          - name: DRY_RUN
            value: "false"
          - name: HEALTH_PORT
            value: "8080"
          - name: METRICS_PORT
            value: "9102"
          - name: NETNS_DIR
            value: "/run/netns"
          - name: LOG_LEVEL
            value: "info"
          - name: SWEEP_INTERVAL
            value: "30"
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 0
          runAsNonRoot: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_ADMIN
              - SYS_ADMIN
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              initialDelaySeconds: 2
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
persistence:
  run-netns:
    type: hostPath
    hostPath: /run/netns
    hostPathType: Directory
    globalMounts:
      - path: /run/netns
        readOnly: true
service:
  metrics:
    controller: kata-tap-qdisc-fix
    type: ClusterIP
    ports:
      http-metrics:
        port: 9102
        protocol: TCP
        targetPort: 9102
