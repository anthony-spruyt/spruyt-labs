---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-automount-defaults
  annotations:
    policies.kyverno.io/title: Inject automountServiceAccountToken Defaults
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Injects automountServiceAccountToken on pods created by controllers we
      cannot configure. Operator-spawned pods that need API access get true;
      Authentik outposts get false. All other pods rely on the
      require-explicit-automount validate policy for enforcement.
spec:
  background: false
  rules:
    - name: inject-false-authentik-outposts
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      preconditions:
        all:
          - key: "{{request.object.metadata.labels.\"app.kubernetes.io/managed-by\" || ''}}"
            operator: Equals
            value: goauthentik.io
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): false
    - name: inject-true-cnpg-clusters
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      preconditions:
        all:
          - key: "{{request.object.metadata.labels.\"app.kubernetes.io/managed-by\" || ''}}"
            operator: Equals
            value: cloudnative-pg
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): true
    - name: inject-true-rook-ceph
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - rook-ceph
              operations:
                - CREATE
      preconditions:
        any:
          - key: "{{request.object.metadata.labels.rook_cluster || ''}}"
            operator: NotEquals
            value: ""
          - key: "{{request.object.metadata.labels.\"app.kubernetes.io/instance\" || ''}}"
            operator: Equals
            value: rook-ceph-operator
          - key: "{{ starts_with(request.object.metadata.labels.app || '', 'rook-ceph') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): true
    - name: inject-true-velero
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - velero
              operations:
                - CREATE
      preconditions:
        any:
          - key: "{{request.object.metadata.labels.\"app.kubernetes.io/name\" || ''}}"
            operator: Equals
            value: velero
          - key: "{{request.object.metadata.labels.\"velero.io/repo-name\" || ''}}"
            operator: NotEquals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): true
    - name: inject-true-flux-controllers
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      preconditions:
        all:
          - key: "{{request.object.metadata.labels.\"app.kubernetes.io/part-of\" || ''}}"
            operator: Equals
            value: flux
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): true
    - name: inject-true-vm-operator-pods
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      preconditions:
        all:
          - key: "{{request.object.metadata.labels.\"managed-by\" || ''}}"
            operator: Equals
            value: vm-operator
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): true
