---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-default-limitrange
  annotations:
    policies.kyverno.io/title: Add Default LimitRange
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Namespace, LimitRange
    policies.kyverno.io/description: >-
      Automatically generates a LimitRange in every namespace to provide
      default resource requests for containers that don't specify them.
      This ensures all pods have at least Burstable QoS class.
spec:
  rules:
    - name: generate-limitrange
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                # Kubernetes system namespaces
                - kube-system
                - kube-public
                - kube-node-lease
                # GitOps and policy
                - flux-system
                - kyverno
                # Core infrastructure
                - cert-manager
                - cilium-secrets
                - cloudflare-system
                - external-dns
                - external-secrets
                - kubelet-csr-approver
                - reloader
                - spegel
                - traefik
                - velero
                # Storage
                - csi-addons-system
                - rook-ceph
                # Database operators
                - cnpg-system
                # Observability
                - observability
                # System utilities
                - chrony
                - irq-balance
      generate:
        apiVersion: v1
        kind: LimitRange
        name: default-limits
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        generateExisting: true
        data:
          spec:
            limits:
              - type: Container
                defaultRequest:
                  cpu: 10m
                  memory: 64Mi
