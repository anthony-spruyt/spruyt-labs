---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-pss-restricted-defaults
  annotations:
    policies.kyverno.io/title: Add PSS Restricted Defaults
    policies.kyverno.io/category: Pod Security Standards
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Mutates incoming Pods to add security context fields required for PSS
      Restricted profile compliance. Only sets fields that are not already
      defined, preserving app-specific configurations. Excludes namespaces
      that legitimately require elevated privileges (storage, CNI, monitoring).
spec:
  background: false
  rules:
    - name: add-pod-security-context
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      exclude:
        any:
          - resources:
              namespaces:
                # Kubernetes system namespaces
                - kube-system
                - kube-public
                - kube-node-lease
                # GitOps and policy controllers
                - flux-system
                - kyverno
                # Privileged infrastructure (legitimate elevated access)
                - rook-ceph
                - falco-system
                - irq-balance
                - spegel
                - velero
                - observability
                - nut-system
                - dev-debug
      mutate:
        patchStrategicMerge:
          spec:
            securityContext:
              +(seccompProfile):
                type: RuntimeDefault
              +(runAsNonRoot): true
            containers:
              - (name): "?*"
                securityContext:
                  +(allowPrivilegeEscalation): false
                  +(capabilities):
                    drop:
                      - ALL
            initContainers:
              - (name): "?*"
                securityContext:
                  +(allowPrivilegeEscalation): false
                  +(capabilities):
                    drop:
                      - ALL
