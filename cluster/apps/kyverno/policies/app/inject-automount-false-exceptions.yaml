---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-automount-false-exceptions
  annotations:
    policies.kyverno.io/title: Inject automountServiceAccountToken for Uncontrollable Workloads
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Injects automountServiceAccountToken on pods created by controllers we
      cannot configure. Authentik outposts get false (no API needed). All other
      operator-spawned pods get true (CNPG clusters, rook-ceph, velero jobs,
      flux controllers, VM operator pods all need API access).
spec:
  background: false
  rules:
    - name: inject-automount-authentik-outposts
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      preconditions:
        all:
          - key: "{{request.object.metadata.labels.\"app.kubernetes.io/managed-by\" || ''}}"
            operator: Equals
            value: goauthentik.io
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): false
    - name: inject-automount-true-operator-pods
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
      mutate:
        patchStrategicMerge:
          spec:
            +(automountServiceAccountToken): true
