---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-claude-agent-config
  annotations:
    policies.kyverno.io/title: Inject Claude Agent Config
    policies.kyverno.io/category: Agent Configuration
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Injects configuration into Claude agent pods spawned by n8n.
      A shared rule injects GitHub bot credentials (gh CLI config,
      read-only gitconfig), settings profiles, plugin bootstrap volumes,
      and OpenTelemetry env vars into all agent namespaces. Clone rules inject a
      plugin-bootstrap init container (after git-clone) that reads
      managed-settings.json, project settings.json, and
      settings.local.json to install marketplaces and plugins via
      claude CLI. The write rule additionally injects SSH key and
      full gitconfig (with commit signing). Per-namespace rules inject
      MCP configmaps, priority classes, and namespace-specific
      credentials. Repo clone: write uses SSH (with pre-commit),
      read+sre use HTTPS with read-scoped GitHub App token (no SSH
      key = no push capability). Validation rules enforce correct
      CLONE_URL protocol per namespace tier.
spec:
  background: false
  rules:
    - name: strip-explicit-priority
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-spruyt-labs-read
                - claude-agents-spruyt-labs-sre
                - claude-agents-spruyt-labs-write
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.priority || `0` }}"
            operator: NotEquals
            value: 0
      mutate:
        patchesJson6902: |-
          - op: remove
            path: /spec/priority
    - name: inject-priority-low
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-spruyt-labs-read
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: low-priority
    - name: inject-priority-standard
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-spruyt-labs-write
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: standard
    - name: inject-priority-high
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-spruyt-labs-sre
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: high-priority
    - name: inject-shared-config
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-spruyt-labs-read
                - claude-agents-spruyt-labs-sre
                - claude-agents-spruyt-labs-write
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: github-gh-config
                secret:
                  secretName: github-bot-credentials
                  items:
                    - key: hosts.yml
                      path: hosts.yml
              - name: gh-config-writable
                emptyDir: {}
              - name: github-gitconfig
                configMap:
                  name: github-bot-gitconfig-read
              - name: claude-settings-profiles
                configMap:
                  name: claude-settings-profiles
              - name: claude-managed-settings
                configMap:
                  name: claude-managed-settings
              - name: claude-home
                emptyDir:
                  sizeLimit: 256Mi
              - name: claude-plugin-bootstrap-script
                configMap:
                  name: claude-plugin-bootstrap-script
                  defaultMode: 0555
            initContainers:
              - name: gh-config-sync
                image: docker.io/library/busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
                restartPolicy: Always
                command: ["sh", "-c"]
                args:
                  - |
                    echo "[gh-config-sync] initial copy..."
                    cp /etc/gh-secret/hosts.yml /tmp/gh-config/hosts.yml
                    chmod 666 /tmp/gh-config/hosts.yml
                    echo "[gh-config-sync] ready, refreshing every 30s"
                    while true; do
                      sleep 30
                      cp /etc/gh-secret/hosts.yml /tmp/gh-config/hosts.yml
                      chmod 666 /tmp/gh-config/hosts.yml
                    done
                startupProbe:
                  exec:
                    command: ["test", "-f", "/tmp/gh-config/hosts.yml"]
                  initialDelaySeconds: 0
                  periodSeconds: 1
                  failureThreshold: 30
                securityContext:
                  runAsUser: 65534
                  runAsGroup: 65534
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                volumeMounts:
                  - name: github-gh-config
                    mountPath: /etc/gh-secret
                    readOnly: true
                  - name: gh-config-writable
                    mountPath: /tmp/gh-config
              - name: plugin-bootstrap
                image: "{{ request.object.spec.containers[0].image }}"
                command:
                  - bash
                  - /scripts/bootstrap-plugins.sh
                  - /etc/claude-code/managed-settings.json
                  - /home/node/.claude/settings.json
                env:
                  - name: HOME
                    value: /home/node
                  - name: GH_CONFIG_DIR
                    value: /tmp/gh-config
                volumeMounts:
                  - name: claude-plugin-bootstrap-script
                    mountPath: /scripts
                    readOnly: true
                  - name: claude-managed-settings
                    mountPath: /etc/claude-code/managed-settings.json
                    subPath: managed-settings.json
                    readOnly: true
                  - name: gh-config-writable
                    mountPath: /tmp/gh-config
                    readOnly: true
                  - name: claude-home
                    mountPath: /home/node/.claude
                securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
            containers:
              - (name): "?*"
                env:
                  - name: GH_CONFIG_DIR
                    value: /tmp/gh-config
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                  - name: MCP_TIMEOUT
                    value: "30000"
                  - name: AGENTMEMORY_URL
                    value: "http://agentmemory.agentmemory.svc.cluster.local:3111"
                  - name: AGENTMEMORY_SECRET
                    value: "unused-cluster-internal"
                  - name: SAFE_CHAIN_LOGGING
                    value: "silent"
                  - name: CLAUDE_CODE_ENABLE_TELEMETRY
                    value: "1"
                  - name: CLAUDE_CODE_ENHANCED_TELEMETRY_BETA
                    value: "1"
                  - name: OTEL_LOG_TOOL_DETAILS
                    value: "1"
                  - name: OTEL_LOG_TOOL_CONTENT
                    value: "1"
                  - name: OTEL_LOG_USER_PROMPTS
                    value: "1"
                  - name: OTEL_METRICS_EXPORTER
                    value: otlp
                  - name: OTEL_LOGS_EXPORTER
                    value: otlp
                  - name: OTEL_EXPORTER_OTLP_PROTOCOL
                    value: http/protobuf
                  - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
                    value: http://vmsingle-victoria-metrics-k8s-stack.observability.svc:8428/opentelemetry/v1/metrics
                  - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
                    value: http://victoria-logs-single-server.observability.svc:9428/insert/opentelemetry/v1/logs
                  - name: OTEL_TRACES_EXPORTER
                    value: otlp
                  - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
                    value: http://victoria-traces-single-vt-single-server.observability.svc:10428/insert/opentelemetry/v1/traces
                  - name: OTEL_RESOURCE_ATTRIBUTES
                    value: "agent.namespace={{request.object.metadata.namespace}}"
                  - name: ANTHROPIC_BASE_URL
                    value: "http://litellm.litellm.svc.cluster.local:4000"
                  - name: ANTHROPIC_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: litellm-credentials
                        key: virtual-key
                  - name: CLAUDE_CODE_ATTRIBUTION_HEADER
                    value: "0"
                  - name: ENABLE_TOOL_SEARCH
                    value: "true"
                volumeMounts:
                  - name: github-gh-config
                    mountPath: /etc/gh-secret
                    readOnly: true
                  - name: gh-config-writable
                    mountPath: /tmp/gh-config
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
                  - name: claude-settings-profiles
                    mountPath: /etc/claude/settings
                    readOnly: true
                  - name: claude-managed-settings
                    mountPath: /etc/claude-code/managed-settings.json
                    subPath: managed-settings.json
                    readOnly: true
                  - name: claude-home
                    mountPath: /home/node/.claude
    - name: inject-managed-mcp
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-spruyt-labs-read
                - claude-agents-spruyt-labs-sre
                - claude-agents-spruyt-labs-write
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config
            containers:
              - (name): "?*"
                env:
                  - name: AGENT_PLATFORM_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: agent-platform-mcp-auth-token
                volumeMounts:
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
                  - name: claude-mcp-config
                    mountPath: /etc/claude-code/managed-mcp.json
                    subPath: mcp.json
                    readOnly: true
    - name: inject-github-ssh
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-spruyt-labs-write
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: github-ssh-key
                secret:
                  secretName: github-bot-ssh-key
                  defaultMode: 0444
              - name: github-gitconfig
                configMap:
                  name: github-bot-gitconfig
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
    - name: inject-repo-clone-write
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-spruyt-labs-write
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'git@github.com:anthony-spruyt/') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: workspace
                emptyDir:
                  sizeLimit: 1Gi
            initContainers:
              - name: git-clone
                image: "{{ request.object.spec.containers[0].image }}"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    echo "[git-clone] starting clone of ${CLONE_URL} ${CLONE_BRANCH:+(branch: $CLONE_BRANCH)}"
                    echo "[git-clone] preparing SSH key..."
                    cp /etc/git-ssh/id_ed25519 /tmp/id_ed25519
                    chmod 600 /tmp/id_ed25519
                    echo "[git-clone] cloning..."
                    if [ -n "$CLONE_BRANCH" ]; then
                      git clone --depth 1 -b "$CLONE_BRANCH" "$CLONE_URL" /workspace/repo
                    else
                      git clone --depth 1 "$CLONE_URL" /workspace/repo
                    fi
                    echo "[git-clone] clone complete ($(du -sh /workspace/repo | cut -f1))"
                    cd /workspace/repo
                    echo "[git-clone] installing pre-commit hooks..."
                    pre-commit install
                    echo "[git-clone] done"
                env:
                  - name: CLONE_URL
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
                  - name: CLONE_BRANCH
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_BRANCH'].value | [0] }}"
                  - name: GIT_SSH_COMMAND
                    value: "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts"
                  - name: GIT_CONFIG_NOSYSTEM
                    value: "1"
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
              - name: plugin-bootstrap-project
                image: "{{ request.object.spec.containers[0].image }}"
                command:
                  - bash
                  - /scripts/bootstrap-plugins.sh
                  - /workspace/repo/.claude/settings.json
                  - /workspace/repo/.claude/settings.local.json
                env:
                  - name: HOME
                    value: /home/node
                  - name: GH_CONFIG_DIR
                    value: /tmp/gh-config
                volumeMounts:
                  - name: claude-plugin-bootstrap-script
                    mountPath: /scripts
                    readOnly: true
                  - name: gh-config-writable
                    mountPath: /tmp/gh-config
                    readOnly: true
                  - name: claude-home
                    mountPath: /home/node/.claude
                  - name: workspace
                    mountPath: /workspace
                    readOnly: true
                securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
    - name: inject-repo-clone-read
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-spruyt-labs-read
                - claude-agents-spruyt-labs-sre
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'https://github.com/anthony-spruyt/') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: workspace
                emptyDir:
                  sizeLimit: 1Gi
              - name: github-access-token
                secret:
                  secretName: github-bot-credentials
                  items:
                    - key: access-token
                      path: access-token
            initContainers:
              - name: git-clone
                image: "{{ request.object.spec.containers[0].image }}"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    echo "[git-clone] starting clone of ${CLONE_URL} ${CLONE_BRANCH:+(branch: $CLONE_BRANCH)}"
                    echo "[git-clone] reading access token..."
                    TOKEN=$(cat /etc/gh-credentials/access-token)
                    if [ -z "$TOKEN" ]; then
                      echo "[git-clone] ERROR: access token is empty" >&2
                      exit 1
                    fi
                    echo "[git-clone] token read OK (${#TOKEN} chars)"
                    ESCAPED_TOKEN=$(printf '%s\n' "$TOKEN" | sed 's/[&\\/]/\\&/g')
                    AUTH_URL=$(printf '%s' "$CLONE_URL" | sed "s|https://|https://x-access-token:${ESCAPED_TOKEN}@|")
                    echo "[git-clone] cloning..."
                    if [ -n "$CLONE_BRANCH" ]; then
                      git clone --depth 1 -b "$CLONE_BRANCH" "$AUTH_URL" /workspace/repo
                    else
                      git clone --depth 1 "$AUTH_URL" /workspace/repo
                    fi
                    echo "[git-clone] clone complete ($(du -sh /workspace/repo | cut -f1))"
                env:
                  - name: CLONE_URL
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
                  - name: CLONE_BRANCH
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_BRANCH'].value | [0] }}"
                  - name: GIT_TERMINAL_PROMPT
                    value: "0"
                  - name: GIT_CONFIG_NOSYSTEM
                    value: "1"
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: github-access-token
                    mountPath: /etc/gh-credentials
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
              - name: plugin-bootstrap-project
                image: "{{ request.object.spec.containers[0].image }}"
                command:
                  - bash
                  - /scripts/bootstrap-plugins.sh
                  - /workspace/repo/.claude/settings.json
                  - /workspace/repo/.claude/settings.local.json
                env:
                  - name: HOME
                    value: /home/node
                  - name: GH_CONFIG_DIR
                    value: /tmp/gh-config
                volumeMounts:
                  - name: claude-plugin-bootstrap-script
                    mountPath: /scripts
                    readOnly: true
                  - name: gh-config-writable
                    mountPath: /tmp/gh-config
                    readOnly: true
                  - name: claude-home
                    mountPath: /home/node/.claude
                  - name: workspace
                    mountPath: /workspace
                    readOnly: true
                securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
    - name: validate-clone-url-write
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-spruyt-labs-write
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
      validate:
        failureAction: Enforce
        message: >-
          CLONE_URL in write namespaces must use SSH format
          (git@github.com:anthony-spruyt/...). Got:
          {{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}.
          Use an HTTPS URL for read/SRE namespaces instead.
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'git@github.com:anthony-spruyt/') }}"
                operator: NotEquals
                value: true
    - name: validate-clone-url-read
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-spruyt-labs-read
                - claude-agents-spruyt-labs-sre
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
      validate:
        failureAction: Enforce
        message: >-
          CLONE_URL in read/SRE namespaces must use HTTPS format
          (https://github.com/anthony-spruyt/...). Got:
          {{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}.
          Use an SSH URL (git@) for write namespaces instead.
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'https://github.com/anthony-spruyt/') }}"
                operator: NotEquals
                value: true
