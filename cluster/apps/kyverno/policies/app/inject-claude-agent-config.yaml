---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-claude-agent-config
  annotations:
    policies.kyverno.io/title: Inject Claude Agent Config
    policies.kyverno.io/category: Agent Configuration
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Injects configuration into Claude agent pods spawned by n8n,
      including GitHub bot credentials (gh CLI config, SSH key, gitconfig),
      MCP server config, and environment variables. Write and read
      namespaces get different OAuth scopes via ESO key mapping.
spec:
  background: false
  rules:
    - name: inject-write-config
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: github-gh-config
                secret:
                  secretName: github-bot-credentials
                  items:
                    - key: hosts.yml
                      path: hosts.yml
              - name: github-ssh-key
                secret:
                  secretName: github-bot-ssh-key
                  defaultMode: 0400
              - name: github-gitconfig
                configMap:
                  name: github-bot-gitconfig
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config
            containers:
              - (name): "?*"
                env:
                  - name: GH_CONFIG_DIR
                    value: /etc/gh
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/gitconfig/gitconfig
                  - name: CONTEXT7_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: context7-api-key
                  - name: HA_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: ha-api-key
                  - name: SRE_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: sre-mcp-auth-token
                volumeMounts:
                  - name: github-gh-config
                    mountPath: /etc/gh
                    readOnly: true
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/gitconfig
                    readOnly: true
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
    - name: inject-read-config
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: github-gh-config
                secret:
                  secretName: github-bot-credentials
                  items:
                    - key: hosts.yml
                      path: hosts.yml
              - name: github-ssh-key
                secret:
                  secretName: github-bot-ssh-key
                  defaultMode: 0400
              - name: github-gitconfig
                configMap:
                  name: github-bot-gitconfig
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config
            containers:
              - (name): "?*"
                env:
                  - name: GH_CONFIG_DIR
                    value: /etc/gh
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/gitconfig/gitconfig
                  - name: CONTEXT7_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: context7-api-key
                  - name: HA_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: ha-api-key
                  - name: SRE_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: sre-mcp-auth-token
                volumeMounts:
                  - name: github-gh-config
                    mountPath: /etc/gh
                    readOnly: true
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/gitconfig
                    readOnly: true
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
