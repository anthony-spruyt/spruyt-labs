---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-claude-agent-config
  annotations:
    policies.kyverno.io/title: Inject Claude Agent Config
    policies.kyverno.io/category: Agent Configuration
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Injects configuration into Claude agent pods spawned by n8n.
      A shared rule injects GitHub bot credentials (gh CLI config, SSH key,
      gitconfig), settings profiles, Context7 API key, and OpenTelemetry
      env vars (metrics + logs to VictoriaMetrics/VictoriaLogs) into all
      agent namespaces. Per-namespace rules inject namespace-scoped MCP
      configmaps (read/write/sre), priority classes (low/standard/high),
      and namespace-specific credentials (SRE auth token only in sre).
      Repo clone init container is injected for write (with pre-commit)
      and read+sre (without pre-commit) when CLONE_URL targets the
      anthony-spruyt/ org.
spec:
  background: false
  rules:
    - name: inject-shared-config
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-write
                - claude-agents-sre
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: github-gh-config
                secret:
                  secretName: github-bot-credentials
                  items:
                    - key: hosts.yml
                      path: hosts.yml
              - name: github-ssh-key
                secret:
                  secretName: github-bot-ssh-key
                  defaultMode: 0444
              - name: github-gitconfig
                configMap:
                  name: github-bot-gitconfig
              - name: claude-settings-profiles
                configMap:
                  name: claude-settings-profiles
            containers:
              - (name): "?*"
                env:
                  - name: GH_CONFIG_DIR
                    value: /etc/gh
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                  - name: MCP_TIMEOUT
                    value: "30000"
                  - name: CONTEXT7_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: context7-api-key
                  - name: CLAUDE_CODE_ENABLE_TELEMETRY
                    value: "1"
                  - name: CLAUDE_CODE_ENHANCED_TELEMETRY_BETA
                    value: "1"
                  - name: OTEL_LOG_TOOL_DETAILS
                    value: "1"
                  - name: OTEL_LOG_TOOL_CONTENT
                    value: "1"
                  - name: OTEL_METRICS_EXPORTER
                    value: otlp
                  - name: OTEL_LOGS_EXPORTER
                    value: otlp
                  - name: OTEL_EXPORTER_OTLP_PROTOCOL
                    value: http/protobuf
                  - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
                    value: http://vmsingle-victoria-metrics-k8s-stack.observability.svc:8428/opentelemetry/v1/metrics
                  - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
                    value: http://victoria-logs-single-server.observability.svc:9428/insert/opentelemetry/v1/logs
                  - name: OTEL_TRACES_EXPORTER
                    value: otlp
                  - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
                    value: http://victoria-traces-single-vt-single-server.observability.svc:10428/insert/opentelemetry/v1/traces
                  - name: OTEL_RESOURCE_ATTRIBUTES
                    value: "agent.namespace={{request.object.metadata.namespace}}"
                volumeMounts:
                  - name: github-gh-config
                    mountPath: /etc/gh
                    readOnly: true
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
                  - name: claude-settings-profiles
                    mountPath: /etc/claude/settings
                    readOnly: true
    - name: inject-read-mcp
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config-read
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
    - name: inject-write-mcp
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config-write
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
    - name: inject-sre-mcp
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-sre
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: high-priority
            volumes:
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config-sre
            containers:
              - (name): "?*"
                env:
                  - name: SRE_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: sre-credentials
                        key: sre-mcp-auth-token
                volumeMounts:
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
    - name: strip-explicit-priority
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-write
                - claude-agents-sre
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.priority || '' }}"
            operator: NotEquals
            value: ""
      mutate:
        patchesJson6902: |-
          - op: remove
            path: /spec/priority
    - name: inject-read-priority
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: low-priority
    - name: inject-write-priority
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: standard
    - name: inject-repo-clone-write
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'git@github.com:anthony-spruyt/') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: workspace
                emptyDir:
                  sizeLimit: 1Gi
            initContainers:
              - name: git-clone
                image: "{{ request.object.spec.containers[0].image }}"
                command: ["sh", "-c"]
                args:
                  - |
                    cp /etc/git-ssh/id_ed25519 /tmp/id_ed25519
                    chmod 600 /tmp/id_ed25519
                    if [ -n "$CLONE_BRANCH" ]; then
                      git clone --depth 1 -b "$CLONE_BRANCH" "$CLONE_URL" /workspace/repo
                    else
                      git clone --depth 1 "$CLONE_URL" /workspace/repo
                    fi
                    cd /workspace/repo
                    pre-commit install
                env:
                  - name: CLONE_URL
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
                  - name: CLONE_BRANCH
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_BRANCH'].value | [0] }}"
                  - name: GIT_SSH_COMMAND
                    value: "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts"
                  - name: GIT_CONFIG_NOSYSTEM
                    value: "1"
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
    - name: inject-repo-clone-read-sre
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
                - claude-agents-sre
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'git@github.com:anthony-spruyt/') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: workspace
                emptyDir:
                  sizeLimit: 1Gi
            initContainers:
              - name: git-clone
                image: "{{ request.object.spec.containers[0].image }}"
                command: ["sh", "-c"]
                args:
                  - |
                    cp /etc/git-ssh/id_ed25519 /tmp/id_ed25519
                    chmod 600 /tmp/id_ed25519
                    if [ -n "$CLONE_BRANCH" ]; then
                      git clone --depth 1 -b "$CLONE_BRANCH" "$CLONE_URL" /workspace/repo
                    else
                      git clone --depth 1 "$CLONE_URL" /workspace/repo
                    fi
                env:
                  - name: CLONE_URL
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
                  - name: CLONE_BRANCH
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_BRANCH'].value | [0] }}"
                  - name: GIT_SSH_COMMAND
                    value: "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts"
                  - name: GIT_CONFIG_NOSYSTEM
                    value: "1"
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
