---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-claude-agent-config
  annotations:
    policies.kyverno.io/title: Inject Claude Agent Config
    policies.kyverno.io/category: Agent Configuration
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Injects configuration into Claude agent pods spawned by n8n,
      including GitHub bot credentials (gh CLI config, SSH key, gitconfig),
      MCP server config, and environment variables. Write and read
      namespaces get different OAuth scopes via ESO key mapping.
spec:
  background: false
  rules:
    - name: inject-write-config
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: github-gh-config
                secret:
                  secretName: github-bot-credentials
                  items:
                    - key: hosts.yml
                      path: hosts.yml
              - name: github-ssh-key
                secret:
                  secretName: github-bot-ssh-key
                  defaultMode: 0444
              - name: github-gitconfig
                configMap:
                  name: github-bot-gitconfig
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config
              - name: claude-settings-profiles
                configMap:
                  name: claude-settings-profiles
            containers:
              - (name): "?*"
                env:
                  - name: GH_CONFIG_DIR
                    value: /etc/gh
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                  - name: MCP_TIMEOUT
                    value: "30000"
                  - name: CONTEXT7_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: context7-api-key
                  - name: HA_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: ha-api-key
                  - name: SRE_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: sre-mcp-auth-token
                  - name: RENOVATE_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: renovate-mcp-auth-token
                volumeMounts:
                  - name: github-gh-config
                    mountPath: /etc/gh
                    readOnly: true
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
                  - name: claude-settings-profiles
                    mountPath: /etc/claude/settings
                    readOnly: true
    - name: inject-read-config
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: github-gh-config
                secret:
                  secretName: github-bot-credentials
                  items:
                    - key: hosts.yml
                      path: hosts.yml
              - name: github-ssh-key
                secret:
                  secretName: github-bot-ssh-key
                  defaultMode: 0444
              - name: github-gitconfig
                configMap:
                  name: github-bot-gitconfig
              - name: claude-mcp-config
                configMap:
                  name: claude-mcp-config
              - name: claude-settings-profiles
                configMap:
                  name: claude-settings-profiles
            containers:
              - (name): "?*"
                env:
                  - name: GH_CONFIG_DIR
                    value: /etc/gh
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                  - name: MCP_TIMEOUT
                    value: "30000"
                  - name: CONTEXT7_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: context7-api-key
                  - name: HA_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: ha-api-key
                  - name: SRE_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: sre-mcp-auth-token
                  - name: RENOVATE_MCP_AUTH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: mcp-credentials
                        key: renovate-mcp-auth-token
                volumeMounts:
                  - name: github-gh-config
                    mountPath: /etc/gh
                    readOnly: true
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
                  - name: claude-mcp-config
                    mountPath: /etc/mcp
                    readOnly: true
                  - name: claude-settings-profiles
                    mountPath: /etc/claude/settings
                    readOnly: true
    - name: inject-repo-clone-write
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-write
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'git@github.com:anthony-spruyt/') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: workspace
                emptyDir:
                  sizeLimit: 1Gi
            initContainers:
              - name: git-clone
                image: "{{ request.object.spec.containers[0].image }}"
                command: ["sh", "-c"]
                args:
                  - |
                    cp /etc/git-ssh/id_ed25519 /tmp/id_ed25519
                    chmod 600 /tmp/id_ed25519
                    if [ -n "$CLONE_BRANCH" ]; then
                      git clone --depth 1 -b "$CLONE_BRANCH" "$CLONE_URL" /workspace/repo
                    else
                      git clone --depth 1 "$CLONE_URL" /workspace/repo
                    fi
                    cd /workspace/repo
                    pip install --quiet --break-system-packages pre-commit
                    pre-commit install
                env:
                  - name: CLONE_URL
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
                  - name: CLONE_BRANCH
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_BRANCH'].value | [0] }}"
                  - name: GIT_SSH_COMMAND
                    value: "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts"
                  - name: GIT_CONFIG_NOSYSTEM
                    value: "1"
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
    - name: inject-repo-clone-read
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - claude-agents-read
              selector:
                matchLabels:
                  managed-by: n8n-claude-code
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] | starts_with(@, 'git@github.com:anthony-spruyt/') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: workspace
                emptyDir:
                  sizeLimit: 1Gi
            initContainers:
              - name: git-clone
                image: "{{ request.object.spec.containers[0].image }}"
                command: ["sh", "-c"]
                args:
                  - |
                    cp /etc/git-ssh/id_ed25519 /tmp/id_ed25519
                    chmod 600 /tmp/id_ed25519
                    if [ -n "$CLONE_BRANCH" ]; then
                      git clone --depth 1 -b "$CLONE_BRANCH" "$CLONE_URL" /workspace/repo
                    else
                      git clone --depth 1 "$CLONE_URL" /workspace/repo
                    fi
                env:
                  - name: CLONE_URL
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_URL'].value | [0] }}"
                  - name: CLONE_BRANCH
                    value: "{{ request.object.spec.containers[0].env[?name=='CLONE_BRANCH'].value | [0] }}"
                  - name: GIT_SSH_COMMAND
                    value: "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts"
                  - name: GIT_CONFIG_NOSYSTEM
                    value: "1"
                  - name: GIT_CONFIG_GLOBAL
                    value: /etc/git-config/gitconfig
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: github-ssh-key
                    mountPath: /etc/git-ssh
                    readOnly: true
                  - name: github-gitconfig
                    mountPath: /etc/git-config
                    readOnly: true
            containers:
              - (name): "?*"
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
