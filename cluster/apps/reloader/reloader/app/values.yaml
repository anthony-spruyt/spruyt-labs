# #yaml-language-server: $schema=TODO
# Reloader documentation: https://github.com/stakater/Reloader/blob/master/deployments/kubernetes/chart/reloader/README.md
# Default values for reloader: https://github.com/stakater/Reloader/blob/master/deployments/kubernetes/chart/reloader/values.yaml
priorityClassName: high-priority
nameOverride: reloader
fullnameOverride: reloader
reloader:
  deployment:
    # PSS restricted compliance
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      limits:
        memory: 192Mi
      requests:
        cpu: 10m
        memory: 128Mi
