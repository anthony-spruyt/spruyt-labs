---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app reloader
spec:
  interval: 1h
  chart:
    spec:
      chart: reloader
      version: 2.1.5
      sourceRef:
        kind: HelmRepository
        name: stakater-charts
        namespace: flux-system
  values:
    # #yaml-language-server: $schema=TODO
    # Reloader documentation: https://github.com/stakater/Reloader/blob/master/deployments/kubernetes/chart/reloader/README.md
    # Default values for reloader: https://github.com/stakater/Reloader/blob/master/deployments/kubernetes/chart/reloader/values.yaml
    nameOverride: *app
    fullnameOverride: *app
    reloader:
      deployment:
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 32Mi
