---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app reloader
spec:
  interval: 1h
  chart:
    spec:
      # TODO:renovate
      chart: reloader
      version: 2.1.5
      sourceRef:
        kind: HelmRepository
        name: stakater-charts
        namespace: flux-system
  values:
    # #yaml-language-server: $schema=TODO
    # Default values for kubelet-csr-approver: TODO
    nameOverride: *app
    fullnameOverride: *app
