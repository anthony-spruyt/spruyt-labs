---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../claude-agents-shared/base
  - ./claude-mcp-config.yaml
  - ./github-external-secret.yaml
  - ./litellm-credentials.sops.yaml
  - ./github-ssh-external-secret.yaml
  - ./github-bot-gitconfig.yaml
configMapGenerator:
  - name: claude-settings-profiles
    files:
      - settings/execute-issue.json
      - settings/pr-fix.json
      - settings/renovate-fix.json
  - name: claude-managed-settings
    files:
      - settings/managed-settings.json
generatorOptions:
  disableNameSuffixHash: true
