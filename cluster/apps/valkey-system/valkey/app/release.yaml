---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
spec:
  chart:
    spec:
      chart: valkey
      version: 0.10.0
      sourceRef:
        kind: HelmRepository
        name: valkey-io-charts
        namespace: flux-system
  interval: 4h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: valkey
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: valkey
              spec:
                template:
                  spec:
                    containers:
                      - name: metrics
                        env:
                          - name: REDIS_PASSWORD
                            valueFrom:
                              secretKeyRef:
                                name: valkey-secrets
                                key: metrics
  valuesFrom:
    - kind: ConfigMap
      name: valkey-values
