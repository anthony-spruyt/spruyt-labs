---
# yaml-language-server: $schema=https://raw.githubusercontent.com/valkey-io/valkey-helm/refs/heads/main/valkey/values.schema.json
# Default values: https://github.com/valkey-io/valkey-helm/blob/main/valkey/values.yaml
# Documentation: https://github.com/valkey-io/valkey-helm/blob/main/valkey/README.md
priorityClassName: high-priority
auth:
  enabled: true
  usersExistingSecret: valkey-secrets
  # https://valkey.io/topics/acl/
  aclUsers:
    default:
      permissions: "~* &* -@all"
    n8n:
      permissions: "~n8n:* &* +@all"
    redisinsight:
      permissions: "~* &* +@read"
    authentik:
      permissions: "~authentik:* &* +@all"
    metrics:
      permissions: "~* &* +@read +@connection +@server +INFO +CLIENT +PING"
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  exporter:
    extraEnvs:
      REDIS_USER: metrics
    extraExporterSecrets:
      - name: valkey-secrets
    extraVolumeMounts:
      - name: valkey-secrets-exporter
        mountPath: /secrets/valkey
        readOnly: true
    command:
      - /bin/sh
      - -c
      - |
        export REDIS_PASSWORD=$(cat /secrets/valkey/metrics)
        exec /redis_exporter
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi
