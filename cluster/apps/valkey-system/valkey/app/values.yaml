---
# yaml-language-server: $schema=https://raw.githubusercontent.com/valkey-io/valkey-helm/refs/heads/main/valkey/values.schema.json
# Default values: https://github.com/valkey-io/valkey-helm/blob/main/valkey/values.yaml
# Documentation: https://github.com/valkey-io/valkey-helm/blob/main/valkey/README.md
priorityClassName: high-priority
auth:
  enabled: true
  usersExistingSecret: valkey-secrets
  # https://valkey.io/topics/acl/
  aclUsers:
    default:
      permissions: "~* &* -@all"
    n8n:
      permissions: "~n8n:* &* +@all"
    redisinsight:
      permissions: "~* &* +@read"
    authentik:
      permissions: "~authentik:* &* +@all"
    metrics:
      permissions: "~* &* +@read +@connection +info +client +config|get +slowlog +latency +memory +cluster|info +cluster|slots +cluster|nodes"
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  exporter:
    args:
      - --redis.addr=redis://metrics@localhost:6379
    extraEnvs:
      REDIS_PASSWORD_FILE: /secrets/valkey/metrics-password-file
    extraExporterSecrets:
      - name: valkey-secrets
    extraVolumeMounts:
      - name: valkey-secrets-exporter
        mountPath: /secrets/valkey
        readOnly: true
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi
