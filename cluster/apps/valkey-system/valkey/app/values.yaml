---
# yaml-language-server: $schema=https://raw.githubusercontent.com/valkey-io/valkey-helm/refs/heads/main/valkey/values.schema.json
# Default values: https://github.com/valkey-io/valkey-helm/blob/main/valkey/values.yaml
# Documentation: https://github.com/valkey-io/valkey-helm/blob/main/valkey/README.md
auth:
  enabled: true
  usersExistingSecret: valkey-secrets
  # https://valkey.io/topics/acl/
  aclUsers:
    n8n:
      permissions: "~n8n:queue:bull:* &* +@all"
metrics:
  enabled: true
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi
