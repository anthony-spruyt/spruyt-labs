---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: low-priority
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
controllers:
  agentmemory:
    strategy: Recreate
    containers:
      engine:
        image:
          # renovate: datasource=docker depName=iiidev/iii
          repository: iiidev/iii
          tag: "0.11.2@sha256:15f8d4ed16c0bec350b98f4e18ed04498b1fc5ccc50585e087b736717300cf26"
          pullPolicy: IfNotPresent
        args:
          - --config
          - /app/config.yaml
        securityContext:
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3111
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3111
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3111
              failureThreshold: 30
              periodSeconds: 5
      console:
        image:
          repository: iiidev/iii
          tag: "0.11.2@sha256:15f8d4ed16c0bec350b98f4e18ed04498b1fc5ccc50585e087b736717300cf26"
          pullPolicy: IfNotPresent
        args:
          - console
          - --port
          - "3114"
          - --host
          - 0.0.0.0
          - --engine-port
          - "3111"
          - --ws-port
          - "3112"
          - --bridge-port
          - "49134"
        securityContext:
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 5m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3114
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3114
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3114
              failureThreshold: 30
              periodSeconds: 5
      viewer-proxy:
        image:
          # renovate: datasource=docker depName=docker.io/alpine/socat
          repository: docker.io/alpine/socat
          tag: "1.8.0.1@sha256:87d88ff79bf42ca723fb360e9585c40e2923a2f4df9b9d148b127568ef6b99e7"
          pullPolicy: IfNotPresent
        args:
          - TCP-LISTEN:3116,fork,reuseaddr,bind=0.0.0.0
          - TCP:127.0.0.1:3113
        securityContext:
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 1m
            memory: 16Mi
          limits:
            memory: 32Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3116
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3116
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3116
              failureThreshold: 60
              periodSeconds: 5
      worker:
        image:
          # renovate: datasource=docker depName=docker.io/library/node
          repository: docker.io/library/node
          tag: "20-bookworm-slim@sha256:2cf067cfed83d5ea958367df9f966191a942351a2df77d6f0193e162b5febfc0"
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - npx --yes @agentmemory/agentmemory@0.9.12 --no-engine
        env:
          - name: GEMINI_API_KEY
            valueFrom:
              secretKeyRef:
                name: agentmemory-secrets
                key: GEMINI_API_KEY
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: agentmemory-secrets
                key: OPENAI_API_KEY
          - name: GEMINI_MODEL
            value: "gemini-2.5-flash"
          - name: EMBEDDING_PROVIDER
            value: "openai"
          - name: AGENTMEMORY_TOOLS
            value: "core"
          - name: AGENTMEMORY_AUTO_COMPRESS
            value: "true"
          - name: GRAPH_EXTRACTION_ENABLED
            value: "true"
          - name: CONSOLIDATION_ENABLED
            value: "true"
          - name: III_ENGINE_URL
            value: "ws://localhost:49134"
          - name: VIEWER_ALLOWED_ORIGINS
            value: "https://agentmemory.lan.${EXTERNAL_DOMAIN},http://localhost:3113"
          - name: DO_NOT_TRACK
            value: "1"
          - name: HOME
            value: /home/node
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - node
                  - -e
                  - "require('net').createConnection(3113,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})"
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - node
                  - -e
                  - "require('net').createConnection(3113,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})"
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - node
                  - -e
                  - "require('net').createConnection(3113,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})"
              failureThreshold: 60
              periodSeconds: 5
persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: ceph-block
    advancedMounts:
      agentmemory:
        engine:
          - path: /data
  config:
    type: configMap
    name: agentmemory-iii-config
    advancedMounts:
      agentmemory:
        engine:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
  tmp:
    type: emptyDir
    advancedMounts:
      agentmemory:
        worker:
          - path: /tmp
  console-home:
    type: emptyDir
    advancedMounts:
      agentmemory:
        console:
          - path: /home/nonroot
  npm-cache:
    type: emptyDir
    advancedMounts:
      agentmemory:
        worker:
          - path: /home/node
service:
  app:
    controller: agentmemory
    ports:
      http:
        port: 3111
      ws:
        port: 3112
      viewer:
        port: 3116
      console:
        port: 3114
      metrics:
        port: 9464
