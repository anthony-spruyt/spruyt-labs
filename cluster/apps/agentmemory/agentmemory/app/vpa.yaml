---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: agentmemory
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentmemory
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: engine
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 512Mi
      - containerName: console
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 256Mi
      - containerName: viewer-proxy
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 32Mi
      - containerName: worker
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 512Mi
