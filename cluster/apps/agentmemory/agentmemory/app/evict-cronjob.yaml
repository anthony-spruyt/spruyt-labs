---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentmemory-evict
  namespace: agentmemory
  labels:
    app.kubernetes.io/name: agentmemory-evict
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentmemory-evict
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: evict
              # renovate: datasource=docker depName=curlimages/curl
              image: docker.io/curlimages/curl:8.17.0@sha256:935d9100e9ba842cdb060de42472c7ca90cfe9a7c96e4dacb55e79e560b3ff40
              command:
                - /bin/sh
                - -c
                - |
                  RESULT=$(curl -sf -X POST http://agentmemory.agentmemory.svc.cluster.local:3111/agentmemory/evict \
                    -H "Authorization: Bearer $${AGENTMEMORY_SECRET}" \
                    -H "Content-Type: application/json" \
                    -d '{"dryRun": true}')
                  echo "Dry run result: $${RESULT}"
                  EVICT_COUNT=$$(echo "$${RESULT}" | grep -o '"wouldEvict":[0-9]*' | grep -o '[0-9]*')
                  if [ "$${EVICT_COUNT:-0}" -gt 0 ]; then
                    echo "Evicting $${EVICT_COUNT} memories..."
                    curl -sf -X POST http://agentmemory.agentmemory.svc.cluster.local:3111/agentmemory/evict \
                      -H "Authorization: Bearer $${AGENTMEMORY_SECRET}" \
                      -H "Content-Type: application/json" \
                      -d '{}'
                  else
                    echo "No memories to evict."
                  fi
              env:
                - name: AGENTMEMORY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: agentmemory-secrets
                      key: AGENTMEMORY_SECRET
              resources:
                limits:
                  cpu: 100m
                  memory: 64Mi
                requests:
                  cpu: 10m
                  memory: 32Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
