---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ipv6-pool
  namespace: metallb-system
spec:
  addresses:
    - "${NETWORK_LB_CIDR_IP6}"
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: ipv6-l2-advert
  namespace: metallb-system
spec:
  ipAddressPools:
    - ipv6-pool
