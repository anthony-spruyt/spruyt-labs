---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
# low-priority tier: Non-critical utility app (per docs/workload-classification.md)
# CPU limit: 2x request per low-priority policy
defaultPodOptions:
  priorityClassName: low-priority
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  firemerge:
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/anthony-spruyt/firemerge
          tag: "0.5.2"
          pullPolicy: IfNotPresent
        env:
          # Python/uv environment - use writable path for venv
          UV_PROJECT_ENVIRONMENT: /tmp/venv
          UV_LINK_MODE: copy
          # Firefly III API connection
          FIREFLY_BASE_URL: http://firefly-iii.firefly-iii.svc.cluster.local
          FIREFLY_TOKEN:
            valueFrom:
              secretKeyRef:
                name: firemerge-secrets
                key: FIREFLY_TOKEN
        # low-priority tier with higher limits for startup build
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        # Probes: startupProbe for long build, then liveness/readiness
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: &port 8080
              # Allow up to 10 min for startup (30s * 20 = 600s)
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 20
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *probes
service:
  app:
    controller: firemerge
    ports:
      http:
        port: *port
persistence:
  cache:
    type: emptyDir
    globalMounts:
      - path: /.cache
  venv:
    type: emptyDir
    globalMounts:
      - path: /tmp/venv
