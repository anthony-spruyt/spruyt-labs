---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app firemerge
  namespace: flux-system
spec:
  targetNamespace: firefly-iii
  path: ./cluster/apps/firefly-iii/firemerge/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: authentik
    - name: firefly-iii
  prune: true
  timeout: 5m
  wait: true
