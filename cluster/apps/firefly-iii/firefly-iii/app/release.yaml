---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-iii
spec:
  chart:
    spec:
      chart: firefly-iii
      version: 1.9.12
      sourceRef:
        kind: HelmRepository
        name: firefly-iii-charts
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: firefly-iii-values
  # Patch deployment with fields not supported by upstream chart
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: firefly-iii
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: standard
              - op: add
                path: /metadata/annotations
                value:
                  reloader.stakater.com/auto: "true"
