---
# =============================================================================
# Firefly III Application Policies
# =============================================================================
# DNS egress is handled by CiliumClusterwideNetworkPolicy allow-kube-dns-egress
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-traefik-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: firefly-iii
      app.kubernetes.io/name: firefly-iii
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
# Allow cronjob pods to reach the Firefly service for recurring transaction processing
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cronjob-firefly-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: firefly-iii
      app.kubernetes.io/name: firefly-iii
    matchExpressions:
      - key: batch.kubernetes.io/job-name
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:app.kubernetes.io/name: firefly-iii
          matchExpressions:
            - key: k8s:batch.kubernetes.io/job-name
              operator: DoesNotExist
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
# Allow Firefly to receive requests from its own cronjob pods
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cronjob-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: firefly-iii
      app.kubernetes.io/name: firefly-iii
    matchExpressions:
      - key: batch.kubernetes.io/job-name
        operator: DoesNotExist
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:app.kubernetes.io/name: firefly-iii
          matchExpressions:
            - key: k8s:batch.kubernetes.io/job-name
              operator: Exists
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-postgres-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: firefly-iii
      app.kubernetes.io/name: firefly-iii
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:cnpg.io/cluster: firefly-iii-cnpg-cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# =============================================================================
# Authentik Outpost Policies (deployed by Authentik to this namespace)
# =============================================================================
# DNS egress is handled by CiliumClusterwideNetworkPolicy allow-kube-dns-egress
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-traefik-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost egress to authentik server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-authentik-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: authentik-system
            k8s:app.kubernetes.io/name: authentik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost egress to kube-api
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "9300"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-world-https-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    # Outpost needs HTTPS for OAuth/OIDC flows and certificate validation
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# =============================================================================
# CNPG PostgreSQL Cluster Policies
# =============================================================================
# DNS egress is handled by CiliumClusterwideNetworkPolicy allow-kube-dns-egress
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-firefly-ingress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: firefly-iii-cnpg-cluster
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:app.kubernetes.io/name: firefly-iii
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-world-https-egress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: firefly-iii-cnpg-cluster
  egress:
    # S3 backup uploads via Barman cloud plugin
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: firefly-iii-cnpg-cluster
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "9187"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-operator-ingress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: firefly-iii-cnpg-cluster
  ingress:
    # CNPG operator needs access to status port for cluster management
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
            k8s:app.kubernetes.io/name: cloudnative-pg
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: firefly-iii-cnpg-cluster
  egress:
    # CNPG pods need Kubernetes API access for cluster coordination
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-internal-cluster
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: firefly-iii-cnpg-cluster
  egress:
    # CNPG pods need to communicate with each other for replication and status
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:cnpg.io/cluster: firefly-iii-cnpg-cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP
  ingress:
    # Allow incoming replication and status from other cluster members
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:cnpg.io/cluster: firefly-iii-cnpg-cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP
