            k8s:app.kubernetes.io/name: authentik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
