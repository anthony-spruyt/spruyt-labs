---
# #yaml-language-server: $schema=TODO
# Documentation: https://github.com/firefly-iii/kubernetes/tree/main/charts/firefly-iii
# Default values: https://github.com/firefly-iii/kubernetes/blob/main/charts/firefly-iii/values.yaml
# standard tier: Business application with availability expectations (per docs/workload-classification.md)
# CPU limit: 3x request per standard policy

image:
  repository: fireflyiii/core
  pullPolicy: IfNotPresent

# Recreate strategy required for RWO volumes - RollingUpdate causes Multi-Attach deadlock
deploymentStrategyType: Recreate

# Use existing secret for sensitive values (APP_KEY, cron token)
config:
  existingSecret: firefly-iii-secrets
  env:
    # Application settings
    APP_ENV: production
    APP_DEBUG: "false"
    APP_LOG_LEVEL: notice
    APP_URL: https://firefly.${EXTERNAL_DOMAIN}
    TRUSTED_PROXIES: "*"
    TZ: ${TIMEZONE}

    # Database connection type (credentials from envValueFrom below)
    DB_CONNECTION: pgsql

    # Authentication - uses Authentik forward-auth via header
    # Custom scope mapping adds X-Firefly-Household-Email for shared finance
    AUTHENTICATION_GUARD: remote_user_guard
    AUTHENTICATION_GUARD_HEADER: HTTP_X_FIREFLY_HOUSEHOLD_EMAIL
    AUTHENTICATION_GUARD_EMAIL: HTTP_X_FIREFLY_HOUSEHOLD_EMAIL

    # Disable 2FA since we use Authentik SSO
    DISABLE_FRAME_HEADER: "false"
    DISABLE_CSP_HEADER: "false"

    # Send error reporting emails
    SEND_ERROR_MESSAGE: "true"
    SEND_REPORT_JOURNALS: "true"

  # Database credentials from CNPG auto-generated secret
  envValueFrom:
    DB_HOST:
      secretKeyRef:
        name: firefly-iii-cnpg-cluster-app
        key: host
    DB_PORT:
      secretKeyRef:
        name: firefly-iii-cnpg-cluster-app
        key: port
    DB_DATABASE:
      secretKeyRef:
        name: firefly-iii-cnpg-cluster-app
        key: dbname
    DB_USERNAME:
      secretKeyRef:
        name: firefly-iii-cnpg-cluster-app
        key: user
    DB_PASSWORD:
      secretKeyRef:
        name: firefly-iii-cnpg-cluster-app
        key: password

# Service configuration
service:
  type: ClusterIP
  port: 80

# Persistence for uploads/attachments
persistence:
  enabled: true
  storageClassName: rbd-fast-delete
  accessModes: ReadWriteOnce
  storage: 5Gi

# Resources - standard tier (3x CPU limit)
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

# Security context (container-level)
securityContext: {}

# Pod security context (pod-level)
podSecurityContext:
  fsGroup: 33
  runAsNonRoot: true
  runAsUser: 33
  runAsGroup: 33

# NOTE: priorityClassName and deploymentAnnotations added via postRenderers in release.yaml

# Pod annotations
podAnnotations: {}

# Ingress disabled - using Traefik IngressRoute instead
ingress:
  enabled: false

# Cronjob for recurring transactions (runs internally)
cronjob:
  enabled: true
  schedule: "0 15 * * *" # At 01:00 daily Melbourne (UTC+10)
  auth:
    existingSecret: firefly-iii-secrets
    secretKey: STATIC_CRON_TOKEN
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Probes (native K8s format)
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Extra volumes for CNPG CA certificate
extraVolumes:
  - name: db-ca-cert
    secret:
      secretName: firefly-iii-cnpg-cluster-ca
      items:
        - key: ca.crt
          path: ca.crt

extraVolumeMounts:
  - name: db-ca-cert
    mountPath: /var/www/html/storage/certs/postgresql
    readOnly: true
