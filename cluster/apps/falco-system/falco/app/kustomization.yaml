---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./exceptions-configmap.yaml
  - ./kata-tap-qdisc-fix-rules-configmap.yaml
  - ./release.yaml
  - ./network-policies.yaml
  - ./vpa.yaml
configMapGenerator:
