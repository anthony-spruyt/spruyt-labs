---
# #yaml-language-server: $schema=TODO
# High-priority: security observability (per docs/workload-classification.md)
driver:
  kind: modern_ebpf

# Priority class for scheduling precedence
priorityClassName: high-priority

# Run on all nodes including control plane
tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists

resources:
  requests:
    cpu: 130m
    memory: 200Mi
  limits:
    cpu: 1000m
    memory: 400Mi

# Enable Falcosidekick for alert forwarding
falcosidekick:
  enabled: true
  priorityClassName: high-priority
  resources:
    requests:
      cpu: 15m
      memory: 24Mi
    limits:
      cpu: 250m
      memory: 48Mi
  config:
    loki:
      # VictoriaLogs Loki-compatible endpoint (uses /insert prefix)
      hostport: http://victoria-logs-single-server.observability.svc:9428/insert

# Disable Falco-talon (alerts only, no automated response)
falco-talon:
  enabled: false

# Disable k8s-metacollector (optional, adds pod metadata enrichment)
k8s-metacollector:
  enabled: false

# Mount custom exception rules from ConfigMap
mounts:
  volumes:
    - name: falco-exceptions
      configMap:
        name: falco-exceptions
    - name: falco-kata-tap-qdisc-fix-rules
      configMap:
        name: falco-kata-tap-qdisc-fix-rules
  volumeMounts:
    - name: falco-exceptions
      mountPath: /etc/falco/rules.d/exceptions.yaml
      subPath: exceptions.yaml
      readOnly: true
    - name: falco-kata-tap-qdisc-fix-rules
      mountPath: /etc/falco/rules.d/kata-tap-qdisc-fix.yaml
      subPath: kata-tap-qdisc-fix.yaml
      readOnly: true
