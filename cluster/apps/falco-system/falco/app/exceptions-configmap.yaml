---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-exceptions
  namespace: falco-system
data:
  exceptions.yaml: |
    # Workload-specific exceptions for expected cluster behavior
    # See: https://falco.org/docs/rules/exceptions/

    # Exception: Grafana sidecar needs K8s API access for ConfigMap/Secret watching
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: grafana_sidecar
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [quay.io/kiwigrid/k8s-sidecar, observability]
      override:
        exceptions: append

    # Exception: Kyverno needs K8s API access for policy enforcement
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: kyverno
          fields: [container.image.repository, k8s.ns.name]
          comps: [startswith, =]
          values:
            - [reg.kyverno.io/kyverno, kyverno]
      override:
        exceptions: append

    # Exception: External Secrets Operator needs K8s API access
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: external_secrets
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [ghcr.io/external-secrets/external-secrets, external-secrets]
      override:
        exceptions: append

    # Exception: Authentik needs K8s API access for outposts
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: authentik
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [ghcr.io/goauthentik/server, authentik-system]
      override:
        exceptions: append

    # Exception: Velero needs K8s API access for backup operations
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: velero
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [docker.io/velero/velero, velero]
      override:
        exceptions: append

    # Exception: kube-state-metrics needs K8s API access for metrics collection
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: kube_state_metrics
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [registry.k8s.io/kube-state-metrics/kube-state-metrics, observability]
      override:
        exceptions: append

    # Exception: kubectl-mcp-server needs K8s API access for MCP tool operations
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: kubectl_mcp_server
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [docker.io/rohitghumare64/kubectl-mcp-server, kubectl-mcp]
      override:
        exceptions: append

    # Exception: Headlamp K8s dashboard needs API access
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: headlamp
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [ghcr.io/headlamp-k8s/headlamp, headlamp-system]
      override:
        exceptions: append

    # Exception: Traefik ingress controller watches Services/Endpoints
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: traefik
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [docker.io/library/traefik, traefik]
      override:
        exceptions: append

    # Exception: CloudNativePG operator manages PostgreSQL clusters
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: cloudnative_pg
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [ghcr.io/cloudnative-pg/cloudnative-pg, cnpg-system]
      override:
        exceptions: append

    # Exception: Vector log collector watches pods for log discovery
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: vector
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [docker.io/timberio/vector, observability]
      override:
        exceptions: append

    # Exception: Ceph CSI driver needs API access for volume operations
    - rule: Contact K8S API Server From Container
      exceptions:
        - name: ceph_csi
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [quay.io/cephcsi/cephcsi, rook-ceph]
      override:
        exceptions: append

    # Exception: Cilium CNI binary execution on host is expected
    - rule: Drop and execute new binary in container
      exceptions:
        - name: cilium_cni
          fields: [proc.name, proc.exepath]
          comps: [=, =]
          values:
            - [cilium-cni, /opt/cni/bin/cilium-cni]
            - [cilium-sysctlfi, /opt/cni/bin/cilium-sysctlfix]
      override:
        exceptions: append

    # Exception: Coder downloads and executes Terraform providers
    - rule: Drop and execute new binary in container
      exceptions:
        - name: coder_terraform
          fields: [container.image.repository, k8s.ns.name]
          comps: [=, =]
          values:
            - [ghcr.io/coder/coder, coder-system]
      override:
        exceptions: append

    # Exception: Kata Containers virtiofsd uses syslog which triggers clear log
    - rule: Clear Log Activities
      exceptions:
        - name: kata_virtiofsd
          fields: [proc.name]
          comps: [=]
          values:
            - [virtiofsd]
      override:
        exceptions: append

    # Exception: CloudNativePG WAL archiver uses shell scripts
    - rule: Run shell untrusted
      exceptions:
        - name: cnpg_archiver
          fields: [container.image.repository, proc.cmdline]
          comps: [startswith, contains]
          values:
            - [ghcr.io/cloudnative-pg/postgresql, wal-archive]
      override:
        exceptions: append
