---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: falco
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: falco
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: falco
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 1000m
          memory: 400Mi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: falco-falcosidekick
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: falco-falcosidekick
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: falcosidekick
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 250m
          memory: 48Mi
