---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow ingress from Traefik
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-traefik-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "18789"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to n8n MCP server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-n8n-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: n8n-system
            k8s:app.kubernetes.io/name: n8n
      toPorts:
        - ports:
            - port: "5678"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow all-port egress to external (world) only - no cluster resources
# OpenClaw agents need unrestricted external access (APIs, npm, pip, git, etc.)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-world-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  egress:
    - toEntities:
        - world
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# =============================================================================
# Authentik Outpost Policies (deployed by Authentik to this namespace)
# =============================================================================
# DNS egress is handled by CiliumClusterwideNetworkPolicy allow-kube-dns-egress
# Allow Traefik to reach authentik outpost for forward auth
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-traefik-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost egress to authentik server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-authentik-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: authentik-system
            k8s:app.kubernetes.io/name: authentik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow outpost egress to kube-api
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow metrics scraping from vmagent
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "9300"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow world HTTPS for OAuth/OIDC flows and certificate validation
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-outpost-world-https-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
