---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
# Based on implementation at https://github.com/serhanekicii/openclaw-helm/tree/main
defaultPodOptions:
  priorityClassName: standard
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  main:
    # Number of replicas (must be 1, OpenClaw doesn't support horizontal scaling)
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    initContainers:
      # Init container handles config setup with merge/overwrite modes.
      # Uses OpenClaw image for Node.js runtime (required for merge mode).
      # Script: init-config.sh (mounted from openclaw-scripts ConfigMap)
      init-config:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: &tag "2026.2.19"
        command:
          - sh
          - /scripts/init-config.sh
        env:
          CONFIG_MODE: "merge"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      # Install ClawHub skills and runtime dependencies (idempotent)
      # Script: init-skills.sh (mounted from openclaw-scripts ConfigMap)
      init-skills:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: *tag
        command:
          - sh
          - /scripts/init-skills.sh
        env:
          HOME: /tmp
          NPM_CONFIG_CACHE: /tmp/.npm
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
    containers:
      # Main OpenClaw container
      main:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: *tag
          pullPolicy: IfNotPresent
        command:
          - /scripts/entrypoint.sh
        args:
          - node
          - dist/index.js
          - gateway
          - --bind
          - lan
          - --port
          - "18789"
        # Reference a secret containing environment variables (e.g., API keys)
        # Create this secret manually or via external-secrets/vault-operator
        envFrom:
          - secretRef:
              name: openclaw-secrets
        env: {}
        # Example: Add runtime dependency paths for skills and extra runtimes
        # env:
        #   PATH: /home/node/.openclaw/pnpm:/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        #   PNPM_HOME: /home/node/.openclaw/pnpm
        #   PNPM_STORE_DIR: /home/node/.openclaw/.pnpm-store
        #   # For internal CA trust (Python requests library)
        #   REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-bundle.crt
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        probes:
          liveness:
            enabled: true
            type: TCP
            spec:
              tcpSocket:
                port: 18789
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            type: TCP
            spec:
              tcpSocket:
                port: 18789
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            type: TCP
            spec:
              tcpSocket:
                port: 18789
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 30
      # Chromium sidecar for browser automation (CDP on port 9222)
      chromium:
        image:
          repository: zenika/alpine-chrome
          tag: "124"
        command:
          - chromium-browser
        args:
          - --headless
          - --disable-gpu
          - --no-sandbox
          - --disable-dev-shm-usage
          - --remote-debugging-address=0.0.0.0
          - --remote-debugging-port=9222
          - --user-data-dir=/tmp/chromium
        env:
          # Fontconfig cache needs a writable directory
          XDG_CACHE_HOME: /tmp
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 9222
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 6
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 9222
              initialDelaySeconds: 5
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 9222
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 12
persistence:
  # ConfigMap for init container to copy from (created by Kustomize configMapGenerator)
  config:
    type: configMap
    name: openclaw-config
    advancedMounts:
      main:
        init-config:
          - path: /config
            readOnly: true
  # Entire .openclaw directory as PVC
  data:
    existingClaim: openclaw-data
    advancedMounts:
      main:
        init-config:
          - path: /home/node/.openclaw
        init-skills:
          - path: /home/node/.openclaw
        main:
          - path: /home/node/.openclaw
  # Workspace markdown files (SOUL.md, USER.md, etc.) synced to PVC on startup
  workspace-files:
    type: configMap
    name: openclaw-workspace
    advancedMounts:
      main:
        init-config:
          - path: /workspace-files
            readOnly: true
  # Scripts (created by Kustomize configMapGenerator)
  scripts:
    type: configMap
    name: openclaw-scripts
    defaultMode: 0755
    advancedMounts:
      main:
        init-config:
          - path: /scripts
            readOnly: true
        init-skills:
          - path: /scripts
            readOnly: true
        main:
          - path: /scripts
            readOnly: true
  # Writable /tmp for containers with readOnlyRootFilesystem
  tmp:
    type: emptyDir
    advancedMounts:
      main:
        init-config:
          - path: /tmp
        init-skills:
          - path: /tmp
        main:
          - path: /tmp
        chromium:
          - path: /tmp
service:
  main:
    controller: main
    ipFamilyPolicy: SingleStack
    ipFamilies:
      - IPv4
    ports:
      http:
        port: 18789
