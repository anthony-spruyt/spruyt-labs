---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app brave-search-mcp
  namespace: flux-system
spec:
  targetNamespace: brave-search-mcp
  path: ./cluster/apps/brave-search-mcp/brave-search-mcp/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  prune: true
  timeout: 5m
  wait: true
