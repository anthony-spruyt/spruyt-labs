---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to Brave Search API
# DNS egress with L7 rule required for toFQDNs to populate Cilium's FQDN cache
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-brave-search-api-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: brave-search-mcp
  egress:
    - toFQDNs:
        - matchName: api.search.brave.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow ingress from LiteLLM MCP gateway
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-litellm-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: brave-search-mcp
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: litellm
            k8s:app.kubernetes.io/name: litellm
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
