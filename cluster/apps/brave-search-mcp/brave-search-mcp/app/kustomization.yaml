---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./brave-search-secrets.sops.yaml
  - ./release.yaml
  - ./network-policies.yaml
  - ./vpa.yaml
configMapGenerator:
  - name: brave-search-mcp-values
    namespace: brave-search-mcp
    files:
      - values.yaml
configurations:
  - ./kustomizeconfig.yaml
