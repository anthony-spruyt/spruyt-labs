---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mosquitto
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: mosquitto
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: mosquitto
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          memory: 256Mi
