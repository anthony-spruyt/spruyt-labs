---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
controllers:
  mosquitto:
    type: statefulset
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      copy-secrets:
        image:
          repository: busybox
          tag: "1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e"
          pullPolicy: IfNotPresent
        command:
          [
            "sh",
            "-c",
            "cp /mosquitto/secrets/credentials.txt /mosquitto/config/ && chown 1883:1883 /mosquitto/config/credentials.txt && chmod 0700 /mosquitto/config/credentials.txt",
          ]
    pod:
      securityContext:
        runAsUser: 1883
        runAsGroup: 1883
        runAsNonRoot: true
        fsGroup: 1883
        seccompProfile:
          type: RuntimeDefault
    containers:
      mosquitto:
        image:
          repository: public.ecr.aws/docker/library/eclipse-mosquitto
          tag: 2.0.22-openssl@sha256:6852da90a65dfff7aa3a1c8b249e92bb83c17ea8bbcce56bedff8707332a1a29
          pullPolicy: IfNotPresent
        # Probes: TCP socket on MQTT port - explicit config for visibility
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 1883
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 1883
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 1
              failureThreshold: 3
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
service:
  mosquitto:
    controller: mosquitto
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      lbipam.cilium.io/ips: "${MOSQUITTO_IP4}"
    ports:
      mqtt:
        port: 1883
        protocol: TCP
      mqtt-ssl:
        port: 8883
        protocol: TCP
configMaps:
  mosquitto-config:
    data:
      # https://mosquitto.org/man/mosquitto-conf-5.html
      mosquitto.conf: |
        # Configure persistence
        persistence true
        persistence_location /mosquitto/data
        autosave_interval 60

        # Configure logging
        connection_messages false
        log_dest stdout
        log_dest stderr

        # Configure listeners
        per_listener_settings true

        # mqtt
        listener 1883
        allow_anonymous false
        password_file /mosquitto/config/credentials.txt

        # mqtt-ssl
        listener 8883
        allow_anonymous false
        password_file /mosquitto/config/credentials.txt
        require_certificate false
        certfile /mosquitto/certs/tls.crt
        keyfile /mosquitto/certs/tls.key
persistence:
  config:
    type: emptyDir
    globalMounts:
      - path: /mosquitto/config
  mosquitto-config:
    type: configMap
    identifier: mosquitto-config
    advancedMounts:
      mosquitto:
        mosquitto:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
            readOnly: true
  mosquitto-data:
    existingClaim: mosquitto-data-v2
    advancedMounts:
      mosquitto:
        mosquitto:
          - path: /mosquitto/data
  mosquitto-log:
    type: emptyDir
    advancedMounts:
      mosquitto:
        mosquitto:
          - path: /mosquitto/log
  mosquitto-certs:
    type: secret
    name: mosquitto-lan-${EXTERNAL_DOMAIN/./-}-tls
    advancedMounts:
      mosquitto:
        mosquitto:
          - path: /mosquitto/certs
  mosquitto-secrets:
    type: secret
    name: mosquitto-secrets
    globalMounts:
      - path: /mosquitto/secrets/credentials.txt
        subPath: credentials.txt
        readOnly: true
