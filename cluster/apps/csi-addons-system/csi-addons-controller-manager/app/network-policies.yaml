---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# CiliumNetworkPolicy for csi-addons-controller-manager
# Manages CSI addon operations - needs kube-api access
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-api-egress
  namespace: csi-addons-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: csi-addons
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow metrics scraping from vmagent
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-metrics-ingress
  namespace: csi-addons-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: csi-addons
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to rook-ceph CSI sidecars for addon operations
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-rook-ceph-csi-egress
  namespace: csi-addons-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: csi-addons
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: rook-ceph
      toPorts:
        - ports:
            - port: "9070"
              protocol: TCP
            - port: "9071"
              protocol: TCP
