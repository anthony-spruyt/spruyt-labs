---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: csi-addons-config
  # replace the namespace with the namespace where the operator is deployed.
  namespace: csi-addons-system
data:
  "reclaim-space-timeout": "5m"
  "max-concurrent-reconciles": "10"
  "max-group-pvcs": "100"
