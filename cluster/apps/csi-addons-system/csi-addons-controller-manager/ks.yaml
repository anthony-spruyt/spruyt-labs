---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app csi-addons-controller-manager
  namespace: flux-system
  labels:
    kustomizationdefaults.flux.home.arpa/disabled: "true"
    sops.flux.home.arpa/disabled: "true"
    substitution.flux.home.arpa/disabled: "true"
spec:
  path: ./deploy/controller
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: kubernetes-csi-addons
  prune: true
  timeout: 5m
  wait: false
