---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bot-ssh-key-rotation
  namespace: github-system
spec:
  schedule: "0 3 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: bot-ssh-key-rotation
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: bot-ssh-key-rotation
          restartPolicy: Never
          containers:
            - name: rotate-ssh-key
              image: ghcr.io/anthony-spruyt/ssh-key-rotation:2.0.2@sha256:1419826607abcae88c687955649abb7744f1b2fa886cc9ddb0f7e34b6778e9e0
              env:
                - name: GITHUB_PAT
                  valueFrom:
                    secretKeyRef:
                      name: bot-ssh-rotation-token
                      key: GITHUB_PAT
                - name: TITLE_PREFIX
                  value: spruyt-labs-bot
                - name: SECRET_NAME
                  value: github-bot-ssh-key
                - name: SECRET_NAMESPACE
                  value: github-system
                - name: GRACE_PERIOD_DAYS
                  value: "4"
                - name: FORCE_SYNC_NAMESPACES
                  value: claude-agents-write
                - name: FORCE_SYNC_ES_NAME
                  value: github-bot-ssh-key
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
