---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow world HTTPS egress for GitHub API calls
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-bot-ssh-rotation-world-https-egress
spec:
  endpointSelector:
    matchLabels:
      app: bot-ssh-key-rotation
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to kube-apiserver for kubectl patch operations
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-bot-ssh-rotation-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      app: bot-ssh-key-rotation
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
