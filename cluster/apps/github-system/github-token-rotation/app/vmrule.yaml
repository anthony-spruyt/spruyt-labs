---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: github-token-rotation
spec:
  groups:
    - name: github-token-rotation
      rules:
        - alert: GitHubTokenRotationFailed
          expr: |
            kube_job_status_failed{namespace="github-system", job_name=~"github-token-rotation.*"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GitHub token rotation CronJob failed"
            description: "CronJob {{ $labels.job_name }} failed. Installation tokens expire after 1 hour."
        - alert: GitHubTokenRotationConsecutiveFailures
          expr: |
            time() - kube_cronjob_status_last_successful_time{namespace="github-system", cronjob="github-token-rotation"} > 3600
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "GitHub token rotation has not succeeded in 1+ hours"
            description: "Installation tokens have likely expired. Workloads using gh/git are degraded. Tokens will self-heal on next successful CronJob run."
