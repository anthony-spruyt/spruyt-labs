---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: github-token-rotation
  namespace: github-system
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: github-token-rotation
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          serviceAccountName: github-token-rotation
          containers:
            - name: rotate-tokens
              image: alpine/k8s:1.35.4@sha256:d9aeef2665287b9918bc57c539ba95382ba4c8d52c8b1310df5666a89d9a3d04
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Retry helper — transient DNS/egress blips from the Alpine
                  # CDN caused repeated CronJob failures (#952, #964) during
                  # cluster reconcile storms. 3 attempts, 5s backoff.
                  retry() {
                    for i in 1 2 3; do
                      "$$@" && return 0
                      echo "retry $$i/3 failed for: $$*" >&2
                      sleep 5
                    done
                    echo "ERROR: all retries exhausted for: $$*" >&2
                    return 1
                  }

                  # Install openssl CLI to /tmp (shared libs already in image via curl)
                  _ARCH=$$(uname -m)
                  fetch_apkindex() {
                    curl -sfL --max-time 30 "https://dl-cdn.alpinelinux.org/alpine/edge/main/$${_ARCH}/APKINDEX.tar.gz" -o /tmp/APKINDEX.tar.gz
                  }
                  retry fetch_apkindex
                  _VER=$$(tar -Oxzf /tmp/APKINDEX.tar.gz APKINDEX 2>/dev/null | \
                    awk '/^P:openssl$$/,/^$$/' | grep '^V:' | head -1 | cut -d: -f2)
                  if [ -z "$${_VER}" ]; then
                    echo "ERROR: Failed to resolve openssl package version"
                    exit 1
                  fi
                  fetch_openssl() {
                    curl -sfL --max-time 30 "https://dl-cdn.alpinelinux.org/alpine/edge/main/$${_ARCH}/openssl-$${_VER}.apk" -o /tmp/openssl.apk
                  }
                  retry fetch_openssl
                  tar -xzf /tmp/openssl.apk -C /tmp usr/bin/openssl 2>/dev/null
                  chmod +x /tmp/usr/bin/openssl
                  export PATH="/tmp/usr/bin:$$PATH"
                  echo "Installed openssl $${_VER}"

                  MAX_RETRIES=3

                  # Base64url encode (no padding, URL-safe)
                  b64url() {
                    openssl base64 -A | tr '+/' '-_' | tr -d '='
                  }

                  # Generate a JWT for a GitHub App
                  generate_jwt() {
                    APP_ID="$$1"
                    KEY_FILE="$$2"

                    NOW=$$(date +%s)
                    IAT=$$((NOW - 60))
                    EXP=$$((NOW + 600))

                    HEADER=$$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
                    PAYLOAD=$$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$$IAT" "$$EXP" "$$APP_ID" | b64url)

                    SIGNATURE=$$(printf '%s.%s' "$$HEADER" "$$PAYLOAD" | \
                      openssl dgst -sha256 -sign "$$KEY_FILE" -binary | b64url)

                    printf '%s.%s.%s' "$$HEADER" "$$PAYLOAD" "$$SIGNATURE"
                  }

                  # Mint an installation access token and update the source secret
                  mint_token() {
                    PREFIX="$$1"
                    APP_ID="$$2"
                    INSTALLATION_ID="$$3"
                    KEY_FILE="$$4"

                    echo "=== Minting $${PREFIX} installation token ==="

                    JWT=$$(generate_jwt "$$APP_ID" "$$KEY_FILE")

                    RESPONSE=$$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
                      "https://api.github.com/app/installations/$${INSTALLATION_ID}/access_tokens" \
                      -H "Authorization: Bearer $${JWT}" \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2022-11-28")

                    HTTP_CODE=$$(echo "$${RESPONSE}" | grep 'HTTP_CODE:' | sed 's/HTTP_CODE://')
                    BODY=$$(echo "$${RESPONSE}" | grep -v 'HTTP_CODE:')

                    if [ "$${HTTP_CODE}" != "201" ]; then
                      echo "ERROR: GitHub API returned HTTP $${HTTP_CODE} for $${PREFIX}"
                      echo "$${BODY}" | jq -r '.message // .' 2>/dev/null || echo "$${BODY}"
                      return 1
                    fi

                    TOKEN=$$(echo "$${BODY}" | jq -r '.token // empty')

                    if [ -z "$${TOKEN}" ]; then
                      echo "ERROR: Failed to parse token from response for $${PREFIX}"
                      echo "Response keys: $$(echo "$${BODY}" | jq -r 'keys | join(", ")' 2>/dev/null || echo 'parse failed')"
                      return 1
                    fi

                    echo "Token minted, updating source secret..."

                    # Build hosts.yml for gh CLI
                    HOSTS_YML=$$(printf 'github.com:\n  oauth_token: %s\n  user: spruyt-labs-bot\n' "$${TOKEN}")

                    # Build .git-credentials for git CLI
                    GIT_CREDS=$$(printf 'https://x-access-token:%s@github.com\n' "$${TOKEN}")

                    # Build patch JSON with jq (handles newlines/special chars)
                    PATCH_JSON=$$(jq -n \
                      --arg token "$${TOKEN}" \
                      --arg hosts "$${HOSTS_YML}" \
                      --arg creds "$${GIT_CREDS}" \
                      --arg at_key "$${PREFIX}-access-token" \
                      --arg hy_key "$${PREFIX}-hosts.yml" \
                      --arg gc_key "$${PREFIX}-git-credentials" \
                      '{stringData: {($$at_key): $$token, ($$hy_key): $$hosts, ($$gc_key): $$creds}}')

                    # Atomic patch with retry
                    ATTEMPT=0
                    while [ $$ATTEMPT -lt $$MAX_RETRIES ]; do
                      ATTEMPT=$$((ATTEMPT + 1))
                      echo "Write attempt $${ATTEMPT}/$${MAX_RETRIES}..."

                      if kubectl patch secret github-bot-credentials -n github-system \
                        --type='merge' -p="$${PATCH_JSON}"; then
                        echo "Write succeeded for $${PREFIX}"
                        break
                      fi

                      echo "WARNING: Write failed, retrying..."
                      if [ $$ATTEMPT -eq $$MAX_RETRIES ]; then
                        echo "ERROR: Write failed after $${MAX_RETRIES} attempts"
                        return 1
                      fi
                      sleep 2
                    done

                    echo "=== $${PREFIX} installation token minted ==="
                  }

                  # Force-sync ExternalSecrets in consumer namespaces.
                  # Best-effort: source secret already updated above; ExternalSecrets
                  # will refresh on their own refreshInterval if force-sync fails
                  # (e.g. external-secrets-webhook rolling restart = no endpoints).
                  force_sync_consumers() {
                    echo "=== Force-syncing ExternalSecrets in consumer namespaces ==="

                    FAILURES=0
                    for NS in claude-agents-write claude-agents-read github-mcp; do
                      for ES_NAME in github-bot-credentials github-bot-ssh-key; do
                        if ! kubectl get externalsecret "$${ES_NAME}" -n "$${NS}" >/dev/null 2>&1; then
                          continue
                        fi
                        echo "Force-syncing $${ES_NAME} in $${NS}..."
                        ATTEMPT=0
                        while [ $$ATTEMPT -lt $$MAX_RETRIES ]; do
                          ATTEMPT=$$((ATTEMPT + 1))
                          if kubectl patch externalsecret "$${ES_NAME}" -n "$${NS}" \
                            --type='merge' \
                            -p="{\"metadata\":{\"annotations\":{\"force-sync\":\"$$(date +%s)\"}}}"; then
                            break
                          fi
                          if [ $$ATTEMPT -eq $$MAX_RETRIES ]; then
                            echo "WARNING: force-sync of $${ES_NAME} in $${NS} failed after $${MAX_RETRIES} attempts (non-fatal; ES refreshInterval will recover)"
                            FAILURES=$$((FAILURES + 1))
                            break
                          fi
                          sleep 2
                        done
                      done
                    done

                    if [ $$FAILURES -gt 0 ]; then
                      echo "=== Force-sync completed with $${FAILURES} non-fatal failure(s) ==="
                    else
                      echo "=== Force-sync complete ==="
                    fi
                  }

                  # Write private keys from env vars to temp files for openssl
                  echo "$${WRITE_PRIVATE_KEY}" > /tmp/write-key.pem
                  echo "$${READ_PRIVATE_KEY}" > /tmp/read-key.pem

                  # Main
                  mint_token "write" "$${WRITE_APP_ID}" "$${WRITE_INSTALLATION_ID}" /tmp/write-key.pem
                  mint_token "read" "$${READ_APP_ID}" "$${READ_INSTALLATION_ID}" /tmp/read-key.pem
                  force_sync_consumers

                  # Clean up key files
                  rm -f /tmp/write-key.pem /tmp/read-key.pem

                  echo "All token rotations completed successfully!"
              env:
                - name: WRITE_APP_ID
                  valueFrom:
                    secretKeyRef:
                      name: github-app-credentials
                      key: write-app-id
                - name: WRITE_INSTALLATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: github-app-credentials
                      key: write-installation-id
                - name: WRITE_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: github-app-credentials
                      key: write-private-key
                - name: READ_APP_ID
                  valueFrom:
                    secretKeyRef:
                      name: github-app-credentials
                      key: read-app-id
                - name: READ_INSTALLATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: github-app-credentials
                      key: read-installation-id
                - name: READ_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: github-app-credentials
                      key: read-private-key
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
          restartPolicy: OnFailure
