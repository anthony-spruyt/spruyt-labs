---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.3/persistentvolumeclaim.json
# Documentation: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#persistentvolumeclaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: technitium-secondary
  namespace: technitium
  # finalizers:
  #   - kubernetes.io/pvc-protection
  annotations:
    reclaimspace.csiaddons.openshift.io/schedule: "0 19 * * *" # At 05:00 daily Melbourne (UTC+10)
spec:
  storageClassName: rbd-fast
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
---
# Step 1: Create a VolumeSnapshot from source PVC
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: technitium-secondary-v2-migration-snapshot
  namespace: technitium
spec:
  volumeSnapshotClassName: rook-ceph-rbd
  source:
    persistentVolumeClaimName: technitium-secondary
