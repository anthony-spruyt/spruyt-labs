---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "dns-secondary-lan-${EXTERNAL_DOMAIN/./-}"
  namespace: technitium
spec:
  secretName: "dns-secondary-lan-${EXTERNAL_DOMAIN/./-}-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  dnsNames:
    - "dns-secondary.lan.${EXTERNAL_DOMAIN}"
    - "${TECHNITIUM_SECONDARY_IP4}"
  keystores:
    pkcs12:
      create: true
      passwordSecretRef:
        name: technitium-cert-secrets
        key: PFX_PASSWORD
