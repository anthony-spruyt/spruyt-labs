---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
fullnameOverride: &name technitium-secondary
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  terminationGracePeriodSeconds: 20
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  technitium-secondary:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      # annotations:
      #   backup.velero.io/backup-volumes: config
      labels:
        role: dns-secondary
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - dns-primary
              topologyKey: kubernetes.io/hostname
    containers:
      technitium:
        image:
          repository: technitium/dns-server
          tag: 14.3.0
          pullPolicy: IfNotPresent
        env:
          - name: DNS_SERVER_DOMAIN
            value: "${DNS_SERVER_SECONDARY_DOMAIN}"
          - name: DNS_SERVER_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: technitium-secrets
                key: DNS_SERVER_ADMIN_PASSWORD
        securityContext:
          allowPrivilegeEscalation: false
          #  Error! Read-only file system : '/tmp/'
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
        # Critical DNS infrastructure - no CPU limit (CPU is compressible)
        resources:
          requests:
            cpu: 50m
            memory: 384Mi
          limits:
            memory: 1Gi
        # Probes: TCP socket on DNS port 53 for health checking
        probes:
          readiness:
            enabled: true
            custom: false
            spec:
              tcpSocket:
                port: 53
              periodSeconds: 5
              failureThreshold: 3
          liveness:
            enabled: true
            custom: false
            spec:
              tcpSocket:
                port: 53
              initialDelaySeconds: 15
              periodSeconds: 10
              failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
service:
  dns:
    controller: *name
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      lbipam.cilium.io/ips: "${TECHNITIUM_SECONDARY_IP4}"
    ports:
      dns-tcp:
        enabled: true
        port: 53
        protocol: TCP
      dns-udp:
        enabled: true
        port: 53
        protocol: UDP
      dns-over-tls:
        enabled: true
        port: 853
        protocol: TCP
      dns-over-https:
        enabled: true
        port: 443
        protocol: TCP
      api-http:
        port: 5380
        protocol: HTTP
      api-https:
        port: 53443
        protocol: HTTPS
    ipFamilyPolicy: SingleStack
    ipFamilies:
      - IPv4
persistence:
  config:
    enabled: true
    existingClaim: technitium-secondary-v2
    globalMounts:
      - path: /etc/dns
  tls:
    enabled: true
    type: secret
    name: "dns-secondary-lan-${EXTERNAL_DOMAIN/./-}-tls"
    globalMounts:
      - path: /certs
        readOnly: true
