---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: technitium
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: technitium
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: technitium
        minAllowed:
          cpu: 220m
          memory: 384Mi
        maxAllowed:
          memory: 1Gi
