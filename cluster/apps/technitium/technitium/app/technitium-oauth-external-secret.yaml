---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: technitium-oauth-credentials
  namespace: technitium
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: technitium-oauth-store
  target:
    name: technitium-oauth-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TECHNITIUM_OIDC_CLIENT_ID: "{{ .clientID }}"
        TECHNITIUM_OIDC_CLIENT_SECRET: "{{ .clientSecret }}"
  data:
    - secretKey: clientID
      remoteRef:
        key: authentik-technitium-oauth
        property: TECHNITIUM_OIDC_CLIENT_ID
    - secretKey: clientSecret
      remoteRef:
        key: authentik-technitium-oauth
        property: TECHNITIUM_OIDC_CLIENT_SECRET
