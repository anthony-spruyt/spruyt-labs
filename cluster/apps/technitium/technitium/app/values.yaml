---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
fullnameOverride: &name technitium
defaultPodOptions:
  priorityClassName: critical-infrastructure
  automountServiceAccountToken: false
  enableServiceLinks: false
  terminationGracePeriodSeconds: 20
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  technitium:
    type: statefulset
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      # annotations:
      #   backup.velero.io/backup-volumes: config
      labels:
        role: dns-primary
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - dns-secondary
              topologyKey: kubernetes.io/hostname
    containers:
      technitium:
        image:
          repository: technitium/dns-server
          tag: 14.3.0@sha256:322b236403ca25028032f28736e2270a860527b030b162c9f82451c6494c4698
          pullPolicy: IfNotPresent
        env:
          - name: DNS_SERVER_DOMAIN
            value: "${DNS_SERVER_DOMAIN}"
          - name: DNS_SERVER_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: technitium-secrets
                key: DNS_SERVER_ADMIN_PASSWORD
        securityContext:
          allowPrivilegeEscalation: false
          #  Error! Read-only file system : '/tmp/'
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 220m
            memory: 384Mi
          limits:
            memory: 1Gi
        # Probes: TCP socket on DNS port 53 for health checking
        probes:
          readiness:
            enabled: true
            custom: false
            spec:
              tcpSocket:
                port: 53
              periodSeconds: 5
              failureThreshold: 3
          liveness:
            enabled: true
            custom: false
            spec:
              tcpSocket:
                port: 53
              initialDelaySeconds: 15
              periodSeconds: 10
              failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
service:
  # TCP service - DNS, DoT, DoH, web UI
  tcp:
    controller: *name
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      lbipam.cilium.io/ips: "${TECHNITIUM_IP4}"
      lbipam.cilium.io/sharing-key: technitium
    ports:
      dns:
        port: 53
        protocol: TCP
      dns-over-http:
        port: 80
        protocol: TCP
      dns-over-tls:
        port: 853
        protocol: TCP
      dns-over-https:
        port: 443
        protocol: TCP
      dns-proxy:
        port: 538
        protocol: TCP
      api-http:
        port: 5380
        protocol: TCP
      api-https:
        port: 53443
        protocol: TCP
    ipFamilyPolicy: SingleStack
    ipFamilies:
      - IPv4
  # UDP service - DNS, DoQ, HTTP/3
  udp:
    controller: *name
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      lbipam.cilium.io/ips: "${TECHNITIUM_IP4}"
      lbipam.cilium.io/sharing-key: technitium
    ports:
      dns:
        port: 53
        protocol: UDP
      dns-over-quic:
        port: 853
        protocol: UDP
      dns-over-http3:
        port: 443
        protocol: UDP
      dns-proxy:
        port: 538
        protocol: UDP
      api-http3:
        port: 53443
        protocol: UDP
    ipFamilyPolicy: SingleStack
    ipFamilies:
      - IPv4
persistence:
  config:
    enabled: true
    existingClaim: technitium-v2
    globalMounts:
      - path: /etc/dns
  tls:
    enabled: true
    type: secret
    name: "dns-lan-${EXTERNAL_DOMAIN/./-}-tls"
    globalMounts:
      - path: /certs
        readOnly: true
