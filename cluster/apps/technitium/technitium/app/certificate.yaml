---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "dns-over-tls-technitium"
  namespace: technitium
spec:
  secretName: "dns-over-tls"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  commonName: "dns.lan.${EXTERNAL_DOMAIN}"
  dnsNames:
    - "dns.lan.${EXTERNAL_DOMAIN}"
  keystores:
    pkcs12:
      create: true
      passwordSecretRef:
        name: technitium-secrets
        key: PFX_PASSWORD
