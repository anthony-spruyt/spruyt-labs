---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "dns-secure-technitium"
  namespace: technitium
spec:
  secretName: "dns-secure"
  issuerRef:
    name: ${CLUSTER_ISSUER}
    kind: ClusterIssuer
  commonName: "dns-secure.lan.${EXTERNAL_DOMAIN}"
  dnsNames:
    - "dns.lan.${EXTERNAL_DOMAIN}"
    - "dns-secure.lan.${EXTERNAL_DOMAIN}"
  ipAddresses:
    - "192.168.50.33"
    - "2403:5812:7fff:74a::202"
    - "192.168.50.38"
    - "2403:5812:7fff:74a::203"
  keystores:
    pkcs12:
      create: true
      passwordSecretRef:
        name: technitium-cert-secrets
        key: PFX_PASSWORD
