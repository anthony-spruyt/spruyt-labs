# #yaml-language-server: $schema=TODO
# Default values for spegel: https://github.com/spegel-org/spegel/blob/main/charts/spegel/values.yaml
# Values documentation: https://artifacthub.io/packages/helm/spegel/spegel

resources:
  requests:
    memory: 128Mi
  limits:
    memory: 128Mi
serviceMonitor:
  enabled: true
grafanaDashboard:
  enabled: true
spegel:
  # -- Path to Containerd mirror configuration.
  # Talos doesn't use the usual /etc/containerd/certs.d directory for its CRI mirror config.
  # Instead Talos's Containerd integration reads host entries from /etc/cri/conf.d/hosts.
  containerdRegistryConfigPath: "/etc/cri/conf.d/hosts" # Default was "/etc/containerd/certs.d"
  resolveLatestTag: false # Default was true
  # -- When true enables debug web page.
  debugWebEnabled: false
verticalPodAutoscaler:
  maxAllowed:
    cpu: 10m
    memory: 128Mi
  minAllowed:
    cpu: 2m
    memory: 24Mi
