---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  chartRef:
    kind: OCIRepository
    name: spegel-ocirepo
    namespace: flux-system
  interval: 4h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: spegel
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: true
  valuesFrom:
    - kind: ConfigMap
      name: spegel-values
