---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minecraft-bedrock-restart
  namespace: minecraft
spec:
  schedule: "0 14 * * *" # 14:00 UTC = 1AM AEDT (UTC+11)
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          serviceAccountName: minecraft-maintenance
          containers:
            - name: restart-creative
              image: bitnami/kubectl:latest
              command:
                - kubectl
                - rollout
                - restart
                - deployment/minecraft-bedrock-creative-minecraft-bedrock
                - -n
                - minecraft
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                seccompProfile:
                  type: RuntimeDefault
            - name: restart-survival
              image: bitnami/kubectl:latest
              command:
                - kubectl
                - rollout
                - restart
                - deployment/minecraft-bedrock-survival-minecraft-bedrock
                - -n
                - minecraft
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                seccompProfile:
                  type: RuntimeDefault
          restartPolicy: OnFailure
