# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
fullnameOverride: bedrock-connect
defaultPodOptions:
  priorityClassName: low-priority
controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    containers:
      main:
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        image:
          repository: pugmatt/bedrock-connect
          tag: "1.63"
          pullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
          - name: bedrock-udp
            containerPort: 19132
            protocol: UDP
        env:
          - name: JAVA_TOOL_OPTIONS
            value: "-Djava.net.preferIPv4Stack=true"
        # Probes: Disabled - minimal container image has no shell/pgrep utilities
        # UDP-only service (Minecraft Bedrock protocol) with no HTTP/TCP endpoints
        # Kubernetes will still restart pod on process crash
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
configMaps:
  config:
    enabled: true
    data:
      custom_servers.json: |-
        [
          {
            "name": "Spruyt fam survival",
            "address": "mc1.lan.spruyt.xyz",
            "port": 19132
          },
          {
            "name": "Spruyt fam creative",
            "address": "mc2.lan.spruyt.xyz",
            "port": 19132
          }
        ]
      config.yml: |-
        custom_servers: /docker/brc/custom_servers.json
service:
  bedrockconnect:
    controller: main
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: "${BEDROCK_CONNECT_IP4}"
    ports:
      bedrock-udp:
        port: 19132
        enabled: true
        protocol: UDP
    externalTrafficPolicy: Local
persistence:
  config:
    enabled: true
    type: configMap
    name: bedrock-connect
    advancedMounts:
      main:
        main:
          - path: /docker/brc/custom_servers.json
            readOnly: true
            subPath: custom_servers.json
          - path: /docker/brc/config.yml
            readOnly: true
            subPath: config.yml
