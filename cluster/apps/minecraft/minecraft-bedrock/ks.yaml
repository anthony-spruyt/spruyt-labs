---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app minecraft-bedrock-creative
  namespace: flux-system
spec:
  targetNamespace: minecraft
  path: ./cluster/apps/minecraft/minecraft-bedrock/creative
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster-storage
  interval: 1h
  prune: true
  timeout: 5m
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app minecraft-bedrock-survival
  namespace: flux-system
spec:
  targetNamespace: minecraft
  path: ./cluster/apps/minecraft/minecraft-bedrock/survival
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster-storage
  interval: 1h
  prune: true
  timeout: 5m
