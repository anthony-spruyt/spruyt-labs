---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: minecraft
resources:
  - ./persistent-volume-claim.yaml
  - ./helm-release.yaml
configMapGenerator:
  - name: minecraft-bedrock-creative-values
    files:
      - values.yaml=./helm-values.yaml
generatorOptions:
  disableNameSuffixHash: false
  labels:
    kustomize.toolkit.fluxcd.io/substitute: "minecraftBedrockCreativeValuesConfigMapName"
