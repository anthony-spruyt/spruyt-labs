---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.3/persistentvolumeclaim.json
# Documentation: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#persistentvolumeclaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-bedrock-survival-v1
  namespace: minecraft
  finalizers:
    - kubernetes.io/pvc-protection
spec:
  storageClassName: rbd-fast
  #volumeName: pvc-bd0d339a-443b-4645-828b-0ffc6cf9654e
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
