---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: &app vaultwarden
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-labs-app-template
    namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: 1.34.3-alpine
            envFrom:
              - secretRef:
                  name: vaultwarden-secrets
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /alive
                    port: &port 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
          backups:
            # Restore with:
            #   gpg --decrypt backup.tar.xz.gpg > backup.tar.xz
            #   tar -xJvf ./backup/data.tar.xz -C /data/
            image:
              repository: bruceforce/vaultwarden-backup
              tag: 2.1.0
            envFrom:
              - secretRef:
                  name: vaultwarden-backup-secrets
    service:
      vaultwarden:
        controller: main
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: vaultwarden-data
        globalMounts:
          - path: /data
      backups:
        existingClaim: vaultwarden-backups
        globalMounts:
          - path: /backups
      tmp:
        type: emptyDir
    defaultPodOptions:
      annotations:
        secret.reloader.stakater.com/reload: *app
