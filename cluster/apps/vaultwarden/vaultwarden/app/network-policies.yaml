---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-dns-egress
  namespace: vaultwarden
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: vaultwarden
      app.kubernetes.io/name: vaultwarden
  egress:
    # Allow DNS to kube-dns Service on UDP/TCP 53
    - toServices:
        - k8sService:
            serviceName: kube-dns
            namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-icmps-egress
  namespace: vaultwarden
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: vaultwarden
      app.kubernetes.io/name: vaultwarden
  egress:
    - toCIDR:
        - ${CLUSTER_SVC_NETS_IP6}
      icmps:
        - fields:
            - family: IPv6
              type: DestinationUnreachable
        - fields:
            - family: IPv6
              type: PacketTooBig
        - fields:
            - family: IPv6
              type: TimeExceeded
        - fields:
            - family: IPv6
              type: ParameterProblem
        - fields:
            - family: IPv6
              type: EchoRequest
        - fields:
            - family: IPv6
              type: EchoReply
        - fields:
            - family: IPv6
              type: MulticastListenerQuery
        - fields:
            - family: IPv6
              type: MulticastListenerReport
        - fields:
            - family: IPv6
              type: MulticastListenerDone
        - fields:
            - family: IPv6
              type: RouterSolicitation
        - fields:
            - family: IPv6
              type: RouterAdvertisement
        - fields:
            - family: IPv6
              type: NeighborSolicitation
        - fields:
            - family: IPv6
              type: NeighborAdvertisement
        - fields:
            - family: IPv6
              type: RedirectMessage
        - fields:
            - family: IPv6
              type: RouterRenumbering
        - fields:
            - family: IPv6
              type: ICMPNodeInformationQuery
        - fields:
            - family: IPv6
              type: ICMPNodeInformationResponse
        - fields:
            - family: IPv6
              type: InverseNeighborDiscoverySolicitation
        - fields:
            - family: IPv6
              type: InverseNeighborDiscoveryAdvertisement
        - fields:
            - family: IPv6
              type: HomeAgentAddressDiscoveryRequest
        - fields:
            - family: IPv6
              type: HomeAgentAddressDiscoveryReply
        - fields:
            - family: IPv6
              type: MobilePrefixSolicitation
        - fields:
            - family: IPv6
              type: MobilePrefixAdvertisement
        - fields:
            - family: IPv6
              type: DuplicateAddressRequestCodeSuffix
        - fields:
            - family: IPv6
              type: DuplicateAddressConfirmationCodeSuffix
        - fields:
            - family: IPv6
              type: ExtendedEchoRequest
        - fields:
            - family: IPv6
              type: "ExtendedEcho Reply"
    - icmps:
        # IPv4 allowed types
        - fields:
            - family: IPv4
              type: EchoReply
        - fields:
            - family: IPv4
              type: DestinationUnreachable
        - fields:
            - family: IPv4
              type: Redirect
        - fields:
            - family: IPv4
              type: Echo
        - fields:
            - family: IPv4
              type: EchoRequest
        - fields:
            - family: IPv4
              type: RouterAdvertisement
        - fields:
            - family: IPv4
              type: RouterSelection
        - fields:
            - family: IPv4
              type: TimeExceeded
        - fields:
            - family: IPv4
              type: ParameterProblem
        - fields:
            - family: IPv4
              type: Timestamp
        - fields:
            - family: IPv4
              type: TimestampReply
        - fields:
            - family: IPv4
              type: Photuris
        - fields:
            - family: IPv4
              type: ExtendedEchoRequest
        - fields:
            - family: IPv4
              type: "ExtendedEcho Reply"
        # IPv6 allowed types
        - fields:
            - family: IPv6
              type: DestinationUnreachable
        - fields:
            - family: IPv6
              type: PacketTooBig
        - fields:
            - family: IPv6
              type: TimeExceeded
        - fields:
            - family: IPv6
              type: ParameterProblem
        - fields:
            - family: IPv6
              type: EchoRequest
        - fields:
            - family: IPv6
              type: EchoReply
        - fields:
            - family: IPv6
              type: MulticastListenerQuery
        - fields:
            - family: IPv6
              type: MulticastListenerReport
        - fields:
            - family: IPv6
              type: MulticastListenerDone
        - fields:
            - family: IPv6
              type: RouterSolicitation
        - fields:
            - family: IPv6
              type: RouterAdvertisement
        - fields:
            - family: IPv6
              type: NeighborSolicitation
        - fields:
            - family: IPv6
              type: NeighborAdvertisement
        - fields:
            - family: IPv6
              type: RedirectMessage
        - fields:
            - family: IPv6
              type: RouterRenumbering
        - fields:
            - family: IPv6
              type: ICMPNodeInformationQuery
        - fields:
            - family: IPv6
              type: ICMPNodeInformationResponse
        - fields:
            - family: IPv6
              type: InverseNeighborDiscoverySolicitation
        - fields:
            - family: IPv6
              type: InverseNeighborDiscoveryAdvertisement
        - fields:
            - family: IPv6
              type: HomeAgentAddressDiscoveryRequest
        - fields:
            - family: IPv6
              type: HomeAgentAddressDiscoveryReply
        - fields:
            - family: IPv6
              type: MobilePrefixSolicitation
        - fields:
            - family: IPv6
              type: MobilePrefixAdvertisement
        - fields:
            - family: IPv6
              type: DuplicateAddressRequestCodeSuffix
        - fields:
            - family: IPv6
              type: DuplicateAddressConfirmationCodeSuffix
        - fields:
            - family: IPv6
              type: ExtendedEchoRequest
        - fields:
            - family: IPv6
              type: "ExtendedEcho Reply"

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-brevo-smtp-egress
  namespace: vaultwarden
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: vaultwarden
      app.kubernetes.io/name: vaultwarden
  egress:
    - toEntities:
        - world
      toFQDNs:
        - matchName: smtp-relay.brevo.com
      toPorts:
        - ports:
            - port: "587"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-bitwarden-push-and-identity-egress
  namespace: vaultwarden
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: vaultwarden
      app.kubernetes.io/name: vaultwarden
  egress:
    - toEntities:
        - world
      toFQDNs:
        - matchName: push.bitwarden.com
        - matchName: identity.bitwarden.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Documentation: https://docs.cilium.io/en/latest/security/policy/index.html
apiVersion: cilium.io/v2
