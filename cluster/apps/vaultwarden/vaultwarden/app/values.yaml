---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: high-priority
controllers:
  main:
    type: statefulset
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
    initContainers:
      permissions:
        image:
          repository: busybox
          tag: "1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e"
        command:
          - sh
          - -c
          - |
            find /data -mindepth 1 -maxdepth 1 ! -name 'lost+found' -exec chown -R 1000:1000 {} \; || true
            if [ -d /data/lost+found ]; then
              chown 1000:1000 /data/lost+found 2>/dev/null || true
            fi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
            add: [CHOWN]
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 16Mi
    containers:
      main:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        image:
          repository: vaultwarden/server
          tag: testing-alpine@sha256:279a8c191d69df9791d63d062f360455ad35090d8da82d6c777fdb53527ae251
          pullPolicy: Always
        env:
          TZ: ${TIMEZONE}
        envFrom:
          - secretRef:
              name: vaultwarden-secrets
          - secretRef:
              name: vaultwarden-oauth-credentials
        # Probes: HTTP /alive endpoint for Vaultwarden health
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /alive
                port: &port 80
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 2Gi
service:
  vaultwarden:
    controller: main
    ports:
      http:
        port: *port
persistence:
  data:
    existingClaim: vaultwarden-data-v2
    globalMounts:
      - path: /data
  tmp:
    type: emptyDir
