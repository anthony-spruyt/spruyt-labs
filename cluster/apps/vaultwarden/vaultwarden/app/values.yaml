---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: high-priority
controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    # pod:
    #   annotations:
    #     backup.velero.io/backup-volumes: data
    containers:
      main:
        image:
          repository: vaultwarden/server
          tag: testing-alpine
          pullPolicy: Always
        env:
          TZ: ${TIMEZONE}
        envFrom:
          - secretRef:
              name: vaultwarden-secrets
          - secretRef:
              name: vaultwarden-oauth-credentials
        # Probes: HTTP /alive endpoint for Vaultwarden health
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /alive
                port: &port 80
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 2Gi
service:
  vaultwarden:
    controller: main
    ports:
      http:
        port: *port
persistence:
  data:
    existingClaim: vaultwarden-data-v2
    globalMounts:
      - path: /data
  tmp:
    type: emptyDir
