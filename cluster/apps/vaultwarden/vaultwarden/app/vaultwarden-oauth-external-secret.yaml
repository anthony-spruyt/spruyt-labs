---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Syncs Vaultwarden OAuth credentials from dedicated secret in authentik-system namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-oauth-credentials
  namespace: vaultwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vaultwarden-oauth-store
  target:
    name: vaultwarden-oauth-credentials
    creationPolicy: Owner
  data:
    - secretKey: SSO_CLIENT_ID
      remoteRef:
        key: authentik-vaultwarden-oauth
        property: VAULTWARDEN_OAUTH_CLIENT_ID
    - secretKey: SSO_CLIENT_SECRET
      remoteRef:
        key: authentik-vaultwarden-oauth
        property: VAULTWARDEN_OAUTH_CLIENT_SECRET
