---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: qdrant
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: qdrant
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: qdrant
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi
