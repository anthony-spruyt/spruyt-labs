---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: coder
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coder
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: coder
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 2Gi
