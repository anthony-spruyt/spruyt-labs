# Default values: https://github.com/coder/coder/blob/main/helm/coder/values.yaml
coder:
  annotations:
    reloader.stakater.com/auto: "true"
  env:
    - name: CODER_ACCESS_URL
      value: "https://code.${EXTERNAL_DOMAIN}"
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-cnpg-cluster-app
          key: uri
    - name: CODER_OIDC_ISSUER_URL
      value: "https://auth.${EXTERNAL_DOMAIN}/application/o/coder/"
    - name: CODER_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: coder-oauth-credentials
          key: CODER_OIDC_CLIENT_ID
    - name: CODER_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: coder-oauth-credentials
          key: CODER_OIDC_CLIENT_SECRET
    - name: CODER_OIDC_SIGN_IN_TEXT
      value: "Sign in with Authentik"
    - name: CODER_OIDC_SCOPES
      value: "openid,profile,email"
    - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
      value: "false"
    - name: CODER_PROMETHEUS_ENABLE
      value: "true"
    - name: CODER_PROMETHEUS_ADDRESS
      value: "0.0.0.0:2112"
    # Disable external STUN — use built-in DERP relay only
    # CODER_DERP_SERVER_RELAY_URL is set automatically by the chart using pod IP
    - name: CODER_DERP_SERVER_STUN_ADDRESSES
      value: "disable"
  image:
    repo: "ghcr.io/coder/coder"
    tag: "v2.33.8@sha256:d7233808a41ed5d370be3afe7a70f78c818c5611bc3dc465496cf6b5f7c00ad3"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  service:
    type: ClusterIP
  serviceAccount:
    workspaceNamespaces:
      - name: coder-workspaces
        workspacePerms: true
        enableDeployments: true
