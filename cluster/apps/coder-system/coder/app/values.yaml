coder:
  env:
    - name: CODER_ACCESS_URL
      value: "https://code.${EXTERNAL_DOMAIN}"
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-cnpg-cluster-app
          key: uri
    - name: CODER_OIDC_ISSUER_URL
      value: "https://auth.${EXTERNAL_DOMAIN}/application/o/coder/"
    - name: CODER_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: coder-oauth-credentials
          key: CODER_OIDC_CLIENT_ID
    - name: CODER_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: coder-oauth-credentials
          key: CODER_OIDC_CLIENT_SECRET
    - name: CODER_OIDC_SIGN_IN_TEXT
      value: "Sign in with Authentik"
    - name: CODER_OIDC_SCOPES
      value: "openid,profile,email"
    - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
      value: "false"
    - name: CODER_PROMETHEUS_ENABLE
      value: "true"
    - name: CODER_PROMETHEUS_ADDRESS
      value: "0.0.0.0:2112"
    # Disable STUN — use built-in DERP relay only (avoids UDP egress issues)
    - name: CODER_DERP_SERVER_STUN_ADDRESSES
      value: "disable"
    # Health check can't reach external URL from inside cluster (hairpin)
    - name: CODER_HEALTH_CHECK_THRESHOLD_DATABASE
      value: "15s"
  service:
    type: ClusterIP
