---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
spec:
  chart:
    spec:
      chart: coder
      version: "2.32.0"
      sourceRef:
        kind: HelmRepository
        name: coder-charts
        namespace: flux-system
  interval: 4h
  valuesFrom:
    - kind: ConfigMap
      name: coder-values
  # Inject hostAliases so Coder resolves code.spruyt.xyz to Traefik LB internally
  # (avoids Cloudflare hairpin for health checks and DERP)
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: coder
            patch: |
              - op: add
                path: /spec/template/spec/hostAliases
                value:
                  - ip: "${TRAEFIK_IP4}"
                    hostnames:
                      - "code.${EXTERNAL_DOMAIN}"
