---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app coder-template-sync
  namespace: flux-system
  labels:
    # Terraform template sources use ${...} interpolation with nested quotes
    # that cannot be escaped via $$ without breaking HCL string parsing.
    substitution.flux.home.arpa/disabled: "true"
spec:
  targetNamespace: coder-system
  path: ./cluster/apps/coder-system/coder-template-sync/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: coder
  prune: true
  force: true
  timeout: 5m
  wait: false
