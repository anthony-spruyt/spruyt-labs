---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: coder-template-push
  namespace: coder-system
spec:
  targetRef:
    apiVersion: batch/v1
    kind: Job
    name: coder-template-push
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: push
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: coder-token-rotation
  namespace: coder-system
spec:
  targetRef:
    apiVersion: batch/v1
    kind: CronJob
    name: coder-token-rotation
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: rotate
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 200m
          memory: 256Mi
