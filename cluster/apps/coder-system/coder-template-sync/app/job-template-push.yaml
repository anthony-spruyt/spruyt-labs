---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/job-batch-v1.json
apiVersion: batch/v1
kind: Job
metadata:
  name: coder-template-push
  annotations:
    # Flux deletes+recreates on spec change (Job fields are immutable).
    # Paired with the kustomizeconfig nameReference that rewrites the
    # Job's volume configMap name to the hashed template ConfigMap,
    # any main.tf change flips the name, triggers a spec diff, and
    # force-recreates the Job. Fixes #966.
    # Value MUST be "Enabled" per Flux docs — "true" is ignored.
    kustomize.toolkit.fluxcd.io/force: "Enabled"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coder-template-push
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: coder-template-sync
      automountServiceAccountToken: false
      restartPolicy: Never
      containers:
        - name: push
          image: ghcr.io/anthony-spruyt/coder-gitops:1.0.9@sha256:9d658c4502c2eed161e8bbcd11c6910e81f12b233feb9603e720ea5bb4a85ba6
          command: ["/usr/local/bin/push-templates.sh"]
          env:
            - name: CODER_URL
              value: "http://coder.coder-system.svc.cluster.local"
            - name: CODER_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: coder-gitops-bot-token
                  key: token
            - name: HOME
              value: /home/coder
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: templates
              mountPath: /templates
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/coder
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: templates
          configMap:
            name: coder-templates
            items:
              - key: devcontainer__main.tf
                path: devcontainer/main.tf
              - key: devcontainer__README.md
                path: devcontainer/README.md
              - key: spruyt-labs__main.tf
                path: spruyt-labs/main.tf
              - key: spruyt-labs__README.md
                path: spruyt-labs/README.md
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: home
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
