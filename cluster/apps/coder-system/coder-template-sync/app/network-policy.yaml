---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: coder-template-sync-egress
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - coder-template-push
          - coder-token-rotation
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: coder-system
            k8s:app.kubernetes.io/name: coder
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Coder pod must explicitly allow ingress from the sync workloads on 8080.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-template-sync-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: coder
  ingress:
    - fromEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values: ["coder-system"]
            - key: k8s:app.kubernetes.io/name
              operator: In
              values: ["coder-template-push", "coder-token-rotation"]
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
