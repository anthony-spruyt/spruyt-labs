---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./rbac.yaml
  - ./secret-bootstrap.sops.yaml
  - ./job-template-push.yaml
  - ./cronjob-token-rotation.yaml
  - ./network-policy.yaml
  - ./vpa.yaml
configMapGenerator:
  - name: coder-templates
    # Flat keys (ConfigMap data keys cannot contain "/"); Job mounts with
    # items[].path to restore the templates/<name>/ layout expected by
    # push-templates.sh.
    files:
      - devcontainer__main.tf=./templates/devcontainer/main.tf
      - devcontainer__README.md=./templates/devcontainer/README.md
      - devcontainer__.terraform.lock.hcl=./templates/devcontainer/.terraform.lock.hcl
configurations:
  - ./kustomizeconfig.yaml
