---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: coder-token-rotation
spec:
  schedule: "0 2 */3 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: coder-token-rotation
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: coder-token-rotation
          automountServiceAccountToken: true
          restartPolicy: Never
          containers:
            - name: rotate
              image: ghcr.io/anthony-spruyt/coder-gitops:1.0.16@sha256:e2eaa2ac04335f0c232647e1645e2a187911305ecde469c42c0f155a9cc7fec7
              command: ["/usr/local/bin/rotate-token.sh"]
              env:
                - name: CODER_URL
                  value: "http://coder.coder-system.svc.cluster.local"
                - name: CODER_SESSION_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: coder-gitops-bot-token
                      key: token
                - name: SECRET_NAME
                  value: coder-gitops-bot-token
                - name: SECRET_NAMESPACE
                  value: coder-system
                - name: SECRET_KEY
                  value: token
                - name: TOKEN_LIFETIME
                  value: "168h"
                - name: TOKEN_NAME_PREFIX
                  value: "gitops-bot"
                - name: HOME
                  value: /home/coder
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: home
                  mountPath: /home/coder
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 32Mi
            - name: home
              emptyDir:
                medium: Memory
                sizeLimit: 32Mi
