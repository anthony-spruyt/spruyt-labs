---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-mcp-config
data:
  mcp.json: |
    {
      "mcpServers": {
        "agentmemory": {
          "type": "stdio",
          "command": "npx",
          "args": ["-y", "@agentmemory/mcp"],
          "env": {
            "AGENTMEMORY_URL": "$${AGENTMEMORY_URL}",
            "AGENTMEMORY_SECRET": "$${AGENTMEMORY_SECRET}",
            "SAFE_CHAIN_LOGGING": "silent"
          }
        },
        "agentplatform": {
          "type": "http",
          "url": "http://n8n-webhook.n8n-system.svc:8080/mcp/agent-platform",
          "headers": {
            "Authorization": "Bearer $${AGENT_PLATFORM_MCP_AUTH_TOKEN}",
            "X-MCP-Job-ID": "$${JOB_ID}",
            "X-MCP-Session-Token": "$${SESSION_TOKEN}"
          }
        },
        "bravesearch": {
          "type": "http",
          "url": "http://brave-search-mcp.brave-search-mcp.svc:8000/mcp"
        },
        "context7": {
          "type": "http",
          "url": "https://mcp.context7.com/mcp",
          "headers": {
            "CONTEXT7_API_KEY": "$${CONTEXT7_API_KEY}"
          }
        }
      }
    }
