# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
# Probes: Not configured - irqbalance is a system daemon with no health endpoint
# Kubernetes will restart pod on process crash
controllers:
  fstrim:
    type: daemonset
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/irqbalance
          tag: 1.9.4
          pullPolicy: IfNotPresent
        env:
          IRQBALANCE_DEBUG: false
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            memory: 128Mi
        securityContext:
          privileged: true
defaultPodOptions:
  priorityClassName: critical-infrastructure
  hostIPC: true
  hostPID: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["e2-1", "e2-2", "e2-3"]
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
persistence:
  run:
    type: emptyDir
    globalMounts:
      - path: /run/irqbalance
