# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
# Probes: Not configured - irqbalance is a system daemon with no health endpoint
# Kubernetes will restart pod on process crash
controllers:
  fstrim:
    type: daemonset
    initContainers:
      tune-rss:
        image:
          repository: nicolaka/netshoot
          tag: v0.13
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            echo "Configuring RSS for enp89s0..."
            ethtool -X enp89s0 equal 4 && echo "RSS configured successfully" || echo "RSS configuration failed (may not be supported)"
        # One-time ethtool command - minimal resources
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 32Mi
        securityContext:
          privileged: true
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/irqbalance
          tag: 1.9.4
          pullPolicy: IfNotPresent
        env:
          # See: https://gist.github.com/gavinmcfall/ea6cb1233d3a300e9f44caf65a32d519
          IRQBALANCE_BANNED_CPULIST: 8-15 # 8-15 are E-cores
          IRQBALANCE_DEBUG: false
        # P99 0.5m per pod - minimal steady-state usage
        resources:
          requests:
            cpu: 5m
            memory: 128Mi
          limits:
            memory: 128Mi
        securityContext:
          privileged: true
defaultPodOptions:
  priorityClassName: critical-infrastructure
  hostIPC: true
  hostPID: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["ms-01-1", "ms-01-2", "ms-01-3"]
persistence:
  run:
    type: emptyDir
    globalMounts:
      - path: /run/irqbalance
