---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: low-priority
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
controllers:
  github-mcp-server:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/github/github-mcp-server
          tag: v0.33.0@sha256:a9dd39eec67f09ded51631c79641dd72acb4945c6391df47824fa2d508b5431b
          pullPolicy: IfNotPresent
        args:
          - "http"
          - "--port"
          - "8083"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8083
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8083
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8083
              failureThreshold: 30
              periodSeconds: 5
      auth-proxy:
        image:
          repository: caddy
          tag: 2.11.2-alpine@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa
          pullPolicy: IfNotPresent
        args:
          - "caddy"
          - "run"
          - "--config"
          - "/etc/caddy/Caddyfile"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            memory: 64Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8082
              periodSeconds: 30
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8082
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8082
              failureThreshold: 30
              periodSeconds: 5
service:
  app:
    controller: github-mcp-server
    ports:
      http:
        port: 8082
persistence:
  caddyfile:
    type: configMap
    name: github-mcp-caddyfile
    advancedMounts:
      github-mcp-server:
        auth-proxy:
          - path: /etc/caddy/Caddyfile
            subPath: Caddyfile
            readOnly: true
  github-pat:
    type: secret
    name: github-mcp-credentials
    advancedMounts:
      github-mcp-server:
        auth-proxy:
          - path: /etc/secrets/github-pat
            subPath: GITHUB_PERSONAL_ACCESS_TOKEN
            readOnly: true
  caddy-data:
    type: emptyDir
    medium: Memory
    sizeLimit: 10Mi
    advancedMounts:
      github-mcp-server:
        auth-proxy:
          - path: /data
          - path: /config
