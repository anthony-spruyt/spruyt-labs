---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whoami
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-labs-app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
  # yaml-language-server: $schema=https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.schema.json
  values:
    controllers:
      main:
        replicas: 2
        containers:
          main:
            image:
              repository: docker.io/traefik/whoami
              tag: v1.11.0
            resources:
              requests:
                cpu: 1m
                memory: 16Mi
              limits:
                cpu: 5m
                memory: 32Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
