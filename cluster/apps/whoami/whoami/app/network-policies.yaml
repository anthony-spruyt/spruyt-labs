---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# CiliumNetworkPolicy for whoami app - test policy for dashboard validation
# INTENTIONALLY WRONG: Using port 8080 instead of 80 to generate policy drops for testing
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: whoami
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: whoami
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: traefik
            io.kubernetes.pod.namespace: traefik-system
      toPorts:
        - ports:
            # INTENTIONALLY WRONG PORT (should be 80) - to test policy drop monitoring
            - port: "8080"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-dns-egress
  namespace: whoami
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: whoami
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
