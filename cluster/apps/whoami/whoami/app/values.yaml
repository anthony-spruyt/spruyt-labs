---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
controllers:
  whoami:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: whoami
    replicas: 1
    containers:
      whoami:
        image:
          repository: docker.io/traefik/whoami
          tag: v1.11.0
          pullPolicy: IfNotPresent
        # Tier 3 - no CPU limit (was 25-80% throttled)
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 64Mi
service:
  whoami:
    controller: whoami
    ports:
      http:
        port: 80
