---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow DNS egress to kube-dns
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-dns-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: chrony
      app.kubernetes.io/instance: chrony
      app.kubernetes.io/name: chrony
  egress:
    - toServices:
        - k8sService:
            serviceName: kube-dns
            namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow NTP egress to upstream time servers
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ntp-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: chrony
      app.kubernetes.io/instance: chrony
      app.kubernetes.io/name: chrony
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "123"
              protocol: UDP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow NTS egress for Network Time Security authentication
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-nts-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: chrony
      app.kubernetes.io/instance: chrony
      app.kubernetes.io/name: chrony
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "4460"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow NTP ingress from world (LoadBalancer serves local network clients)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ntp-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: chrony
      app.kubernetes.io/instance: chrony
      app.kubernetes.io/name: chrony
  ingress:
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "123"
              protocol: UDP
