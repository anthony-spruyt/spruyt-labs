---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
fullnameOverride: &name chrony
controllers:
  chrony:
    annotations:
      reloader.stakater.com/auto: "true"
    type: deployment
    replicas: 3
    strategy: RollingUpdate
    pod:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: *name
    containers:
      chrony:
        image:
          repository: dockurr/chrony
          tag: 4.8
          pullPolicy: IfNotPresent
        ports:
          - containerPort: 123
            protocol: UDP
        env:
          - name: "NTP_SERVERS"
            value: "time.cloudflare.com"
          - name: "TZ"
            value: ${TIMEZONE}
          - name: "ENABLE_SYSCLK"
            value: "false"
          - name: ENABLE_NTS
            value: "true"
          - name: LOG_LEVEL
            value: "1" #  0 (informational), 1 (warning), 2 (non-fatal error), and 3 (fatal error).
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    chronyc waitsync 15           \
                    && exit 0 || exit 1
              initialDelaySeconds: 5
              periodSeconds: 15
              failureThreshold: 2
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    chronyc sources -n           \
                    | awk '$1 == "*" { exit 0 }  \
                          END { exit 1 }'
              initialDelaySeconds: 20
              periodSeconds: 60
              timeoutSeconds: 5
              failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            cpu: 500m
            memory: 64Mi
service:
  chrony:
    controller: *name
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      metallb.io/loadBalancerIPs: "${LB_IP4_NTP}"
    ports:
      ntp:
        port: 123
        protocol: UDP
