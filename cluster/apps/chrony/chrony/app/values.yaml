---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
fullnameOverride: &name chrony
defaultPodOptions:
  priorityClassName: high-priority
controllers:
  chrony:
    annotations:
      reloader.stakater.com/auto: "true"
    type: deployment
    replicas: 3
    strategy: Recreate
    pod:
      securityContext:
        runAsNonRoot: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: *name
    containers:
      chrony:
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
            add: [CHOWN, DAC_OVERRIDE, SETUID, SETGID, NET_BIND_SERVICE]
        image:
          repository: dockurr/chrony
          tag: 4.8
          pullPolicy: IfNotPresent
        ports:
          - containerPort: 123
            protocol: UDP
        env:
          - name: "NTP_SERVERS"
            value: "time.cloudflare.com"
          - name: "TZ"
            value: ${TIMEZONE}
          - name: "ENABLE_SYSCLK"
            value: "false"
          - name: ENABLE_NTS
            value: "true"
          - name: LOG_LEVEL
            value: "1" #  0 (informational), 1 (warning), 2 (non-fatal error), and 3 (fatal error).
        # Probes: Readiness only - liveness intentionally disabled
        # chrony can temporarily lose NTP sync during network issues but shouldn't restart
        # (restarts would cause time discontinuities)
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    chronyc waitsync 15           \
                    && exit 0 || exit 1
              initialDelaySeconds: 5
              periodSeconds: 15
              failureThreshold: 2
          # liveness: intentionally disabled - see comment above
          #   enabled: true
          #   custom: true
          #   spec:
          #     exec:
          #       command:
          #         - sh
          #         - -c
          #         - |
          #           chronyc waitsync 15           \
          #           && exit 0 || exit 1
          #     initialDelaySeconds: 20
          #     periodSeconds: 60
          #     timeoutSeconds: 5
          #     failureThreshold: 3
        # Tier 1 critical infrastructure - no CPU limit (P99: 13m, +23% headroom)
        resources:
          requests:
            cpu: 16m
            memory: 10Mi
          limits:
            memory: 64Mi
service:
  chrony:
    controller: *name
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      lbipam.cilium.io/ips: "${NTP_IP4}"
    ports:
      ntp:
        port: 123
        protocol: UDP
