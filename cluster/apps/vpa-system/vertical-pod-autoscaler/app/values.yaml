# Default values for vertical-pod-autoscaler
# Chart: https://github.com/cowboysysop/charts/tree/master/charts/vertical-pod-autoscaler

crds:
  # CRDs managed via Talos extraManifests (talos/patches/control-plane/extra-manifests.yaml)
  enabled: false

admissionController:
  priorityClassName: high-priority
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

recommender:
  priorityClassName: high-priority
  extraArgs:
    pod-recommendation-min-cpu-millicores: 1
    pod-recommendation-min-memory-mb: 10
    storage: prometheus
    prometheus-address: http://vmsingle-victoria-metrics-k8s-stack.observability.svc:8428
    prometheus-cadvisor-job-name: kubelet
    history-length: 14d
    container-pod-name-label: pod
    container-name-label: container
    pod-namespace-label: namespace
    pod-name-label: pod
    metric-for-pod-labels: "kube_pod_labels{job=\"kube-state-metrics\"}[8d]"
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 1024Mi

updater:
  priorityClassName: high-priority
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 1024Mi
