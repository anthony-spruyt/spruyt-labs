---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vertical-pod-autoscaler-admission-controller
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vertical-pod-autoscaler-admission-controller
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: admission-controller
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 512Mi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vertical-pod-autoscaler-recommender
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vertical-pod-autoscaler-recommender
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: recommender
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 1024Mi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vertical-pod-autoscaler-updater
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vertical-pod-autoscaler-updater
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: updater
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          memory: 1024Mi
