---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app external-dns-technitium
  namespace: flux-system
spec:
  targetNamespace: external-dns
  path: ./cluster/apps/external-dns/external-dns-technitium/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: technitium
  prune: true
  timeout: 5m
  wait: true
