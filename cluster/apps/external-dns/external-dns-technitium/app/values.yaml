---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kubernetes-sigs/external-dns/refs/heads/master/charts/external-dns/values.schema.json
# Documentation: https://github.com/kubernetes-sigs/external-dns/tree/master/charts/external-dns#values
# Default values: https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml
resources:
  limits:
    # cpu: 100m
    memory: 96Mi
  requests:
    cpu: 5m
    memory: 32Mi
provider:
  name: rfc2136
extraArgs:
  - --rfc2136-host=${TECHNITIUM_IP4}
  - --rfc2136-port=53
  - --rfc2136-zone=lan.${EXTERNAL_DOMAIN}
  - --rfc2136-zone=${EXTERNAL_DOMAIN}
  - --rfc2136-tsig-secret-alg=hmac-sha256
  - --rfc2136-tsig-axfr
  - --source=traefik-proxy
env:
  - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
    valueFrom:
      secretKeyRef:
        name: external-dns-technitium-secrets
        key: EXTERNAL_DNS_RFC2136_TSIG_SECRET
  - name: EXTERNAL_DNS_RFC2136_TSIG_KEYNAME
    valueFrom:
      secretKeyRef:
        name: external-dns-technitium-secrets
        key: EXTERNAL_DNS_RFC2136_TSIG_KEYNAME
interval: 2m
sources:
  - crd
  - service
  - ingress
  - traefik-proxy
  - gateway-grpcroute
  - gateway-httproute
  - gateway-tlsroute
  - gateway-udproute
  - gateway-tcproute
policy: sync
txtPrefix: external-dns-
txtOwnerId: k8s
domainFilters:
  - "lan.${EXTERNAL_DOMAIN}"
  - "${EXTERNAL_DOMAIN}"
serviceMonitor:
  enabled: true
deploymentAnnotations:
  reloader.stakater.com/auto: "true"
