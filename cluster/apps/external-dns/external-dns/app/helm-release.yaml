---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns
  namespace: external-dns
spec:
  interval: 1h
  chart:
    spec:
      chart: *app
      version: 1.18.0
      sourceRef:
        kind: HelmRepository
        name: kubernetes-sigs-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    cleanupOnFail: true
  rollback:
    timeout: 10m
    recreate: true
    cleanupOnFail: true
  #uninstall:
  #  keepHistory: false
  #driftDetection:
  #  mode: enabled
  #maxHistory: 3
  valuesFrom:
    - kind: ConfigMap
      name: external-dns-values
