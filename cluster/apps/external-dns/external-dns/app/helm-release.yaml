---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 1h
  chart:
    spec:
      # TODO:renovate
      chart: external-dns
      version: 1.18.0
      sourceRef:
        kind: HelmRepository
        name: kubernetes-sigs-charts
        namespace: flux-system
  #install:
  #  remediation: # perform remediation when helm install fails
  #    retries: 3
  #upgrade:
  #  remediation: # perform remediation when helm upgrade fails
  #    retries: 3
  #  cleanupOnFail: true
  #uninstall:
  #  keepHistory: false
  #driftDetection:
  #  mode: enabled
  #maxHistory: 3
  # Documentation: https://github.com/kubernetes-sigs/external-dns/tree/master/charts/external-dns#values
  values:
    provider:
      name: rfc2136
    extraArgs:
      - --rfc2136-host=${LB_IP_TECHNITIUM}
      - --rfc2136-port=53
      - --rfc2136-zone=lan.${EXTERNAL_DOMAIN}
      - --rfc2136-tsig-secret-alg=hmac-sha256
      - --rfc2136-tsig-keyname=external-dns
      - --rfc2136-tsig-axfr
    envFrom:
      - secretRef:
          name: external-dns-secrets
    #interval: 2m
    #sources:
    #  - ingress
    #  - service
    #  - crd
    #policy: sync
    #txtPrefix: "k8s."
    #txtOwnerId: default
    #domainFilters:
    #  - "${SECRET_DOMAIN}"
    #resources:
    #  requests:
    #    memory: 100Mi
    #    cpu: 25m
    #  limits:
    #    memory: 250Mi
