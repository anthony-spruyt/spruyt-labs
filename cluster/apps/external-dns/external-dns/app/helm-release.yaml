---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 1h
  chart:
    spec:
      # TODO:renovate
      chart: external-dns
      version: 1.18.0
      sourceRef:
        kind: HelmRepository
        name: kubernetes-sigs-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    cleanupOnFail: true
  rollback:
    timeout: 10m
    recreate: true
    cleanupOnFail: true
  #uninstall:
  #  keepHistory: false
  #driftDetection:
  #  mode: enabled
  #maxHistory: 3
  # yaml-language-server: $schema=https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.schema.json
  # Documentation: https://github.com/kubernetes-sigs/external-dns/tree/master/charts/external-dns#values
  # Default values: https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml
  values:
    # -- [Resources](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/) for the `external-dns` container.
    resources:
      limits:
        cpu: 100m
        memory: 96Mi
      requests:
        cpu: 5m
        memory: 32Mi

    provider:
      name: rfc2136
    extraArgs:
      - --rfc2136-host=${LB_IP4_TECHNITIUM}
      - --rfc2136-port=53
      - --rfc2136-zone=lan.${EXTERNAL_DOMAIN}
      - --rfc2136-tsig-secret-alg=hmac-sha256
      - --rfc2136-tsig-keyname=external-dns
      - --rfc2136-tsig-axfr
      - --source=traefik-proxy
      - --traefik-disable-legacy
    env:
      - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
        valueFrom:
          secretKeyRef:
            name: external-dns-secrets
            key: EXTERNAL_DNS_RFC2136_TSIG_SECRET
    interval: 2m
    sources:
      - crd
      - service
      - ingress
      - traefik-proxy
      #- gateway-grpcroute
      #- gateway-httproute
      #- gateway-tlsroute
      #- gateway-udproute
      #- gateway-tcproute
    policy: sync
    txtPrefix: external-dns-
    txtOwnerId: k8s
    domainFilters:
      - "lan.${EXTERNAL_DOMAIN}"
    serviceMonitor:
      enabled: true
