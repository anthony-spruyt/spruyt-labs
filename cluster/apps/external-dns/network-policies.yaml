---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external-dns
  namespace: external-dns
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  egress:
    # Kube-apiserver: watch Services, Ingresses, TraefikProxy, Gateway resources
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # RFC2136 DNS UPDATE to Technitium (via LoadBalancer IP)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "53"
              protocol: TCP
  ingress:
    # Metrics scraping from vmagent
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "7979"
              protocol: TCP
