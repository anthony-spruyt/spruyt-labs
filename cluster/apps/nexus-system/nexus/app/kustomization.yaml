---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./nexus-admin.sops.yaml
  - ./nexus-secrets-key.sops.yaml
  - ./nexus-upstream-creds.sops.yaml
  - ./nexus-workspace-clients.sops.yaml
  - ./persistent-volume-claim.yaml
  - ./release.yaml
  - ./provision-repos-rbac.yaml
  - ./provision-repos-job.yaml
  - ./network-policies.yaml
  - ./vpa.yaml
  - ./pod-monitor.yaml
configMapGenerator:
  - name: nexus-values
    namespace: nexus-system
    files:
      - values.yaml
  - name: nexus-provisioner-script
    namespace: nexus-system
    files:
      - provision.sh
  # Bootstrap script is referenced from inside the app-template values file,
  # which kustomize cannot rewrite — so disable the hash suffix and rely on
  # stakater/reloader (already annotated on the statefulset) to restart the
  # pod when content changes.
  - name: nexus-bootstrap-script
    namespace: nexus-system
    files:
      - bootstrap.sh
    options:
      disableNameSuffixHash: true
configurations:
  - ./kustomizeconfig.yaml
