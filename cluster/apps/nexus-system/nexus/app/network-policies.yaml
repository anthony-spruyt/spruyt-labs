---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: nexus-default
  namespace: nexus-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nexus
  ingress:
    # Coder workspace envbuilder pods (labeled com.coder.resource: "true" by the template)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: coder-workspaces
            k8s:com.coder.resource: "true"
      toPorts:
        - ports:
            - {port: "8081", protocol: TCP}
            - {port: "8082", protocol: TCP}
            - {port: "8083", protocol: TCP}
    # Traefik pods (for external ingress)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
            k8s:app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - {port: "8081", protocol: TCP}
            - {port: "8082", protocol: TCP}
            - {port: "8083", protocol: TCP}
    # vmagent metrics scrape
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports: [{port: "8081", protocol: TCP}]
    # Provisioning Job in-namespace
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: nexus-system
            k8s:app.kubernetes.io/name: nexus-provisioner
      toPorts:
        - ports: [{port: "8081", protocol: TCP}]
    # claude-agent write pods — pre-commit npm/pypi pulls (issue #1880)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: claude-agents-spruyt-labs-write
            k8s:managed-by: n8n-claude-code
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: claude-agents-write
            k8s:managed-by: n8n-claude-code
      toPorts:
        - ports: [{port: "8081", protocol: TCP}]
  egress:
    - toEntities: ["world"]
      toPorts:
        - ports:
            - {port: "443", protocol: TCP}
            - {port: "80", protocol: TCP}
