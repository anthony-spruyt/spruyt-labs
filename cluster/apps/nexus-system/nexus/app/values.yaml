---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.6.2/charts/library/common/values.schema.json

defaultPodOptions:
  priorityClassName: standard

controllers:
  main:
    type: statefulset
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        runAsUser: 200
        runAsGroup: 200
        fsGroup: 200
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
    containers:
      main:
        securityContext:
          runAsUser: 200
          runAsGroup: 200
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        image:
          # renovate: datasource=docker depName=sonatype/nexus3
          repository: sonatype/nexus3
          tag: "3.91.0@sha256:5788b8873cdcda22835e30293a85545e109430dab94aa3e5717bb978e2883003"
        env:
          TZ:
            value: "${TIMEZONE}"
          INSTALL4J_ADD_VM_PARAMS:
            value: >-
              -Xms1200m -Xmx1200m -XX:MaxDirectMemorySize=2g
              -Dkaraf.startLocalConsole=false
              -Djava.util.prefs.userRoot=/nexus-data/javaprefs
        ports:
          - name: http
            containerPort: 8081
            protocol: TCP
          - name: docker-group
            containerPort: 8082
            protocol: TCP
          - name: docker-cache
            containerPort: 8083
            protocol: TCP
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet: {path: /service/rest/v1/status, port: 8081}
              initialDelaySeconds: 60
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness: *probes
          startup:
            enabled: true
            custom: true
            spec:
              httpGet: {path: /service/rest/v1/status, port: 8081}
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 60
        resources:
          requests: {cpu: 250m, memory: 2Gi}
          limits: {memory: 4Gi}
      # Bootstrap sidecar: the official sonatype/nexus3 image does NOT honor
      # NEXUS_SECURITY_INITIAL_PASSWORD. On a fresh PVC Nexus writes a random
      # password to /nexus-data/admin.password. This sidecar waits for it,
      # promotes the desired admin user (from the nexus-admin secret) to
      # nx-admin, disables the built-in "admin" user, writes a marker, and
      # idles. Subsequent restarts no-op via the marker.
      bootstrap:
        securityContext:
          runAsUser: 200
          runAsGroup: 200
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        image:
          # renovate: datasource=docker depName=alpine/curl
          repository: alpine/curl
          tag: "8.14.1@sha256:9cb587777e2693ca3817d3086ce22bde3fda1990d03cf9dc716eaf844f9f8fc6"
        command: ["/bin/sh", "/scripts/bootstrap.sh"]
        env:
          NEXUS_USER:
            valueFrom:
              secretKeyRef:
                name: nexus-admin
                key: admin-username
          NEXUS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: nexus-admin
                key: admin-password
        probes:
          liveness: {enabled: false}
          readiness: {enabled: false}
          startup: {enabled: false}
        resources:
          requests: {cpu: 10m, memory: 16Mi}
          limits: {cpu: 100m, memory: 64Mi}

service:
  nexus:
    controller: main
    ports:
      http:
        port: 8081
      docker-group:
        port: 8082
      docker-cache:
        port: 8083

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 100Gi
    storageClass: ceph-block
    globalMounts:
      - path: /nexus-data
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  bootstrap-script:
    type: configMap
    name: nexus-bootstrap-script
    defaultMode: 0755
    advancedMounts:
      main:
        bootstrap:
          - path: /scripts
            readOnly: true
