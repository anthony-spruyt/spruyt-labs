# TEMPLATE for cluster/apps/nexus-system/nexus/app/nexus-workspace-clients.sops.yaml
# Ref #976.
#
# Holds credentials for the Nexus-local "workspace-client" users that Coder
# workspaces authenticate as when pulling/pushing via the docker-group and
# envbuilder-cache repos. Plural name anticipates future user types:
#   - puller   (nx-anonymous role, read-only, consumed now)
#   - pusher   (custom role with envbuilder-cache write, future)
#
# USER STEPS before pushing:
#   1. Generate the puller password:
#        PULLER_PASS=$(openssl rand -base64 32 | tr -d '=+/' | cut -c1-32)
#   2. Copy this template to the sops path and substitute:
#        cp nexus-workspace-clients.sops.yaml.template nexus-workspace-clients.sops.yaml
#        sed -i "s|<PULLER_PASSWORD>|$PULLER_PASS|g" nexus-workspace-clients.sops.yaml
#   3. Encrypt in place:
#        sops -e -i cluster/apps/nexus-system/nexus/app/nexus-workspace-clients.sops.yaml
#   4. Delete this .template file:
#        rm nexus-workspace-clients.sops.yaml.template
#
# The same PULLER_PASS value must also land in the workspace-side secret
# coder-workspace-nexus-clients as `workspace-puller:<pass>` base64.
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-workspace-clients
  namespace: nexus-system
type: Opaque
stringData:
  puller-password: <PULLER_PASSWORD>
