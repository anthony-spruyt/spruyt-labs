---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nexus
  namespace: nexus-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: nexus
  updatePolicy:
    updateMode: "Initial"
  resourcePolicy:
    containerPolicies:
      - containerName: main
        controlledValues: "RequestsOnly"
        minAllowed: {cpu: 1m, memory: 1Mi}
        maxAllowed: {memory: 4Gi}
      - containerName: bootstrap
        controlledValues: "RequestsOnly"
        minAllowed: {cpu: 1m, memory: 1Mi}
        maxAllowed: {cpu: 100m, memory: 64Mi}
