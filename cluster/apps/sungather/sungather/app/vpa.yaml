---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: sungather
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sungather
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: app
        minAllowed:
          cpu: 20m
          memory: 32Mi
        maxAllowed:
          cpu: 200m
          memory: 64Mi
