---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: standard
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
# TODO: Add HTTP probes on port 8099 once app is stable
controllers:
  sungather:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    containers:
      app:
        image:
          repository: bohdans/sungather
          tag: v@sha256:58304729d98e221be01f4fcd796f1200793fe958577b3b838893732034fd9169
          pullPolicy: IfNotPresent
        env:
          TZ: ${TIMEZONE}
        # standard: CPU limit 5-10x request per resource policy
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
persistence:
  config:
    type: emptyDir
    globalMounts:
      - path: /config
  logs:
    type: emptyDir
    globalMounts:
      - path: /logs
  sungather-config:
    type: secret
    name: sungather-secrets
    advancedMounts:
      sungather:
        app:
          - path: /config/config.yaml
            subPath: config.yaml
            readOnly: true
service:
  app:
    controller: sungather
    ports:
      http:
        port: 8099
