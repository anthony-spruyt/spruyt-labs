---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-single
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-single-ocirepo
    namespace: flux-system
  interval: 4h
  valuesFrom:
    - kind: ConfigMap
      name: victoria-logs-single-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: victoria-logs-single-server
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
          - target:
              kind: DaemonSet
              name: victoria-logs-single-vector
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: true
