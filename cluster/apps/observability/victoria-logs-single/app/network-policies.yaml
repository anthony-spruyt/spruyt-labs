---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow ingress from all cluster pods on port 9428 (Vector agents from all namespaces send logs here)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cluster-logs-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs-single
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "9428"
              protocol: TCP
