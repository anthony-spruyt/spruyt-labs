---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app victoria-logs-single
  namespace: flux-system
spec:
  targetNamespace: observability
  path: ./cluster/apps/observability/victoria-logs-single/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster-storage
  prune: true
  timeout: 5m
  wait: true
