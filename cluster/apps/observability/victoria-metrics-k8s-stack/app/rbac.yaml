---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.2-standalone-strict/clusterrole-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vmagent-kube-scheduler-metrics
rules:
  - nonResourceURLs:
      - /metrics
      - /metrics/slis
      - /metrics/probes
    verbs:
      - get
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.2-standalone-strict/clusterrolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmagent-kube-scheduler-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vmagent-kube-scheduler-metrics
subjects:
  - kind: ServiceAccount
    name: vmagent-victoria-metrics-k8s-stack
    namespace: observability
