---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow ingress from all cluster pods on port 8428 (scraped by VMAgent + OTLP from all namespaces)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cluster-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vmsingle
  ingress:
    - fromEndpoints:
        - {}
      toPorts:
        - ports:
            - port: "8428"
              protocol: TCP
