# -- Grafana dependency chart configuration. For possible values refer [here](https://github.com/grafana/helm-charts/tree/main/charts/grafana#configuration)
grafana:
  enabled: true
  deploymentStrategy:
    type: Recreate
  podAnnotations:
    reloader.stakater.com/auto: "true"
  resources:
    limits:
      cpu: 3000m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 1Gi
  sidecar:
    datasources:
      enabled: true
      initDatasources: true
      label: grafana_datasource
      resource: both
    dashboards:
      enabled: true
  persistence:
    enabled: false
  plugins:
    - victoriametrics-metrics-datasource
    - victoriametrics-logs-datasource
  admin:
    existingSecret: grafana-secrets
    userKey: admin-user
    passwordKey: admin-password
  grafana.ini:
    server:
      root_url: https://grafana.lan.${EXTERNAL_DOMAIN}
    auth:
      signout_redirect_url: https://auth.${EXTERNAL_DOMAIN}/application/o/grafana/end-session/
      oauth_auto_login: false
    auth.generic_oauth:
      name: Authentik
      enabled: true
      client_id: $__file{/etc/secrets/auth_generic_oauth/client_id}
      client_secret: $__file{/etc/secrets/auth_generic_oauth/client_secret}
      scopes: openid profile email groups
      auth_url: https://auth.${EXTERNAL_DOMAIN}/application/o/authorize/
      token_url: http://authentik-server.authentik-system/application/o/token/
      api_url: http://authentik-server.authentik-system/application/o/userinfo/
      role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'
      allow_assign_grafana_admin: true
      email_attribute_path: email
      login_attribute_path: preferred_username
      name_attribute_path: name
  extraSecretMounts:
    - name: auth-generic-oauth-secret-mount
      secretName: grafana-oauth-credentials
      defaultMode: 0440
      mountPath: /etc/secrets/auth_generic_oauth
      readOnly: true

# -- prometheus-node-exporter dependency chart configuration. For possible values check [here](https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus-node-exporter/values.yaml)
prometheus-node-exporter:
  enabled: true
  resources:
    limits:
      cpu: 1000m
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

# -- kube-state-metrics dependency chart configuration. For possible values check [here](https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-state-metrics/values.yaml)
kube-state-metrics:
  enabled: true
  resources:
    limits:
      cpu: 1000m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 96Mi

kubeEtcd:
  enabled: true
  service:
    enabled: true
    port: 2379
    targetPort: 2379
    selector:
      component: kube-controller-manager # instead of using hardcoded IP endpoints,
      # this is a trick borrowed from from https://github.com/siderolabs/talos/discussions/7214#discussioncomment-10255876
      # which only works if/because etcd is deployed on the same nodes where the rest
      # of the api server (notably kube-controller-manager) are deployed. Adjust if that's
      # not how your cluster is set up.
  # -- Spec for VMServiceScrape CRD is [here](https://docs.victoriametrics.com/operator/api.html#vmservicescrapespec)
  vmScrape:
    spec:
      jobLabel: jobLabel
      namespaceSelector:
        matchNames: [kube-system]
      endpoints:
        - port: http-metrics
          scheme: https
          tlsConfig:
            ca:
              secret:
                name: etcd-secrets
                key: ca.crt
            cert:
              secret:
                name: etcd-secrets
                key: server.crt
            keySecret:
              name: etcd-secrets
              key: server.key

kubeScheduler:
  vmScrape:
    spec:
      endpoints:
        - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          port: http-metrics
          scheme: https
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecureSkipVerify: true

kubeControllerManager:
  vmScrape:
    spec:
      endpoints:
        - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          port: http-metrics
          scheme: https
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecureSkipVerify: true
