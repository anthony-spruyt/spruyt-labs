# Victoria Metrics k8s Stack Reference -> https://docs.victoriametrics.com/helm/victoria-metrics-k8s-stack/#parameters
# Default values for victoria-metrics-k8s-stack: https://github.com/VictoriaMetrics/helm-charts/blob/master/charts/victoria-metrics-k8s-stack/values.yaml

victoria-metrics-operator:
  enabled: false

vmsingle:
  enabled: true
  # -- Full spec for VMSingle CRD. Allowed values describe [here](https://docs.victoriametrics.com/operator/api#vmsinglespec)
  spec:
    resources:
      limits:
        cpu: 3000m
        memory: 2048Mi
      requests:
        cpu: 200m
        memory: 1664Mi
    # -- Data retention period. Possible units character: h(ours), d(ays), w(eeks), y(ears), if no unit character specified - month. The minimum retention period is 24h. See these [docs](https://docs.victoriametrics.com/single-server-victoriametrics/#retention)
    retentionPeriod: 7d
    replicaCount: 1
    storage:
      storageClassName: "rbd-fast-delete"
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi

alertmanager:
  enabled: true
  # -- (object) Full spec for VMAlertmanager CRD. Allowed values described [here](https://docs.victoriametrics.com/operator/api#vmalertmanagerspec)
  spec:
    resources:
      limits:
        cpu: 500m
        memory: 64Mi
      requests:
        cpu: 5m
        memory: 32Mi
    # -- (string) If this one defined, it will be used for alertmanager configuration and config parameter will be ignored
    configSecret: victoria-metrics-k8s-stack-secrets

vmalert:
  enabled: true
  # -- (object) Full spec for VMAlert CRD. Allowed values described [here](https://docs.victoriametrics.com/operator/api#vmalertspec)
  spec:
    resources:
      limits:
        cpu: 1000m
        memory: 128Mi
      requests:
        cpu: 30m
        memory: 80Mi

vmagent:
  # -- (object) Full spec for VMAgent CRD. Allowed values described [here](https://docs.victoriametrics.com/operator/api#vmagentspec)
  spec:
    resources:
      limits:
        cpu: 1000m
        memory: 256Mi
      requests:
        cpu: 80m
        memory: 128Mi
    env:
      - name: GOGC
        value: 100
      - name: GOMAXPROCS
        value: 1
    extraArgs:
      promscrape.streamParse: "true"
      promscrape.dropOriginalLabels: "false"
      promscrape.disableCompression: "true"
      promscrape.maxScrapeSize: "256MB"
    # inlineScrapeConfig: |
    #   - job_name: 'kubernetes-pods'
