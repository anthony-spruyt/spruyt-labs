# #yaml-language-server: $schema=TODO
# Victoria Metrics k8s Stack Reference -> https://docs.victoriametrics.com/helm/victoria-metrics-k8s-stack/#parameters
# Default values for victoria-metrics-k8s-stack: https://github.com/VictoriaMetrics/helm-charts/blob/master/charts/victoria-metrics-k8s-stack/values.yaml

external:
  grafana:
    host: https://grafana.lan.${EXTERNAL_DOMAIN}

# Additional datasources for Ceph Dashboard compatibility
# The Ceph Dashboard hardcodes var-datasource=Dashboard1 in iframe URLs
# See: https://github.com/ceph/ceph/blob/main/src/pybind/mgr/dashboard/frontend/src/app/shared/components/grafana/grafana.component.ts
defaultDatasources:
  extra:
    - name: Dashboard1
      type: prometheus
      url: http://vmsingle-victoria-metrics-k8s-stack.observability.svc.cluster.local.:8428
      access: proxy
      isDefault: false
      jsonData:
        manageAlerts: false

# Disable default NodeFilesystemSpaceFillingUp alerts - replaced with Talos-safe version in vmrules/
defaultRules:
  rules:
    NodeFilesystemSpaceFillingUp:
      create: false

victoria-metrics-operator:
  enabled: false

vmsingle:
  enabled: true
  # -- Full spec for VMSingle CRD. Allowed values describe [here](https://docs.victoriametrics.com/operator/api#vmsinglespec)
  # High-priority: CPU limit 5x request per workload-classification.md
  # Requests based on P99: 774m (+20% headroom)
  spec:
    priorityClassName: high-priority
    # Prefer different nodes from other heavy VM components to prevent thermal throttling
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: [vmagent, grafana]
              topologyKey: kubernetes.io/hostname
    resources:
      limits:
        cpu: 4650m
        memory: 2048Mi
      requests:
        cpu: 930m
        memory: 1664Mi
    # -- Data retention period. Possible units character: h(ours), d(ays), w(eeks), y(ears), if no unit character specified - month. The minimum retention period is 24h. See these [docs](https://docs.victoriametrics.com/single-server-victoriametrics/#retention)
    retentionPeriod: 7d
    replicaCount: 1
    storage:
      storageClassName: "rbd-fast-delete"
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi

alertmanager:
  enabled: true
  # -- (object) Full spec for VMAlertmanager CRD. Allowed values described [here](https://docs.victoriametrics.com/operator/api#vmalertmanagerspec)
  # High-priority - no CPU limit (CPU is compressible)
  spec:
    priorityClassName: high-priority
    resources:
      limits:
        memory: 64Mi
      requests:
        cpu: 5m
        memory: 32Mi
    # -- (string) If this one defined, it will be used for alertmanager configuration and config parameter will be ignored
    configSecret: victoria-metrics-k8s-stack-secrets

vmalert:
  enabled: true
  # -- (object) Full spec for VMAlert CRD. Allowed values described [here](https://docs.victoriametrics.com/operator/api#vmalertspec)
  # High-priority - no CPU limit (CPU is compressible)
  # Requests based on P99: 89m (+20% headroom)
  spec:
    priorityClassName: high-priority
    # vmalert is lightweight (~110m CPU) - no anti-affinity needed
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 110m
        memory: 80Mi
    # Override external.url for alert source links (chart defaults to dummy URL when using Traefik IngressRoutes)
    extraArgs:
      external.url: https://grafana.lan.${EXTERNAL_DOMAIN}

vmagent:
  # -- (object) Full spec for VMAgent CRD. Allowed values described [here](https://docs.victoriametrics.com/operator/api#vmagentspec)
  # High-priority: CPU limit 5x request per workload-classification.md
  # Requests based on P99: 373m (+20% headroom)
  # Memory increased to 512Mi - OOMKilled at 256Mi during service discovery
  spec:
    priorityClassName: high-priority
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: [vmsingle, grafana]
              topologyKey: kubernetes.io/hostname
    resources:
      limits:
        cpu: 2250m
        memory: 512Mi
      requests:
        cpu: 450m
        memory: 256Mi
    env:
      - name: GOGC
        value: 100
      - name: GOMAXPROCS
        value: 1
    extraArgs:
      promscrape.streamParse: "true"
      promscrape.dropOriginalLabels: "false"
      promscrape.disableCompression: "true"
      promscrape.maxScrapeSize: "256MB"
    # inlineScrapeConfig: |
    #   - job_name: 'kubernetes-pods'
    #     kubernetes_sd_configs:
    #       - role: pod
    #     relabel_configs:
    #       - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
    #         action: keep
    #         regex: true
    #       - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
    #         action: replace
    #         regex: '([^:]+)(?::\d+)?;(\d+)'
    #         replacement: '${1}:${2}'
    #         target_label: __address__
    #   - job_name: 'kubernetes-endpoints'
    #     scrape_interval: 30s
    #     kubernetes_sd_configs:
    #       - role: endpoints
    #     relabel_configs:
    #       - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
    #         action: keep
    #         regex: true
    #       - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
    #         action: replace
    #         target_label: __address__
    #         regex: '(.+)(?::\d+);(\d+)'
    #         replacement: '$1:$2'
# -- Grafana dependency chart configuration. For possible values refer [here](https://github.com/grafana/helm-charts/tree/main/charts/grafana#configuration)
grafana:
  enabled: true
  priorityClassName: high-priority
  deploymentStrategy:
    type: Recreate
  podAnnotations:
    reloader.stakater.com/auto: "true"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values: [vmsingle, vmagent]
            topologyKey: kubernetes.io/hostname
  # High-priority: CPU limit 5x request per workload-classification.md
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 1Gi
  sidecar:
    datasources:
      enabled: true
      # Disabled: Grafana helm chart 10.5.x has a bug where init container uses WATCH mode
      # instead of LIST, causing pod to hang. Sidecar still loads datasources dynamically.
      # Upstream issue: https://github.com/grafana/helm-charts/issues/4045 (related)
      initDatasources: false
      label: grafana_datasource
      resource: both
    dashboards:
      enabled: true
  persistence:
    enabled: false
  plugins:
    - victoriametrics-metrics-datasource
    - victoriametrics-logs-datasource
  admin:
    existingSecret: grafana-secrets
    userKey: admin-user
    passwordKey: admin-password
  # https://github.com/grafana/grafana/blob/main/conf/defaults.ini
  grafana.ini:
    server:
      root_url: https://grafana.lan.${EXTERNAL_DOMAIN}
    date_formats:
      default_timezone: ${TIMEZONE}
    security:
      # Allow Grafana to be embedded in iframes (required for Ceph Dashboard integration)
      allow_embedding: true
      cookie_samesite: disabled
    auth:
      signout_redirect_url: https://auth.${EXTERNAL_DOMAIN}/application/o/grafana/end-session/
      disable_login_form: true
      oauth_auto_login: true
    auth.generic_oauth:
      name: Authentik
      enabled: true
      client_id: $__env{GRAFANA_OAUTH_CLIENT_ID}
      client_secret: $__env{GRAFANA_OAUTH_CLIENT_SECRET}
      scopes: openid profile email
      auth_url: https://auth.${EXTERNAL_DOMAIN}/application/o/authorize/
      token_url: http://authentik-server.authentik-system/application/o/token/
      api_url: http://authentik-server.authentik-system/application/o/userinfo/
      login_attribute_path: preferred_username
      groups_attribute_path: groups
      name_attribute_path: name
      email_attribute_path: email
      role_attribute_path: contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
      allow_sign_up: true
      use_pkce: true
  envFromSecrets:
    - name: grafana-oauth-credentials
      optional: false

# -- prometheus-node-exporter dependency chart configuration. For possible values check [here](https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus-node-exporter/values.yaml)
# No CPU limit (CPU is compressible)
# Requests based on P99: 42m (+20% headroom)
prometheus-node-exporter:
  enabled: true
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # Talos-optimized filesystem filters - exclude noisy tmpfs/rootfs metrics
  extraArgs:
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+|run/containerd/.+)($|/)
    - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|erofs|sysfs|tracefs|tmpfs|rootfs)$
  # VMServiceScrape configuration for Talos-specific filtering
  vmScrape:
    enabled: true
    spec:
      endpoints:
        - port: metrics
          metricRelabelConfigs:
            # Drop kubelet pod mountpoints
            - action: drop
              source_labels: [mountpoint]
              regex: "/var/lib/kubelet/pods.+"
            # Drop MS-01 nct6775 bogus temperature sensors (SYSTIN, AUXTIN0-2, etc)
            # These report false 100+°C readings. Keep temp2 (VRM) and temp7 (PECI/CPU)
            - action: drop
              source_labels: [__name__, chip, sensor]
              regex: node_hwmon_temp_celsius;platform_nct6775_2592;temp(1|3|4|5|6|8|9|10|11|12)

# -- kube-state-metrics dependency chart configuration. For possible values check [here](https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-state-metrics/values.yaml)
# No CPU limit (CPU is compressible)
# Requests based on P99: 16m
kube-state-metrics:
  enabled: true
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 20m
      memory: 96Mi

kubeEtcd:
  enabled: true
  service:
    enabled: true
    port: 2379
    targetPort: 2379
    selector:
      component: kube-controller-manager # instead of using hardcoded IP endpoints,
      # this is a trick borrowed from from https://github.com/siderolabs/talos/discussions/7214#discussioncomment-10255876
      # which only works if/because etcd is deployed on the same nodes where the rest
      # of the api server (notably kube-controller-manager) are deployed. Adjust if that's
      # not how your cluster is set up.
  # -- Spec for VMServiceScrape CRD is [here](https://docs.victoriametrics.com/operator/api.html#vmservicescrapespec)
  vmScrape:
    spec:
      jobLabel: jobLabel
      namespaceSelector:
        matchNames: [kube-system]
      endpoints:
        - port: http-metrics
          scheme: https
          tlsConfig:
            ca:
              secret:
                name: etcd-secrets
                key: ca.crt
            cert:
              secret:
                name: etcd-secrets
                key: server.crt
            keySecret:
              name: etcd-secrets
              key: server.key

kubeScheduler:
  vmScrape:
    spec:
      endpoints:
        - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          port: http-metrics
          scheme: https
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecureSkipVerify: true

kubeControllerManager:
  vmScrape:
    spec:
      endpoints:
        - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          port: http-metrics
          scheme: https
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecureSkipVerify: true
