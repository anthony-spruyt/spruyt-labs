---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./grafana-secrets.sops.yaml
  - ./authentik-secret-store.yaml
  - ./grafana-oauth-external-secret.yaml
  - ./oauth-rotation-rbac.yaml
  - ./victoria-metrics-k8s-stack-secrets.sops.yaml
  - ./vm-service-scrapes.yaml
  - ./release.yaml
configMapGenerator:
  - name: victoria-metrics-k8s-stack-values
    namespace: observability
    files:
      - values.yaml
  # Custom Ceph dashboard (kept for custom metrics/layout)
  - name: grafana-dashboard-ceph-cluster
    namespace: observability
    files:
      - dashboards/ceph-cluster.json
    options:
      labels:
        grafana_dashboard: "1"
  # Official Ceph dashboards (required for Ceph Dashboard embedding)
  - name: grafana-dashboard-ceph-official-cluster
    namespace: observability
    files:
      - dashboards/ceph-official-ceph-cluster.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-hosts
    namespace: observability
    files:
      - dashboards/ceph-official-hosts-overview.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-osds
    namespace: observability
    files:
      - dashboards/ceph-official-osds-overview.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-pools
    namespace: observability
    files:
      - dashboards/ceph-official-pool-overview.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-rgw
    namespace: observability
    files:
      - dashboards/ceph-official-radosgw-overview.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-rbd-overview
    namespace: observability
    files:
      - dashboards/ceph-official-rbd-overview.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-rbd-details
    namespace: observability
    files:
      - dashboards/ceph-official-rbd-details.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-pool-detail
    namespace: observability
    files:
      - dashboards/ceph-official-pool-detail.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-ceph-official-osd-device-details
    namespace: observability
    files:
      - dashboards/ceph-official-osd-device-details.json
    options:
      labels:
        grafana_dashboard: "1"
configurations:
  - ./kustomizeconfig.yaml
