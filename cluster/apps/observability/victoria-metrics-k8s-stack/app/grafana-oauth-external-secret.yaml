---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Syncs Grafana OAuth credentials from authentik-secrets in authentik-system namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth-credentials
  namespace: observability
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: authentik-secrets
  target:
    name: grafana-oauth-credentials
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_OAUTH_CLIENT_ID
      remoteRef:
        key: authentik-secrets
        property: GRAFANA_OAUTH_CLIENT_ID
    - secretKey: GRAFANA_OAUTH_CLIENT_SECRET
      remoteRef:
        key: authentik-secrets
        property: GRAFANA_OAUTH_CLIENT_SECRET
