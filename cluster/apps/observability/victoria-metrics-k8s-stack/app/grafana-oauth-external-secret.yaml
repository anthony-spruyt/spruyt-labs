---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
# Syncs Grafana OAuth credentials from dedicated secret in authentik-system namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth-credentials
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: grafana-oauth-store
  target:
    name: grafana-oauth-credentials
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_OAUTH_CLIENT_ID
      remoteRef:
        key: authentik-grafana-oauth
        property: GRAFANA_OAUTH_CLIENT_ID
    - secretKey: GRAFANA_OAUTH_CLIENT_SECRET
      remoteRef:
        key: authentik-grafana-oauth
        property: GRAFANA_OAUTH_CLIENT_SECRET
