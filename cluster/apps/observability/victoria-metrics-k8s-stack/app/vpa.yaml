# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/autoscaling.k8s.io/verticalpodautoscaler_v1.json
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vmsingle-victoria-metrics-k8s-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vmsingle-victoria-metrics-k8s-stack
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: vmsingle
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 4650m
          memory: 2048Mi
