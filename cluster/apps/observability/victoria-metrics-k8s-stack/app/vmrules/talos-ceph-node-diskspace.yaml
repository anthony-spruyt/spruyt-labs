---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
# Talos-safe version of CephNodeDiskspaceWarning alert
# Adds deriv() guard to filter out false positives from Talos node restarts
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: talos-ceph-node-diskspace-alerts
  namespace: observability
spec:
  groups:
    - name: talos-ceph-nodes
      rules:
        # Warning: 5 days prediction - only fire if disk is actually filling (deriv < 0)
        - alert: CephNodeDiskspaceWarning
          expr: |
            (
              predict_linear(node_filesystem_free_bytes{device=~"/.*"}[2d], 3600 * 24 * 5) * on(instance) group_left(nodename) node_uname_info < 0
            )
            and
            (
              deriv(node_filesystem_free_bytes{device=~"/.*"}[2d]) < 0
            )
          labels:
            oid: 1.3.6.1.4.1.50495.1.2.1.8.4
            severity: warning
            type: ceph_default
          annotations:
            summary: "Host filesystem free space is getting low"
            description: "Mountpoint {{ $labels.mountpoint }} on {{ $labels.nodename }} will be full in less than 5 days based on the 48 hour trailing fill rate."
