---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/operator.victoriametrics.com/vmrule_v1beta1.json
# Recording rules for node temperature metrics
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: node-temperature-recording
  namespace: observability
spec:
  groups:
    - name: node-temperature
      interval: 30s
      rules:
        # Max CPU temperature per node
        # - MS-01 (Intel): platform_coretemp_0
        # - E2 (AMD): pci0000:00_0000:00:18_3 (k10temp)
        - record: node:cpu_temperature_celsius:max
          expr: |
            max by (instance) (
              node_hwmon_temp_celsius{chip=~"platform_coretemp_.*|pci0000:00_0000:00:18_3"}
            )

        # Average CPU temperature per node
        - record: node:cpu_temperature_celsius:avg
          expr: |
            avg by (instance) (
              node_hwmon_temp_celsius{chip=~"platform_coretemp_.*|pci0000:00_0000:00:18_3"}
            )

        # Max NVMe temperature per node
        - record: node:nvme_temperature_celsius:max
          expr: |
            max by (instance) (
              node_hwmon_temp_celsius{chip=~"nvme_.*"}
            )

        # CPU thermal headroom (percentage of critical temp used)
        # 100% = at critical temp, 0% = at 0°C
        - record: node:cpu_temperature_percent:max
          expr: |
            100 * max by (instance) (
              node_hwmon_temp_celsius{chip=~"platform_coretemp_.*|pci0000:00_0000:00:18_3"}
              / on(instance, chip, sensor) node_hwmon_temp_crit_celsius{chip=~"platform_coretemp_.*|pci0000:00_0000:00:18_3"}
            )

        # NVMe thermal headroom (percentage of critical temp used)
        - record: node:nvme_temperature_percent:max
          expr: |
            100 * max by (instance) (
              node_hwmon_temp_celsius{chip=~"nvme_.*"}
              / on(instance, chip, sensor) node_hwmon_temp_crit_celsius{chip=~"nvme_.*"}
            )
