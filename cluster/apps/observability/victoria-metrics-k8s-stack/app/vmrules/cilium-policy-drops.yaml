---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/operator.victoriametrics.com/vmrule_v1beta1.json
# Alerting rules for Cilium network policy drops
# Requires Cilium hubble.metrics.enabled with sourceContext/destinationContext labels
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: cilium-policy-drops
  namespace: observability
spec:
  groups:
    - name: cilium-policy-drops
      interval: 30s
      rules:
        # Alert when pods are consistently dropping packets due to policy
        - alert: CiliumPolicyDrops
          expr: |
            sum by (source, destination) (
              rate(hubble_drop_total{reason="POLICY_DENIED"}[5m])
            ) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Network policy drops: {{ $labels.source }} → {{ $labels.destination }}"
            description: |
              Traffic from {{ $labels.source }} to {{ $labels.destination }} is being blocked.
              Rate: {{ $value | printf "%.2f" }}/s. Check network policies.
            runbook_url: "Use 'task dev-env:hubble-drops' to see live dropped packets"

        # Critical alert for sustained high drop rate
        - alert: CiliumPolicyDropsCritical
          expr: |
            sum by (source, destination) (
              rate(hubble_drop_total{reason="POLICY_DENIED"}[5m])
            ) > 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High policy drop rate: {{ $labels.source }} → {{ $labels.destination }}"
            description: |
              High drop rate ({{ $value | printf "%.1f" }}/s) for traffic from
              {{ $labels.source }} to {{ $labels.destination }}.
              This may be breaking application functionality.
            runbook_url: "Use 'task dev-env:hubble-drops' to see live dropped packets"

        # Recording rules for dashboard queries
        # Use 'or vector(0)' to always produce a sample (avoids RecordingRulesNoData alert)
        - record: cilium:policy_drops:rate5m
          expr: |
            sum by (source, destination, reason) (
              rate(hubble_drop_total[5m])
            ) or vector(0)

        - record: cilium:policy_drops:by_source:rate5m
          expr: |
            sum by (source) (
              rate(hubble_drop_total{reason="POLICY_DENIED"}[5m])
            ) or vector(0)

        - record: cilium:policy_drops:by_destination:rate5m
          expr: |
            sum by (destination) (
              rate(hubble_drop_total{reason="POLICY_DENIED"}[5m])
            ) or vector(0)
