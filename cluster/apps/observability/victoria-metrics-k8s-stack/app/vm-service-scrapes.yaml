---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: hubble-metrics
  labels:
    app.kubernetes.io/instance: victoria-metrics-k8s-stack
spec:
  selector:
    matchLabels:
      k8s-app: hubble
  namespaceSelector:
    matchNames:
      - kube-system
  endpoints:
    - port: hubble-metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: nut-exporter
  labels:
    app.kubernetes.io/instance: victoria-metrics-k8s-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nut-server
  namespaceSelector:
    matchNames:
      - nut-system
  endpoints:
    - port: metrics
      path: /ups_metrics
      params:
        ups: [cp1500]
      interval: 15s
      scrapeTimeout: 10s
      relabelConfigs:
        - sourceLabels: [__param_ups]
          targetLabel: ups
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: n8n
  labels:
    app.kubernetes.io/instance: victoria-metrics-k8s-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/instance: n8n
  namespaceSelector:
    matchNames:
      - n8n-system
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/instance: victoria-metrics-k8s-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
      app.kubernetes.io/instance: cert-manager
  namespaceSelector:
    matchNames:
      - cert-manager
  endpoints:
    - port: tcp-prometheus-servicemonitor
      path: /metrics
      interval: 60s
      scrapeTimeout: 10s
