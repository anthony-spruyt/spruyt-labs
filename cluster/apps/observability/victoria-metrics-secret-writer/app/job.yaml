---
# yaml-language-server: $schema=https://k8s-schemas.pages.dev/kubernetes/master/job-batch-v1.json
apiVersion: batch/v1
kind: Job
metadata:
  name: kube-secrets-writer
  namespace: observability
spec:
  template:
    spec:
      automountServiceAccountToken: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - image: registry.k8s.io/kubectl:v1.34.2
          command: ["/bin/sh"]
          args:
            - "-c"
            - |
              set -euo pipefail
              umask 077
              SECRET_NAMESPACE="${SECRET_NAMESPACE:-observability}"

              sync_component() {
                component="$1"
                dir="$2"
                secret="$3"
                mappings="$4"

                if [ ! -d "$dir" ]; then
                  echo "Directory $dir missing for $component, skipping" >&2
                  return
                fi

                args=""
                missing=0

                for entry in $mappings; do
                  key=${entry%%:*}
                  candidates=${entry#*:}
                  found=0
                  for candidate in $(echo "$candidates" | tr ',' ' '); do
                    if [ -f "$dir/$candidate" ]; then
                      args="$args --from-file=$key=$dir/$candidate"
                      found=1
                      break
                    fi
                  done
                  if [ "$found" -eq 0 ]; then
                    echo "Missing file(s) [$candidates] for $component key $key" >&2
                    missing=$((missing + 1))
                  fi
                done

                if [ "$missing" -gt 0 ]; then
                  echo "Skipping $component due to missing required files" >&2
                  return
                fi

                cmd="kubectl create secret generic \"$secret\" --namespace \"$SECRET_NAMESPACE\" --save-config --dry-run=client$args -o yaml"
                echo "Syncing $component secrets from $dir into ${SECRET_NAMESPACE}/$secret" >&2
                sh -c "$cmd | kubectl apply -n \"$SECRET_NAMESPACE\" -f -"
              }

              cat <<'EOF' | while IFS='|' read -r component dir secret mappings; do
              etcd|/mnt/secrets/etcd|etcd-secrets|ca.crt:ca.crt server.crt:server.crt server.key:server.key
              kube-scheduler|/mnt/secrets/kube-scheduler|kube-scheduler-secrets|ca.crt:ca.crt client.crt:client.crt client.key:client.key
              kube-controller-manager|/mnt/secrets/kube-controller-manager|kube-controller-manager-secrets|ca.crt:ca.crt client.crt:client.crt client.key:client.key
              kube-apiserver|/mnt/secrets/kube-apiserver|kube-apiserver-secrets|ca.crt:ca.crt client.crt:apiserver.crt,client.crt client.key:apiserver.key,client.key
              EOF
              do
                [ -n "$component" ] || continue
                sync_component "$component" "$dir" "$secret" "$mappings"
              done
          imagePullPolicy: IfNotPresent
          name: kubectl
          volumeMounts:
            - mountPath: /mnt/secrets/etcd
              name: etcd-secrets
              readOnly: true
            - mountPath: /mnt/secrets/kube-scheduler
              name: kube-scheduler-secrets
              readOnly: true
            - mountPath: /mnt/secrets/kube-controller-manager
              name: kube-controller-manager-secrets
              readOnly: true
            - mountPath: /mnt/secrets/kube-apiserver
              name: kube-apiserver-secrets
              readOnly: true
            - mountPath: /tmp
              name: tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 60 # this matches the etcd user in the cluster
            seLinuxOptions: {}
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: 100m
              memory: 1Gi
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: tmp
          emptyDir: {}
        - hostPath:
            path: /system/secrets/etcd
            type: Directory
          name: etcd-secrets
        - hostPath:
            path: /system/secrets/kubernetes/kube-scheduler
            type: Directory
          name: kube-scheduler-secrets
        - hostPath:
            path: /system/secrets/kubernetes/kube-controller-manager
            type: Directory
          name: kube-controller-manager-secrets
        - hostPath:
            path: /system/secrets/kubernetes/apiserver
            type: Directory
          name: kube-apiserver-secrets
      restartPolicy: Never
      serviceAccount: secrets-writer
      serviceAccountName: secrets-writer
  backoffLimit: 3
