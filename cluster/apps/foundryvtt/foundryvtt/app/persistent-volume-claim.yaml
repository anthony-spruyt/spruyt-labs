---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/persistentvolumeclaim.json
# Documentation: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#persistentvolumeclaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foundryvtt-data
  labels:
    velero.io/backup-volumes: "true"
  # finalizers:
  #   - kubernetes.io/pvc-protection
spec:
  storageClassName: rbd-fast-delete-v2
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
