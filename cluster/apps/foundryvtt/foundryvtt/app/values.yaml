---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
controllers:
  foundryvtt:
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    replicas: 1
    type: deployment
    serviceAccount:
      identifier: foundryvtt
    initContainers:
      permissions:
        image:
          repository: busybox
          tag: "1.37.0"
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            # Change ownership of data directory, skipping lost+found
            # lost+found is a system directory that cannot be modified
            find /data -mindepth 1 -maxdepth 1 ! -name 'lost+found' -exec chown -R 1000:1000 {} \; || true
            # Try to change lost+found ownership, but don't fail if it fails
            if [ -d /data/lost+found ]; then
              chown 1000:1000 /data/lost+found 2>/dev/null || true
            fi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - CHOWN
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 10m
            memory: 16Mi
    containers:
      app:
        image:
          repository: felddy/foundryvtt
          tag: "13.351.0"
          pullPolicy: IfNotPresent
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        envFrom:
          - secretRef:
              name: foundryvtt-secrets
        resources:
          requests:
            cpu: 500m
            memory: 4Gi
          limits:
            cpu: 2000m
            memory: 8Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        ports:
          - name: http
            containerPort: 30000
            protocol: TCP
        probes:
          liveness:
            enabled: true
            custom: false
            spec:
              initialDelaySeconds: 120
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 10
              httpGet:
                path: /
                port: http
          readiness:
            enabled: true
            custom: false
            spec:
              initialDelaySeconds: 30
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 3
              httpGet:
                path: /
                port: http
persistence:
  data:
    existingClaim: "foundryvtt-data"
    globalMounts:
      - path: /data
serviceAccount:
  foundryvtt:
    enabled: true
service:
  foundryvtt:
    controller: foundryvtt
    type: ClusterIP
    ports:
      http:
        port: 30000
        protocol: HTTP
