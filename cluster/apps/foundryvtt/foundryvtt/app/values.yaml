---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
controllers:
  foundryvtt:
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    replicas: 1
    type: deployment
    serviceAccount:
      identifier: foundryvtt
    initContainers:
      permissions:
        image:
          repository: busybox
          tag: "1.37.0"
          pullPolicy: IfNotPresent
        command:
          - chown
          - -R
          - 1000:1000
          - /data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - CHOWN
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 10m
            memory: 16Mi
    containers:
      app:
        image:
          repository: felddy/foundryvtt
          tag: "13.351.0"
          pullPolicy: IfNotPresent
        envFrom:
          - secretRef:
              name: foundryvtt-secrets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        probes:
          liveness:
            enabled: true
            custom: false
            spec:
              initialDelaySeconds: 600
              failureThreshold: 40
              periodSeconds: 30
              timeoutSeconds: 20
              httpGet:
                path: /
                port: http
          readiness:
            enabled: true
            custom: false
            spec:
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 20
              httpGet:
                path: /
                port: http
persistence:
  data:
    existingClaim: "foundryvtt-data"
    globalMounts:
      - path: /data
serviceAccount:
  foundryvtt:
    enabled: true
service:
  foundryvtt:
    controller: foundryvtt
    type: ClusterIP
    ports:
      http:
        port: 30000
        protocol: HTTP
