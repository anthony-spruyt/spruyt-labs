---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
defaultPodOptions:
  priorityClassName: low-priority
controllers:
  foundryvtt:
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    replicas: 1
    type: statefulset
    serviceAccount:
      identifier: foundryvtt
    initContainers:
      permissions:
        image:
          repository: busybox
          tag: "1.37.0"
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            # Change ownership of data directory, skipping lost+found
            # lost+found is a system directory that cannot be modified
            find /data -mindepth 1 -maxdepth 1 ! -name 'lost+found' -exec chown -R 1000:1000 {} \; || true
            # Try to change lost+found ownership, but don't fail if it fails
            if [ -d /data/lost+found ]; then
              chown 1000:1000 /data/lost+found 2>/dev/null || true
            fi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - CHOWN
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 10m
            memory: 16Mi
    containers:
      app:
        image:
          repository: felddy/foundryvtt
          tag: "13.351.0"
          pullPolicy: IfNotPresent
        env:
          # https://github.com/felddy/foundryvtt-docker?tab=readme-ov-file#environment-variables
          CONTAINER_CACHE: "/data/container_cache"
          CONTAINER_CACHE_SIZE: "5"
          CONTAINER_PATCHES: "/data/container_patches"
          # Set to a space-delimited list of URLs to be sourced after Foundry is installed but before it is started. Patch URLs are sourced in the order specified. CONTAINER_PATCH_URLS are processed before CONTAINER_PATCHES. ⚠️ Only use patch URLs from trusted sources!
          # CONTAINER_PATCH_URLS:
          CONTAINER_PRESERVE_CONFIG: "false"
          CONTAINER_URL_FETCH_RETRY: "3"
          CONTAINER_VERBOSE: "false"
          # FOUNDRY_AWS_CONFIG:
          FOUNDRY_COMPRESS_WEBSOCKET: "true"
          # Choose the CSS theme for the setup page. Choose from foundry, fantasy, or scifi.
          FOUNDRY_CSS_THEME: "foundry"
          # FOUNDRY_DEMO_CONFIG:
          FOUNDRY_HOT_RELOAD: "false"
          FOUNDRY_IP_DISCOVERY: "false"
          FOUNDRY_LANGUAGE: "en.core"
          # FOUNDRY_LOCAL_HOSTNAME:
          FOUNDRY_MINIFY_STATIC_FILES: "true"
          FOUNDRY_PROTOCOL: "4"
          FOUNDRY_PROXY_PORT: "443"
          FOUNDRY_PROXY_SSL: "true"
          # FOUNDRY_ROUTE_PREFIX:
          # FOUNDRY_SSL_CERT:
          # FOUNDRY_SSL_KEY:
          FOUNDRY_TELEMETRY: "true"
          FOUNDRY_UPNP: "false"
          # FOUNDRY_UPNP_LEASE_DURATION:
          # FOUNDRY_VERSION:
          # FOUNDRY_WORLD:
          TZ: "Australia/Melbourne"
          # Override for default NodeJS Thread Count
          UV_THREADPOOL_SIZE: "8"
          NODE_OPTIONS: "--max-old-space-size=6144"
        envFrom:
          - secretRef:
              name: foundryvtt-secrets
        # Gaming workload - P99 1m, reduce heavily over-provisioned CPU
        resources:
          requests:
            cpu: 10m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        ports:
          - name: http
            containerPort: 30000
            protocol: TCP
        # Probes: HTTP / with long startup delay (120s) for slow initialization
        probes:
          liveness:
            enabled: true
            custom: false
            spec:
              initialDelaySeconds: 120
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 10
              httpGet:
                path: /
                port: http
          readiness:
            enabled: true
            custom: false
            spec:
              initialDelaySeconds: 30
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 3
              httpGet:
                path: /
                port: http
persistence:
  data:
    existingClaim: "foundryvtt-data"
    globalMounts:
      - path: /data
serviceAccount:
  foundryvtt:
    enabled: true
service:
  foundryvtt:
    controller: foundryvtt
    type: ClusterIP
    ports:
      http:
        port: 30000
        protocol: HTTP
