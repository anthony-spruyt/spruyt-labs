---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# CiliumNetworkPolicy for CloudNativePG operator
# Manages PostgreSQL clusters across namespaces
# Allow kube-api egress for CRD management and cluster coordination
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-api-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow webhook ingress from kube-apiserver for admission webhooks
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-webhook-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to CNPG clusters in all namespaces for status monitoring
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-cluster-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  egress:
    # CNPG clusters in authentik-system
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: authentik-system
            k8s:cnpg.io/cluster: authentik-cnpg-cluster
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # CNPG clusters in firefly-iii
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:cnpg.io/cluster: firefly-iii-cnpg-cluster
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # CNPG clusters in n8n-system
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: n8n-system
            k8s:cnpg.io/cluster: n8n-cnpg-cluster
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # CNPG clusters in coder-system
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: coder-system
            k8s:cnpg.io/cluster: coder-cnpg-cluster
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow egress to barman plugin for plugin registration/health checks
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-barman-plugin-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
            k8s:app.kubernetes.io/name: plugin-barman-cloud
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow metrics scraping from vmagent
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-operator-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
