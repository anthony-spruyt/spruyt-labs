---
# yaml-language-server: $schema=https://raw.githubusercontent.com/cloudnative-pg/charts/refs/heads/main/charts/cloudnative-pg/values.schema.json
# Documentation: https://github.com/cloudnative-pg/charts/blob/main/charts/cloudnative-pg/README.md
# Default values: https://github.com/cloudnative-pg/charts/blob/main/charts/cloudnative-pg/values.yaml
priorityClassName: critical-infrastructure
config:
  clusterWide: true
monitoring:
  podMonitorEnabled: true
# Critical infrastructure - no CPU limit (CPU is compressible)
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 256Mi
