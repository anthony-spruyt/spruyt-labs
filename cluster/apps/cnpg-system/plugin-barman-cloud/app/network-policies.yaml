---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# CiliumNetworkPolicy for Barman Cloud plugin
# Provides sidecar for CNPG backup operations
# Allow ingress from CNPG clusters for backup sidecar communication
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-cluster-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: plugin-barman-cloud
  ingress:
    # CNPG clusters in authentik-system
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: authentik-system
            k8s:cnpg.io/cluster: authentik-cnpg-cluster
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # CNPG clusters in firefly-iii
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: firefly-iii
            k8s:cnpg.io/cluster: firefly-iii-cnpg-cluster
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # CNPG clusters in n8n-system
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: n8n-system
            k8s:cnpg.io/cluster: n8n-cnpg-cluster
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # CNPG clusters in coder-system
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: coder-system
            k8s:cnpg.io/cluster: coder-cnpg-cluster
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow ingress from CNPG operator for plugin registration/health checks
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-operator-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: plugin-barman-cloud
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
            k8s:app.kubernetes.io/name: cloudnative-pg
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# Allow metrics scraping from vmagent
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-barman-metrics-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: plugin-barman-cloud
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            k8s:app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
