---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app unifi
  namespace: &fluxnamespace flux-system
spec:
  targetNamespace: unifi
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster-storage
    - name: traefik
  interval: 1h
  path: ./cluster/apps/unifi/unifi/app
  prune: false
  sourceRef:
    kind: GitRepository
    name: *fluxnamespace
    namespace: *fluxnamespace
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
