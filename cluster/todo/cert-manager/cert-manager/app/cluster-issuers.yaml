---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: ${SECRET_ACME_EMAIL}
    profile: tlsserver
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-private-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: solver-secrets
              key: CLOUDFLARE_API_TOKEN
        selector:
          dnsZones:
            - "${EXTERNAL_DOMAIN}"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    email: ${SECRET_ACME_EMAIL}
    profile: tlsserver
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production-account-private-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: solver-secrets
              key: CLOUDFLARE_API_TOKEN
        selector:
          dnsZones:
            - "${EXTERNAL_DOMAIN}"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
# Dashboard: https://app.zerossl.com/dashboard
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zerossl-production
spec:
  acme:
    email: ${SECRET_ACME_EMAIL}
    server: https://acme.zerossl.com/v2/DV90
    privateKeySecretRef:
      name: zerossl-production-account-private-key
    externalAccountBinding:
      keyID: ${ZEROSSL_EAB_KID}
      keySecretRef:
        name: zerossl-eab-secret
        key: EAB_HMAC_Key
      keyAlgorithm: HS256
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: solver-secrets
              key: CLOUDFLARE_API_TOKEN
        selector:
          dnsZones:
            - "${EXTERNAL_DOMAIN}"
