---
# Default values: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.2.0/charts/library/common/values.schema.json
fullnameOverride: &name technitium
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  terminationGracePeriodSeconds: 20
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
controllers:
  technitium:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      # annotations:
      #   backup.velero.io/backup-volumes: config
      labels:
        role: dns-primary
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - dns-secondary
              topologyKey: kubernetes.io/hostname
    containers:
      technitium:
        image:
          repository: technitium/dns-server
          tag: 13.6.0
          pullPolicy: IfNotPresent
        env:
          - name: DNS_SERVER_DOMAIN
            value: "${DNS_SERVER_DOMAIN}"
          - name: DNS_SERVER_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: technitium-secrets
                key: DNS_SERVER_ADMIN_PASSWORD
        securityContext:
          allowPrivilegeEscalation: false
          #  Error! Read-only file system : '/tmp/'
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 40m
            memory: 192Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        probes:
          readiness:
            enabled: true
            custom: false
            spec:
              tcpSocket:
                port: 53
              periodSeconds: 5
              failureThreshold: 3
          liveness:
            enabled: true
            custom: false
            spec:
              tcpSocket:
                port: 53
              initialDelaySeconds: 15
              periodSeconds: 10
              failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
service:
  dns:
    controller: *name
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      metallb.io/loadBalancerIPs: "${LB_IP4_TECHNITIUM}"
      metallb.io/loadBalancerIPsVersion: "3"
    ports:
      dns-tcp:
        enabled: true
        port: 53
        protocol: TCP
      dns-udp:
        enabled: true
        port: 53
        protocol: UDP
      dns-over-tls:
        enabled: true
        port: 853
        protocol: TCP
      dns-over-https:
        enabled: true
        port: 443
        protocol: TCP
      api-http:
        port: 5380
        protocol: HTTP
      api-https:
        port: 53443
        protocol: HTTPS
    ipFamilyPolicy: SingleStack
    ipFamilies:
      - IPv4
persistence:
  config:
    enabled: true
    existingClaim: technitium
    globalMounts:
      - path: /etc/dns
  tls:
    enabled: true
    type: secret
    name: dns-internal-spruyt-xyz-tls
    globalMounts:
      - path: /certs
        readOnly: true
