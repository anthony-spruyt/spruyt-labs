apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cilium/cilium.yaml
  - cilium/network-policies/allow-all.yaml
  - traefik/traefik-namespace.yaml
  - traefik/traefik.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: cilium-config
    namespace: kube-system
    files:
      - values.yaml=cilium/cilium-values.yaml