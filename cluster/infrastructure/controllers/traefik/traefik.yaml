---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://helm.traefik.io/traefik
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: traefik
      version: "36.3.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  targetNamespace: traefik
  values:
    deployment:
      enabled: true
      kind: DaemonSet
    hostNetwork: true
    service:
      enabled: false
    ingressClass:
      enabled: true
      isDefaultClass: true
    ports:
      web:
        port: 80
      websecure:
        port: 443
    providers:
      kubernetesCRD: {}
      kubernetesIngress: {}
