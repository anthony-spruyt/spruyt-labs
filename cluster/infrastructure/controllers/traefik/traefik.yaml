---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://helm.traefik.io/traefik
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: traefik
      version: "36.3.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  targetNamespace: traefik
  # https://github.com/traefik/traefik-helm-chart/blob/v36.3.0/traefik/values.yaml
  # https://github.com/traefik/traefik-helm-chart/blob/v36.3.0/EXAMPLES.md
  values:
    deployment:
      enabled: true
      kind: Deployment
      replicas: 1
    ingressClass:
      enabled: true
      isDefaultClass: true
    ingressRoute:
      dashboard:
        enabled: false
    ports:
      web:
        redirectTo:
          port: websecure
    service:
      externalIPs:
        - 159.196.222.36
    # https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
    securityContext:
      seccompProfile:
        type: RuntimeDefault
    # https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

        