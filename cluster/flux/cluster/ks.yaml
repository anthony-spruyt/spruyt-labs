---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-meta
  namespace: flux-system
spec:
  # 4h interval - webhooks trigger immediate reconciliation on changes
  # Ref: https://github.com/anthony-spruyt/spruyt-labs/issues/233
  interval: 4h
  path: ./cluster/flux/meta
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  patches:
    # Add defaults to all HelmRepository Kustomizations
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: HelmRepository
        metadata:
          name: not-used
        spec:
          interval: 15m
          timeout: 3m
      target:
        group: source.toolkit.fluxcd.io
        kind: HelmRepository
        labelSelector: helmrepositorydefaults.flux.home.arpa/disabled notin (true)
    # Add defaults to all OCIRepository Kustomizations
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: not-used
        spec:
          interval: 15m
          timeout: 3m
          layerSelector:
            mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
            operation: copy
      target:
        group: source.toolkit.fluxcd.io
        kind: OCIRepository
        labelSelector: ocirepositorydefaults.flux.home.arpa/disabled notin (true)
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-meta
  # 4h interval - webhooks trigger immediate reconciliation on changes
  # Ref: https://github.com/anthony-spruyt/spruyt-labs/issues/233
  interval: 4h
  path: ./cluster/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  patches:
    # Add defaults to all Kustomizations
    # 4h interval - webhooks trigger immediate reconciliation on changes
    # Ref: https://github.com/anthony-spruyt/spruyt-labs/issues/233
    - patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          interval: 4h
          sourceRef:
            kind: GitRepository
            name: flux-system
            namespace: flux-system
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        labelSelector: kustomizationdefaults.flux.home.arpa/disabled notin (true)
    # Add SOPS decryption to all Kustomizations
    - patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          decryption:
            provider: sops
            secretRef:
              name: sops-age
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        labelSelector: sops.flux.home.arpa/disabled notin (true)
    # Add post build substitutions to all Kustomizations
    - patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          postBuild:
            substituteFrom:
              - kind: ConfigMap
                name: cluster-settings
              - kind: Secret
                name: cluster-secrets
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        labelSelector: substitution.flux.home.arpa/disabled notin (true)
