---
# https://yamllint.readthedocs.io/en/latest/configuration.html
ignore: |
  *.sops.*
extends: default
rules:
  truthy:
    allowed-values: ["true", "false"]
  comments:
    require-starting-space: false
    min-spaces-from-content: 1
  comments-indentation: disable
  line-length: disable
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
  indentation: enable
  document-start: disable
