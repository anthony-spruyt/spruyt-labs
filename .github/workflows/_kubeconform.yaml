---
name: Kubeconform

on: # yamllint disable-line rule:truthy
  workflow_call: {}

permissions:
  contents: read

jobs:
  kubeconform:
    name: Validate manifests
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=github-releases depName=kubernetes/kubernetes
      KUBERNETES_VERSION: "1.36.2"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup kubeconform
        uses: bmuschko/setup-kubeconform@5ccaecbbf012bcb1eeeab66e649db64a477ade8f # v1

      - name: Validate cluster manifests
        run: |
          find cluster -name '*.yaml' -type f \
            ! -name '*sops*' \
            ! -name 'namespace.yaml' \
            ! -name 'values.yaml' \
            ! -name 'kustomizeconfig.yaml' \
            ! -path '*/flux-system/*' \
            ! -path '*/blueprints/*' \
            -print0 | xargs -0 kubeconform \
              -summary \
              -skip CustomResourceDefinition \
              -ignore-missing-schemas \
              -kubernetes-version "$KUBERNETES_VERSION" \
              -output json
