# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "Release Shutdown Orchestrator"
on:
  push:
    tags:
      - "shutdown-orchestrator/v*"
permissions:
  contents: "write"
  packages: "write"
  id-token: "write"
  attestations: "write"
env:
  IMAGE: "ghcr.io/anthony-spruyt/shutdown-orchestrator"
  WORKDIR: "cmd/shutdown-orchestrator"
jobs:
  test:
    name: "Test"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
      - name: "Setup Go"
        uses: "actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5" # v5
        with:
          go-version-file: "${{ env.WORKDIR }}/go.mod"
          cache-dependency-path: "${{ env.WORKDIR }}/go.sum"
      - name: "Run tests"
        working-directory: "${{ env.WORKDIR }}"
        run: go test -race ./...
  release:
    name: "Build, push and release"
    needs: "test"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
      - name: "Extract version from tag"
        id: "version"
        run: |
          # Tag format: shutdown-orchestrator/v1.2.3
          TAG="${GITHUB_REF#refs/tags/shutdown-orchestrator/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2" # v3
      - name: "Login to GHCR"
        uses: "docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772" # v3
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - name: "Docker metadata"
        id: "meta"
        uses: "docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804" # v5
        with:
          images: "${{ env.IMAGE }}"
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
      - name: "Extract Go version from go.mod"
        id: "go-version"
        run: echo "version=$(grep '^go ' ${{ env.WORKDIR }}/go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: "Build and push"
        id: "push"
        uses: "docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1" # v6
        with:
          context: "${{ env.WORKDIR }}"
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          build-args: |
            GO_VERSION=${{ steps.go-version.outputs.version }}
            VERSION=${{ steps.version.outputs.tag }}
            COMMIT=${{ github.sha }}
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"
          sbom: true
          provenance: "mode=max"
      - name: "Generate provenance attestation"
        uses: "actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275" # v4
        with:
          subject-name: "${{ env.IMAGE }}"
          subject-digest: "${{ steps.push.outputs.digest }}"
          push-to-registry: true
      - name: "Generate release notes"
        id: "notes"
        env:
          TAG: "${{ steps.version.outputs.tag }}"
          DIGEST: "${{ steps.push.outputs.digest }}"
        run: |
          {
            echo 'RELEASE_NOTES<<NOTES_EOF'
            printf '## Container Image\n\n'
            printf '```\n'
            printf 'ghcr.io/anthony-spruyt/shutdown-orchestrator:%s\n' "${TAG#v}"
            printf '```\n\n'
            # shellcheck disable=SC2016
            printf '**Digest:** `%s`\n\n' "${DIGEST}"
            printf '## Verify Provenance\n\n'
            printf '```bash\n'
            printf 'gh attestation verify oci://ghcr.io/anthony-spruyt/shutdown-orchestrator:%s --owner anthony-spruyt\n' "${TAG#v}"
            printf '```\n'
            echo 'NOTES_EOF'
          } >> "$GITHUB_ENV"
      - name: "Create GitHub Release"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          TAG: "${{ steps.version.outputs.tag }}"
        run: |
          gh release create "shutdown-orchestrator/${TAG}" \
            --title "shutdown-orchestrator ${TAG}" \
            --notes "${RELEASE_NOTES}"
