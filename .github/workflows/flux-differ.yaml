---
name: Flux differ

on:
  pull_request:
    branches: ["*"]
    paths: ["cluster/**.yaml"]

permissions: read-all

jobs:
  flux-differ:
    name: Flux differ
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
      checks: read
      statuses: write
    strategy:
      matrix:
        path: ["cluster"]
        resource: ["helmrelease", "kustomization"]
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.6.4

      - name: Diff resources
        uses: allenporter/flux-local/action/diff@7.5.6
        id: diff
        with:
          sources: flux-system
          path: "${{ matrix.path }}"
          resource: "${{ matrix.resource }}"

      - name: Comment truncated diff via github-script
        uses: actions/github-script@v6
        env:
          DIFF: ${{ steps.diff.outputs.diff }}
          TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          github-token: ${{ env.TOKEN }}
          script: |
            const diff = process.env.DIFF || ''
            if (!diff) {
              core.info('No diff to post.')
              return
            }

            // trim to first 65k chars
            const truncated = diff.slice(0, 65000)

            // build the comment body
            const body = [
              '```diff',
              truncated,
              '```'
            ].join('\n')

            // create or update a comment
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body
            })
