---
name: Flux differ

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
    paths:
      - "cluster/**.yaml"

permissions: read-all

jobs:
  flux-differ:
    name: Flux differ
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
      checks: read
      statuses: write
    strategy:
      matrix:
        path: ["cluster"]
        resource: ["helmrelease", "kustomization"]
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.8.3

      - name: Diff resources
        uses: allenporter/flux-local/action/diff@8.1.0
        id: diff
        with:
          sources: flux-system
          path: "${{ matrix.path }}"
          resource: "${{ matrix.resource }}"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Truncate diff to file
        shell: bash
        run: |
          set -eo pipefail

          # 1) Slurp the full diff into a file via heredoc
          cat > full-diff.txt <<'DIFF'
          ${{ steps.diff.outputs.diff }}
          DIFF

          # 2) Chop it down to 65 000 bytes
          head -c 65000 full-diff.txt \
            > truncated-diff.txt
