---
name: Flux differ

on: # yamllint disable-line rule:truthy
  workflow_call:
    secrets:
      FLUX_DIFFER_CLIENT_ID:
        required: true
      FLUX_DIFFER_PRIVATE_KEY:
        required: true

jobs:
  flux-differ:
    name: Flux differ
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        path: ["cluster"]
        resource: ["helmrelease", "kustomization"]
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: generate-token
        with:
          client-id: "${{ secrets.FLUX_DIFFER_CLIENT_ID }}"
          private-key: "${{ secrets.FLUX_DIFFER_PRIVATE_KEY }}"

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@5adad89dcce7b79f20274ae8e112bcec7bd46764 # v2.8.5

      - name: Diff resources
        uses: allenporter/flux-local/action/diff@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        id: diff
        with:
          sources: flux-system
          path: "${{ matrix.path }}"
          resource: "${{ matrix.resource }}"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Truncate diff to file
        shell: bash
        run: |
          set -eo pipefail

          # Read diff.patch directly from the file the flux-local action
          # generated, instead of expanding the step output into an env var
          # which hits ARG_MAX on large diffs (e.g. bulk pin PRs)
          cp diff.patch full-diff.txt

          # Chop it down to 65 000 bytes
          head -c 65000 full-diff.txt \
            > truncated-diff.txt
