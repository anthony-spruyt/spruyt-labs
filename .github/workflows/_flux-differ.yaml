---
name: Flux differ

on: # yamllint disable-line rule:truthy
  workflow_call:
    secrets:
      BOT_APP_ID:
        required: true
      BOT_APP_PRIVATE_KEY:
        required: true

jobs:
  flux-differ:
    name: Flux differ
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        path: ["cluster"]
        resource: ["helmrelease", "kustomization"]
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: generate-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@871be9b40d53627786d3a3835a3ddba1e3234bd2 # v2.8.3

      - name: Diff resources
        uses: allenporter/flux-local/action/diff@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        id: diff
        with:
          sources: flux-system
          path: "${{ matrix.path }}"
          resource: "${{ matrix.resource }}"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Truncate diff to file
        shell: bash
        run: |
          set -eo pipefail

          # Read diff.patch directly from the file the flux-local action
          # generated, instead of expanding the step output into an env var
          # which hits ARG_MAX on large diffs (e.g. bulk pin PRs)
          cp diff.patch full-diff.txt

          # Chop it down to 65 000 bytes
          head -c 65000 full-diff.txt \
            > truncated-diff.txt
