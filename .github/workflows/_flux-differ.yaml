---
name: Flux differ

on: # yamllint disable-line rule:truthy
  workflow_call:
    secrets:
      BOT_APP_ID:
        required: true
      BOT_APP_PRIVATE_KEY:
        required: true

jobs:
  flux-differ:
    name: Flux differ
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        path: ["cluster"]
        resource: ["helmrelease", "kustomization"]
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: generate-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@871be9b40d53627786d3a3835a3ddba1e3234bd2 # v2.8.3

      - name: Diff resources
        uses: allenporter/flux-local/action/diff@d4ebcae7ae08c8c8b8b7c1f515cf86759f9ca950 # 8.1.0
        id: diff
        with:
          sources: flux-system
          path: "${{ matrix.path }}"
          resource: "${{ matrix.resource }}"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Truncate diff to file
        shell: bash
        env:
          DIFF_OUTPUT: "${{ steps.diff.outputs.diff }}"
        run: |
          set -eo pipefail

          # Write diff via env var to avoid heredoc injection
          printf '%s' "$DIFF_OUTPUT" > full-diff.txt

          # Chop it down to 65 000 bytes
          head -c 65000 full-diff.txt \
            > truncated-diff.txt
