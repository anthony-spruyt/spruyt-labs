# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "Bull Board"
on:
  workflow_call: {}
permissions:
  contents: "read"
  security-events: "write"
env:
  WORKDIR: "ts/agent-queue-worker/bull-board"
jobs:
  test:
    name: "Test"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
      - name: "Setup Node.js"
        uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6
        with:
          node-version: "24"
      - name: "Type check"
        working-directory: "${{ env.WORKDIR }}"
        run: npm ci --ignore-scripts && npx tsc --noEmit
  build:
    name: "Docker build"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd" # v4
      - name: "Build image"
        uses: "docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f" # v7
        with:
          context: "${{ env.WORKDIR }}"
          push: false
          load: true
          tags: "local/bull-board:ci"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"
      - name: "Trivy vulnerability scan"
        uses: "anthony-spruyt/repo-operator/.github/actions/trivy-scan@8425319a660f72eb27a2cf4b160c8a916d8affe2" # main
        with:
          image-ref: "local/bull-board:ci"
          trivyignores: ".trivyignore.yaml"
          category: "trivy-bull-board"
