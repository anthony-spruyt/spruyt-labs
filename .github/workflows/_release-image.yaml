# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "Release Image"
on:
  workflow_call:
    inputs:
      image:
        description: "Image name (e.g., agent-queue-worker)"
        required: true
        type: "string"
      workdir:
        description: "Build context path (e.g., ts/agent-queue-worker)"
        required: true
        type: "string"
      tag-prefix:
        description: "Git tag prefix (e.g., agent-queue-worker/v)"
        required: true
        type: "string"
      push:
        description: "Push to GHCR and create release"
        required: false
        type: "boolean"
        default: false
      language:
        description: "node or go"
        required: true
        type: "string"
      bump:
        description: "Semver bump type"
        required: false
        type: "string"
        default: "patch"
    outputs:
      digest:
        description: "Image digest"
        value: "${{ jobs.build-and-release.outputs.digest }}"
      version:
        description: "Released version"
        value: "${{ jobs.resolve-version.outputs.version }}"
concurrency:
  group: "release-${{ inputs.image }}-${{ github.ref }}"
  cancel-in-progress: false
permissions:
  contents: "write"
  packages: "write"
  id-token: "write"
  attestations: "write"
  security-events: "write"
jobs:
  resolve-version:
    name: "Resolve version"
    runs-on: "ubuntu-latest"
    outputs:
      tag: "${{ steps.bump.outputs.tag }}"
      version: "${{ steps.bump.outputs.version }}"
      prev-tag: "${{ steps.bump.outputs.prev-tag }}"
      has-changes: "${{ steps.diff.outputs.has-changes }}"
      changelog: "${{ steps.diff.outputs.changelog }}"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - name: "Checkout"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
        with:
          fetch-depth: 0
      - name: "Compute next version"
        id: "bump"
        env:
          BUMP: "${{ inputs.bump }}"
          PREFIX: "${{ inputs.tag-prefix }}"
        run: |
          LATEST=$(git tag --list "${PREFIX}*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#"${PREFIX}"}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          {
            echo "version=$VERSION"
            echo "tag=v$VERSION"
            echo "prev-tag=$LATEST"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::Bumping $BUMP: $CURRENT -> $VERSION"
      - name: "Check for changes since last tag"
        id: "diff"
        env:
          PREV_TAG: "${{ steps.bump.outputs.prev-tag }}"
          WORKDIR: "${{ inputs.workdir }}"
        run: |
          if [ -z "$PREV_TAG" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "changelog=Initial release" >> "$GITHUB_OUTPUT"
            echo "::notice::No previous tag, treating as initial release"
            exit 0
          fi

          COMMITS=$(git log --oneline "${PREV_TAG}..HEAD" -- "${WORKDIR}/" 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes in ${WORKDIR}/ since ${PREV_TAG}, skipping release"
            exit 0
          fi

          echo "has-changes=true" >> "$GITHUB_OUTPUT"

          # Store changelog as multiline output
          {
            echo "changelog<<__CHANGELOG_DELIM_9f3a__"
            echo "$COMMITS" | while read -r line; do
              echo "- $line"
            done
            echo "__CHANGELOG_DELIM_9f3a__"
          } >> "$GITHUB_OUTPUT"

          COMMIT_COUNT=$(echo "$COMMITS" | wc -l)
          echo "::notice::Found ${COMMIT_COUNT} commit(s) in ${WORKDIR}/ since ${PREV_TAG}"
  check-release:
    name: "Check release"
    needs: "resolve-version"
    if: "needs.resolve-version.outputs.has-changes == 'true'"
    runs-on: "ubuntu-latest"
    outputs:
      should-build: "${{ steps.check.outputs.should-build }}"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - name: "Login to GHCR (read-only)"
        uses: "docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee" # v4
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - name: "Check if image already exists"
        id: "check"
        env:
          PUSH: "${{ inputs.push }}"
          IMAGE_REF: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}:${{ needs.resolve-version.outputs.version }}"
          VERSION: "${{ needs.resolve-version.outputs.version }}"
          TAG_PREFIX: "${{ inputs.tag-prefix }}"
        run: |
          if [ "$PUSH" != "true" ]; then
            echo "::notice::Dry run mode, will build"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if image tag already exists in registry
          if docker manifest inspect "$IMAGE_REF" > /dev/null 2>&1; then
            echo "::warning::Image $IMAGE_REF already exists in registry, skipping build"
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Image $IMAGE_REF not found in registry, will build"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          fi
  test:
    name: "Test"
    needs: "resolve-version"
    if: "needs.resolve-version.outputs.has-changes == 'true'"
    runs-on: "ubuntu-latest"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - name: "Checkout"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - name: "Setup Node.js"
        if: "inputs.language == 'node'"
        uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6
        with:
          node-version: "24"
      - name: "Type check (Node)"
        if: "inputs.language == 'node'"
        working-directory: "${{ inputs.workdir }}"
        run: npm ci --ignore-scripts && npx tsc --noEmit
      - name: "Setup Go"
        if: "inputs.language == 'go'"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c" # v6
        with:
          go-version-file: "${{ inputs.workdir }}/go.mod"
          cache-dependency-path: "${{ inputs.workdir }}/go.sum"
      - name: "Run tests (Go)"
        if: "inputs.language == 'go'"
        working-directory: "${{ inputs.workdir }}"
        run: go test -race ./...
  build-and-release:
    name: "Build and release"
    needs:
      - "resolve-version"
      - "check-release"
      - "test"
    if: "needs.resolve-version.outputs.has-changes == 'true' && needs.check-release.outputs.should-build == 'true'"
    runs-on: "ubuntu-latest"
    outputs:
      digest: "${{ steps.push.outputs.digest }}"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - name: "Checkout"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5" # v4
      - name: "Login to GHCR"
        if: "inputs.push"
        uses: "docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee" # v4
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - name: "Docker metadata"
        id: "meta"
        uses: "docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302" # v6
        with:
          images: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}"
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.tag }}
            type=raw,value=latest
      - name: "Extract Go version"
        if: "inputs.language == 'go'"
        id: "go-version"
        env:
          WORKDIR: "${{ inputs.workdir }}"
        run: echo "version=$(grep '^go ' "${WORKDIR}/go.mod" | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: "Build image (local)"
        id: "build-local"
        uses: "docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf" # v7
        with:
          context: "${{ inputs.workdir }}"
          push: false
          load: true
          tags: "local/${{ inputs.image }}:ci"
          build-args: "${{ inputs.language == 'go' && format('GO_VERSION={0}\nVERSION={1}\nCOMMIT={2}', steps.go-version.outputs.version, needs.resolve-version.outputs.tag, github.sha) || '' }}"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"
      - name: "Push image to GHCR"
        if: "inputs.push"
        id: "push"
        uses: "docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf" # v7
        with:
          context: "${{ inputs.workdir }}"
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          build-args: "${{ inputs.language == 'go' && format('GO_VERSION={0}\nVERSION={1}\nCOMMIT={2}', steps.go-version.outputs.version, needs.resolve-version.outputs.tag, github.sha) || '' }}"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"
          sbom: true
          provenance: "mode=max"
      - name: "Generate provenance attestation"
        if: "inputs.push"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4
        with:
          subject-name: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}"
          subject-digest: "${{ steps.push.outputs.digest }}"
          push-to-registry: true
      - name: "Create git tag"
        if: "inputs.push"
        env:
          TAG: "${{ needs.resolve-version.outputs.tag }}"
          PREFIX: "${{ inputs.tag-prefix }}"
        run: |
          git tag "${PREFIX}${TAG#v}"
          git push origin "${PREFIX}${TAG#v}"
      - name: "Generate release notes"
        if: "inputs.push"
        env:
          IMAGE: "${{ inputs.image }}"
          TAG: "${{ needs.resolve-version.outputs.tag }}"
          DIGEST: "${{ steps.push.outputs.digest }}"
          OWNER: "${{ github.repository_owner }}"
          CHANGELOG: "${{ needs.resolve-version.outputs.changelog }}"
          SHA: "${{ github.sha }}"
          RUN_ID: "${{ github.run_id }}"
          SERVER_URL: "${{ github.server_url }}"
          REPO: "${{ github.repository }}"
        run: |
          {
            echo 'RELEASE_NOTES<<__NOTES_DELIM_7b2e__'
            printf '## Container Image\n\n'
            printf '```\n'
            printf 'ghcr.io/%s/%s:%s\n' "${OWNER}" "${IMAGE}" "${TAG#v}"
            printf '```\n\n'
            # shellcheck disable=SC2016
            printf '**Digest:** `%s`\n\n' "${DIGEST}"
            printf '**Commit:** %s | **Run:** [#%s](%s/%s/actions/runs/%s)\n\n' \
              "${SHA:0:8}" "${RUN_ID}" "${SERVER_URL}" "${REPO}" "${RUN_ID}"
            printf '### Changes\n\n'
            printf '%s\n' "${CHANGELOG}"
            echo '__NOTES_DELIM_7b2e__'
          } >> "$GITHUB_ENV"
      - name: "Create GitHub Release"
        if: "inputs.push"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          IMAGE: "${{ inputs.image }}"
          TAG: "${{ needs.resolve-version.outputs.tag }}"
          PREFIX: "${{ inputs.tag-prefix }}"
        run: |
          gh release create "${PREFIX}${TAG#v}" \
            --title "${IMAGE} ${TAG}" \
            --notes "${RELEASE_NOTES}"
