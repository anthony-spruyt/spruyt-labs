# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "Release Agent Queue Worker"
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: "choice"
        options:
          - "patch"
          - "minor"
          - "major"
permissions:
  contents: "write"
  packages: "write"
  id-token: "write"
  attestations: "write"
  security-events: "write"
jobs:
  release:
    uses: "./.github/workflows/_release-image.yaml"
    with:
      image: "agent-queue-worker"
      workdir: "ts/agent-queue-worker"
      tag-prefix: "agent-queue-worker/v"
      language: "node"
      push: true
      bump: "${{ inputs.bump }}"
    secrets: "inherit"
