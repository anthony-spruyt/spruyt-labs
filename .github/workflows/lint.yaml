---
# https://github.com/marketplace/actions/super-linter
name: Lint

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions: read-all

env:
  VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      actions: read
      checks: read
      statuses: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Repo checkout
        uses: actions/checkout@v5
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0
      - name: Run super linter
        uses: super-linter/super-linter@v8.2.0
        env:
          DEFAULT_BRANCH: "origin/main"
          FILTER_REGEX_EXCLUDE: '.*sops.*|.*/mcp\.json$'
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          IGNORE_GITIGNORED_FILES: "true"
          LINTER_RULES_PATH: ".github/linters"
          VALIDATE_ALL_CODEBASE: "${{ env.VALIDATE_ALL_CODEBASE }}"
          VALIDATE_BASH: "true"
          VALIDATE_BASH_EXEC: "true"
          VALIDATE_GITHUB_ACTIONS: "true"
          VALIDATE_GITLEAKS: "true"
          VALIDATE: "true"
          VALIDATE_JSON: "true"
          VALIDATE_JSON_PRETTIER: "true"
          VALIDATE_JSONC: "true"
          VALIDATE_JSONC_PRETTIER: "true"
          VALIDATE_NATURAL_LANGUAGE: "true"
          VALIDATE_MARKDOWN: "true"
          VALIDATE_MARKDOWN_PRETTIER: "true"
          VALIDATE_RENOVATE: "true"
          VALIDATE_TERRAFORM_FMT: "true"
          VALIDATE_TERRAFORM_TFLINT: "true"
          VALIDATE_TRIVY: "true"
          VALIDATE_YAML: "true"
          VALIDATE_YAML_PRETTIER: "true"
          #VALIDATE_CHECKOV: "true" # Cant get this one working locally
          #VALIDATE_TERRAFORM_TERRASCAN: "true" # Do not need doubling up
