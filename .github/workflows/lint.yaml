---
name: Lint

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions: read-all

env:
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
  VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      actions: read
      checks: read
      statuses: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0
      - name: Lint
        uses: github/super-linter/slim@v7
        env:
          VALIDATE_ALL_CODEBASE: ${{ env.VALIDATE_ALL_CODEBASE }}
          DEFAULT_BRANCH: "${{ env.DEFAULT_BRANCH }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          ANSIBLE_CONFIG_FILE: .gitbub/linters/.ansible-lint
          MARKDOWN_CONFIG_FILE: .gitbub/linters/.markdownlint.yaml
          TERRAFORM_TFLINT_CONFIG_FILE: .gitbub/linters/.tflint.hcl
          YAML_CONFIG_FILE: .gitbub/linters/.yamllint.yaml
          KUBERNETES_KUBECONFORM_OPTIONS: --ignore-missing-schemas
