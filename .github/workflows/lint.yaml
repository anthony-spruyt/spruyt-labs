---
name: Lint

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions: read-all

env:
  VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      actions: read
      checks: read
      statuses: write
      issues: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Repo checkout
        uses: actions/checkout@v6
        with:
          # Full git history is needed to get a proper list of changed files within `mega-linter`
          fetch-depth: 0
      - name: Run mega linter
        uses: oxsecurity/megalinter@v9
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
