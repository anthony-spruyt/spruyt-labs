---
name: Kyverno Policy Test

on: # yamllint disable-line rule:truthy
  workflow_call: {}

permissions:
  contents: read

jobs:
  kyverno-test:
    name: Test policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0

      - name: Create test resources
        run: |
          mkdir -p /tmp/kyverno-test

          # Basic pod for testing mutate policies
          printf '%s\n' \
            'apiVersion: v1' \
            'kind: Pod' \
            'metadata:' \
            '  name: test-pod' \
            '  namespace: default' \
            'spec:' \
            '  containers:' \
            '    - name: app' \
            '      image: nginx:latest' \
            > /tmp/kyverno-test/pod.yaml

          # Deployment for testing autogen rules
          printf '%s\n' \
            'apiVersion: apps/v1' \
            'kind: Deployment' \
            'metadata:' \
            '  name: test-deployment' \
            '  namespace: default' \
            'spec:' \
            '  replicas: 1' \
            '  selector:' \
            '    matchLabels:' \
            '      app: test' \
            '  template:' \
            '    metadata:' \
            '      labels:' \
            '        app: test' \
            '    spec:' \
            '      containers:' \
            '        - name: app' \
            '          image: nginx:latest' \
            > /tmp/kyverno-test/deployment.yaml

          # StatefulSet for testing topology spread policy
          printf '%s\n' \
            'apiVersion: apps/v1' \
            'kind: StatefulSet' \
            'metadata:' \
            '  name: test-statefulset' \
            '  namespace: default' \
            'spec:' \
            '  serviceName: test' \
            '  replicas: 1' \
            '  selector:' \
            '    matchLabels:' \
            '      app: test-sts' \
            '  template:' \
            '    metadata:' \
            '      labels:' \
            '        app: test-sts' \
            '    spec:' \
            '      containers:' \
            '        - name: app' \
            '          image: nginx:latest' \
            > /tmp/kyverno-test/statefulset.yaml

          # Namespace for testing generate policy
          printf '%s\n' \
            'apiVersion: v1' \
            'kind: Namespace' \
            'metadata:' \
            '  name: test-namespace' \
            > /tmp/kyverno-test/namespace.yaml

      - name: Test policies against sample resources
        run: |
          echo "=== Collecting Kyverno policies ==="
          policy_files=()
          while IFS= read -r -d '' file; do
            if grep -q 'kind: ClusterPolicy\|kind: Policy' "$file" 2>/dev/null; then
              echo "Found policy: $file"
              policy_files+=("$file")
            fi
          done < <(find cluster/apps/kyverno -name '*.yaml' -type f \
            ! -name 'kustomization.yaml' \
            ! -name 'ks.yaml' \
            ! -name 'namespace.yaml' \
            -print0)

          if [ ${#policy_files[@]} -eq 0 ]; then
            echo "No policies found to test"
            exit 0
          fi

          echo "=== Testing policies with kyverno apply ==="
          kyverno apply "${policy_files[@]}" \
            --resource /tmp/kyverno-test/pod.yaml \
            --resource /tmp/kyverno-test/deployment.yaml \
            --resource /tmp/kyverno-test/statefulset.yaml \
            --resource /tmp/kyverno-test/namespace.yaml

          echo "=== All policy tests passed ==="
