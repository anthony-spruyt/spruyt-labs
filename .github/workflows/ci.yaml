# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
# See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/ci.yaml for template comments

name: "CI"
on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
permissions:
  contents: "write"
  pull-requests: "write"
  security-events: "write"
  statuses: "write"
jobs:
  changes:
    name: "Detect changes"
    runs-on: "ubuntu-latest"
    outputs:
      cluster: "${{ steps.filter.outputs.cluster }}"
      kyverno: "${{ steps.filter.outputs.kyverno }}"
      terraform: "${{ steps.filter.outputs.terraform }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
      - name: "Path filter"
        uses: "dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36" # v3
        id: "filter"
        with:
          filters: |
            cluster:
              - 'cluster/**.yaml'
            kyverno:
              - 'cluster/apps/kyverno/**'
            terraform:
              - 'infra/terraform/**'
  lint:
    uses: "anthony-spruyt/repo-operator/.github/workflows/_lint.yaml@main"
    secrets: "inherit"
  kubeconform:
    needs: "changes"
    if: "needs.changes.outputs.cluster == 'true'"
    uses: "./.github/workflows/_kubeconform.yaml"
  kyverno-test:
    needs: "changes"
    if: "needs.changes.outputs.kyverno == 'true'"
    uses: "./.github/workflows/_kyverno-test.yaml"
  terraform-validate:
    needs: "changes"
    if: "needs.changes.outputs.terraform == 'true'"
    uses: "./.github/workflows/_terraform-validate.yaml"
  flux-differ:
    needs: "changes"
    if: "github.event_name == 'pull_request' && needs.changes.outputs.cluster == 'true'"
    uses: "./.github/workflows/_flux-differ.yaml"
    secrets:
      BOT_APP_ID: "${{ secrets.BOT_APP_ID }}"
      BOT_APP_PRIVATE_KEY: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
  summary:
    needs:
      - "lint"
      - "kubeconform"
      - "kyverno-test"
      - "terraform-validate"
      - "flux-differ"
    if: "always()"
    uses: "anthony-spruyt/repo-operator/.github/workflows/_summary.yaml@main"
