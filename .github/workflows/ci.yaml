# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
# See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/ci.yaml for template comments

name: "CI"
on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
concurrency:
  group: "${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}"
  cancel-in-progress: "${{ github.event_name == 'pull_request' }}"
permissions:
  actions: "write"
  contents: "write"

  pull-requests: "write"
  security-events: "write"
  statuses: "write"
jobs:
  changes:
    name: "Detect changes"
    runs-on: "ubuntu-latest"
    outputs:
      cluster: "${{ steps.filter.outputs.cluster }}"
      kyverno: "${{ steps.filter.outputs.kyverno }}"
      terraform: "${{ steps.filter.outputs.terraform }}"
      shutdown-orchestrator: "${{ steps.filter.outputs.shutdown-orchestrator }}"
      kata-tap-qdisc-fix: "${{ steps.filter.outputs.kata-tap-qdisc-fix }}"
      mcp-header-proxy: "${{ steps.filter.outputs.mcp-header-proxy }}"
      agent-queue-worker: "${{ steps.filter.outputs.agent-queue-worker }}"
      bull-board: "${{ steps.filter.outputs.bull-board }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0
      - name: "Find last successful CI commit"
        if: "github.event_name == 'push'"
        id: "last-success"
        env:
          GH_TOKEN: "${{ github.token }}"
          WORKFLOW: "CI"
        run: |
          SHA=$(gh run list --workflow "$WORKFLOW" --branch main --status success --limit 1 --json headSha --jq '.[0].headSha // empty')
          if [ -n "$SHA" ] && git cat-file -e "$SHA" 2>/dev/null; then
            echo "base=$SHA" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
      - name: "Path filter"
        uses: "dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d" # v4
        id: "filter"
        with:
          base: "${{ steps.last-success.outputs.base }}"
          filters: |
            cluster:
              - 'cluster/**/*.yaml'
            kyverno:
              - 'cluster/apps/kyverno/**'
            terraform:
              - 'infra/terraform/**'
            shutdown-orchestrator:
              - 'cmd/shutdown-orchestrator/**'
            kata-tap-qdisc-fix:
              - 'cmd/kata-tap-qdisc-fix/**'
            mcp-header-proxy:
              - 'cmd/mcp-header-proxy/**'
            agent-queue-worker:
              - 'ts/agent-queue-worker/**'
            bull-board:
              - 'ts/agent-queue-worker/bull-board/**'
  lint:
    uses: "anthony-spruyt/repo-operator/.github/workflows/_lint.yaml@main"
    secrets: "inherit"
  kubeconform:
    needs: "changes"
    if: "needs.changes.outputs.cluster == 'true'"
    uses: "./.github/workflows/_kubeconform.yaml"
  kyverno-test:
    needs: "changes"
    if: "needs.changes.outputs.kyverno == 'true'"
    uses: "./.github/workflows/_kyverno-test.yaml"
  terraform-validate:
    needs: "changes"
    if: "needs.changes.outputs.terraform == 'true'"
    uses: "./.github/workflows/_terraform-validate.yaml"
  shutdown-orchestrator:
    needs: "changes"
    if: "needs.changes.outputs.shutdown-orchestrator == 'true'"
    uses: "./.github/workflows/_shutdown-orchestrator.yaml"
    secrets: "inherit"
  kata-tap-qdisc-fix:
    needs: "changes"
    if: "needs.changes.outputs.kata-tap-qdisc-fix == 'true'"
    uses: "./.github/workflows/_kata-tap-qdisc-fix.yaml"
    secrets: "inherit"
  mcp-header-proxy:
    needs: "changes"
    if: "needs.changes.outputs.mcp-header-proxy == 'true'"
    uses: "./.github/workflows/_mcp-header-proxy.yaml"
    secrets: "inherit"
  agent-queue-worker:
    needs: "changes"
    if: "needs.changes.outputs.agent-queue-worker == 'true'"
    uses: "./.github/workflows/_agent-queue-worker.yaml"
    secrets: "inherit"
  bull-board:
    needs: "changes"
    if: "needs.changes.outputs.bull-board == 'true'"
    uses: "./.github/workflows/_bull-board.yaml"
    secrets: "inherit"
  summary:
    needs:
      - "lint"
      - "kubeconform"
      - "kyverno-test"
      - "terraform-validate"
      - "shutdown-orchestrator"
      - "kata-tap-qdisc-fix"
      - "mcp-header-proxy"
      - "agent-queue-worker"
      - "bull-board"
    if: "always()"
    uses: "anthony-spruyt/repo-operator/.github/workflows/_summary.yaml@main"
