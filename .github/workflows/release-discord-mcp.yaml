# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: "Release Discord MCP"
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: "choice"
        options:
          - "patch"
          - "minor"
          - "major"
permissions:
  contents: "write"
  packages: "write"
  id-token: "write"
  attestations: "write"
env:
  IMAGE: "ghcr.io/anthony-spruyt/discord-mcp"
  WORKDIR: "images/discord-mcp"
  TAG_PREFIX: "discord-mcp/v"
jobs:
  resolve-version:
    name: "Resolve version"
    runs-on: "ubuntu-latest"
    outputs:
      tag: "${{ steps.bump.outputs.tag }}"
      version: "${{ steps.bump.outputs.version }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: "Compute next version"
        id: "bump"
        env:
          BUMP: "${{ inputs.bump }}"
        run: |
          LATEST=$(git tag --list "${TAG_PREFIX}*" --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            VER=${LATEST#"${TAG_PREFIX}"}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
            case "$BUMP" in
              major) NEXT="$((MAJOR+1)).0.0" ;;
              minor) NEXT="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEXT="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_PREFIX}${NEXT}" >> "$GITHUB_OUTPUT"
  build-and-push:
    name: "Build and push"
    needs: "resolve-version"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd" # v4
      - name: "Login to GHCR"
        uses: "docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2" # v4
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - name: "Docker metadata"
        id: "meta"
        uses: "docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf" # v6
        with:
          images: "${{ env.IMAGE }}"
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=raw,value=latest
      - name: "Build and push"
        id: "push"
        uses: "docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294" # v7
        with:
          context: "${{ env.WORKDIR }}"
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          platforms: "linux/amd64"
      - name: "Attest"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4
        with:
          subject-name: "${{ env.IMAGE }}"
          subject-digest: "${{ steps.push.outputs.digest }}"
          push-to-registry: true
      - name: "Create tag"
        run: |
          git tag "${{ needs.resolve-version.outputs.tag }}"
          git push origin "${{ needs.resolve-version.outputs.tag }}"
