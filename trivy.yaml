---
# https://trivy.dev/latest/docs/references/configuration/config-file/
disable-telemetry: true
exit-code: 1
exit-on-eol: 2
scan:
  skip-dirs:
    - .secrets
    - talos/clusterconfig
  skip-files:
    - cluster/apps/csi-addons-system/csi-addons-controller-manager/app/csi-addons-config.yaml
    - cluster/apps/csi-addons-system/csi-addons-controller-manager/app/rbac.yaml
    - cluster/apps/csi-addons-system/csi-addons-controller-manager/app/setup-controller.yaml
    - cluster/apps/kube-system/snapshot-controller/app/setup-snapshot-controller.yaml
    - cluster/apps/minecraft/maintenance/minecraft-bedrock-restart.yaml
    - cluster/apps/minecraft/maintenance/role.yaml
    - cluster/apps/observability/victoria-metrics-secret-writer/app/etcd-secret-writer.yaml
    - cluster/apps/observability/victoria-metrics-secret-writer/app/role.yaml
  scanners:
    - vuln
    - misconfig
    - secret
ignorefile: .trivyignore
