---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  startCapacitorScript: "{{ .ROOT_DIR }}/.taskfiles/flux/scripts/start-capacitor.sh"

tasks:
  install-capacitor:
    desc: Install flux capacitor
    cmds:
      - curl -L "https://github.com/gimlet-io/capacitor/releases/download/capacitor-next/next-$(uname)-$(uname -m)" -o {{ .ROOT_DIR }}/capacitor/next
      - chmod +x {{ .ROOT_DIR }}/capacitor/next
  cap:
    desc: Start flux capacitor
    cmds:
      - bash {{ .startCapacitorScript }}
    interactive: true
