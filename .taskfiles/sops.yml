  encrypt-file:
    desc: encrypt sops file 'to use must include -- before path to file.' eg "task sops:encrypt -- file.yml"
    cmds:
      - export SOPS_AGE_KEY_FILE="/workspaces/spruyt-labs/secrets/age.key"
      - sops --config ".sops.yaml" --encrypt --in-place {{.CLI_ARGS}}

  decrypt-file:
    desc: decrypt sops file 'to use must include -- before path to file.'  eg "task sops:decrypt -- file.yml"
    cmds:
      - export SOPS_AGE_KEY_FILE="/workspaces/spruyt-labs/secrets/age.key"
      - sops --config ".sops.yaml" --decrypt --in-place {{.CLI_ARGS}}

  encrypt-cluster-secrets:
    desc: encrypt cluster secrets sops file
    cmds:
      - export SOPS_AGE_KEY_FILE="/workspaces/spruyt-labs/secrets/age.key"
      - sops --config "/workspaces/spruyt-labs/.sops.yaml" --encrypt --in-place "/workspaces/spruyt-labs/cluster/flux/meta/cluster-secrets.sops.yaml"

  decrypt-cluster-secrets:
    desc: decrypt cluster secrets sops file
    cmds:
      - export SOPS_AGE_KEY_FILE="/workspaces/spruyt-labs/secrets/age.key"
      - sops --config "/workspaces/spruyt-labs/.sops.yaml" --decrypt --in-place "/workspaces/spruyt-labs/cluster/flux/meta/cluster-secrets.sops.yaml"

  encrypt-talos:
    desc: encrypt talos sops files
    cmds:
      - export SOPS_AGE_KEY_FILE="/workspaces/spruyt-labs/secrets/age.key"
      - sops --config "/workspaces/spruyt-labs/.sops.yaml" --encrypt --in-place "/workspaces/spruyt-labs/talos/talenv.sops.yaml"
      - sops --config "/workspaces/spruyt-labs/.sops.yaml" --encrypt --in-place "/workspaces/spruyt-labs/talos/talsecret.sops.yaml"

  decrypt-talos:
    desc: decrypt talos sops files
      - export SOPS_AGE_KEY_FILE="/workspaces/spruyt-labs/secrets/age.key"
      - sops --config "/workspaces/spruyt-labs/.sops.yaml" --decrypt --in-place "/workspaces/spruyt-labs/talos/talenv.sops.yaml"
      - sops --config "/workspaces/spruyt-labs/.sops.yaml" --decrypt --in-place "/workspaces/spruyt-labs/talos/talsecret.sops.yaml"
