---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
vars:
  decryptScript: "{{ .ROOT_DIR }}/talos/sops-decrypt.sh"
  encryptScript: "{{ .ROOT_DIR }}/talos/sops-encrypt.sh"

tasks:
  encrypt:
    desc: Encrypt sops files
    cmds:
      - bash {{ .encryptScript }}

  decrypt:
    desc: Decrypt sops files
    cmds:
      - bash {{ .decryptScript }}
