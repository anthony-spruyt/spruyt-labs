---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  startCapacitorScript: "{{ .ROOT_DIR }}/.taskfiles/flux/scripts/start-capacitor.sh"

tasks:
  cap:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task flux:cap"'
    cmds:
      - bash {{ .startCapacitorScript }}
    interactive: true
