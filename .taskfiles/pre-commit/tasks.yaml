---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  init:
    desc: Initialize pre-commit hooks
    cmds:
      - git config --unset-all core.hooksPath || true
      - pre-commit install --install-hooks
  run:
    desc: Run pre-commit
    cmds:
      - pre-commit run --all-files
