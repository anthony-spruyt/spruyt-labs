---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  fmt: "{{ .ROOT_DIR }}/.taskfiles/terraform/scripts/fmt.sh"
  init: "{{ .ROOT_DIR }}/.taskfiles/terraform/scripts/init.sh"
  validate: "{{ .ROOT_DIR }}/.taskfiles/terraform/scripts/validate.sh"

tasks:
  login:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task terraform:login"'
    cmds:
      - terraform login
  fmt:
    desc: Terraform format all workspaces and modules
    cmds:
      - terraform fmt -recursive
    dir: /workspaces/spruyt-labs/infra/terraform
  init:
    desc: Initializes all workspaces and modules
    cmds:
      - bash {{ .init }}
  validate:
    desc: Validates all workspaces and modules
    cmds:
      - bash {{ .validate }}
