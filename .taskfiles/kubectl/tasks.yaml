---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
vars:
  deleteFailedPodsScript: "{{ .ROOT_DIR }}/.taskfiles/kubectl/scripts/delete-failed-pods.sh"

tasks:
  delete-failed-pods:
    desc: Deletes all failed pods from the cluster
    cmds:
      - bash {{ .deleteFailedPodsScript }}
