---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
vars:
  deleteFailedPodsScript: "{{ .ROOT_DIR }}/.taskfiles/kubectl/scripts/delete-failed-pods.sh"
  resetPvcAccessModeScript: "{{ .ROOT_DIR }}/.taskfiles/kubectl/scripts/reset-pvc-access-mode.sh"

tasks:
  delete-failed-pods:
    desc: Deletes all failed pods from the cluster
    cmds:
      - bash {{ .deleteFailedPodsScript }}
  reset-pvc-access-mode:
    desc: Removes the claim reference from a persistent volumen and resets the access mode. Pass the persisten volume name as CLI argument.
    cmds:
      - bash {{ .resetPvcAccessModeScript }} {{.CLI_ARGS}}
