---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  openclawScriptsDir: "{{ .ROOT_DIR }}/.taskfiles/openclaw/scripts"

tasks:
  fetch-schema:
    desc: Fetches the OpenClaw config JSON Schema from the running pod
    cmds:
      - bash {{ .openclawScriptsDir }}/fetch-schema.sh
  sync-workspace:
    desc: Copies workspace markdown files from the running pod back to the repo
    cmds:
      - bash {{ .openclawScriptsDir }}/sync-workspace.sh
