---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  installAgeScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-age.sh"
  installFluxCapacitorScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-flux-capacitor.sh"
  installFluxScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-flux.sh"
  installHelmPluginsScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-helm-plugins.sh"
  installSafeChainScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-safe-chain.sh"
  installTalhelperScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-talhelper.sh"
  installTalosctlScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-talosctl.sh"
  hubbleDropsScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/hubble-drops.sh"
  installHubbleScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-hubble.sh"
  installVeleroScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/install-velero.sh"
  runMegaLinterScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/run-mega-linter.sh"
  updateHelmPluginsScript: "{{ .ROOT_DIR }}/.taskfiles/dev-env/scripts/update-helm-plugins.sh"

tasks:
  install-age:
    desc: Installs age and age-keygen
    cmds:
      - bash {{ .installAgeScript }}
  install-flux:
    desc: Installs the Flux CLI
    cmds:
      - bash {{ .installFluxScript }}
  install-flux-capacitor:
    desc: Installs Flux Capacitor v2 local FluxCD GUI
    cmds:
      - bash {{ .installFluxCapacitorScript }}
  install-helm-plugins:
    desc: Installs Helm schema gen and diff
    cmds:
      - bash {{ .installHelmPluginsScript }}
  install-hubble:
    desc: Installs the Hubble CLI for Cilium network observability
    cmds:
      - bash {{ .installHubbleScript }}
  hubble-drops:
    desc: Shows recent dropped network traffic (blocked by network policies)
    cmds:
      - bash {{ .hubbleDropsScript }}
  install-safe-chain:
    desc: Installs safe-chain
    cmds:
      - bash {{ .installSafeChainScript }}
  install-talhelper:
    desc: Installs the Talhelper CLI
    cmds:
      - bash {{ .installTalhelperScript }}
  install-talosctl:
    desc: Installs talosctl
    cmds:
      - bash {{ .installTalosctlScript }}
  install-velero:
    desc: Installs the Velero CLI
    cmds:
      - bash {{ .installVeleroScript }}
  lint:
    desc: Runs mega-linter against the repo
    cmds:
      - bash {{ .runMegaLinterScript }}
  priv-pod:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task dev-enc:priv-pod" to run a privileged pod on a specified node'
    cmd: |
      kubectl run privileged-{{.node}} -i --rm -n dev-debug --image=null \
        --overrides="$(yq {{.ROOT_DIR}}/.taskfiles/dev-env/resources/privileged-pod.tmpl.yaml -o=json | envsubst)"
    env:
      node: "{{.node}}"
    preconditions:
      - test -f {{.ROOT_DIR}}/.taskfiles/dev-env/resources/privileged-pod.tmpl.yaml
  priv-pod-e2-1:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task dev-enc:priv-pod" to run a privileged pod on e2-1'
    cmd: |
      task dev-env:priv-pod node=e2-1
  priv-pod-e2-2:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task dev-enc:priv-pod" to run a privileged pod on e2-2'
    cmd: |
      task dev-env:priv-pod node=e2-2
  priv-pod-e2-3:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task dev-enc:priv-pod" to run a privileged pod on e2-3'
    cmd: |
      task dev-env:priv-pod node=e2-3
  priv-pod-ms-1:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task dev-enc:priv-pod" to run a privileged pod on ms-01-1'
    cmd: |
      task dev-env:priv-pod node=ms-01-1
  priv-pod-ms-2:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task dev-enc:priv-pod" to run a privileged pod on ms-01-2'
    cmd: |
      task dev-env:priv-pod node=ms-01-2
  priv-pod-ms-3:
    desc: 'DO NOT RUN THIS FROM TASK UI -> USE CLI: "task dev-enc:priv-pod" to run a privileged pod on ms-01-3'
    cmd: |
      task dev-env:priv-pod node=ms-01-3
  update-helm-plugins:
    desc: Updates Helm plugins
    cmds:
      - bash {{ .updateHelmPluginsScript }}
