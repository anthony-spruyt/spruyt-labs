---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  initScript: "{{ .ROOT_DIR }}/.taskfiles/sops/scripts/sops-encrypt.sh"
  decryptScript: "{{ .ROOT_DIR }}/.taskfiles/sops/scripts/sops-decrypt.sh"
  encryptScript: "{{ .ROOT_DIR }}/.taskfiles/sops/scripts/sops-encrypt.sh"

tasks:
  encrypt:
    desc: Encrypt sops files
    cmds:
      - bash {{ .encryptScript }}

  decrypt:
    desc: Decrypt sops files
    cmds:
      - bash {{ .decryptScript }}
