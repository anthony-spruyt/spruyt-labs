---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  installScriptsDir: "{{ .ROOT_DIR }}/.taskfiles/install/scripts"

tasks:
  age-cli:
    desc: Installs age and age-keygen
    cmds:
      - bash {{ .installScriptsDir }}/install-age.sh
  cilium-cli:
    desc: Installs the Cilium CLI
    cmds:
      - bash {{ .installScriptsDir }}/install-cilium.sh
  claude-code-cli:
    desc: Installs the Claude Code CLI
    cmds:
      - bash {{ .installScriptsDir }}/install-claude-code.sh
  cnpg-plugin:
    desc: Installs the CNPG kubectl plugin for CloudNativePG
    cmds:
      - bash {{ .installScriptsDir }}/install-cnpg.sh
  flux-cli:
    desc: Installs the Flux CLI
    cmds:
      - bash {{ .installScriptsDir }}/install-flux.sh
  flux-capacitor:
    desc: Installs Flux Capacitor v2 local FluxCD GUI
    cmds:
      - bash {{ .installScriptsDir }}/install-flux-capacitor.sh
  helm-cli:
    desc: Installs Helm
    cmds:
      - bash {{ .installScriptsDir }}/install-helm.sh
  helmfile-cli:
    desc: Installs Helmfile
    cmds:
      - bash {{ .installScriptsDir }}/install-helmfile.sh
  helm-plugins:
    desc: Installs Helm schema gen and diff
    cmds:
      - bash {{ .installScriptsDir }}/install-helm-plugins.sh
  hubble-cli:
    desc: Installs the Hubble CLI for Cilium network observability
    cmds:
      - bash {{ .installScriptsDir }}/install-hubble.sh
  kubectl-cli:
    desc: Installs kubectl
    cmds:
      - bash {{ .installScriptsDir }}/install-kubectl.sh
  kustomize-cli:
    desc: Installs kustomize
    cmds:
      - bash {{ .installScriptsDir }}/install-kustomize.sh
  safe-chain:
    desc: Installs safe-chain
    cmds:
      - bash {{ .installScriptsDir }}/install-safe-chain.sh
  talhelper-cli:
    desc: Installs the Talhelper CLI
    cmds:
      - bash {{ .installScriptsDir }}/install-talhelper.sh
  talosctl-cli:
    desc: Installs talosctl
    cmds:
      - bash {{ .installScriptsDir }}/install-talosctl.sh
  velero-cli:
    desc: Installs the Velero CLI
    cmds:
      - bash {{ .installScriptsDir }}/install-velero.sh
  task:
    desc: Updates Task (go-task) to the latest version
    cmds:
      - bash {{ .installScriptsDir }}/update-task.sh
  update-helm-plugins:
    desc: Updates Helm plugins
    cmds:
      - bash {{ .installScriptsDir }}/update-helm-plugins.sh
