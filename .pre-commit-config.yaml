# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/pre-commit-config.json

fail_fast: false
repos:
  - repo: "https://github.com/adrienverge/yamllint"
    rev: "v1.38.0"
    hooks:
      - id: "yamllint"
        args:
          - "--config-file"
          - ".yamllint.yml"
  - repo: "https://github.com/pre-commit/pre-commit-hooks"
    rev: "v6.0.0"
    hooks:
      - id: "check-merge-conflict"
      - id: "trailing-whitespace"
        args:
          - "--markdown-linebreak-ext=md"
      - id: "end-of-file-fixer"
      - id: "mixed-line-ending"
  - repo: "https://github.com/Lucas-C/pre-commit-hooks"
    rev: "v1.5.6"
    hooks:
      - id: "remove-crlf"
      - id: "remove-tabs"
        args:
          - "--whitespaces-count"
          - "2"
        exclude: "(go\\.mod|go\\.sum)$"
  - repo: "https://github.com/sirosen/texthooks"
    rev: "0.7.1"
    hooks:
      - id: "fix-smartquotes"
      - id: "fix-ligatures"
  - repo: "https://github.com/zricethezav/gitleaks"
    rev: "v8.30.1"
    hooks:
      - id: "gitleaks"
        args:
          - "--config"
          - ".gitleaks.toml"
  - repo: "https://github.com/shellcheck-py/shellcheck-py"
    rev: "v0.11.0.1"
    hooks:
      - id: "shellcheck"
  - repo: "https://github.com/scop/pre-commit-shfmt"
    rev: "v3.12.0-2"
    hooks:
      - id: "shfmt"
  - repo: "https://github.com/igorshubovych/markdownlint-cli"
    rev: "v0.48.0"
    hooks:
      - id: "markdownlint"
  - repo: "local"
    hooks:
      - id: "jsonlint"
        name: "jsonlint"
        entry: "npx @prantlf/jsonlint --quiet"
        language: "system"
        types:
          - "json"
  - repo: "https://github.com/rhysd/actionlint"
    rev: "v1.7.11"
    hooks:
      - id: "actionlint"
  - repo: "https://github.com/antonbabenko/pre-commit-terraform"
    rev: "v1.105.0"
    hooks:
      - id: "terraform_fmt"
        files: "^infra/terraform/"
      - id: "terraform_tflint"
        files: "^infra/terraform/"
  - repo: "https://github.com/k8s-at-home/sops-pre-commit"
    rev: "v2.1.1"
    hooks:
      - id: "forbid-secrets"
