# yaml-language-server: $schema=https://raw.githubusercontent.com/oxsecurity/megalinter/main/megalinter/descriptors/schemas/megalinter-configuration.jsonschema.json
# Base MegaLinter configuration synced from repo-operator
# This file is automatically updated - do not modify directly
# To add custom linters, modify .mega-linter.yml instead

DEFAULT_BRANCH: "main"
ENABLE_LINTERS:
  - "ACTION_ACTIONLINT"
  - "BASH_SHELLCHECK"
  - "BASH_SHFMT"
  - "JSON_JSONLINT"
  - "MARKDOWN_MARKDOWNLINT"
  - "REPOSITORY_GITLEAKS"
  - "REPOSITORY_SECRETLINT"
  - "REPOSITORY_TRIVY"
  - "SPELL_LYCHEE"
  - "YAML_YAMLLINT"
EXCLUDED_DIRECTORIES:
  - ".claude"
  - ".git"
  - "plans"
FILTER_REGEX_EXCLUDE: "(CLAUDE\\.md$)"
FLAVOR_SUGGESTIONS: false
IGNORE_GITIGNORED_FILES: true
REPOSITORY_GITLEAKS_ARGUMENTS:
  - "--no-git"
REPOSITORY_SECRETLINT_ARGUMENTS:
  - "--secretlintignore"
  - ".secretlintignore"
SPELL_LYCHEE_FILTER_REGEX_EXCLUDE: "(package-lock\\.json)"
REPOSITORY_TRIVY_CONFIG_FILE: "trivy-mega-linter.yaml"
REPOSITORY_TRIVY_ARGUMENTS: "--source misconfig,secret --exit-code 1"
REPOSITORY_TRIVY_COMMAND_REMOVE_ARGUMENTS: "--source vuln,misconfig --exit-code 1"
