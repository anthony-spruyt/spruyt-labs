---
# https://taskfile.dev
version: "3"

vars:
  PROJECT_DIR:
    sh: "git rev-parse --show-toplevel"
  CLUSTER_DIR: "{{.PROJECT_DIR}}/cluster"

includes:
  dev-env: .taskfiles/dev-env/tasks.yaml
  flux: .taskfiles/flux/tasks.yaml
  kubectl: .taskfiles/kubectl/tasks.yaml
  pre-commit: .taskfiles/pre-commit/tasks.yaml
  rook-ceph: .taskfiles/rook-ceph/tasks.yaml
  sops: .taskfiles/sops/tasks.yaml
  talos: .taskfiles/talos/tasks.yaml
  terraform: .taskfiles/terraform/tasks.yaml
  test: .taskfiles/test/tasks.yaml
