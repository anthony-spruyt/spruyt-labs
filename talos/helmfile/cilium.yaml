---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true
repositories:
  - name: cilium
    url: https://helm.cilium.io
releases:
  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: 1.18.2
    disableValidation: true
    values: ["cilium-values.yaml"]
