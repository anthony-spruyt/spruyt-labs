---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
# Example configs:
# - https://github.com/budimanjojo/talhelper/blob/master/example/talconfig.yaml
# - https://github.com/mrwulf/home-cluster/blob/main/talos/talconfig.yaml

# renovate: depName=ghcr.io/siderolabs/installer datasource=docker
talosVersion: v1.10.6
# renovate: depName=ghcr.io/siderolabs/kubelet datasource=docker
kubernetesVersion: v1.33.3

clusterName: ${CLUSTER_NAME}
endpoint: https://${LB_IP4_KUBEAPI}:6443
#endpoint: https://${DOMAIN_NAME_KUBEAPI} # This is dependant on the DNS server so can be flakey if that is down rather use the load balancer service IP
#endpoint: https://${C1_IP4}:6443 # Change back to this if doing a fresh bootsrap
domain: ${CLUSTER_DOMAIN}

additionalApiServerCertSans:
  - 127.0.0.1
  - ${LB_IP4_KUBEAPI}
  - ${LB_IP6_KUBEAPI}
  - ${DOMAIN_NAME_KUBEAPI}

cniConfig:
  name: none

clusterSvcNets:
  - ${CLUSTER_SVC_NETS_IP4}
  - ${CLUSTER_SVC_NETS_IP6}
clusterPodNets:
  - ${CLUSTER_POD_NETS_IP4}
  - ${CLUSTER_POD_NETS_IP6}

nodes:
  - hostname: ${C1_HOST}
    controlPlane: true
    ipAddress: ${C1_IP4}
    machineSpec: &e2machinespec
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    installDiskSelector: &e2installdiskselector
      size: "<= 300GB"
      model: RTL9210B-CG
    networkInterfaces:
      - interface: eno1
        dhcp: &dhcp false
        addresses:
          - "${C1_IP4}/24"
          - "${C1_IP6}/64"
        mtu: &mtu 9000
        routes: &routes
          - network: "0.0.0.0/0"
            gateway: "${GATEWAY_IP4}"
            #metric: 1024
          - network: ::/0
            gateway: "${GATEWAY_IP6}"
            #metric: 4096
        vip: &vip
          ip: "${KUBEAPI_VIP_IP}"
    certSANs: &additionalMachineCertSans
      - ${C1_IP4}
      - ${C2_IP4}
      - ${C3_IP4}
      - 127.0.0.1
      - ${LB_IP4_KUBEAPI}
      - ${DOMAIN_NAME_KUBEAPI}
    nodeLabels: &e2nodelabels
      node-role.kubernetes.io/control-plane: ""
      #node.kubernetes.io/exclude-from-external-load-balancers: "" # only use this if not scheduling on control plane
    nodeAnnotations: &nodeannotations
      installerImage: "factory.talos.dev/metal-installer-secureboot/777390ee380b57c5589bda8c3c3673d6b1e3252add27737701d216fbd50a3774:v1.10.6"
    schematic: &e2schematic
      customization:
        secureboot:
          includeWellKnownCertificates: true
        extraKernelArgs:
          - -lockdown
          - lockdown=integrity
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    patches: &e2patches
      - |-
        machine:
          install:
             wipe: true
          systemDiskEncryption:
            ephemeral: &e2encryption
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
                #- slot: 1
                #  nodeID: {}
              options:
                - no_read_workqueue
                - no_write_workqueue
            state: *e2encryption
          network:
            extraHostEntries:
              - ip: ${LB_IP4_KUBEAPI}
                aliases:
                  - ${DOMAIN_NAME_KUBEAPI}
  - hostname: ${C2_HOST}
    controlPlane: true
    ipAddress: ${C2_IP4}
    machineSpec: *e2machinespec
    installDiskSelector: *e2installdiskselector
    networkInterfaces:
      - interface: eno1
        dhcp: *dhcp
        addresses:
          - "${C2_IP4}/24"
          - "${C2_IP6}/64"
        mtu: *mtu
        routes: *routes
        vip: *vip
    certSANs: *additionalMachineCertSans
    nodeLabels: *e2nodelabels
    nodeAnnotations: *nodeannotations
    schematic: *e2schematic
    patches: *e2patches
  - hostname: ${C3_HOST}
    controlPlane: true
    ipAddress: ${C3_IP4}
    machineSpec: *e2machinespec
    installDiskSelector: *e2installdiskselector
    networkInterfaces:
      - interface: eno1
        dhcp: *dhcp
        addresses:
          - "${C3_IP4}/24"
          - "${C3_IP6}/64"
        mtu: *mtu
        routes: *routes
        vip: *vip
    certSANs: *additionalMachineCertSans
    nodeLabels: *e2nodelabels
    nodeAnnotations: *nodeannotations
    schematic: *e2schematic
    patches: *e2patches
  - hostname: ${W1_HOST}
    controlPlane: false
    ipAddress: ${W1_IP4}
    machineSpec: &pi4machinespec
      mode: metal
      arch: arm64
    installDisk: &pi4installdisk /dev/sda
    networkInterfaces:
      - interface: eno1
        dhcp: *dhcp
        addresses:
          - "${W1_IP4}/24"
          - "${W1_IP6}/64"
        mtu: *mtu
        routes: *routes
    certSANs: *additionalMachineCertSans
    nodeLabels: &pi4nodelabels
      node-role.kubernetes.io/worker: ""
    nodeAnnotations: *nodeannotations
  - hostname: ${W2_HOST}
    controlPlane: false
    ipAddress: ${W2_IP4}
    machineSpec: *pi4machinespec
    installDisk: *pi4installdisk
    networkInterfaces:
      - interface: eno1
        dhcp: *dhcp
        addresses:
          - "${W2_IP4}/24"
          - "${W2_IP6}/64"
        mtu: *mtu
        routes: *routes
    certSANs: *additionalMachineCertSans
    nodeLabels: *pi4nodelabels
    nodeAnnotations: *nodeannotations

patches:
  - |-
    machine:
      features:
        kubePrism:
          enabled: true
          port: 7445
        hostDNS:
          enabled: true
          # Incompatible with Cilium bpf masquerade. https://github.com/siderolabs/talos/issues/8836
          forwardKubeDNSToHost: false
          resolveMemberNames: true
      files:
        # configure containerd for spegel
        - content: |
            [plugins."io.containerd.cri.v1.images"]
              discard_unpacked_layers = false
          path: /etc/cri/conf.d/20-customization.part
          permissions: 0o644
          op: create
      kubelet:
        extraArgs:
          rotate-server-certificates: true
          max-pods: 150
        extraConfig:
          imageGCLowThresholdPercent: 60
          imageGCHighThresholdPercent: 70
          maxParallelImagePulls: 10
          serializeImagePulls: false
      network:
        disableSearchDomain: true
        nameservers:
          - ${GATEWAY_IP4}
          - 172.64.36.1
          - 172.64.36.2

controlPlane:
  patches:
    # Disable default API server admission plugins so that
    # it does not conflict with mutating admission policy.
    - |-
      - op: replace
        path: /cluster/apiServer/admissionControl
        value: []

    # Enable MutatingAdmissionPolicy feature‐gate
    - |-
      cluster:
        apiServer:
          extraArgs:
            runtime-config: admissionregistration.k8s.io/v1alpha1=true
            feature-gates: MutatingAdmissionPolicy=true

    # Grant Kubernetes‐sidecar access to the Talos API for backups
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:etcd:backup
            allowedKubernetesNamespaces:
              - backups

    # Core cluster settings & resource tweaks
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        network:
          cni:
            name: none
        proxy:
          disabled: true

    # Spegel scheduler: disable ImageLocality scoring
    - |
      cluster:
        scheduler:
          config:
            apiVersion: kubescheduler.config.k8s.io/v1
            kind: KubeSchedulerConfiguration
            profiles:
              - schedulerName: default-scheduler
                plugins:
                  score:
                    disabled:
                      - name: ImageLocality

    # Bootstrap manifests
    - |-
      cluster:
        extraManifests:
          - # renovate: datasource=github-releases depName=kubernetes-sigs/gateway-api
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.3.0/experimental-install.yaml
          #- # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator
          #  https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.84.0/stripped-down-crds.yaml
