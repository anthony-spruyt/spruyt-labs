---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/v3.0.36/pkg/config/schemas/talconfig.json

# renovate: depName=ghcr.io/siderolabs/installer datasource=docker
talosVersion: v1.11.2
# renovate: depName=ghcr.io/siderolabs/kubelet datasource=docker
kubernetesVersion: v1.33.4

clusterName: ${CLUSTER_NAME}
domain: ${CLUSTER_DOMAIN}
endpoint: "https://${KUBEAPI_VIP}:6443"
#endpoint: "https://${E2_3_IP4}:6443"
allowSchedulingOnControlPlanes: false
cniConfig:
  name: none # Cilium
clusterPodNets:
  - ${CLUSTER_POD_CIDR_IP4}
clusterSvcNets:
  - ${CLUSTER_SVC_CIDR_IP4}
additionalApiServerCertSans:
  - ${E2_1_IP4}
  - ${E2_2_IP4}
  - ${E2_3_IP4}
  - ${MS_01_1_IP4}
  - ${MS_01_2_IP4}
  - ${MS_01_3_IP4}
  - 127.0.0.1 # KubePrism
additionalMachineCertSans:
  - ${KUBEAPI_VIP}
  - ${E2_1_IP4}
  - ${E2_2_IP4}
  - ${E2_3_IP4}
  - ${MS_01_1_IP4}
  - ${MS_01_2_IP4}
  - ${MS_01_3_IP4}
  - 127.0.0.1 # KubePrism

nodes:
  - hostname: e2-1
    controlPlane: true
    installDiskSelector:
      serial: P300ADBB25032802523
    ipAddress: ${E2_1_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${E2_1_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
            vip:
              ip: ${KUBEAPI_VIP}
    nodeAnnotations: &e2NodeAnnotations
      installerImage: "{{ .MachineConfig.MachineInstall.InstallImage }}"
    patches: &e2Patches
      # Disable ipv6 auto config
      # Disable ipv6 accept RAs
      - |-
        machine:
          sysctls:
            net.ipv6.conf.enp1s0.autoconf: "0"
            net.ipv6.conf.enp1s0.accept_ra: "0"
      # Set all disks to `none` scheduler (optimal setting for Ceph and ZFS)
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="block", ENV{DEVTYPE}=="disk", ATTR{queue/scheduler}="none"
    schematic: &e2Schematic
      customization:
        secureboot:
          includeWellKnownCertificates: true
        extraKernelArgs:
          - -lockdown # Secure boot lockdown needs updating
          - lockdown=integrity # to integrity for Cilium
          - quiet # Reduce noise
          - loglevel=3 # Reduce noise
          - amd_pstate=1 # Enable AMD CPU boost
          # - talos.auditd.disabled=1 # Less security, faster computer
          # - mitigations=off # Less security, faster computer
          # - apparmor=0 # Less security, faster computer
          # - security=none # Less security, faster computer
          # - init_on_alloc=0 # Less security, faster computer
          # - init_on_free=0 # Less security, faster computer
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/lldpd
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    volumes: &e2TpmEncryptedVolumes
      - name: STATE
        encryption:
          provider: luks2
          keys:
            - slot: 0
              nodeID: {}
            - slot: 1
              tpm: {}
      - name: EPHEMERAL
        encryption:
          provider: luks2
          keys:
            - slot: 0
              nodeID: {}
              lockToState: true
            - slot: 1
              tpm: {}
              lockToState: true
  - hostname: e2-2
    controlPlane: true
    installDiskSelector:
      serial: P300ADBB25032802429
    ipAddress: ${E2_2_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${E2_2_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
            vip:
              ip: ${KUBEAPI_VIP}
    nodeAnnotations: *e2NodeAnnotations
    patches: *e2Patches
    schematic: *e2Schematic
    volumes: *e2TpmEncryptedVolumes
  - hostname: e2-3
    controlPlane: true
    installDiskSelector:
      serial: P300ADBB25032803816
    ipAddress: ${E2_3_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${E2_3_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
            vip:
              ip: ${KUBEAPI_VIP}
    nodeAnnotations: *e2NodeAnnotations
    patches: *e2Patches
    schematic: *e2Schematic
    volumes: *e2TpmEncryptedVolumes
  - hostname: ms-01-1
    controlPlane: false
    installDiskSelector:
      serial: MQ11W14606696
    ipAddress: ${MS_01_1_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp2s0f0np0
        ignore: true
      - interface: enp2s0f1np1
        ignore: true
      - interface: enp87s0
        ignore: true
      - interface: enp89s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${MS_01_1_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
    nodeAnnotations: &ms01NodeAnnotations
      installerImage: "factory.talos.dev/metal-installer-secureboot/358b87443e77784112467ac042afcf9f96ad38c0d2de23d157d836b1eb44a5e8:v1.11.2"
    patches: &ms01Patches
      # Enable Thunderbolt
      # and net
      - |-
        machine:
          kernel:
            modules:
              - name: nbd
              - name: thunderbolt
              - name: thunderbolt_net
      # Disable ipv6 auto config and accept RAs
      - |-
        machine:
          sysctls:
            net.ipv6.conf.enp2s0f0np0.autoconf: "0"
            net.ipv6.conf.enp2s0f0np0.accept_ra: "0"
            net.ipv6.conf.enp2s0f1np1.autoconf: "0"
            net.ipv6.conf.enp2s0f1np1.accept_ra: "0"
            net.ipv6.conf.enp87s0.autoconf: "0"
            net.ipv6.conf.enp87s0.accept_ra: "0"
            net.ipv6.conf.enp89s0.autoconf: "0"
            net.ipv6.conf.enp89s0.accept_ra: "0"
      # Optimize networking for 10Gb/s NICs
      - |-
        machine:
          sysctls:
            net.core.default_qdisc: fq                      # 10Gb/s
            net.ipv4.tcp_congestion_control: bbr            # 10Gb/s
            net.ipv4.tcp_fastopen: 3                        # TCP Fast Open
            net.ipv4.tcp_mtu_probing: 1                     # Jumbo frames
            net.ipv4.tcp_rmem: 4096 87380 33554432          # 10Gb/s
            net.ipv4.tcp_window_scaling: 1                  # 10Gb/s
            net.ipv4.tcp_wmem: 4096 65536 33554432          # 10Gb/s
      # Enable Intel CPU boost
      - |-
        machine:
          sysfs:
            devices.system.cpu.intel_pstate.hwp_dynamic_boost: 1 # Enable CPU boost
      # Intel GPU passthrough
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
      # Auto authorize Thunderbolt devices
      - |-
        machine:
          udev:
            rules:
              - ACTION=="add", SUBSYSTEM=="thunderbolt", ATTR{authorized}=="0", ATTR{authorized}="1"
      # Boost transmit queue length - high-throughput workloads
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tap*", ATTR{tx_queue_len}="10000"
              - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tun*", ATTR{tx_queue_len}="10000"
      # Set all disks to `none` scheduler (optimal setting for Ceph and ZFS)
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="block", ENV{DEVTYPE}=="disk", ATTR{queue/scheduler}="none"
    schematic: &ms01Scehmatic
      customization:
        secureboot:
          includeWellKnownCertificates: true
        extraKernelArgs:
          - -lockdown # Secure boot lockdown needs updating
          - lockdown=integrity # to integrity for Cilium
          - quiet # Reduce noise
          - loglevel=3 # Reduce noise
          - intel_iommu=on # PCI Passthrough
          - iommu=pt # PCI Passthrough
          # - talos.auditd.disabled=1 # Less security, faster computer
          # - mitigations=off # Less security, faster computer
          # - apparmor=0 # Less security, faster computer
          # - security=none # Less security, faster computer
          # - init_on_alloc=0 # Less security, faster computer
          # - init_on_free=0 # Less security, faster computer
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
            - siderolabs/lldpd
            - siderolabs/thunderbolt
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    volumes: &ms01TpmEncryptedVolumes
      - name: STATE
        encryption:
          provider: "luks2"
          keys:
            - slot: 0
              tpm: {}
      - name: EPHEMERAL
        encryption:
          provider: "luks2"
          keys:
            - slot: 0
              tpm: {}
              lockToState: true
  - hostname: "ms-01-2"
    controlPlane: false
    installDiskSelector:
      serial: TBC
    ipAddress: ${MS_01_2_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp2s0f0np0
        ignore: true
      - interface: enp2s0f1np1
        ignore: true
      - interface: enp87s0
        ignore: true
      - interface: enp89s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${MS_01_2_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
    nodeAnnotations: *ms01NodeAnnotations
    patches: *ms01Patches
    schematic: *ms01Scehmatic
    volumes: *ms01TpmEncryptedVolumes
  - hostname: ms-01-3
    controlPlane: false
    installDiskSelector:
      serial: TBC
    ipAddress: ${MS_01_3_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp2s0f0np0
        ignore: true
      - interface: enp2s0f1np1
        ignore: true
      - interface: enp87s0
        ignore: true
      - interface: enp89s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${MS_01_3_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
    nodeAnnotations: *ms01NodeAnnotations
    patches: *ms01Patches
    schematic: *ms01Scehmatic
    volumes: *ms01TpmEncryptedVolumes

controlPlane:
  disableSearchDomain: &disableSearchDomain true
  extensionServices: &extensionServices
    - name: lldpd
      configFiles:
        - content: |
            configure lldpd portidsubtype ifname
            configure system description "Talos Node"
          mountPath: /usr/local/etc/lldpd/lldpd.conf
  nameservers: &nameservers
    - ${GATEWAY_IP4}
  nodeLabels:
    node-role.kubernetes.io/control-plane: ""
  patches:
    # Expose control plane metrics
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
    # Disable default API server admission plugins so that
    # it does not conflict with mutating admission policy.
    - |-
      - op: replace
        path: /cluster/apiServer/admissionControl
        value: []
    # Enable MutatingAdmissionPolicy feature‐gate
    - |-
      cluster:
        apiServer:
          extraArgs:
            # https://kubernetes.io/docs/tasks/extend-kubernetes/configure-aggregation-layer/
            # enable-aggregator-routing: true
            runtime-config: admissionregistration.k8s.io/v1alpha1=true
            feature-gates: MutatingAdmissionPolicy=true
    # Set control plane resources
    # - |-
    #   cluster:
    #     apiServer:
    #       resources:
    #         requests:
    #           cpu: 400m
    #           memory: 1.5G
    #         limits:
    #           memory: 4G
    #     controllerManager:
    #       resources:
    #         requests:
    #           cpu: 100m
    #           memory: 100Mi
    #         limits:
    #           memory: 400Mi
    #     scheduler:
    #       resources:
    #         requests:
    #           cpu: 10m
    #           memory: 100Mi
    #         limits:
    #           memory: 200Mi
    # Configure etcd
    - |-
      cluster:
        etcd:
          extraArgs:
            auto-compaction-retention: 4
    # Spegel scheduler: disable ImageLocality scoring
    - |
      cluster:
        scheduler:
          config:
            apiVersion: kubescheduler.config.k8s.io/v1
            kind: KubeSchedulerConfiguration
            profiles:
              - schedulerName: default-scheduler
                plugins:
                  score:
                    disabled:
                      - name: ImageLocality
    # Bootstrap manifests
    - |-
      cluster:
        extraManifests:
          - # renovate: datasource=github-releases depName=kubernetes-sigs/gateway-api
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.3.0/experimental-install.yaml
          - # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator
            https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.85.0/stripped-down-crds.yaml
          - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/refs/heads/release-8.3/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml
          - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/refs/heads/release-8.3/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml
          - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/refs/heads/release-8.3/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml
          - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/refs/heads/release-8.3/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshotclasses.yaml
          - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/refs/heads/release-8.3/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshotcontents.yaml
          - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/refs/heads/release-8.3/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshots.yaml

worker:
  disableSearchDomain: *disableSearchDomain
  extensionServices: *extensionServices
  nameservers: *nameservers

patches:
  # Enable KubePrism
  - |-
    machine:
      features:
        kubePrism:
          enabled: true
          port: 7445
  # Configure host DNS for Cilium
  - |-
    machine:
      features:
        hostDNS:
          enabled: true
          # Incompatible with Cilium bpf masquerade. https://github.com/siderolabs/talos/issues/8836
          forwardKubeDNSToHost: false
          resolveMemberNames: true
  # Disable KubeProxy in favor of Cilium
  - |-
    cluster:
      proxy:
        disabled: true
  # Wipe disks on install
  - |-
    machine:
      install:
          wipe: true
  # Configure containerd
  - |-
    machine:
      files:
        # dont discard unpacked layers for spegel
        # expose containerd metrics
        # set log level to warn
        - op: create
          path: /etc/cri/conf.d/20-customization.part
          permissions: 0o644
          content: |
            [plugins."io.containerd.cri.v1.images"]
              discard_unpacked_layers = false
            [metrics]
              address = "0.0.0.0:11234"
            [debug]
              level = "warn"
  # Configure kubelet
  - |-
    machine:
      kubelet:
        extraArgs:
          rotate-server-certificates: true
          max-pods: 150
          logging-format: json
        extraConfig:
          imageGCLowThresholdPercent: 60
          imageGCHighThresholdPercent: 70
          maxParallelImagePulls: 10
          serializeImagePulls: false
          shutdownGracePeriod: 60s
          shutdownGracePeriodCriticalPods: 30s
        nodeIP:
          validSubnets:
            - ${CLUSTER_NODE_CIDR_IP4}
  # Set NTP server
  - |-
    machine:
      time:
        disabled: false
        servers:
          - time.cloudflare.com
