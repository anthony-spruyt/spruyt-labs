---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/v3.0.36/pkg/config/schemas/talconfig.json

# renovate: depName=ghcr.io/siderolabs/installer datasource=docker
talosVersion: v1.11.2
# renovate: depName=ghcr.io/siderolabs/kubelet datasource=docker
kubernetesVersion: v1.34.1

clusterName: ${CLUSTER_NAME}
domain: ${CLUSTER_DOMAIN}
endpoint: "https://${KUBEAPI_VIP}:6443"
#endpoint: "https://${E2_3_IP4}:6443"
allowSchedulingOnControlPlanes: false
cniConfig:
  name: none # Cilium
clusterPodNets:
  - ${CLUSTER_POD_CIDR_IP4}
clusterSvcNets:
  - ${CLUSTER_SVC_CIDR_IP4}
additionalApiServerCertSans:
  - ${E2_1_IP4}
  - ${E2_2_IP4}
  - ${E2_3_IP4}
  - ${MS_01_1_IP4}
  - ${MS_01_2_IP4}
  - ${MS_01_3_IP4}
  - 127.0.0.1 # KubePrism
additionalMachineCertSans:
  - ${KUBEAPI_VIP}
  - ${E2_1_IP4}
  - ${E2_2_IP4}
  - ${E2_3_IP4}
  - ${MS_01_1_IP4}
  - ${MS_01_2_IP4}
  - ${MS_01_3_IP4}
  - 127.0.0.1 # KubePrism

nodes:
  - hostname: e2-1
    controlPlane: true
    installDiskSelector:
      serial: 50026B76874DDE95 # Kinston
      # serial: P300ADBB25032802523 # Patriot
    ipAddress: ${E2_1_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${E2_1_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
            vip:
              ip: ${KUBEAPI_VIP}
    nodeAnnotations: &e2NodeAnnotations
      installerImage: "{{ .MachineConfig.MachineInstall.InstallImage }}"
    patches: &e2Patches
      # Disable ipv6 auto config
      # Disable ipv6 accept RAs
      - |-
        machine:
          sysctls:
            net.ipv6.conf.enp1s0.autoconf: "0"
            net.ipv6.conf.enp1s0.accept_ra: "0"
      # Set all disks to `none` scheduler (optimal setting for Ceph and ZFS)
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="block", ENV{DEVTYPE}=="disk", ATTR{queue/scheduler}="none"
    schematic: &e2Schematic
      customization:
        secureboot:
          includeWellKnownCertificates: true
        extraKernelArgs:
          - -lockdown # Secure boot lockdown needs updating
          - lockdown=integrity # to integrity for Cilium
          - quiet # Reduce noise
          - loglevel=3 # Reduce noise
          - amd_pstate=1 # Enable AMD CPU boost
          - pcie_aspm=off # Stop link ASPM transitions
          - pci=pcie_bus_perf # Set device MPS to the largest allowable MPS based on its parent bus.
          - nvme_core.default_ps_maxlatency_us=0 # Prevent entering low PS
          - iommu=pt # PCI Passthrough
          - idle=nomwait # Prevent deep CPU idle states
          - mitigations=off # Less security, faster computer
          - security=none # Less security, faster computer
          - init_on_alloc=0 # Less security, faster computer
          - init_on_free=0 # Less security, faster computer
          - talos.auditd.disabled=1 # Less security, faster computer
          - apparmor=0 # Less security, faster computer
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/lldpd
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    volumes: &e2TpmEncryptedVolumes
      - name: STATE
        encryption:
          provider: luks2
          keys:
            - slot: 0
              nodeID: {}
            - slot: 1
              tpm: {}
      - name: EPHEMERAL
        encryption:
          provider: luks2
          keys:
            - slot: 0
              nodeID: {}
              lockToState: true
            - slot: 1
              tpm: {}
              lockToState: true
  - hostname: e2-2
    controlPlane: true
    installDiskSelector:
      serial: P300ADBB25032802429
    ipAddress: ${E2_2_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${E2_2_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
            vip:
              ip: ${KUBEAPI_VIP}
    nodeAnnotations: *e2NodeAnnotations
    patches: *e2Patches
    schematic: *e2Schematic
    volumes: *e2TpmEncryptedVolumes
  - hostname: e2-3
    controlPlane: true
    installDiskSelector:
      serial: P300ADBB25032803816
    ipAddress: ${E2_3_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${E2_3_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
            vip:
              ip: ${KUBEAPI_VIP}
    nodeAnnotations: *e2NodeAnnotations
    patches: *e2Patches
    schematic: *e2Schematic
    volumes: *e2TpmEncryptedVolumes
  - hostname: ms-01-1
    controlPlane: false
    installDiskSelector:
      serial: MQ11W14606696
    ipAddress: ${MS_01_1_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - deviceSelector: { busPath: 0-1.0 } # Thunderbolt power side
        ignore: true
      - deviceSelector: { busPath: 1-1.0 } # Thunderbolt nic side
        ignore: true
      - interface: enp2s0f0np0
        ignore: true
      - interface: enp2s0f1np1
        ignore: true
      - interface: enp87s0
        ignore: true
      - interface: enp89s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${MS_01_1_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
    nodeAnnotations: &ms01NodeAnnotations
      installerImage: "{{ .MachineConfig.MachineInstall.InstallImage }}"
    patches: &ms01Patches
      # Enable Thunderbolt
      # and net
      - |-
        machine:
          kernel:
            modules:
              - name: nbd
              - name: thunderbolt
              - name: thunderbolt_net
      # Disable ipv6 auto config and accept RAs
      # - |-
      #   machine:
      #     sysctls:
      #       net.ipv6.conf.enp2s0f0np0.autoconf: "0"
      #       net.ipv6.conf.enp2s0f0np0.accept_ra: "0"
      #       net.ipv6.conf.enp2s0f1np1.autoconf: "0"
      #       net.ipv6.conf.enp2s0f1np1.accept_ra: "0"
      #       net.ipv6.conf.enp87s0.autoconf: "0"
      #       net.ipv6.conf.enp87s0.accept_ra: "0"
      #       net.ipv6.conf.enp89s0.autoconf: "0"
      #       net.ipv6.conf.enp89s0.accept_ra: "0"
      # Optimize networking for 10Gb/s NICs
      - |-
        machine:
          sysctls:
            net.core.default_qdisc: fq                      # 10Gb/s
            net.ipv4.tcp_congestion_control: bbr            # 10Gb/s
            net.ipv4.tcp_fastopen: 3                        # TCP Fast Open
            net.ipv4.tcp_mtu_probing: 1                     # Jumbo frames
            net.ipv4.tcp_rmem: 4096 87380 33554432          # 10Gb/s
            net.ipv4.tcp_window_scaling: 1                  # 10Gb/s
            net.ipv4.tcp_wmem: 4096 65536 33554432          # 10Gb/s
      # Enable Intel CPU boost
      - |-
        machine:
          sysfs:
            devices.system.cpu.intel_pstate.hwp_dynamic_boost: 1 # Enable CPU boost
      # Intel GPU passthrough
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
      # Auto authorize Thunderbolt devices
      - |-
        machine:
          udev:
            rules:
              - ACTION=="add", SUBSYSTEM=="thunderbolt", ATTR{authorized}=="0", ATTR{authorized}="1"
      # Boost transmit queue length - high-throughput workloads
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tap*", ATTR{tx_queue_len}="10000"
              - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tun*", ATTR{tx_queue_len}="10000"
      # Set all disks to `none` scheduler (optimal setting for Ceph and ZFS)
      - |-
        machine:
          udev:
            rules:
              - SUBSYSTEM=="block", ENV{DEVTYPE}=="disk", ATTR{queue/scheduler}="none"
    schematic: &ms01Scehmatic
      customization:
        secureboot:
          includeWellKnownCertificates: true
        extraKernelArgs:
          - -lockdown # Secure boot lockdown needs updating
          - lockdown=integrity # to integrity for Cilium
          - quiet # Reduce noise
          - loglevel=3 # Reduce noise
          - intel_iommu=on # PCI Passthrough
          - iommu=pt # PCI Passthrough
          - talos.auditd.disabled=1 # Less security, faster computer
          - mitigations=off # Less security, faster computer - Thunderbolt ring https://gist.github.com/gavinmcfall/ea6cb1233d3a300e9f44caf65a32d519
          - net.ifnames=0 # Thunderbolt ring https://gist.github.com/gavinmcfall/ea6cb1233d3a300e9f44caf65a32d519
          - apparmor=0 # Less security, faster computer
          - security=none # Less security, faster computer
          - init_on_alloc=0 # Less security, faster computer
          - init_on_free=0 # Less security, faster computer
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
            - siderolabs/lldpd
            - siderolabs/thunderbolt
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    volumes: &ms01TpmEncryptedVolumes
      - name: STATE
        encryption:
          provider: "luks2"
          keys:
            - slot: 0
              tpm: {}
      - name: EPHEMERAL
        encryption:
          provider: "luks2"
          keys:
            - slot: 0
              tpm: {}
              lockToState: true
  - hostname: ms-01-2
    controlPlane: false
    installDiskSelector:
      serial: MP46W15115349
    ipAddress: ${MS_01_2_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - deviceSelector: { busPath: 0-1.0 } # Thunderbolt power side
        ignore: true
      - deviceSelector: { busPath: 1-1.0 } # Thunderbolt nic side
        ignore: true
      - interface: enp2s0f0np0
        ignore: true
      - interface: enp2s0f1np1
        ignore: true
      - interface: enp87s0
        ignore: true
      - interface: enp89s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${MS_01_2_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
    nodeAnnotations: *ms01NodeAnnotations
    patches: *ms01Patches
    schematic: *ms01Scehmatic
    volumes: *ms01TpmEncryptedVolumes
  - hostname: ms-01-3
    controlPlane: false
    installDiskSelector:
      serial: MQ19B55500378
    ipAddress: ${MS_01_3_IP4}
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - deviceSelector: { busPath: 0-1.0 } # Thunderbolt power side
        ignore: true
      - deviceSelector: { busPath: 1-1.0 } # Thunderbolt nic side
        ignore: true
      - interface: enp2s0f0np0
        ignore: true
      - interface: enp2s0f1np1
        ignore: true
      - interface: enp87s0
        ignore: true
      - interface: enp89s0
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 20
            addresses:
              - ${MS_01_3_IP4}/24
            routes:
              - network: 0.0.0.0/0
                gateway: ${GATEWAY_IP4}
                metric: 512
    nodeAnnotations: *ms01NodeAnnotations
    patches: *ms01Patches
    schematic: *ms01Scehmatic
    volumes: *ms01TpmEncryptedVolumes

controlPlane:
  disableSearchDomain: &disableSearchDomain true
  extensionServices: &extensionServices
    - name: lldpd
      configFiles:
        - content: |
            configure lldpd portidsubtype ifname
            configure system description "Talos Node"
          mountPath: /usr/local/etc/lldpd/lldpd.conf
  nameservers: &nameservers
    - ${DNS_1}
    - ${DNS_2}
  nodeLabels:
    node-role.kubernetes.io/control-plane: ""
    bgp: "65050"

  patches:
    - "@patches/control-plane/configure-etcd.yaml"
    - "@patches/control-plane/configure-scheduler-for-spegel.yaml"
    - "@patches/control-plane/disable-admissions-plugins.yaml"
    - "@patches/control-plane/configure-api-server.yaml"
    - "@patches/control-plane/expose-metrics.yaml"
    - "@patches/control-plane/extra-manifests.yaml"
    # - "@patches/control-plane/resources.yaml"

worker:
  disableSearchDomain: *disableSearchDomain
  extensionServices: *extensionServices
  nameservers: *nameservers
  nodeLabels:
    bgp: "65050"

patches:
  - "@patches/global/configure-containerd.yaml"
  - "@patches/global/configure-kubelet.yaml"
  - "@patches/global/configure-ntp.yaml"
  - "@patches/global/disable-kube-proxy-for-cilium.yaml"
  - "@patches/global/enable-kube-prism.yaml"
  - "@patches/global/host-dns-for-cilium.yaml"
  - "@patches/global/wipe-disks-on-install.yaml"
