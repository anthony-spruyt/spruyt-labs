---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
clusterName: ${CLUSTER_NAME}
# renovate: depName=ghcr.io/siderolabs/installer datasource=docker
talosVersion: v1.10.4
# renovate: depName=ghcr.io/siderolabs/kubelet datasource=docker
kubernetesVersion: v1.33.2
endpoint: https://${C1_IP}:6443
additionalApiServerCertSans:
  - 127.0.0.1
  - ${API_DOMAIN_NAME}
additionalMachineCertSans:
  - ${C1_IP}
  - 127.0.0.1
  - ${API_DOMAIN_NAME}
domain: ${CLUSTER_DOMAIN}

# Disable as we are going with cilium
cniConfig:
  name: none

nodes:
  - hostname: ctrl-e2-1
    controlPlane: true
    ipAddress: ${C1_IP}
    disableSearchDomain: true
    nameservers:
      - ${NAMESERVER_IP}
    machineSpec:
      mode: metal
      arch: amd64
    installDisk: /dev/nvme0n1
    networkInterfaces:
      - interface: eth0
        dhcp: true
    nodeLabels:
      node-role.kubernetes.io/control-plane: ''
    nodeAnnotations:
      installerImage: '{{ .MachineConfig.MachineInstall.InstallImage }}'
    patches:
      - |-
        machine:
          install:
             wipe: true
  - hostname: ctrl-e2-2
    controlPlane: true
    ipAddress: ${C2_IP}
    disableSearchDomain: true
    nameservers:
      - ${NAMESERVER_IP}
    machineSpec:
      mode: metal
      arch: amd64
    installDisk: /dev/nvme0n1
    networkInterfaces:
      - interface: eth0
        dhcp: true
    nodeLabels:
      node-role.kubernetes.io/control-plane: ''
    nodeAnnotations:
      installerImage: '{{ .MachineConfig.MachineInstall.InstallImage }}'
    patches:
      - |-
        machine:
          install:
             wipe: true
  - hostname: wrk-pi4b4gb-1
    controlPlane: false
    ipAddress: ${W1_IP}
    disableSearchDomain: true
    nameservers:
      - ${NAMESERVER_IP}
    machineSpec:
      mode: metal
      arch: arm64
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: true
    nodeLabels:
      node-role.kubernetes.io/worker: ''
    nodeAnnotations:
      installerImage: '{{ .MachineConfig.MachineInstall.InstallImage }}'
  - hostname: wrk-pi4b8gb-1
    controlPlane: false
    ipAddress: ${W2_IP}
    disableSearchDomain: true
    nameservers:
      - ${NAMESERVER_IP}
    machineSpec:
      mode: metal
      arch: arm64
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: true
    nodeLabels:
      node-role.kubernetes.io/worker: ''
    nodeAnnotations:
      installerImage: '{{ .MachineConfig.MachineInstall.InstallImage }}'

patches:
  - |-
    machine:
      features:
        kubePrism:
          enabled: true
          port: 7445
        hostDNS:
          enabled: true
          # Incompatible with Cilium bpf masquerade. https://github.com/siderolabs/talos/issues/8836
          forwardKubeDNSToHost: false
      files:
        # configure containerd for spegel
        - content: |
            [plugins."io.containerd.cri.v1.images"]
              discard_unpacked_layers = false
          path: /etc/cri/conf.d/20-customization.part
          permissions: 0o644
          op: create
      kubelet:
        extraArgs:
          rotate-server-certificates: true
          max-pods: 150
        extraConfig:
          imageGCLowThresholdPercent: 60
          imageGCHighThresholdPercent: 70
          maxParallelImagePulls: 10
          serializeImagePulls: false
      network:
        disableSearchDomain: false
        extraHostEntries:
          - ip: ${C1_IP}
            aliases:
              - ${API_DOMAIN_NAME}
      #sysctls:
      #  net.core.rmem_max: 67108864            # Cloudflared / QUIC
      #  net.core.wmem_max: 67108864            # Cloudflared / QUIC
      #udev:
      #  rules:
      #    # Transmit queue length
      #    - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tap*", ATTR{tx_queue_len}="10000"
      #    - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tun*", ATTR{tx_queue_len}="10000"

# worker:
#   schematic: &schematic
#     customization:
#       extraKernelArgs:
#         - talos.auditd.disabled=1  # Less security, faster computer
#         - mitigations=off          # Less security, faster computer
#         - apparmor=0               # Less security, faster computer
#         - security=none            # Less security, faster computer
#         - init_on_alloc=0          # Less security, faster computer
#         - init_on_free=0           # Less security, faster computer
#   extensionServices: &extensionServices
#     - name: lldpd
#       configFiles:
#         - content: |
#             configure lldpd portidsubtype ifname
#             configure system description "Talos Node"
#           mountPath: /usr/local/etc/lldpd/lldpd.conf

controlPlane:
  #schematic: *schematic
  #extensionServices: *extensionServices
  patches:

    # Disable default API server admission plugins so that
    # it does not conflict with mutating admission policy.
    - |-
      - op: replace
        path: /cluster/apiServer/admissionControl
        value: []

    # Enable MutatingAdmissionPolicy feature‐gate
    - |-
      cluster:
        apiServer:
          extraArgs:
            runtime-config: admissionregistration.k8s.io/v1alpha1=true
            feature-gates: MutatingAdmissionPolicy=true

    # Grant Kubernetes‐sidecar access to the Talos API for backups
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:etcd:backup
            allowedKubernetesNamespaces:
              - backups

    # Core cluster settings & resource tweaks
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        #apiServer:
        #  extraArgs:
        #    enable-aggregator-routing: true
        #  resources:
        #    requests:
        #      cpu: 300m
        #      memory: 1G
        #    limits:
        #      memory: 2G
        #controllerManager:
        #  extraArgs:
        #    bind-address: 0.0.0.0
        #  resources:
        #    requests:
        #      cpu: 100m
        #      memory: 100Mi
        #    limits:
        #      memory: 300Mi
        #etcd:
        #  extraArgs:
        #    listen-metrics-urls: http://0.0.0.0:2381
        #    auto-compaction-retention: 4
        # Disable default CNI and proxy as we are going with cilium
        network:
          cni:
            name: none
        proxy:
          disabled: true
        #scheduler:
        #  extraArgs:
        #    bind-address: 0.0.0.0
        #  resources:
        #    requests:
        #      cpu: 100m
        #      memory: 256Mi
        #    limits:
        #      memory: 512Mi

    # Spegel scheduler: disable ImageLocality scoring
    - |
      cluster:
        scheduler:
          config:
            apiVersion: kubescheduler.config.k8s.io/v1
            kind: KubeSchedulerConfiguration
            profiles:
              - schedulerName: default-scheduler
                plugins:
                  score:
                    disabled:
                      - name: ImageLocality

    # Bootstrap manifests
    - |-
      cluster:
        extraManifests:
          - # renovate: datasource=github-releases depName=kubernetes-sigs/gateway-api
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.3.0/experimental-install.yaml
          - # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator
            https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.83.0/stripped-down-crds.yaml
