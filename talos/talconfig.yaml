---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
# renovate: depName=ghcr.io/siderolabs/installer datasource=docker
talosVersion: v1.10.7
# renovate: depName=ghcr.io/siderolabs/kubelet datasource=docker
kubernetesVersion: v1.33.4 # version of Kubernetes 1.34.0 is too new to be used with Talos 1.10.7

clusterName: ${CLUSTER_NAME}
#endpoint: https://${DOMAIN_NAME_KUBEAPI}
#endpoint: https://${C1_IP4}:6443
endpoint: https://${KUBEAPI_VIP_IP}:6443
domain: ${CLUSTER_DOMAIN}

additionalApiServerCertSans:
  - 127.0.0.1
  - ${DOMAIN_NAME_KUBEAPI}
  - ${KUBEAPI_VIP_IP}
  - ${C1_IP4}
  - ${C1_IP4_VLAN_10}
  - ${C2_IP4}
  - ${C2_IP4_VLAN_10}
  - ${C3_IP4}
  - ${C3_IP4_VLAN_10}
  - ${C1_IP6}
  - ${C1_IP6_VLAN_10}
  - ${C2_IP6}
  - ${C2_IP6_VLAN_10}
  - ${C3_IP6}
  - ${C3_IP6_VLAN_10}

cniConfig:
  name: none

clusterSvcNets:
  - ${CLUSTER_SVC_NETS_IP4}
  - ${CLUSTER_SVC_NETS_IP6}
clusterPodNets:
  - ${CLUSTER_POD_NETS_IP4}
  - ${CLUSTER_POD_NETS_IP6}

nodes:
  - hostname: ${C1_HOST}
    controlPlane: true
    ipAddress: ${C1_IP4}
    machineSpec: &e2machinespec
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    installDiskSelector: &e2installdiskselector
      size: "<= 300GB"
      model: RTL9210B-CG
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: &dhcp false
        addresses:
          - "${C1_IP4}/24"
          - "${C1_IP6}/64"
        mtu: &mtu 9000
        routes: &routes
          - network: "0.0.0.0/0"
            gateway: "${GATEWAY_IP4}"
            metric: 512
          - network: ::/0
            gateway: "${GATEWAY_IP6}"
            metric: 512
        vip: &vip
          ip: "${KUBEAPI_VIP_IP}"
        vlans:
          - vlanId: 10
            addresses:
              - "${C1_IP4_VLAN_10}/24"
              - "${C1_IP6_VLAN_10}/64"
            mtu: *mtu

    certSANs: &additionalMachineCertSans
      - 127.0.0.1
      - ${DOMAIN_NAME_KUBEAPI}
      - ${KUBEAPI_VIP_IP}
      - ${C1_IP4}
      - ${C1_IP4_VLAN_10}
      - ${C2_IP4}
      - ${C2_IP4_VLAN_10}
      - ${C3_IP4}
      - ${C3_IP4_VLAN_10}
      - ${C1_IP6}
      - ${C1_IP6_VLAN_10}
      - ${C2_IP6}
      - ${C2_IP6_VLAN_10}
      - ${C3_IP6}
      - ${C3_IP6_VLAN_10}
    nodeLabels: &e2nodelabels
      node-role.kubernetes.io/control-plane: ""
      #node.kubernetes.io/exclude-from-external-load-balancers: "" # only use this if not scheduling on control plane
    nodeAnnotations: &nodeannotations
      installerImage: "factory.talos.dev/metal-installer-secureboot/9aa2ecda3ee602d57be72bb3c9b43fc6bc37c7279ea5b36c4e84d91d55853d61:v1.10.7"
    schematic: &e2schematic
      customization:
        secureboot:
          includeWellKnownCertificates: true
        extraKernelArgs:
          - -lockdown
          - lockdown=integrity
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    patches: &e2patches
      - |-
        machine:
          sysctls:
            net.ipv6.conf.enp1s0.autoconf: "0"
            net.ipv6.conf.enp1s0.accept_ra: "0"
          install:
             wipe: true
          systemDiskEncryption:
            ephemeral: &e2encryption
              provider: luks2
              keys:
                - slot: 0
                  nodeID: {}
                - slot: 1
                  tpm: {}
              options:
                - no_read_workqueue
                - no_write_workqueue
            state: *e2encryption
          network:
            extraHostEntries:
              - ip: ${KUBEAPI_VIP_IP}
                aliases:
                  - ${DOMAIN_NAME_KUBEAPI}
  - hostname: ${C2_HOST}
    controlPlane: true
    ipAddress: ${C2_IP4}
    machineSpec: *e2machinespec
    installDiskSelector: *e2installdiskselector
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: *dhcp
        addresses:
          - "${C2_IP4}/24"
          - "${C2_IP6}/64"
        mtu: *mtu
        routes: *routes
        vip: *vip
        vlans:
          - vlanId: 10
            addresses:
              - "${C2_IP4_VLAN_10}/24"
              - "${C2_IP6_VLAN_10}/64"
            mtu: *mtu
    certSANs: *additionalMachineCertSans
    nodeLabels: *e2nodelabels
    nodeAnnotations: *nodeannotations
    schematic: *e2schematic
    patches:
      - |-
        machine:
          sysctls:
            net.ipv6.conf.enp1s0.autoconf: "0"
            net.ipv6.conf.enp1s0.accept_ra: "0"
          install:
             wipe: true
          systemDiskEncryption:
            ephemeral:
              provider: luks2
              keys:
                - slot: 0
                  nodeID: {}
                - slot: 1
                  tpm: {}
              options:
                - no_read_workqueue
                - no_write_workqueue
            state:
          network:
            extraHostEntries:
              - ip: ${KUBEAPI_VIP_IP}
                aliases:
                  - ${DOMAIN_NAME_KUBEAPI}
  - hostname: ${C3_HOST}
    controlPlane: true
    ipAddress: ${C3_IP4}
    machineSpec: *e2machinespec
    installDiskSelector: *e2installdiskselector
    networkInterfaces:
      - interface: eno1
        ignore: true
      - interface: enp1s0
        dhcp: *dhcp
        addresses:
          - "${C3_IP4}/24"
          - "${C3_IP6}/64"
        mtu: *mtu
        routes: *routes
        vip: *vip
        vlans:
          - vlanId: 10
            addresses:
              - "${C3_IP4_VLAN_10}/24"
              - "${C3_IP6_VLAN_10}/64"
            mtu: *mtu
    certSANs: *additionalMachineCertSans
    nodeLabels: *e2nodelabels
    nodeAnnotations: *nodeannotations
    schematic: *e2schematic
    patches: *e2patches
  - hostname: ${W1_HOST}
    controlPlane: false
    ipAddress: ${W1_IP4}
    machineSpec: &pi4machinespec
      mode: metal
      arch: arm64
    installDisk: &pi4installdisk /dev/sda
    networkInterfaces:
      - interface: eno1
        dhcp: *dhcp
        addresses:
          - "${W1_IP4}/24"
          - "${W1_IP6}/64"
        mtu: *mtu
        routes: *routes
    certSANs: *additionalMachineCertSans
    nodeLabels: &pi4nodelabels
      node-role.kubernetes.io/worker: ""
    nodeAnnotations: *nodeannotations
    patches: &rpipatches
      - |-
        machine:
          sysctls:
            net.ipv6.conf.en01.autoconf: "0"
            net.ipv6.conf.eno1.accept_ra: "0"
          install:
             wipe: true
          network:
            extraHostEntries:
              - ip: ${KUBEAPI_VIP_IP}
                aliases:
                  - ${DOMAIN_NAME_KUBEAPI}
  - hostname: ${W2_HOST}
    controlPlane: false
    ipAddress: ${W2_IP4}
    machineSpec: *pi4machinespec
    installDisk: *pi4installdisk
    networkInterfaces:
      - interface: eno1
        dhcp: *dhcp
        addresses:
          - "${W2_IP4}/24"
          - "${W2_IP6}/64"
        mtu: *mtu
        routes: *routes
    certSANs: *additionalMachineCertSans
    nodeLabels: *pi4nodelabels
    nodeAnnotations: *nodeannotations
    patches: *rpipatches

patches:
  - |-
    machine:
      features:
        kubePrism:
          enabled: true
          port: 7445
        hostDNS:
          enabled: true
          # Incompatible with Cilium bpf masquerade. https://github.com/siderolabs/talos/issues/8836
          forwardKubeDNSToHost: false
          resolveMemberNames: true
      files:
        # configure containerd for spegel
        - content: |
            [plugins."io.containerd.cri.v1.images"]
              discard_unpacked_layers = false
          path: /etc/cri/conf.d/20-customization.part
          permissions: 0o644
          op: create
      kubelet:
        extraArgs:
          rotate-server-certificates: true
          max-pods: 150
          logging-format: json
          node-status-update-frequency: "5s"
        extraConfig:
          imageGCLowThresholdPercent: 60
          imageGCHighThresholdPercent: 70
          maxParallelImagePulls: 10
          serializeImagePulls: false
        nodeIP:
          validSubnets:
            - ${CLUSTER_VLAN_CIDR_IP4}
            - ${CLUSTER_VLAN_CIDR_IP6}
      network:
        disableSearchDomain: true
        nameservers:
          - ${LB_IP4_TECHNITIUM}
          - ${LB_IP4_TECHNITIUM_SECONDARY}
          - 172.64.36.1
          - 172.64.36.2
      time:
        servers:
          - time.cloudflare.com

controlPlane:
  patches:
    # Disable default API server admission plugins so that
    # it does not conflict with mutating admission policy.
    - |-
      - op: replace
        path: /cluster/apiServer/admissionControl
        value: []

    # Enable MutatingAdmissionPolicy feature‐gate
    - |-
      cluster:
        apiServer:
          extraArgs:
            runtime-config: admissionregistration.k8s.io/v1alpha1=true
            feature-gates: MutatingAdmissionPolicy=true

    # Grant Kubernetes‐sidecar access to the Talos API for backups
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:etcd:backup
            allowedKubernetesNamespaces:
              - backups

    # Core cluster settings & resource tweaks
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        network:
          cni:
            name: none
        proxy:
          disabled: true

    # Spegel scheduler: disable ImageLocality scoring
    - |
      cluster:
        scheduler:
          config:
            apiVersion: kubescheduler.config.k8s.io/v1
            kind: KubeSchedulerConfiguration
            profiles:
              - schedulerName: default-scheduler
                plugins:
                  score:
                    disabled:
                      - name: ImageLocality

    # Bootstrap manifests
    - |-
      cluster:
        extraManifests:
          - # renovate: datasource=github-releases depName=kubernetes-sigs/gateway-api
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.3.0/experimental-install.yaml
          - # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator
            https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.84.0/stripped-down-crds.yaml
