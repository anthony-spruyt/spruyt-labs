---
apiVersion: v1
kind: Pod
metadata:
  name: __POD_NAME__
  labels:
    app.kubernetes.io/name: kata-podman-probe
    app.kubernetes.io/component: probe-4-no-guest-seccomp
  annotations:
    io.katacontainers.config.runtime.disable_guest_seccomp: "true"
spec:
  runtimeClassName: kata
  restartPolicy: Never
  nodeSelector:
    kata.spruyt-labs/ready: "true"
  containers:
    - name: probe
      image: docker.io/library/fedora:41
      command: ["sleep", "600"]
      securityContext:
        runAsNonRoot: false
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
          add: ["SETUID", "SETGID"]
