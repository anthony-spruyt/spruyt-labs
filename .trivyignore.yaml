---
# Path-specific trivy ignores
# https://trivy.dev/latest/docs/configuration/filtering

misconfigurations:
  # Kubernetes handles health checks via liveness/readiness probes
  - id: AVD-DS-0026
    paths:
      - cmd/shutdown-orchestrator/Dockerfile

  # Hubble SSO ingress needs to be in kube-system (where Cilium runs)
  - id: AVD-KSV-0037
    paths:
      - cluster/apps/traefik/traefik/ingress/kube-system/certificates.yaml
      - cluster/apps/traefik/traefik/ingress/kube-system/ingress-routes.yaml

  # etcd-defrag - must run in kube-system (etcd is a control-plane component)
  - id: AVD-KSV-0037
    paths:
      - cluster/apps/kube-system/etcd-defrag/app/cronjob.yaml
      - cluster/apps/kube-system/etcd-defrag/app/serviceaccount.yaml
  # Alpine is a trusted base image (Docker Official Image)
  - id: AVD-KSV-0125
    paths:
      - cluster/apps/kube-system/etcd-defrag/app/cronjob.yaml

  # ESO/OAuth readers need cross-namespace secret access (least-privilege via resourceNames)
  - id: AVD-KSV-0113
    paths:
      - cluster/apps/authentik-system/authentik/app/external-secrets-rbac.yaml
      - cluster/apps/authentik-system/authentik/app/oauth-secret-rotation/role.yaml

  # kubectl-mcp-server needs pod delete for cleanup and pods/eviction for drain
  # Scale subresources (deployments/scale, statefulsets/scale) are also granted but
  # AVD-KSV-0048 only triggers on the pods delete rule (lines 13-16)
  - id: AVD-KSV-0048
    paths:
      - cluster/apps/kubectl-mcp/kubectl-mcp-server/app/rbac.yaml

  # Authentik outpost deployer needs access to secrets/services/configmaps/deployments to deploy outposts
  # Required for forward-auth SSO pattern
  - id: AVD-KSV-0048
    paths:
      - cluster/apps/**/authentik-outpost-rbac.yaml
  - id: AVD-KSV-0049
    paths:
      - cluster/apps/**/authentik-outpost-rbac.yaml
  - id: AVD-KSV-0056
    paths:
      - cluster/apps/**/authentik-outpost-rbac.yaml
  - id: AVD-KSV-0113
    paths:
      - cluster/apps/**/authentik-outpost-rbac.yaml

  # Shutdown orchestrator needs deployment access for Ceph scaling
  - id: AVD-KSV-0048
    paths:
      - cluster/apps/nut-system/shutdown-orchestrator/rbac-rook-ceph/rbac.yaml

  # bitnami/kubectl only publishes :latest tag (versioned tags require premium registry)
  - id: AVD-KSV-0013
    paths:
      - cluster/apps/authentik-system/authentik/app/oauth-secret-rotation/cronjob.yaml
  # Bitnami is a trusted publisher (VMware/Broadcom) - trivy flags all Docker Hub as "untrusted"
  - id: AVD-KSV-0125
    paths:
      - cluster/apps/authentik-system/authentik/app/oauth-secret-rotation/cronjob.yaml

  # Shutdown orchestrator needs pods/exec to run ceph commands via rook-ceph-tools
  # (scoped to rook-ceph namespace only via namespace-scoped Role)
  - id: AVD-KSV-0053
    paths:
      - cluster/apps/nut-system/shutdown-orchestrator/rbac-rook-ceph/rbac.yaml

  # AWS - Terraform infrastructure ignores
  # Dont need S3 bucket logging
  - id: AVD-AWS-0089
    paths:
      - infra/terraform/**

  # AWS encryption is good enough
  - id: AVD-AWS-0132
    paths:
      - infra/terraform/**

  # Terraform cloud workspaces do need unrestricted S3 IAM policies
  - id: AVD-AWS-0345
    paths:
      - infra/terraform/**

  # Attach policy directly to user, policies are user specific
  - id: AVD-AWS-0143
    paths:
      - infra/terraform/**

