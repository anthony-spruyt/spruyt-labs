  - id: AVD-KSV-0106
    paths:
      - cluster/apps/observability/victoria-metrics-secret-writer/app/etcd-secret-writer.yaml
  # Job deployed to observability namespace, not default - but template uses placeholder
  - id: AVD-KSV-0110
    paths:
      - cluster/apps/observability/victoria-metrics-secret-writer/app/etcd-secret-writer.yaml
  - id: AVD-KSV-0118
    paths:
      - cluster/apps/observability/victoria-metrics-secret-writer/app/etcd-secret-writer.yaml
  # Bitnami is a trusted publisher (VMware/Broadcom)
  - id: AVD-KSV-0125
    paths:
