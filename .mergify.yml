queue_rules:
  - name: "default"
    merge_method: "squash"
    batch_size: 1
    merge_conditions:
      - "#approved-reviews-by >= 1"
      - "-draft"
priority_rules:
  - name: "revert PRs"
    conditions:
      - "label = agent/revert"
    priority: "high"
    allow_checks_interruption: true
  - name: "emergency merge"
    conditions:
      - "label = emergency/merge"
    priority: "high"
    allow_checks_interruption: true
pull_request_rules:
  - name: "auto-merge approved PRs"
    conditions:
      - "#approved-reviews-by >= 1"
      - "-label = blocked"
      - "-draft"
      - "-merged"
    actions:
      queue: {}
  - name: "auto-merge revert PRs"
    conditions:
      - "label = agent/revert"
      - "author~=.*\\[bot\\]$"
      - "-label = blocked"
      - "-merged"
    actions:
      queue: {}
  - name: "cleanup labels on merge"
    conditions:
      - or:
          - "merged"
          - "queue-dequeue-reason = PR_MERGED"
    actions:
      label:
        remove:
          - "agent/safe"
          - "agent/triage"
          - "agent/fixing"
          - "agent/fixable"
  - name: "emergency merge (break glass)"
    conditions:
      - "label = emergency/merge"
      - "author = anthony-spruyt"
      - "-label = blocked"
      - "-draft"
      - "-merged"
    actions:
      queue: {}
  - name: "cleanup labels on close"
    conditions:
      - "closed"
      - "-merged"
    actions:
      label:
        remove:
          - "agent/triage"
          - "agent/fixing"
          - "agent/fixable"
          - "agent/needs-review"
merge_protections:
  - name: "default"
    if:
      - "base = main"
      - "-label = agent/revert"
      - "-label = emergency/merge"
    success_conditions:
      - "#approved-reviews-by >= 1"
  - name: "revert-approved"
    if:
      - "base = main"
      - "label = agent/revert"
    success_conditions:
      - "author~=.*\\[bot\\]$"
  - name: "emergency-merge"
    if:
      - "base = main"
      - "label = emergency/merge"
    success_conditions:
      - "author = anthony-spruyt"
merge_protections_settings:
  reporting_method: "check-runs"
  auto_merge_conditions: true
