EXTENDS: .mega-linter-base.yml
CONFIG_PROPERTIES_TO_APPEND:
  - ENABLE_LINTERS
  - EXCLUDED_DIRECTORIES
ENABLE_LINTERS:
  - GO_GOLANGCI_LINT
  - TERRAFORM_TFLINT
FILTER_REGEX_EXCLUDE: '(CLAUDE\.md$)|.*sops.*|.*/mcp\.json$|cluster/apps/openclaw/openclaw/app/workspace/|\.taskfiles/talos/scripts/'
GO_GOLANGCI_LINT_PRE_COMMANDS:
  - command: "export GOMODCACHE=/tmp/gomod GOPATH=/tmp/gopath && cd cmd/shutdown-orchestrator && go mod download && printf '#!/bin/sh\nexport GOMODCACHE=/tmp/gomod GOPATH=/tmp/gopath\nWS=\"${DEFAULT_WORKSPACE:-/tmp/lint}\"\ncd \"$WS/cmd/shutdown-orchestrator\" || exit 1\nexec golangci-lint \"$@\"\n' > /tmp/golangci-lint-wrapper.sh && chmod +x /tmp/golangci-lint-wrapper.sh"
    cwd: "workspace"
GO_GOLANGCI_LINT_CLI_EXECUTABLE: "/tmp/golangci-lint-wrapper.sh"
EXCLUDED_DIRECTORIES:
  - .output
  - clusterconfig
  - legacy
  - talos
