ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - BASH_SHELLCHECK
  - MARKDOWN_MARKDOWNLINT
  - REPOSITORY_GITLEAKS
  - REPOSITORY_SECRETLINT
  - REPOSITORY_TRIVY
  - SPELL_LYCHEE
  - TERRAFORM_TFLINT
  - YAML_YAMLLINT
FILTER_REGEX_EXCLUDE: '.*sops.*|.*/mcp\.json$'
EXCLUDED_DIRECTORIES:
  - .git
  - talos
  - .kilocode
  - clusterconfig
  - legacy
  - .taskfiles/talos/scripts
DEFAULT_BRANCH: main
IGNORE_GITIGNORED_FILES: true
